<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU Music Player</title>
    
    <script>
        const MUSIC_VERSION = "6.0_PRIVATE_PLAYLIST"; 
        if (localStorage.getItem('maka_music_v') !== MUSIC_VERSION) {
            if ('caches' in window) { caches.keys().then((names) => { names.forEach(name => { caches.delete(name); }); }); }
            localStorage.setItem('maka_music_v', MUSIC_VERSION); window.location.reload(true); 
        }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA ULTRA LUXURY GLASS === */
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; 
            --gold-lux: #D4AF37; --bg-surface: #F0F4F8; 
            --white: #FFFFFF; --text-main: #0F172A; --text-muted: #64748B; 
            --danger: #EF4444; --success: #10B981;
        }
        
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 220px; -webkit-font-smoothing: antialiased; overflow-x: hidden; position: relative; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        /* AMBIENT LIGHT & BACKGROUND */
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.5; animation: floatLight 10s infinite alternate; }
        .light-1 { top: -20%; left: -20%; width: 500px; height: 500px; background: #bfdbfe; }
        .light-2 { top: 40%; right: -30%; width: 400px; height: 400px; background: rgba(212, 175, 55, 0.15); animation-delay: 2s; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(20px, 40px);} }

        /* HEADER */
        .header-music { 
            background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); 
            padding: 40px 20px 30px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            position: relative; z-index: 10; box-shadow: 0 10px 30px rgba(45, 99, 237, 0.25); text-align: center;
        }
        .main-title { font-family: 'Outfit'; font-size: 32px; font-weight: 900; margin: 0; color: white; letter-spacing: -1px; text-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .sub-tag { font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; letter-spacing: 3px; color: var(--gold-lux); text-transform: uppercase; margin-bottom: 5px; display: block; }

        /* TAB NAVIGATION */
        .tab-container { display: flex; justify-content: center; gap: 8px; margin-top: -20px; position: relative; z-index: 15; padding: 0 10px;}
        .btn-tab { background: rgba(255,255,255,0.9); border: 1px solid rgba(255,255,255,0.5); padding: 12px 10px; border-radius: 30px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 10px; color: var(--text-muted); cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; flex: 1; max-width: 140px; display: flex; align-items: center; justify-content: center; gap: 5px;}
        .btn-tab.active { background: var(--electric-blue); color: white; border-color: var(--electric-blue); box-shadow: 0 10px 25px rgba(45,99,237,0.3); }
        .btn-tab.active-priv { background: var(--royal-blue); color: var(--gold-lux); border-color: var(--royal-blue); box-shadow: 0 10px 25px rgba(10,34,89,0.3); }

        /* PLAYLIST CONTAINER */
        .playlist-container { padding: 30px 20px 20px; display: flex; flex-direction: column; gap: 12px; max-width: 800px; margin: 0 auto; position: relative; z-index: 5;}
        
        .song-card { 
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.9); border-radius: 20px; padding: 15px; 
            display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .song-card:active { transform: scale(0.97); }
        .song-card.playing { background: white; border-color: var(--electric-blue); box-shadow: 0 10px 30px rgba(45,99,237,0.15); }
        .song-card.playing-priv { background: white; border-color: var(--gold-lux); box-shadow: 0 10px 30px rgba(212,175,55,0.15); }
        
        .song-icon { 
            width: 50px; height: 50px; border-radius: 15px; background: #F1F5F9; color: var(--electric-blue); 
            display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0;
        }
        .song-card.playing .song-icon { background: var(--electric-blue); color: white; animation: pulsePlay 1.5s infinite; }
        .song-card.playing-priv .song-icon { background: var(--royal-blue); color: var(--gold-lux); animation: pulsePlayPriv 1.5s infinite; }
        
        @keyframes pulsePlay { 0% { box-shadow: 0 0 0 0 rgba(45,99,237,0.4); } 70% { box-shadow: 0 0 0 10px rgba(45,99,237,0); } 100% { box-shadow: 0 0 0 0 rgba(45,99,237,0); } }
        @keyframes pulsePlayPriv { 0% { box-shadow: 0 0 0 0 rgba(212,175,55,0.4); } 70% { box-shadow: 0 0 0 10px rgba(212,175,55,0); } 100% { box-shadow: 0 0 0 0 rgba(212,175,55,0); } }

        .song-info { flex: 1; min-width: 0; }
        .song-title { font-family: 'Outfit'; font-size: 16px; font-weight: 800; color: var(--royal-blue); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;}
        .song-artist { font-size: 12px; font-weight: 600; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-uploader { font-size: 9px; font-weight: 800; color: #94A3B8; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px;}
        .badge-private { background: var(--gold-lux); color: black; padding: 2px 5px; border-radius: 4px; font-size: 8px; margin-left: 5px; vertical-align: middle;}

        .btn-del-song { background: none; border: none; color: var(--danger); font-size: 16px; padding: 10px; cursor: pointer; display: none; }

        /* FLOATING MUSIC PLAYER (BOTTOM) */
        .player-dock { 
            position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 500px; background: rgba(10, 34, 89, 0.95); backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.2); border-radius: 30px; padding: 15px 20px; 
            box-shadow: 0 20px 50px rgba(10,34,89,0.4); display: flex; flex-direction: column; gap: 10px; z-index: 1000;
            transition: 0.3s;
        }

        .player-info-row { display: flex; align-items: center; justify-content: space-between; gap: 15px; }
        .now-playing-text { flex: 1; min-width: 0; }
        .np-title { font-family: 'Outfit'; font-size: 15px; font-weight: 800; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;}
        .np-artist { font-size: 11px; font-weight: 600; color: #94A3B8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .player-controls { display: flex; align-items: center; gap: 15px; }
        .btn-ctrl { background: none; border: none; color: white; font-size: 20px; cursor: pointer; transition: 0.2s; }
        .btn-ctrl:active { transform: scale(0.8); }
        .btn-play-main { width: 45px; height: 45px; border-radius: 50%; background: var(--gold-lux); color: black; display: flex; align-items: center; justify-content: center; font-size: 20px; border: none; cursor: pointer; box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4); }

        .progress-container { width: 100%; display: flex; align-items: center; gap: 10px; }
        .time-text { font-size: 10px; font-weight: 700; color: #94A3B8; font-family: 'Space Grotesk'; }
        .progress-bar { flex: 1; height: 6px; background: rgba(255,255,255,0.2); border-radius: 10px; position: relative; cursor: pointer; overflow: hidden; }
        .progress-fill { position: absolute; left: 0; top: 0; height: 100%; background: var(--electric-blue); width: 0%; border-radius: 10px; pointer-events: none;}

        /* FAB ADD SONG */
        .fab-add { 
            position: fixed; bottom: 190px; right: 20px; width: 55px; height: 55px; 
            background: linear-gradient(135deg, var(--electric-blue) 0%, var(--royal-blue) 100%); 
            color: white; border-radius: 20px; display: flex; align-items: center; justify-content: center; 
            font-size: 22px; box-shadow: 0 10px 30px rgba(45,99,237,0.4); border: 2px solid white; cursor: pointer; z-index: 999; transition: 0.2s;
        }
        .fab-add:active { transform: scale(0.9); }

        .fab-local {
            position: fixed; bottom: 190px; right: 20px; width: 55px; height: 55px; 
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%); 
            color: white; border-radius: 20px; display: none; align-items: center; justify-content: center; 
            font-size: 22px; box-shadow: 0 10px 30px rgba(16,185,129,0.4); border: 2px solid white; cursor: pointer; z-index: 999; transition: 0.2s;
        }
        .fab-local:active { transform: scale(0.9); }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.6); backdrop-filter: blur(10px); display: none; align-items: flex-end; justify-content: center; z-index: 99999; }
        .modal-box { background: #F8FAFC; width: 100%; max-width: 500px; border-top-left-radius: 35px; border-top-right-radius: 35px; border-top: 1px solid rgba(255,255,255,0.5); padding: 30px 25px; box-shadow: 0 -10px 50px rgba(0,0,0,0.2); transform: translateY(100%); animation: slideUp 0.4s forwards cubic-bezier(0.19, 1, 0.22, 1); }
        @keyframes slideUp { to { transform: translateY(0); } }
        
        .inp-group { margin-bottom: 15px; }
        .inp-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
        .inp-text { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid #E2E8F0; background: white; font-family: 'Inter'; font-weight: 600; outline: none; transition: 0.2s;}
        .inp-text:focus { border-color: var(--electric-blue); box-shadow: 0 0 0 3px rgba(45,99,237,0.1); }
        .btn-submit { width: 100%; padding: 18px; border: none; border-radius: 18px; background: var(--electric-blue); color: white; font-family: 'Space Grotesk'; font-size: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(45,99,237,0.3); margin-top: 10px; transition: 0.2s;}
        .btn-submit:active { transform: scale(0.98); }

        /* BACK NAV */
        .back-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; text-align: center; }
        .btn-premium-back { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(45,99,237,0.2); color: var(--royal-blue); padding: 14px; border-radius: 50px; font-family: 'Space Grotesk'; font-size: 12px; font-weight: 800; display: inline-flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <header class="header-music">
        <span class="sub-tag">COMMUNITY PLAYLIST</span>
        <h1 class="main-title">MLU MUSIC</h1>
    </header>

    <div class="tab-container">
        <button class="btn-tab active" id="tabOnline" onclick="switchMode('online')"><i class="fas fa-globe"></i> UMUM</button>
        <button class="btn-tab" id="tabPrivate" onclick="switchMode('private')"><i class="fas fa-lock"></i> PRIBADI</button>
        <button class="btn-tab" id="tabLocal" onclick="switchMode('local')"><i class="fas fa-folder-open"></i> LOKAL</button>
    </div>

    <div class="playlist-container" id="playlistOnline">
        <div style="text-align:center; padding: 50px; color: #94A3B8; font-weight: 600;">
            <i class="fas fa-circle-notch fa-spin" style="font-size:24px; color:var(--electric-blue); margin-bottom:10px;"></i><br>
            Memuat Lagu...
        </div>
    </div>

    <div class="playlist-container" id="playlistPrivate" style="display: none;">
        <div style="text-align:center; padding: 50px; color: #94A3B8; font-weight: 600;">
            <i class="fas fa-lock" style="font-size:24px; color:var(--gold-lux); margin-bottom:10px;"></i><br>
            Memuat Brankas Lagu...
        </div>
    </div>

    <div class="playlist-container" id="playlistLocal" style="display: none;">
        <div style="text-align:center; padding: 30px; color: #94A3B8; border: 2px dashed #CBD5E1; border-radius: 20px;">
            <i class="fas fa-folder-plus" style="font-size:40px; color:#CBD5E1; margin-bottom:15px;"></i><br>
            <div style="font-family:'Space Grotesk'; font-weight:800; font-size:16px; color:var(--royal-blue); margin-bottom:5px;">Pilih Lagu dari HP</div>
            <div style="font-size:12px; margin-bottom:15px; color: var(--danger); font-weight: bold;">Perhatian: Lagu akan hilang jika aplikasi ditutup. Gunakan Playlist Pribadi untuk simpan permanen.</div>
        </div>
    </div>

    <audio id="mainAudio" preload="metadata"></audio>
    <input type="file" id="localFileInput" accept="audio/*" multiple style="display:none;" onchange="handleLocalFiles(event)">

    <div class="player-dock" id="playerDock" style="display: none;">
        <div class="player-info-row">
            <div class="now-playing-text">
                <div class="np-title" id="npTitle">Pilih Lagu</div>
                <div class="np-artist" id="npArtist">Unknown Artist</div>
            </div>
            <div class="player-controls">
                <button class="btn-ctrl" onclick="prevSong()"><i class="fas fa-backward"></i></button>
                <button class="btn-play-main" id="btnPlayPause" onclick="togglePlay()"><i class="fas fa-play"></i></button>
                <button class="btn-ctrl" onclick="nextSong()"><i class="fas fa-forward"></i></button>
            </div>
        </div>
        <div class="progress-container">
            <span class="time-text" id="currentTime">0:00</span>
            <div class="progress-bar" id="progressBar" onclick="seekAudio(event)">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span class="time-text" id="durationTime">0:00</span>
        </div>
    </div>

    <button class="fab-add" id="fabOnline" onclick="openAddModal()"><i class="fas fa-plus"></i></button>
    <button class="fab-local" id="fabLocal" onclick="document.getElementById('localFileInput').click()"><i class="fas fa-folder-open"></i></button>

    <div class="back-nav">
        <a href="dashboard.html" class="btn-premium-back"><i class="fas fa-home"></i> KEMBALI KE DASHBOARD</a>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="modal-box">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <div style="font-family:'Space Grotesk'; font-size:20px; font-weight:900; color:var(--royal-blue);">Tambah Lagu Permanen</div>
                <button style="background:#F1F5F9; border:none; width:35px; height:35px; border-radius:50%; color:#64748B; cursor:pointer;" onclick="closeAddModal()"><i class="fas fa-times"></i></button>
            </div>

            <div class="inp-group">
                <label class="inp-label">Tipe Penyimpanan</label>
                <select id="inpTipe" class="inp-text" style="background: #FFFBEB; border-color: var(--gold-lux); color: var(--royal-blue);">
                    <option value="public">🌐 Radio Umum (Semua Member Bisa Putar)</option>
                    <option value="private" selected>🔒 Pribadi (Hanya Muncul di HP Saya)</option>
                </select>
            </div>

            <div class="inp-group">
                <label class="inp-label">Judul Lagu</label>
                <input type="text" id="inpJudul" class="inp-text" placeholder="Contoh: Kangen">
            </div>

            <div class="inp-group">
                <label class="inp-label">Penyanyi / Band</label>
                <input type="text" id="inpArtis" class="inp-text" placeholder="Contoh: Dewa 19">
            </div>

            <div class="inp-group">
                <label class="inp-label">Link Lagu (URL dari Catbox/Drive)</label>
                <textarea id="inpLink" class="inp-text" style="height:80px; resize:none;" placeholder="https://..."></textarea>
            </div>

            <button class="btn-submit" id="btnSaveSong" onclick="saveSong()">SIMPAN LAGU</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // CEK USER
        let uData = null; try { uData = JSON.parse(localStorage.getItem('maka_user')); } catch (e) {}
        if (!uData || !uData.plat) window.location.href = 'index.html';
        const myName = uData.namaKtp || uData.namaWa || "User";
        const myPlat = uData.plat;
        const isAdmin = uData.isSuperAdmin || (uData.role && uData.role !== 'KELUARGA MLU' && uData.role !== 'GUEST');

        function cleanStr(s) { return s ? s.replace(/[^A-Z0-9]/gi, '').toUpperCase() : ''; }

        // STATE VARIABEL
        let modePlay = 'private'; // Default sekarang buka yg Private aja bos
        let playlistOnline = [];
        let playlistPrivate = [];
        let playlistLocal = [];
        let currentIndexOnline = -1;
        let currentIndexPrivate = -1;
        let currentIndexLocal = -1;
        
        const audio = document.getElementById('mainAudio');
        const playPauseBtn = document.getElementById('btnPlayPause');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');

        // SWITCH TAB 
        window.switchMode = (mode) => {
            modePlay = mode;
            
            // Reset Active Class
            document.getElementById('tabOnline').className = 'btn-tab';
            document.getElementById('tabPrivate').className = 'btn-tab';
            document.getElementById('tabLocal').className = 'btn-tab';
            
            // Hide All Containers
            document.getElementById('playlistOnline').style.display = 'none';
            document.getElementById('playlistPrivate').style.display = 'none';
            document.getElementById('playlistLocal').style.display = 'none';

            if(mode === 'online') {
                document.getElementById('tabOnline').classList.add('active');
                document.getElementById('playlistOnline').style.display = 'flex';
                document.getElementById('fabOnline').style.display = 'flex';
                document.getElementById('fabLocal').style.display = 'none';
            } else if (mode === 'private') {
                document.getElementById('tabPrivate').classList.add('active-priv');
                document.getElementById('playlistPrivate').style.display = 'flex';
                document.getElementById('fabOnline').style.display = 'flex';
                document.getElementById('fabLocal').style.display = 'none';
            } else {
                document.getElementById('tabLocal').classList.add('active');
                document.getElementById('playlistLocal').style.display = 'flex';
                document.getElementById('fabLocal').style.display = 'flex';
                document.getElementById('fabOnline').style.display = 'none';
            }
        };

        // Initialize Tab at startup
        setTimeout(() => switchMode('private'), 100);

        // MESIN PENERJEMAH LINK MULTI-PLATFORM
        function convertDirectLink(url) {
            if (url.includes('drive.google.com')) {
                let id = "";
                if (url.includes('/d/')) { id = url.split('/d/')[1].split('/')[0]; } 
                else if (url.includes('id=')) { id = url.split('id=')[1].split('&')[0]; }
                if (id) return `https://drive.google.com/uc?export=download&id=${id}`;
            }
            if (url.includes('dropbox.com')) return url.replace('www.dropbox.com', 'dl.dropboxusercontent.com').replace('?dl=0', '');
            return url;
        }

        // LOAD DATA ONLINE & PRIVATE DARI FIREBASE
        onSnapshot(query(collection(db, 'mlu_music'), orderBy('timestamp', 'desc')), (snap) => {
            const listOnline = document.getElementById('playlistOnline');
            const listPrivate = document.getElementById('playlistPrivate');
            
            playlistOnline = [];
            playlistPrivate = [];
            listOnline.innerHTML = "";
            listPrivate.innerHTML = "";

            if (snap.empty) {
                listOnline.innerHTML = '<div style="text-align:center; padding:30px; color:#94A3B8;">Belum ada lagu di Radio Umum.</div>';
                listPrivate.innerHTML = '<div style="text-align:center; padding:30px; color:#94A3B8;">Brankas lagu Anda masih kosong.</div>';
                return;
            }

            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (d.isPrivate) {
                    if (cleanStr(d.uploaderPlat) === cleanStr(myPlat)) {
                        playlistPrivate.push({ id: docSnap.id, ...d });
                    }
                } else {
                    playlistOnline.push({ id: docSnap.id, ...d });
                }
            });

            // RENDER UMUM
            if(playlistOnline.length === 0) {
                listOnline.innerHTML = '<div style="text-align:center; padding:30px; color:#94A3B8;">Belum ada lagu di Radio Umum.</div>';
            } else {
                playlistOnline.forEach((song, index) => {
                    const canDel = isAdmin || (cleanStr(song.uploaderPlat) === cleanStr(myPlat));
                    const delBtn = canDel ? `<button class="btn-del-song" style="display:block;" onclick="event.stopPropagation(); deleteSong('${song.id}')"><i class="fas fa-trash"></i></button>` : '';
                    
                    listOnline.innerHTML += `
                        <div class="song-card" id="card-online-${index}" onclick="playSong(${index}, 'online')">
                            <div class="song-icon"><i class="fas fa-globe"></i></div>
                            <div class="song-info">
                                <div class="song-title">${song.title}</div>
                                <div class="song-artist">${song.artist}</div>
                                <div class="song-uploader">Added by: ${song.uploaderName}</div>
                            </div>
                            ${delBtn}
                        </div>
                    `;
                });
            }

            // RENDER PRIBADI
            if(playlistPrivate.length === 0) {
                listPrivate.innerHTML = '<div style="text-align:center; padding:30px; color:#94A3B8;"><i class="fas fa-lock" style="font-size:30px; color:var(--gold-lux); margin-bottom:10px;"></i><br>Brankas lagu Anda masih kosong. Tambahkan lagu dengan ikon +</div>';
            } else {
                playlistPrivate.forEach((song, index) => {
                    const delBtn = `<button class="btn-del-song" style="display:block;" onclick="event.stopPropagation(); deleteSong('${song.id}')"><i class="fas fa-trash"></i></button>`;
                    
                    listPrivate.innerHTML += `
                        <div class="song-card" id="card-private-${index}" onclick="playSong(${index}, 'private')" style="border-left: 4px solid var(--gold-lux);">
                            <div class="song-icon" style="background:var(--royal-blue); color:var(--gold-lux);"><i class="fas fa-lock"></i></div>
                            <div class="song-info">
                                <div class="song-title">${song.title} <span class="badge-private">PRIVATE</span></div>
                                <div class="song-artist">${song.artist}</div>
                            </div>
                            ${delBtn}
                        </div>
                    `;
                });
            }
        });

        // LOAD DATA LOCAL
        window.handleLocalFiles = (event) => {
            const files = event.target.files;
            if (files.length === 0) return;

            const list = document.getElementById('playlistLocal');
            if (playlistLocal.length === 0) list.innerHTML = ""; 

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const fileURL = URL.createObjectURL(file);
                const rawName = file.name.replace(/\.[^/.]+$/, ""); 
                
                playlistLocal.push({ title: rawName, artist: "Local File", url: fileURL });
                const index = playlistLocal.length - 1;
                
                list.innerHTML += `
                    <div class="song-card" id="card-local-${index}" onclick="playSong(${index}, 'local')">
                        <div class="song-icon" style="background:#ECFDF5; color:var(--success);"><i class="fas fa-folder"></i></div>
                        <div class="song-info">
                            <div class="song-title" style="color:var(--text-main);">${rawName}</div>
                            <div class="song-artist">Local Device (Temporary)</div>
                        </div>
                    </div>
                `;
            }
        };

        // KONTROL AUDIO UTAMA
        window.playSong = (index, sourceMode) => {
            let currentList, currentIndexVar, prefixCard, activeClass;
            
            if (sourceMode === 'online') { currentList = playlistOnline; currentIndexVar = currentIndexOnline; prefixCard = 'card-online-'; activeClass = 'playing'; }
            else if (sourceMode === 'private') { currentList = playlistPrivate; currentIndexVar = currentIndexPrivate; prefixCard = 'card-private-'; activeClass = 'playing-priv'; }
            else { currentList = playlistLocal; currentIndexVar = currentIndexLocal; prefixCard = 'card-local-'; activeClass = 'playing'; }

            if (currentList.length === 0) return;
            
            // Matikan indikator sebelumnya
            if (currentIndexOnline !== -1) { let old = document.getElementById(`card-online-${currentIndexOnline}`); if(old) old.classList.remove('playing'); }
            if (currentIndexPrivate !== -1) { let old = document.getElementById(`card-private-${currentIndexPrivate}`); if(old) old.classList.remove('playing-priv'); }
            if (currentIndexLocal !== -1) { let old = document.getElementById(`card-local-${currentIndexLocal}`); if(old) old.classList.remove('playing'); }

            // Update State
            modePlay = sourceMode;
            if(sourceMode === 'online') { currentIndexOnline = index; currentIndexPrivate = -1; currentIndexLocal = -1; }
            else if(sourceMode === 'private') { currentIndexPrivate = index; currentIndexOnline = -1; currentIndexLocal = -1; }
            else { currentIndexLocal = index; currentIndexOnline = -1; currentIndexPrivate = -1; }

            const song = currentList[index];
            
            // Nyalakan indikator lagu yang baru
            const newCard = document.getElementById(`${prefixCard}${index}`);
            if(newCard) newCard.classList.add(activeClass);

            // Set UI Player
            document.getElementById('playerDock').style.display = 'flex';
            document.getElementById('npTitle').innerText = song.title;
            document.getElementById('npArtist').innerText = song.artist;

            // Set Source & Play
            audio.src = (sourceMode === 'online' || sourceMode === 'private') ? convertDirectLink(song.driveUrl) : song.url;
            audio.play().then(() => {
                playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            }).catch(e => {
                alert("Gagal memutar lagu. Pastikan format file didukung atau akses link terbuka.");
                console.error(e);
            });
        };

        window.togglePlay = () => {
            let currentList, currentIndexVar;
            if (modePlay === 'online') { currentList = playlistOnline; currentIndexVar = currentIndexOnline; }
            else if (modePlay === 'private') { currentList = playlistPrivate; currentIndexVar = currentIndexPrivate; }
            else { currentList = playlistLocal; currentIndexVar = currentIndexLocal; }

            if (currentIndexVar === -1) {
                if(currentList.length > 0) playSong(0, modePlay);
                return;
            }
            if (audio.paused) { audio.play(); playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>'; } 
            else { audio.pause(); playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; }
        };

        window.nextSong = () => {
            let currentList, currentIndexVar;
            if (modePlay === 'online') { currentList = playlistOnline; currentIndexVar = currentIndexOnline; }
            else if (modePlay === 'private') { currentList = playlistPrivate; currentIndexVar = currentIndexPrivate; }
            else { currentList = playlistLocal; currentIndexVar = currentIndexLocal; }

            if(currentList.length === 0) return;
            let nextIndex = currentIndexVar + 1;
            if(nextIndex >= currentList.length) nextIndex = 0;
            playSong(nextIndex, modePlay);
        };

        window.prevSong = () => {
            let currentList, currentIndexVar;
            if (modePlay === 'online') { currentList = playlistOnline; currentIndexVar = currentIndexOnline; }
            else if (modePlay === 'private') { currentList = playlistPrivate; currentIndexVar = currentIndexPrivate; }
            else { currentList = playlistLocal; currentIndexVar = currentIndexLocal; }

            if(currentList.length === 0) return;
            let prevIndex = currentIndexVar - 1;
            if(prevIndex < 0) prevIndex = currentList.length - 1;
            playSong(prevIndex, modePlay);
        };

        audio.addEventListener('ended', window.nextSong);

        audio.addEventListener('timeupdate', () => {
            const current = audio.currentTime; const duration = audio.duration;
            if (!isNaN(duration)) {
                const progressPercent = (current / duration) * 100;
                progressFill.style.width = `${progressPercent}%`;
                
                let currentMin = Math.floor(current / 60); let currentSec = Math.floor(current % 60);
                if(currentSec < 10) currentSec = `0${currentSec}`;
                currentTimeEl.innerText = `${currentMin}:${currentSec}`;
                
                let durMin = Math.floor(duration / 60); let durSec = Math.floor(duration % 60);
                if(durSec < 10) durSec = `0${durSec}`;
                durationTimeEl.innerText = `${durMin}:${durSec}`;
            }
        });

        window.seekAudio = (e) => {
            if (audio.duration) {
                const clickX = e.offsetX; const width = progressBar.clientWidth;
                audio.currentTime = (clickX / width) * audio.duration;
            }
        };

        // FUNGSI MODAL
        window.openAddModal = () => {
            document.getElementById('inpTipe').value = (modePlay === 'private') ? 'private' : 'public';
            document.getElementById('inpJudul').value = '';
            document.getElementById('inpArtis').value = '';
            document.getElementById('inpLink').value = '';
            const m = document.getElementById('addModal');
            m.style.display = 'flex'; setTimeout(()=>m.classList.add('show'),10);
        };
        
        window.closeAddModal = () => {
            const m = document.getElementById('addModal');
            m.classList.remove('show'); setTimeout(()=>m.style.display = 'none',300);
        };

        window.saveSong = async () => {
            const isPrivate = document.getElementById('inpTipe').value === 'private';
            const title = document.getElementById('inpJudul').value.trim();
            const artist = document.getElementById('inpArtis').value.trim() || 'Unknown Artist';
            const link = document.getElementById('inpLink').value.trim();
            const btn = document.getElementById('btnSaveSong');

            if (!title || !link) return alert("Judul lagu dan Link wajib diisi!");
            if (!link.includes('drive.google.com') && !link.includes('dropbox.com') && !link.includes('catbox.moe') && !link.endsWith('.mp3')) {
                return alert("Gunakan link dari Catbox.moe, Google Drive, atau Dropbox!");
            }

            btn.innerText = "MENYIMPAN..."; btn.style.opacity = '0.7';

            try {
                await addDoc(collection(db, 'mlu_music'), {
                    title: title, artist: artist, driveUrl: link, 
                    isPrivate: isPrivate,
                    uploaderName: myName, uploaderPlat: myPlat, timestamp: Date.now()
                });
                closeAddModal();
                
                // Pindah ke tab yang sesuai
                switchMode(isPrivate ? 'private' : 'online');

            } catch(e) { alert("Gagal: " + e.message); } 
            finally { btn.innerText = "SIMPAN LAGU"; btn.style.opacity = '1'; }
        };

        window.deleteSong = async (id) => {
            if(confirm("Yakin ingin menghapus lagu ini secara permanen?")) {
                await deleteDoc(doc(db, 'mlu_music', id));
            }
        };
    </script>
</body>
</html>
