<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uang Kas KC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA HITAM PEKAT (KC) === */
        :root { 
            --kc-yellow: #D4FF00; 
            --kc-green: #10B981; 
            --bg-black: #000000;
        }
        body { margin: 0; background: var(--bg-black); font-family: 'Inter', sans-serif; color: #fff; padding-bottom: 50px; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; text-decoration: none; outline: none;}

        /* HEADER */
        .header { background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); padding: 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-back { color: white; font-size: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .header-title h1 { margin: 0; font-family: 'Space Grotesk'; font-size: 20px; color: var(--kc-yellow); letter-spacing: 1px; }
        .header-title p { margin: 0; font-size: 10px; color: #94a3b8; font-weight: 600; letter-spacing: 1px; }

        /* KARTU SALDO */
        .balance-card { margin: 20px; background: linear-gradient(135deg, #111 0%, #050505 100%); border: 1px solid rgba(212,255,0,0.2); border-radius: 24px; padding: 30px 20px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.8); position: relative; overflow: hidden;}
        .glow-effect { position: absolute; width: 150px; height: 150px; background: var(--kc-yellow); filter: blur(60px); opacity: 0.1; top: -50px; left: 50%; transform: translateX(-50%); pointer-events: none;}
        .balance-label { font-size: 11px; color: #94a3b8; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; position: relative; z-index: 2;}
        .balance-amount { font-family: 'Space Grotesk'; font-size: 38px; font-weight: 900; color: var(--kc-yellow); text-shadow: 0 0 20px rgba(212,255,0,0.3); margin-bottom: 20px; position: relative; z-index: 2;}
        
        .btn-add { display: none; background: var(--kc-yellow); color: black; border: none; padding: 12px 24px; border-radius: 12px; font-family: 'Space Grotesk'; font-weight: 900; font-size: 12px; cursor: pointer; margin: 0 auto; box-shadow: 0 5px 15px rgba(212,255,0,0.2); position: relative; z-index: 2;}

        /* DAFTAR TRANSAKSI */
        .tx-container { padding: 0 20px; }
        .tx-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .tx-title { font-family: 'Space Grotesk'; font-size: 14px; color: white; letter-spacing: 1px;}
        .tx-count { font-size: 11px; color: #64748b; font-weight: 600; background: #111; padding: 4px 10px; border-radius: 20px;}

        .tx-list { display: flex; flex-direction: column; gap: 10px; }
        .tx-item { background: #111; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .tx-icon { width: 45px; height: 45px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;}
        .tx-in .tx-icon { background: rgba(16,185,129,0.1); color: var(--kc-green); border: 1px solid rgba(16,185,129,0.2);}
        .tx-out .tx-icon { background: rgba(239,68,68,0.1); color: #EF4444; border: 1px solid rgba(239,68,68,0.2);}
        
        .tx-info { flex: 1; margin: 0 15px; overflow: hidden;}
        .tx-desc { font-size: 13px; font-weight: 700; color: white; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .tx-date { font-size: 10px; color: #64748b; font-family: 'Inter'; font-weight: 500;}
        
        .tx-amount { font-family: 'Space Grotesk'; font-size: 15px; font-weight: 800; text-align: right;}
        .tx-in .tx-amount { color: var(--kc-green); }
        .tx-in .tx-amount::before { content: "+ "; }
        .tx-out .tx-amount { color: #EF4444; }
        .tx-out .tx-amount::before { content: "- "; }

        /* MODAL TAMBAH KAS */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #111; width: 90%; max-width: 350px; border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); }
        .modal-title { font-family: 'Space Grotesk'; font-size: 18px; color: var(--kc-yellow); margin: 0 0 20px 0; text-align: center;}
        
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 10px; color: #94a3b8; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        .input-group select, .input-group input { width: 100%; padding: 12px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: #000; color: white; font-family: 'Inter'; font-size: 14px; outline: none;}
        .input-group input:focus { border-color: var(--kc-yellow); }
        
        .modal-btns { display: flex; gap: 10px; margin-top: 25px; }
        .btn-cancel { flex: 1; background: #222; color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer;}
        .btn-save { flex: 1; background: var(--kc-yellow); color: black; border: none; padding: 14px; border-radius: 14px; font-weight: 800; cursor: pointer; font-family: 'Space Grotesk';}
    </style>
</head>
<body>

    <div class="header">
        <a href="dashboard_kc.html" class="btn-back"><i class="fas fa-chevron-left"></i></a>
        <div class="header-title">
            <h1>UANG KAS KC</h1>
            <p>TRANSPARANSI KARTIKA CHANDRA</p>
        </div>
    </div>

    <div class="balance-card">
        <div class="glow-effect"></div>
        <div class="balance-label">TOTAL KAS SAAT INI</div>
        <div class="balance-amount" id="totalKas">Rp 0</div>
        <button class="btn-add" id="btnAddTx" onclick="openModal()">+ CATAT TRANSAKSI</button>
    </div>

    <div class="tx-container">
        <div class="tx-header">
            <div class="tx-title">RIWAYAT TRANSAKSI</div>
            <div class="tx-count" id="txCount">0 Data</div>
        </div>
        <div class="tx-list" id="txList">
            <div style="text-align:center; color:#64748b; font-size:12px; padding:20px;">Memuat data kas...</div>
        </div>
    </div>

    <div class="modal-overlay" id="txModal">
        <div class="modal-box">
            <h2 class="modal-title">CATAT KAS KC</h2>
            <div class="input-group">
                <label>Jenis Transaksi</label>
                <select id="txType">
                    <option value="in">PEMASUKAN (KAS MASUK)</option>
                    <option value="out">PENGELUARAN (KAS KELUAR)</option>
                </select>
            </div>
            <div class="input-group">
                <label>Nominal (Rp)</label>
                <input type="number" id="txAmount" placeholder="Contoh: 50000" inputmode="numeric">
            </div>
            <div class="input-group">
                <label>Keterangan / Catatan</label>
                <input type="text" id="txDesc" placeholder="Contoh: Uang kas dari Bro Ricky">
            </div>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">BATAL</button>
                <button class="btn-save" onclick="simpanTransaksi()">SIMPAN</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // MENGGUNAKAN DATABASE KHUSUS KARTIKA CHANDRA
        const appKC = initializeApp({ apiKey: "AIzaSyDDVYQSjmJEn_RvIUotSxbh8L-ysJMCthk", authDomain: "kartikachandrafc.firebaseapp.com", projectId: "kartikachandrafc" }, "AppKC");
        const dbKC = getFirestore(appKC);

        // Ambil Data User yang Sedang Login
        let uData = null;
        try { uData = JSON.parse(localStorage.getItem('maka_user')); } catch (e) {}
        if (!uData || !uData.plat) window.location.href = 'index_kc.html';

        // Cek Hak Akses (Tombol Tambah Kas)
        const role = (uData.role || "").toUpperCase();
        const plat = (uData.plat || "").replace(/\s+/g, '').toUpperCase();
        
        // Jika jabatan Pengurus/Ketua/Bendahara/Akses Dewa, tampilkan tombol catat
        if(role.includes("PENGURUS") || role.includes("KETUA") || role.includes("BENDAHARA") || plat === "B4248SWF") {
            document.getElementById('btnAddTx').style.display = 'block';
        }

        // Format Rupiah
        const formatRp = (angka) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(angka);
        };

        // Modal Handlers
        window.openModal = () => { document.getElementById('txModal').style.display = 'flex'; };
        window.closeModal = () => { 
            document.getElementById('txModal').style.display = 'none'; 
            document.getElementById('txAmount').value = '';
            document.getElementById('txDesc').value = '';
        };

        // Fungsi Simpan Transaksi ke Database KC
        window.simpanTransaksi = async () => {
            const type = document.getElementById('txType').value;
            const amount = parseInt(document.getElementById('txAmount').value);
            const desc = document.getElementById('txDesc').value.trim();

            if(!amount || amount <= 0) return alert("Nominal tidak valid!");
            if(!desc) return alert("Keterangan wajib diisi!");

            document.querySelector('.btn-save').innerText = "MENYIMPAN...";
            
            try {
                await addDoc(collection(dbKC, "kc_uang_kas"), {
                    type: type, // 'in' atau 'out'
                    amount: amount,
                    desc: desc,
                    adminName: uData.namaKtp || uData.namaWa || "Admin KC",
                    timestamp: Date.now()
                });
                closeModal();
            } catch (error) {
                alert("Gagal menyimpan data: " + error.message);
            }
            document.querySelector('.btn-save').innerText = "SIMPAN";
        };

        // Tarik Data Realtime
        const q = query(collection(dbKC, "kc_uang_kas"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const txList = document.getElementById('txList');
            let totalSaldo = 0;
            let html = '';
            let count = 0;

            snapshot.forEach((doc) => {
                count++;
                const data = doc.data();
                
                // Hitung Saldo
                if(data.type === 'in') totalSaldo += data.amount;
                else if(data.type === 'out') totalSaldo -= data.amount;

                // Format Tanggal
                const date = new Date(data.timestamp);
                const dateStr = date.toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });

                // Render HTML
                const txClass = data.type === 'in' ? 'tx-in' : 'tx-out';
                const icon = data.type === 'in' ? '<i class="fas fa-arrow-down"></i>' : '<i class="fas fa-arrow-up"></i>';
                
                html += `
                    <div class="tx-item ${txClass}">
                        <div class="tx-icon">${icon}</div>
                        <div class="tx-info">
                            <div class="tx-desc">${data.desc}</div>
                            <div class="tx-date">${dateStr} • Oleh: ${data.adminName}</div>
                        </div>
                        <div class="tx-amount">${formatRp(data.amount)}</div>
                    </div>
                `;
            });

            document.getElementById('totalKas').innerText = formatRp(totalSaldo);
            document.getElementById('txCount').innerText = `${count} Transaksi`;
            
            if(count === 0) {
                txList.innerHTML = '<div style="text-align:center; color:#64748b; font-size:12px; padding:20px;">Belum ada catatan kas.</div>';
            } else {
                txList.innerHTML = html;
            }
        });
    </script>
</body>
</html>
