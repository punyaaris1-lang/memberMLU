<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU - Portal Akses</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --royal-blue: #0A2259; --electric-blue: #2D63ED; --bg-light: #F8FAFC; --white: #FFFFFF; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg-light); height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .login-card { background: var(--white); width: 90%; max-width: 380px; padding: 40px 30px; border-radius: 40px; box-shadow: 0 25px 50px rgba(10, 34, 89, 0.15); text-align: center; position: relative; }
        .brand-logo { font-family: 'Space Grotesk'; font-size: 38px; font-weight: 900; color: var(--royal-blue); margin-bottom: 5px; }
        .sub-tag { font-size: 10px; font-weight: 800; letter-spacing: 2px; color: #64748B; margin-bottom: 30px; text-transform: uppercase; }
        
        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 11px; font-weight: 800; color: var(--royal-blue); display: block; margin-bottom: 8px; margin-left: 10px; }
        input { width: 100%; padding: 18px; border-radius: 20px; border: 1px solid #E2E8F0; background: #F8FAFC; font-family: 'Space Grotesk'; font-size: 18px; font-weight: 800; outline: none; text-align: center; letter-spacing: 2px; transition: 0.3s; }
        input:focus { border-color: var(--electric-blue); background: var(--white); box-shadow: 0 0 0 4px rgba(45, 99, 237, 0.1); }
        
        #logPlat { text-transform: uppercase; }
        #logPin { letter-spacing: 8px; font-size: 24px; color: var(--royal-blue); }

        .btn-main { width: 100%; padding: 20px; border: none; border-radius: 20px; background: linear-gradient(135deg, var(--royal-blue) 0%, var(--electric-blue) 100%); color: white; font-family: 'Space Grotesk'; font-size: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(45, 99, 237, 0.3); }
        .btn-magic { width: 100%; padding: 15px; margin-top: 15px; border: none; border-radius: 20px; background: #10B981; color: white; font-family: 'Space Grotesk'; font-size: 12px; font-weight: 800; cursor: pointer; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); }
        
        #loader { display: none; margin-top: 15px; font-size: 12px; font-weight: 600; color: var(--electric-blue); }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="brand-logo">MLU SYSTEM</div>
        <div class="sub-tag">Secured Access Portal</div>
        
        <div class="input-group">
            <label>Plat Nomor Kendaraan</label>
            <input type="text" id="logPlat" placeholder="B 1234 XYZ">
        </div>

        <div class="input-group">
            <label>PIN Rahasia (Angka/Huruf Bebas)</label>
            <input type="password" id="logPin" placeholder="••••••">
            <div style="font-size:9px; color:#94A3B8; text-align:center; margin-top:8px;">*Jika ini login pertama, PIN akan otomatis tersimpan.</div>
        </div>
        
        <button class="btn-main" onclick="handleLogin()">VERIFIKASI AKSES</button>
        
        <button class="btn-magic" id="btnSetup" onclick="setupDatabase()" style="display:none;"><i class="fas fa-database"></i> SETUP SERVER (KLIK 1X)</button>
        
        <div id="loader"><i class="fas fa-spinner fa-spin"></i> Memproses ke Server...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // DATA RAW
        const rawMembers = [
            { n: "RENO", p: "B 4454 SWF", h: "085711164860", r: "KELUARGA MLU", t: "RTO" },
            { n: "UBAY", p: "B 4484 SWF", h: "085771739616", r: "SEKRETARIS", t: "RTO" },
            { n: "PURNOMO", p: "B 4773 SWF", h: "087888720198", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "CRIS", p: "B 4933 SWG", h: "082123914054", r: "KELUARGA MLU", t: "RTO" },
            { n: "ABDULLAH FAQIH", p: "B 4699 SWG", h: "08978608692", r: "KELUARGA MLU", t: "RTO" },
            { n: "MAT", p: "B 4673 SWE", h: "088291040252", r: "KELUARGA MLU", t: "RTO" },
            { n: "REHAN", p: "B 4229 SWF", h: "-", r: "KELUARGA MLU", t: "RTO" },
            { n: "OBYZWNSKY", p: "B 4457 SWF", h: "088211503243", r: "KELUARGA MLU", t: "RTO" },
            { n: "MALIK", p: "B 4922 SWG", h: "081398006148", r: "KELUARGA MLU", t: "RTO" },
            { n: "AWANG THEA", p: "B 4146 SWH", h: "085714306460", r: "KELUARGA MLU", t: "RTO" },
            { n: "SARIP", p: "B 4804 SWJ", h: "081317818752", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "FERY", p: "B 4674 SWE", h: "082124545636", r: "HUMAS", t: "RTO" },
            { n: "IVAN", p: "B 4105 SWI", h: "085717433722", r: "KELUARGA MLU", t: "RTO" },
            { n: "ENDRO", p: "B 4437 SWF", h: "081386517328", r: "SATGAS", t: "RTO" },
            { n: "NANANG", p: "B 4248 SWJ", h: "-", r: "KELUARGA MLU", t: "RTO" },
            { n: "IW4N", p: "B 4650 SWE", h: "081398669543", r: "PEMBINA", t: "RTO" },
            { n: "YUDIF", p: "B 4720 SWI", h: "085159680822", r: "KELUARGA MLU", t: "RTO" },
            { n: "RIO", p: "B 4683 SWE", h: "081318321423", r: "KELUARGA MLU", t: "RTO" },
            { n: "AGS", p: "B 4497 SWF", h: "081387477676", r: "KELUARGA MLU", t: "RTO" },
            { n: "DZILAN", p: "B 4961 SWF", h: "081919570750", r: "KELUARGA MLU", t: "RTO" },
            { n: "JISTER", p: "B 4713 SWG", h: "081381336088", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "AJI", p: "B 4381 SWD", h: "082128835198", r: "PENASEHAT", t: "RTO" },
            { n: "CAPUNG", p: "B 3687 PWG", h: "-", r: "KELUARGA MLU", t: "RTO" },
            { n: "PAPADILO", p: "B 4236 SWG", h: "087888786276", r: "KELUARGA MLU", t: "RTO" },
            { n: "BW", p: "B 4697 SWG", h: "089506550656", r: "KELUARGA MLU", t: "RTO" },
            { n: "EGA", p: "B 4769 SWE", h: "087848620227", r: "KELUARGA MLU", t: "RTO" },
            { n: "DAYYAN", p: "B 4236 SWJ", h: "085885579179", r: "WAKIL KETUA", t: "RTO" },
            { n: "JET LEE", p: "B 4876 SWE", h: "085711546320", r: "SATGAS", t: "RTO" },
            { n: "AHMAD", p: "B 4453 SWF", h: "081290159443", r: "KETUA UMUM", t: "RTO" },
            { n: "ENDANG SAHARA", p: "B 4793 SWJ", h: "081314421984", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "DONI", p: "B 4944 SWH", h: "081808138130", r: "HUMAS", t: "RTO" },
            { n: "RIZKY", p: "B 4248 SWF", h: "085691536957", r: "KELUARGA MLU", t: "RTO" },
            { n: "ANDRI JR", p: "B 4231 SWF", h: "087875875068", r: "KELUARGA MLU", t: "RTO" },
            { n: "VIZAR", p: "B 4810 SWJ", h: "085810304638", r: "KELUARGA MLU", t: "RTO" },
            { n: "NANDANG", p: "B 4958 SWT", h: "081297370884", r: "KELUARGA MLU", t: "RTO" },
            { n: "WINDIYONO", p: "B 4237 SWF", h: "081213669925", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "ZAKARIA", p: "B 4795 SWJ", h: "088211963922", r: "KELUARGA MLU", t: "RTO" },
            { n: "RAMON", p: "B 4774 UWF", h: "08111007688", r: "KELUARGA MLU", t: "RTO" },
            { n: "RICHIE", p: "B 4429 SWF", h: "088808104101", r: "KELUARGA MLU", t: "RTO" },
            { n: "GOND'S", p: "B 4798 SWF", h: "081219139569", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "MUHAMAD ILHAM M.", p: "B 4698 SWE", h: "082310253644", r: "KELUARGA MLU", t: "RTO" }
        ];

        // Cek Database Awal saat web dibuka
        window.onload = async () => {
            const snap = await getDocs(collection(db, "mlu_members"));
            if(snap.empty) document.getElementById('btnSetup').style.display = 'block';
        };

        window.setupDatabase = async () => {
            document.getElementById('loader').style.display = 'block';
            document.getElementById('btnSetup').style.display = 'none';
            try {
                for (const m of rawMembers) {
                    await addDoc(collection(db, 'mlu_members'), { 
                        namaKtp: m.n, namaWa: m.n, nama: m.n, plat: m.p, hp: m.h, role: m.r, type: m.t, foto: "", pin: "" 
                    });
                }
                alert("SUKSES! Server siap digunakan.");
                document.getElementById('loader').style.display = 'none';
            } catch (e) { alert("Gagal setup server."); }
        };

        window.handleLogin = async () => {
            const rawPlat = document.getElementById('logPlat').value.trim();
            const rawPin = document.getElementById('logPin').value.trim();
            
            if(!rawPlat || !rawPin) return alert("Plat Nomor dan PIN wajib diisi!");

            document.getElementById('loader').style.display = 'block';
            const searchPlat = rawPlat.replace(/\s/g, '').toUpperCase();
            
            let foundUser = null;
            let foundDocId = null;

            try {
                const querySnapshot = await getDocs(collection(db, "mlu_members"));
                if(querySnapshot.empty) {
                    document.getElementById('loader').style.display = 'none';
                    return alert("⛔ SERVER KOSONG! Klik SETUP SERVER dulu.");
                }

                querySnapshot.forEach((doc) => {
                    const dbPlat = (doc.data().plat || "").replace(/\s/g, '').toUpperCase();
                    if (dbPlat === searchPlat) {
                        foundUser = doc.data();
                        foundDocId = doc.id;
                    }
                });

                if (foundUser) {
                    // LOGIKA PIN KEAMANAN
                    if (!foundUser.pin || foundUser.pin === "") {
                        // INI LOGIN PERTAMA, SIMPAN PIN-NYA KE SERVER!
                        await updateDoc(doc(db, "mlu_members", foundDocId), { pin: rawPin });
                        alert("✅ BERHASIL! PIN Anda telah didaftarkan. Harap ingat PIN ini untuk login selanjutnya.");
                    } else {
                        // LOGIN KEDUA DST, CEK APAKAH PIN-NYA BENAR
                        if (foundUser.pin !== rawPin) {
                            document.getElementById('loader').style.display = 'none';
                            return alert("❌ AKSES DITOLAK! PIN yang Anda masukkan SALAH.");
                        }
                    }

                    // GOD MODE PAK RIZKY
                    if(searchPlat === 'B4248SWF') foundUser.isSuperAdmin = true;

                    localStorage.setItem('maka_user', JSON.stringify({
                        id: foundDocId, // Simpan ID agar setting tahu doc mana
                        plat: foundUser.plat, 
                        nama: foundUser.nama || foundUser.namaWa || foundUser.namaKtp,
                        namaKtp: foundUser.namaKtp, 
                        namaWa: foundUser.namaWa, 
                        role: foundUser.role || 'KELUARGA MLU',
                        type: foundUser.type || 'RTO', 
                        hp: foundUser.hp || '-', 
                        foto: foundUser.foto || '',
                        isSuperAdmin: foundUser.isSuperAdmin || false
                    }));
                    window.location.href = 'dashboard.html';
                } else {
                    alert("❌ Akses Ditolak! Plat Nomor tidak terdaftar.");
                }
            } catch(e) {
                alert("Gagal terhubung ke internet.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }
    </script>
</body>
</html>
