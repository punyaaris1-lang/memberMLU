<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KOPDAR MLU</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Inter:wght@300;500&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  height:100vh;
  background:#02040a;
  color:#fff;
  font-family:'Inter',sans-serif;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* BACKGROUND */
.bg{
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top, rgba(0,255,255,.18), transparent 60%),
    linear-gradient(rgba(0,255,255,.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,.05) 1px, transparent 1px);
  background-size:100% 100%, 40px 40px, 40px 40px;
  animation:grid 20s linear infinite;
}
@keyframes grid{
  to{background-position:0 0,400px 400px,400px 400px}
}

/* INTRO */
#intro{
  position:fixed;
  inset:0;
  background:#000;
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:18px;
}

#intro h1{
  font-family:'Orbitron';
  font-size:20px;
  letter-spacing:3px;
  color:#00ffff;
  text-shadow:0 0 25px #00ffff;
}

#intro button{
  padding:12px 30px;
  border-radius:30px;
  background:transparent;
  border:1px solid #00ffff;
  color:#00ffff;
  font-size:13px;
}

/* CARD */
.card{
  position:relative;
  z-index:2;
  width:90%;
  max-width:360px;
  padding:28px;
  border-radius:26px;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(0,255,255,.4);
  box-shadow:0 0 45px rgba(0,255,255,.35);
  text-align:center;
  animation:fade 1.2s ease forwards;
}
@keyframes fade{
  from{opacity:0;transform:scale(.95)}
  to{opacity:1;transform:scale(1)}
}

/* LOGO */
.logo-wrap{
  width:120px;
  height:120px;
  margin:0 auto 16px;
  border-radius:50%;
  border:2px solid #00ffff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 0 35px rgba(0,255,255,.9);
  animation:logoPulse 2s infinite alternate;
  overflow:hidden;
}

.logo-wrap img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:50%;
}

@keyframes logoPulse{
  from{
    transform:scale(1);
    box-shadow:0 0 20px rgba(0,255,255,.5);
  }
  to{
    transform:scale(1.08);
    box-shadow:0 0 55px rgba(0,255,255,1);
  }
}

/* TEXT */
.title{
  font-family:'Orbitron';
  font-size:22px;
  letter-spacing:2px;
  color:#00ffff;
  text-shadow:0 0 20px #00ffff;
}

.subtitle{
  font-size:12px;
  opacity:.7;
  margin:10px 0 22px;
}

/* INFO */
.info{
  margin:12px 0;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(0,255,255,.3);
  animation:pulse 1.8s infinite alternate;
}
@keyframes pulse{
  from{box-shadow:0 0 6px rgba(0,255,255,.3)}
  to{box-shadow:0 0 14px rgba(0,255,255,.8)}
}

.label{
  font-size:11px;
  letter-spacing:1px;
  opacity:.6;
}
.value{
  margin-top:4px;
  font-size:15px;
}

/* MAP */
.map{
  display:block;
  margin-top:20px;
  padding:12px;
  border-radius:24px;
  border:1px solid #00ffff;
  color:#00ffff;
  font-size:13px;
  text-decoration:none;
}

/* FOOTER */
.footer{
  margin-top:18px;
  font-size:12px;
  opacity:.8;
  letter-spacing:1px;
}
</style>
</head>

<body>

<div id="intro">
  <h1>UNDANGAN KEPADA ANGGOTA</h1>
  <h1>MAKA LINTAS UTARA</h1>
  <button onclick="start()">TAP TO OPEN</button>
</div>

<div class="bg"></div>

<div class="card">

  <!-- LOGO ASLI -->
  <div class="logo-wrap">
    <img src="1763947427555.jpg" alt="Logo MLU">
  </div>

  <div class="title">KOPDAR DADAKAN</div>
  <div class="subtitle">ASSALAMUALAIKUM</div>

  <div class="info">
    <div class="label">HARI</div>
    <div class="value">Minggu Malam</div>
  </div>

  <div class="info">
    <div class="label">JAM</div>
    <div class="value">17:30 WIB</div>
  </div>

  <div class="info">
    <div class="label">TANGGAL</div>
    <div class="value">21 Desember</div>
  </div>

  <div class="info">
    <div class="label">LOKASI</div>
    <div class="value">Showroom Kelapa Gading</div>
  </div>

  <div class="info">
    <div class="label">AGENDA</div>
    <div class="value">FC • OD • Keluh Kesah Anggota</div>
  </div>

  <a class="map" href="https://maps.app.goo.gl/YHrBtpSCgo4KitBe7" target="_blank">
    📍 BUKA LOKASI
  </a>

  <div class="footer">
    SALAM<br><strong>MAKA LINTAS UTARA</strong>
  </div>
</div>

<script>
function start(){
  document.getElementById('intro').style.display='none';
}
</script>

</body>
</html>
