<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU Super App - Login</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="logomlu.png">
    <link rel="apple-touch-icon" href="logomlu.png">
    <meta name="theme-color" content="#0A2259">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; 
            --bg-surface: #F8FAFC; --white: #FFFFFF; 
            --text-main: #0F172A; --text-muted: #64748B; 
            --gold: #D4AF37;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-surface); font-family: 'Inter', sans-serif; overflow: hidden; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        /* --- SPLASH SCREEN (LOADING) --- */
        #splashScreen {
            position: fixed; inset: 0; background: linear-gradient(160deg, var(--royal-blue) 0%, #051336 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.8s ease-out;
        }
        
        .splash-logo { width: 150px; height: 150px; object-fit: contain; margin-bottom: 25px; animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        
        .splash-title { font-family: 'Space Grotesk'; font-size: 38px; font-weight: 900; color: white; margin: 0; text-align: center; line-height: 1.1; letter-spacing: 2px; text-shadow: 0 10px 20px rgba(0,0,0,0.5); opacity: 0; animation: fadeUp 1s ease-out 0.5s forwards; }
        
        .splash-loader { margin-top: 30px; width: 40px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; position: relative; opacity: 0; animation: fadeUp 1s ease-out 0.8s forwards; }
        .splash-loader::after { content: ''; position: absolute; top: 0; left: 0; height: 100%; width: 50%; background: var(--gold); border-radius: 10px; animation: loadingBar 2s infinite ease-in-out; }

        /* Posisi teks "Made with love" dinaikkan agar tidak terpotong layar HP */
        .splash-footer { position: absolute; bottom: 80px; font-size: 11px; font-weight: 600; color: #93C5FD; text-transform: uppercase; letter-spacing: 2px; opacity: 0; animation: fadeUp 1s ease-out 1s forwards; }
        .splash-footer i { color: #EF4444; margin: 0 3px; animation: heartbeat 1.5s infinite; }

        /* --- LOGIN SCREEN --- */
        #loginScreen {
            display: none; flex-direction: column; min-height: 100%; background: var(--bg-surface);
            background-image: radial-gradient(circle at 50% -20%, rgba(45, 99, 237, 0.1) 0%, transparent 50%);
            opacity: 0; transition: opacity 0.5s ease-in; padding: 40px 25px; align-items: center; justify-content: center;
        }

        .login-card { background: white; width: 100%; max-width: 400px; border-radius: 35px; padding: 40px 30px; box-shadow: 0 25px 50px rgba(10,34,89,0.08); border: 1px solid rgba(255,255,255,0.8); text-align: center; }
        
        .login-logo { width: 90px; height: 90px; margin-bottom: 20px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .login-title { font-family: 'Space Grotesk'; font-size: 26px; font-weight: 900; color: var(--royal-blue); margin: 0 0 5px 0; }
        .login-subtitle { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 35px; }

        .form-group { margin-bottom: 20px; text-align: left; position: relative;}
        .form-group label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; letter-spacing: 1px;}
        .input-icon { position: absolute; left: 18px; top: 38px; color: var(--electric-blue); font-size: 16px; }
        .form-input { width: 100%; padding: 16px 16px 16px 45px; border-radius: 16px; border: 2px solid #E2E8F0; background: #F8FAFC; font-family: 'Space Grotesk'; font-weight: 700; font-size: 16px; color: var(--text-main); transition: 0.3s; text-transform: uppercase;}
        .form-input:focus { border-color: var(--electric-blue); background: white; box-shadow: 0 0 0 4px rgba(45,99,237,0.1); }

        .btn-login { width: 100%; padding: 18px; border: none; border-radius: 16px; background: linear-gradient(135deg, var(--royal-blue) 0%, #15398F 100%); color: white; font-family: 'Space Grotesk'; font-size: 15px; font-weight: 800; margin-top: 15px; cursor: pointer; box-shadow: 0 15px 30px rgba(10,34,89,0.25); transition: 0.2s; letter-spacing: 1px;}
        .btn-login:active { transform: scale(0.96); }

        .error-msg { color: var(--danger); font-size: 11px; font-weight: 700; margin-top: 15px; background: #FEF2F2; padding: 10px; border-radius: 10px; display: none; }

        /* ANIMATIONS */
        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeUp { 0% { transform: translateY(20px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        @keyframes loadingBar { 0% { transform: translateX(-100%); } 100% { transform: translateX(200%); } }
        @keyframes heartbeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
    </style>
</head>
<body>

    <div id="splashScreen">
        <img src="logomlu.png" class="splash-logo" alt="MLU Logo">
        <h1 class="splash-title">MLU<br>SUPER APPS</h1>
        <div class="splash-loader"></div>
        
        <div class="splash-footer">
            Made with love <i class="fas fa-heart"></i> for MLU Family
        </div>
    </div>

    <div id="loginScreen">
        <div class="login-card">
            <img src="logomlu.png" class="login-logo" alt="Logo">
            <h2 class="login-title">LOGIN MEMBER</h2>
            <div class="login-subtitle">Masukkan Plat Nomor Anda untuk masuk</div>

            <div class="form-group">
                <label>Plat Nomor Kendaraan</label>
                <i class="fas fa-motorcycle input-icon"></i>
                <input type="text" id="inputPlat" class="form-input" placeholder="Contoh: B 1234 XYZ" autocomplete="off">
            </div>

            <div id="errorBox" class="error-msg"></div>

            <button class="btn-login" id="btnLogin" onclick="prosesLogin()">MASUK APLIKASI</button>
        </div>
        
        <div style="margin-top: 30px; font-size: 11px; font-weight: 600; color: var(--text-muted);">
            &copy; 2026 Komunitas Maka Lintas Utara
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Reg Failed', err));
            });
        }

        // --- SISTEM SPLASH SCREEN DELAY ---
        document.addEventListener("DOMContentLoaded", () => {
            const userData = localStorage.getItem('maka_user');
            
            // Timer diperpanjang jadi 4.5 Detik agar animasi tuntas dinikmati
            setTimeout(() => {
                const splash = document.getElementById('splashScreen');
                splash.style.opacity = '0';
                
                setTimeout(() => {
                    splash.style.display = 'none';
                    
                    if (userData) {
                        window.location.href = 'dashboard.html';
                    } else {
                        const loginBox = document.getElementById('loginScreen');
                        loginBox.style.display = 'flex';
                        
                        setTimeout(() => {
                            loginBox.style.opacity = '1';
                        }, 50);
                    }
                }, 800); 
            }, 4500); // <-- UBAH KE 4500 ms (4.5 Detik)
        });

        // --- SISTEM LOGIN FIREBASE ---
        window.prosesLogin = async () => {
            const rawPlat = document.getElementById('inputPlat').value;
            const plat = rawPlat.trim().toUpperCase();
            const errBox = document.getElementById('errorBox');
            const btn = document.getElementById('btnLogin');

            if (!plat) {
                errBox.innerText = "⚠️ Plat Nomor wajib diisi!";
                errBox.style.display = 'block';
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMERIKSA...';
            btn.style.opacity = '0.7';
            errBox.style.display = 'none';

            try {
                const q = query(collection(db, "mlu_members"), where("plat", "==", plat));
                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    errBox.innerHTML = `⚠️ Plat <b>${plat}</b> tidak ditemukan di sistem. Hubungi Pengurus!`;
                    errBox.style.display = 'block';
                    btn.innerHTML = 'MASUK APLIKASI';
                    btn.style.opacity = '1';
                    return;
                }

                let userData = null;
                let docId = null;
                querySnapshot.forEach((doc) => {
                    userData = doc.data();
                    docId = doc.id;
                });

                userData.id = docId;
                localStorage.setItem('maka_user', JSON.stringify(userData));

                btn.innerHTML = '<i class="fas fa-check-circle"></i> BERHASIL!';
                btn.style.background = 'var(--success)';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 500);

            } catch (error) {
                errBox.innerText = "⚠️ Terjadi kesalahan koneksi. Coba lagi.";
                errBox.style.display = 'block';
                btn.innerHTML = 'MASUK APLIKASI';
                btn.style.opacity = '1';
                console.error(error);
            }
        };
        
        document.getElementById('inputPlat').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') { prosesLogin(); }
        });
    </script>
</body>
</html>
