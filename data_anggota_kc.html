<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC - Directory Anggota</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA KARTIKA CHANDRA (DARK NEON) === */
        :root { 
            --royal-blue: #D4FF00; /* Neon Lime KC */
            --bg-surface: #050505; 
            --text-main: #FFFFFF; 
            --text-muted: #94A3B8; 
            --danger: #EF4444;
            --success: #10B981;
        }
        
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 120px; overflow-x: hidden; position: relative; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; text-decoration: none; }

        /* AMBIENT LIGHT & BACKGROUND */
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.15; animation: floatLight 10s infinite alternate; }
        .light-1 { top: -20%; left: -20%; width: 500px; height: 500px; background: #D4FF00; }
        .light-2 { top: 40%; right: -30%; width: 400px; height: 400px; background: #10B981; animation-delay: 2s; }
        .bg-watermark { position: fixed; top: 15%; right: -15%; width: 100%; height: 80%; background-image: url('bg_maka.jpg'); background-repeat: no-repeat; background-size: contain; background-position: center; opacity: 0.05; transform: rotate(-15deg); z-index: -2; pointer-events: none; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(20px, 40px);} }

        /* HEADER */
        .header-main { padding: 40px 20px 20px; position: relative; z-index: 10; text-align: center; }
        .sub-tag { font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--success); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .main-title { font-family: 'Outfit'; font-size: 32px; font-weight: 900; color: var(--royal-blue); margin: 0; letter-spacing: -1px; }

        /* SEARCH BOX */
        .search-container { padding: 0 20px 20px; position: sticky; top: 0; z-index: 99; margin-top: 10px; }
        .search-box { background: #111; border-radius: 16px; padding: 5px 20px; display: flex; align-items: center; border: 1px solid #222; transition: 0.3s; }
        .search-box:focus-within { border-color: var(--royal-blue); }
        .search-box i { color: var(--royal-blue); font-size: 18px; margin-right: 12px; }
        .search-box input { flex: 1; border: none; padding: 16px 0; font-family: 'Inter'; font-size: 14px; font-weight: 600; background: transparent; color: var(--text-main); outline: none; }

        /* LIST & CARD (RAPI & CLEAN SESUAI MLU) */
        .list-container { padding: 0 20px 30px; display: flex; flex-direction: column; gap: 15px; }
        
        .member-card { 
            background: #0f0f0f;
            border: 1px solid #222;
            border-radius: 20px; padding: 18px; display: flex; align-items: center; gap: 15px; 
            animation: slideUp 0.5s ease-out backwards;
        }
        .member-card.is-pengurus { 
            background: linear-gradient(135deg, #111 0%, #1a1a05 100%); 
            border-color: #333;
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* === BINGKAI FOTO SOLUSI FINAL === */
        /* Background ditanam langsung di mangkoknya, biar nggak ada layer yang nutupin */
        .m-photo-wrap { 
            width: 65px; height: 65px; border-radius: 16px; flex-shrink: 0;
            border: 2px solid #222; cursor: zoom-in; 
            background-color: #111;
            background-image: url('bg_maka.jpg');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; position: relative;
        }
        .is-pengurus .m-photo-wrap { border-color: var(--royal-blue); box-shadow: 0 5px 15px rgba(212,255,0,0.15);}
        .m-photo { 
            width: 100%; height: 100%; object-fit: cover; 
            background-color: transparent; border-radius: 14px;
        }

        .m-info { flex: 1; min-width: 0; }
        .m-name { font-family: 'Outfit'; font-size: 17px; font-weight: 800; color: white; text-transform: uppercase; margin-bottom: 2px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .m-wa-name { font-size: 10px; font-weight: 700; color: var(--text-muted); display: block; margin-bottom: 8px; text-transform: uppercase;}
        
        .m-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
        .badge { font-size: 9px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid transparent; }
        .bg-plat { background: rgba(212,255,0,0.1); color: var(--royal-blue); border-color: rgba(212,255,0,0.2); }
        .bg-role { background: #1a1a1a; color: #cbd5e1; border-color: #333; }
        .is-pengurus .bg-jabatan { background: rgba(212,255,0,0.1); color: var(--royal-blue); border-color: rgba(212,255,0,0.3); }

        /* DOMPET TABUNGAN */
        .m-saldo { 
            font-size: 11px; font-weight: 800; color: var(--success); 
            display: inline-flex; align-items: center; gap: 6px; 
            cursor: pointer; padding: 5px 10px; background: rgba(16, 185, 129, 0.1); 
            border-radius: 8px; transition: 0.2s; border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* ACTION BUTTONS */
        .m-actions { display: flex; flex-direction: column; gap: 8px; }
        .btn-act { width: 36px; height: 36px; border-radius: 10px; border: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-call { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.2); }
        .btn-edit { background: #111; color: var(--royal-blue); border: 1px solid #333; display: none; }
        .btn-del { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); display: none; }

        /* FLOATING ADD BUTTON (DIGESER KE ATAS) */
        .fab-add { position: fixed; bottom: 100px; right: 20px; width: 55px; height: 55px; background: var(--royal-blue); color: black; border-radius: 16px; display: none; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 2px solid #000; cursor: pointer; z-index: 1000;}

        /* BACK NAV */
        .back-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; text-align: center;}
        .btn-premium-back { background: #111; border: 1px solid #333; padding: 14px 25px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 12px; color: var(--royal-blue); text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);}

        /* MODAL FORM */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.show { opacity: 1; }
        .modal-box { background: #111; width: 90%; max-width: 450px; border-radius: 20px; padding: 25px; transform: scale(0.9); transition: 0.3s; border: 1px solid #222; max-height: 85vh; overflow-y: auto;}
        .modal-overlay.show .modal-box { transform: scale(1); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-family: 'Outfit'; font-size: 20px; font-weight: 900; color: var(--royal-blue); }
        .btn-close { background: #222; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 14px; cursor: pointer; color: white;}
        
        .form-group { margin-bottom: 15px; }
        .form-group label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.5px;}
        .form-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #333; background: #000; font-family: 'Inter'; font-weight: 600; font-size: 14px; color: white; outline: none;}
        .form-input:focus { border-color: var(--royal-blue); }

        .upload-area { border: 2px dashed #333; border-radius: 16px; padding: 20px; text-align: center; background: #0a0a0a; cursor: pointer; position: relative; margin-bottom: 20px;}
        .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .preview-img { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; display: none; margin: 10px auto 0; border: 2px solid #333; }

        .btn-save { width: 100%; padding: 16px; border: none; border-radius: 14px; background: var(--royal-blue); color: black; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 900; margin-top: 10px; cursor: pointer; letter-spacing: 1px;}

        /* LIGHTBOX FOTO */
        .photo-viewer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 99999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); padding: 20px;}
        .pv-container { position: relative; max-width: 400px; width: 100%; text-align: center; }
        .pv-container img { width: 100%; border-radius: 20px; object-fit: cover; max-height: 70vh; border: 2px solid #333; }
        .pv-close { position: absolute; top: -15px; right: -15px; width: 40px; height: 40px; border-radius: 50%; background: var(--danger); color: white; border: 2px solid white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;}

        /* HISTORY MODAL */
        .hist-list { margin-top: 15px; max-height: 400px; overflow-y: auto; }
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #222; }
        .hist-desc { font-size: 12px; font-weight: 700; color: white; }
        .hist-date { font-size: 10px; color: var(--text-muted); }
        .hist-val { font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; }
        .val-in { color: var(--success); } .val-out { color: var(--danger); }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="bg-watermark"></div>

    <header class="header-main">
        <span class="sub-tag">DATABASE KOMUNITAS</span>
        <h1 class="main-title">DATA ANGGOTA KC</h1>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari nama, plat, atau jabatan..." onkeyup="filterList()">
        </div>
    </div>

    <main class="list-container" id="memberList">
        <div style="text-align:center; padding:50px; color:#94A3B8;"><i class="fas fa-spinner fa-spin"></i> Memuat data...</div>
    </main>

    <button class="fab-add" id="btnAdd" onclick="openModal()"><i class="fas fa-plus"></i></button>
    
    <div class="back-nav">
        <a href="dashboard_kc.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a>
    </div>

    <div class="photo-viewer-overlay" id="photoViewer" onclick="closePhoto()">
        <div class="pv-container" onclick="event.stopPropagation()">
            <img id="pvImage" src="">
            <button class="pv-close" onclick="closePhoto()"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="modalTitleText">Tambah Anggota</div>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <input type="hidden" id="formId">
            
            <div class="upload-area">
                <i class="fas fa-camera" style="font-size:24px; color:var(--royal-blue); margin-bottom:5px; display:block;"></i>
                <div style="font-size:11px; font-weight:700; color:var(--text-muted);">Tap untuk Upload Foto Wajah (PNG Transparan)</div>
                <input type="file" id="formFoto" accept="image/*">
                <img id="previewFoto" class="preview-img">
            </div>

            <div class="form-group"><label>Nama Anggota</label><input type="text" id="formNamaKtp" class="form-input" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Plat Nomor</label><input type="text" id="formPlat" class="form-input" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Nomor HP (WhatsApp)</label><input type="tel" id="formHp" class="form-input"></div>
            
            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;">
                    <label>Jabatan</label>
                    <select id="formRole" class="form-input" style="color:var(--royal-blue);">
                        <option value="KELUARGA MLU">Member Biasa</option>
                        <option value="KETUA UMUM">Ketua Umum</option>
                        <option value="WAKIL KETUA">Wakil Ketua</option>
                        <option value="PEMBINA">Pembina</option>
                        <option value="PENASEHAT">Penasehat</option>
                        <option value="SEKRETARIS">Sekretaris</option>
                        <option value="BENDAHARA">Bendahara</option>
                        <option value="HUMAS INTERNAL">Humas Internal</option>
                        <option value="HUMAS EKSTERNAL">Humas Eksternal</option>
                        <option value="KREATOR">Kreator</option>
                        <option value="URC">URC KC</option>
                    </select>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>Divisi / Vendor</label>
                    <select id="formType" class="form-input">
                        <option value="TRANSGO">TRANSGO</option>
                        <option value="RTO">RTO MAKA</option>
                        <option value="UMUM">UMUM</option>
                    </select>
                </div>
            </div>

            <div class="form-group"><label>Saldo Tabungan KC (Rp)</label><input type="number" id="formTabungan" class="form-input" placeholder="0" style="color:var(--success); font-weight:bold;"></div>
            
            <button class="btn-save" id="btnSave" onclick="saveData()">SIMPAN DATA</button>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">Riwayat Tabungan</div>
                <button class="btn-close" onclick="document.getElementById('historyModal').classList.remove('show'); setTimeout(()=>document.getElementById('historyModal').style.display='none',300);"><i class="fas fa-times"></i></button>
            </div>
            <div id="historyTargetName" style="font-size:12px; font-weight:800; color:#94a3b8; margin-top:-15px; margin-bottom:15px; text-transform:uppercase; border-bottom:1px solid #222; padding-bottom:10px;"></div>
            <div id="historyContent" class="hist-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, setDoc, deleteDoc, doc, query, orderBy, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // =========================================================================
        // KONEKSI DATABASE UTAMA MLU AGAR FOTO SINKRON 100% DENGAN DASHBOARD
        // =========================================================================
        const firebaseMain = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5" };
        const appMain = initializeApp(firebaseMain, "AppMain"); 
        const dbMain = getFirestore(appMain);
        
        // KONEKSI DATABASE KC (KHUSUS UNTUK RIWAYAT TABUNGAN SAJA)
        const firebaseKC = { apiKey: "AIzaSyDfsTAGclYUSRe6YhiljS-Re6YhiljS-xb-v-9RBYVEM", authDomain: "antriankcnew.firebaseapp.com", projectId: "antriankcnew" };
        const appKC = initializeApp(firebaseKC, "AppKC"); 
        const dbKC = getFirestore(appKC);

        // HAK AKSES ADMIN
        const u = JSON.parse(localStorage.getItem('maka_user')) || {};
        const isAdmin = true; 
        if (isAdmin) {
            document.getElementById('btnAdd').style.display = 'flex';
            const style = document.createElement('style'); style.innerHTML = '.btn-del, .btn-edit { display: flex !important; }'; document.head.appendChild(style);
        }

        let membersData = [];
        let currentPhotoBase64 = "";

        // =========================================================================
        // KOMPRESOR FOTO: KUNCI DI 'image/png' AGAR TRANSPARAN!
        // =========================================================================
        document.getElementById('formFoto').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    let w = img.width; let h = img.height;
                    if (w > h) { if (w > 600) { h *= 600/w; w = 600; } } else { if (h > 600) { w *= 600/h; h = 600; } }
                    canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                    
                    currentPhotoBase64 = canvas.toDataURL('image/png');
                    
                    document.getElementById('previewFoto').src = currentPhotoBase64;
                    document.getElementById('previewFoto').style.display = 'block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        const roleWeight = { 
            "KETUA UMUM": 1, "WAKIL KETUA": 2, "PEMBINA": 3, "PENASEHAT": 4, "SEKRETARIS": 5, 
            "BENDAHARA": 6, "HUMAS INTERNAL": 7, "HUMAS EKSTERNAL": 8, "KREATOR": 9, "URC": 10, "MEMBER": 11, "KELUARGA MLU": 11
        };
        const getRoleWeight = (role) => roleWeight[(role || "").toUpperCase()] || 12;

        // LOAD DATA DARI DATABASE MLU UTAMA
        onSnapshot(query(collection(dbMain, "mlu_members"), orderBy("namaKtp", "asc")), (snap) => {
            membersData = [];
            snap.forEach(doc => { membersData.push({ id: doc.id, ...doc.data() }); });
            renderList(membersData);
        });

        function renderList(data) {
            const list = document.getElementById('memberList'); list.innerHTML = '';
            
            data.sort((a, b) => {
                const wA = getRoleWeight(a.role); const wB = getRoleWeight(b.role);
                if (wA !== wB) return wA - wB; 
                return (a.namaKtp || "").localeCompare(b.namaKtp || "");
            });

            data.forEach((m, index) => {
                const isPengurus = m.role && m.role !== 'KELUARGA MLU' && m.role !== 'MEMBER';
                const cardClass = isPengurus ? 'member-card is-pengurus' : 'member-card';
                const nameKtp = m.namaKtp || m.nama || "-";
                const nameWa = m.namaWa || "-";
                
                // MENGGUNAKAN LOGIKA BINGKAI FOTO YANG PASTI NEMBUS
                let photoHtml = '';
                if (m.foto && m.foto.length > 50) {
                    photoHtml = `<img src="${m.foto}" class="m-photo" onerror="this.style.display='none'">`;
                } else {
                    photoHtml = `<i class="fas fa-user" style="font-size:26px; color:rgba(255,255,255,0.4);"></i>`;
                }

                let waLink = m.hp && m.hp !== "-" && m.hp !== "" ? `https://wa.me/62${m.hp.replace(/^0+/, '')}` : '#';
                const saldo = m.tabungan_kc ? parseInt(m.tabungan_kc).toLocaleString('id-ID') : "0";

                const delay = index * 0.05; 

                list.innerHTML += `
                    <div class="${cardClass}" style="animation-delay:${delay}s">
                        
                        <div class="m-photo-wrap" onclick="viewPhoto('${m.foto && m.foto.length > 50 ? m.foto : ''}')">
                            ${photoHtml}
                        </div>

                        <div class="m-info">
                            <div class="m-name">${nameKtp}</div>
                            <div class="m-wa-name">WA: ${nameWa}</div>
                            <div class="m-badges">
                                <span class="badge bg-plat">${m.plat}</span>
                                <span class="badge bg-role">${m.type||m.vendor||'TRANSGO'}</span>
                                ${isPengurus ? `<span class="badge bg-jabatan">${m.role}</span>` : ''}
                            </div>
                            
                            <div class="m-saldo" onclick="checkSavings('${m.id}', '${nameKtp}')">
                                <i class="fas fa-wallet"></i> Rp ${saldo}
                            </div>
                        </div>

                        <div class="m-actions">
                            <a href="${waLink}" class="btn-act btn-call" target="_blank"><i class="fab fa-whatsapp"></i></a>
                            <button class="btn-act btn-edit" onclick="openEditModal('${m.id}')"><i class="fas fa-pen"></i></button>
                            <button class="btn-act btn-del" onclick="deleteData('${m.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        window.filterList = () => {
            const txt = document.getElementById('searchInput').value.toLowerCase();
            const filtered = membersData.filter(m => (m.namaKtp && m.namaKtp.toLowerCase().includes(txt)) || (m.namaWa && m.namaWa.toLowerCase().includes(txt)) || (m.plat && m.plat.toLowerCase().includes(txt)) || (m.role && m.role.toLowerCase().includes(txt)));
            renderList(filtered);
        };

        // --- HISTORY SAVINGS DARI DATABASE KC ---
        window.checkSavings = async (id, name) => {
            document.getElementById('historyTargetName').innerText = name;
            document.getElementById('historyContent').innerHTML = `<div style="text-align:center; padding:20px; color:#94A3B8;">Memuat data...</div>`;
            const m = document.getElementById('historyModal'); m.style.display='flex'; setTimeout(()=>m.classList.add('show'),10);

            const q = query(collection(dbKC, "tabungan_trx"), where("memberId", "==", id));
            const snap = await getDocs(q);
            
            let dataArr = [];
            snap.forEach(d => dataArr.push(d.data()));
            dataArr.sort((a,b) => b.timestamp - a.timestamp); 

            const cont = document.getElementById('historyContent'); cont.innerHTML = "";
            
            if(dataArr.length === 0) {
                cont.innerHTML = `<div style="text-align:center; padding:20px; color:#cbd5e1; font-size:12px;">Belum ada riwayat transaksi.</div>`;
                return;
            }

            dataArr.forEach(data => {
                const isIn = data.type === 'IN';
                const cls = isIn ? 'val-in' : 'val-out';
                const sign = isIn ? '+' : '-';
                const date = new Date(data.timestamp).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
                
                cont.innerHTML += `
                <div class="hist-item">
                    <div style="flex:1;">
                        <div class="hist-desc">${data.desc || (isIn ? 'Setoran Tabungan' : 'Penarikan')}</div>
                        <div class="hist-date">${date} • oleh ${data.adminName||'Admin KC'}</div>
                    </div>
                    <div class="hist-val ${cls}">${sign} Rp ${data.amount.toLocaleString('id-ID')}</div>
                </div>`;
            });
        }

        window.viewPhoto = (src) => { if(!src)return; document.getElementById('pvImage').src = src; document.getElementById('photoViewer').style.display = 'flex'; };
        window.closePhoto = () => { document.getElementById('photoViewer').style.display = 'none'; };

        // MODAL LOGIC
        const modal = document.getElementById('formModal');
        window.openModal = () => { 
            document.getElementById('formId').value = ''; document.getElementById('formNamaKtp').value = ''; document.getElementById('formNamaWa').value = ''; 
            document.getElementById('formPlat').value = ''; document.getElementById('formHp').value = ''; document.getElementById('formRole').value = 'KELUARGA MLU';
            document.getElementById('formType').value = 'TRANSGO'; document.getElementById('formTabungan').value = ''; 
            currentPhotoBase64 = ""; document.getElementById('previewFoto').style.display = 'none'; document.getElementById('formFoto').value = '';
            document.getElementById('modalTitleText').innerText = "Tambah Anggota"; 
            modal.style.display = 'flex'; setTimeout(()=>modal.classList.add('show'),10);
        };

        window.openEditModal = (id) => {
            const m = membersData.find(x => x.id === id); if(!m) return;
            document.getElementById('formId').value = id; document.getElementById('formNamaKtp').value = m.namaKtp || m.nama || ''; 
            document.getElementById('formNamaWa').value = m.namaWa || m.nama || ''; document.getElementById('formPlat').value = m.plat || ''; 
            document.getElementById('formHp').value = m.hp || ''; document.getElementById('formRole').value = m.role || 'KELUARGA MLU';
            document.getElementById('formType').value = m.type || m.divisi || 'RTO'; document.getElementById('formTabungan').value = m.tabungan_kc || ''; 
            document.getElementById('modalTitleText').innerText = "Edit Anggota";
            if(m.foto && m.foto.length > 50) { currentPhotoBase64 = m.foto; document.getElementById('previewFoto').src = m.foto; document.getElementById('previewFoto').style.display = 'block'; } 
            else { currentPhotoBase64 = ""; document.getElementById('previewFoto').style.display = 'none'; }
            modal.style.display = 'flex'; setTimeout(()=>modal.classList.add('show'),10);
        }

        window.closeModal = () => { modal.classList.remove('show'); setTimeout(()=>modal.style.display = 'none',300); };

        window.saveData = async () => {
            const id = document.getElementById('formId').value;
            const namaKtp = document.getElementById('formNamaKtp').value.trim().toUpperCase();
            const namaWa = document.getElementById('formNamaWa').value.trim().toUpperCase();
            const plat = document.getElementById('formPlat').value.trim().toUpperCase();
            const hp = document.getElementById('formHp').value.trim();
            const role = document.getElementById('formRole').value;
            const type = document.getElementById('formType').value;
            
            let rawTabungan = document.getElementById('formTabungan').value.trim();
            const tabungan = rawTabungan ? parseInt(rawTabungan) : 0;
            const idRapat = plat.replace(/\s+/g, '');

            if(!namaKtp || !namaWa || !plat) return alert("Nama KTP, Nama WA, dan Plat wajib diisi!");

            const btn = document.getElementById('btnSave'); btn.innerText = "MENYIMPAN..."; btn.style.opacity = '0.7';

            try {
                let payload = { namaKtp: namaKtp, namaWa: namaWa, nama: namaKtp, plat: plat, hp: hp, role: role, type: type, vendor: type, tabungan_kc: tabungan };
                if(currentPhotoBase64 !== "") payload.foto = currentPhotoBase64;

                // SIMPAN KE DATABASE MLU UTAMA
                if (id) {
                    await setDoc(doc(dbMain, "mlu_members", id), payload, { merge: true });
                } else {
                    await setDoc(doc(dbMain, "mlu_members", idRapat), payload, { merge: true });
                }
                
                closeModal();
            } catch (e) { alert("Gagal menyimpan: " + e.message); } 
            finally { btn.innerText = "SIMPAN DATA"; btn.style.opacity = '1'; }
        };

        window.deleteData = async (id) => { 
            if(confirm("Hapus anggota ini permanen?")) { 
                await deleteDoc(doc(dbMain, "mlu_members", id)); 
            } 
        };
    </script>
</body>
</html>
