<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Anggota KC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; font-family: 'Inter', sans-serif; color: #fff; padding-bottom: 50px; }
        .header { background: rgba(15,15,15,0.9); padding: 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-back { color: white; font-size: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none;}
        .header-title h1 { margin: 0; font-family: 'Space Grotesk'; font-size: 20px; color: #D4FF00; }
        .container { padding: 20px; }
        .search-box { width: 100%; padding: 15px; border-radius: 12px; background: #111; border: 1px solid rgba(255,255,255,0.1); color: white; margin-bottom: 20px; outline: none;}
        .member-list { display: flex; flex-direction: column; gap: 10px; }
        .member-card { background: #111; padding: 15px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center;}
        .m-name { font-weight: 800; color: white; margin-bottom: 5px; font-family: 'Space Grotesk';}
        .m-plat { font-size: 11px; color: #10B981; }
    </style>
</head>
<body>
    <div class="header">
        <a href="dashboard_kc.html" class="btn-back"><i class="fas fa-chevron-left"></i></a>
        <div class="header-title"><h1>DATA ANGGOTA KC</h1></div>
    </div>
    <div class="container">
        <input type="text" class="search-box" placeholder="Cari Nama atau Plat...">
        <div class="member-list" id="listAnggota">
            <div style="text-align:center; color:#64748b; font-size:12px;">Data akan dimuat di sini...</div>
        </div>
    </div>
</body>
</html>
