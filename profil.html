<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#064E3B">
    <title>Setting Profil - KGR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-base: #F4F6F5; --text-dark: #111827; --text-gray: #4B5563; 
            --emerald-dark: #064E3B; --emerald-main: #059669; --emerald-card: linear-gradient(135deg, #065F46 0%, #022C22 100%);
            --glass-bg: rgba(255, 255, 255, 0.75); --glass-border: rgba(255, 255, 255, 0.9); 
            --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.04); --color-out: #DC2626; 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #E2E8E4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: var(--bg-base); position: relative; overflow: hidden; display: flex; flex-direction: column; color: var(--text-dark); }
        @media (min-width: 600px) { .app-container { max-width: 480px; height: 90vh; max-height: 900px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.15); border: 8px solid #FFFFFF; margin: auto; } }
        
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid var(--glass-border); box-shadow: var(--shadow-soft), inset 0 0 20px rgba(255,255,255,0.5); z-index: 2; position: relative; }
        
        .header-page { padding: 40px 24px 20px; display: flex; align-items: center; gap: 15px; z-index: 10; position: relative; border-bottom: 1px solid rgba(0,0,0,0.05); background: rgba(244,246,245,0.8); backdrop-filter: blur(20px); }
        .btn-back { width: 40px; height: 40px; border-radius: 14px; background: #FFF; color: var(--text-dark); display: flex; justify-content: center; align-items: center; font-size: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(0,0,0,0.1); }
        .btn-back:active { transform: scale(0.9); }
        .header-page h2 { font-size: 18px; font-weight: 900; letter-spacing: -0.5px; }
        
        .content-area { flex-grow: 1; overflow-y: auto; padding: 20px 24px 110px; scrollbar-width: none; z-index: 2; position: relative; }
        .content-area::-webkit-scrollbar { display: none; }
        
        .profile-card { border-radius: 24px; padding: 30px 20px; margin-bottom: 25px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        /* Avatar & Icon Kamera Fix Menempel Precision */
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; margin-bottom: 10px; background-size: cover; background-position: center; background-color: #111827; color: var(--emerald-main); display: flex; justify-content: center; align-items: center; font-size: 40px; font-weight: 900; border: 4px solid #FFF; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; }
        .btn-edit-foto { position: absolute; bottom: -2px; right: -2px; width: 34px; height: 34px; background: var(--text-dark); color: var(--emerald-main); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 14px; border: 2.5px solid #FFF; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); z-index: 10; }
        
        .role-badge { display: inline-block; padding: 4px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; background: var(--emerald-main); color: #FFF; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 25px; box-shadow: 0 4px 10px rgba(5, 150, 105, 0.3); }
        
        .form-group { width: 100%; margin-bottom: 15px; text-align: left; }
        .form-label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; color: var(--text-gray); }
        .form-input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1.5px solid rgba(0,0,0,0.06); font-size: 14px; font-weight: 700; color: var(--text-dark); outline: none; background: #FFF; transition: 0.2s; }
        .form-input:focus { border-color: var(--emerald-main); box-shadow: 0 0 0 3px rgba(5,150,105,0.1); }
        .form-input:disabled { background: #E5E5E5; color: var(--text-gray); cursor: not-allowed; border-color: transparent; }
        
        .btn-save { width: 100%; padding: 16px; border-radius: 16px; font-size: 13px; font-weight: 900; background: var(--text-dark); color: #FFF; border: none; margin-top: 10px; display: flex; justify-content: center; align-items: center; gap: 8px; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: 0.2s;}
        .btn-save i { color: var(--emerald-main); }
        .btn-save:disabled { background: #CCC; cursor: not-allowed; box-shadow: none; }
        .btn-save:active:not(:disabled) { transform: scale(0.97); }
        
        .btn-superadmin { width: 100%; padding: 16px; border-radius: 16px; font-size: 13px; font-weight: 800; background: var(--text-dark); color: var(--emerald-main); border: none; margin-bottom: 12px; display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s;}
        .btn-superadmin:active { transform: scale(0.97); }
        
        .btn-logout { width: 100%; padding: 16px; border-radius: 16px; font-size: 13px; font-weight: 800; background: #FFF; color: var(--color-out); border: 2px solid var(--color-out); display: flex; justify-content: center; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s;}
        .btn-logout:active { background: var(--color-out); color: #FFF; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header-page">
            <div class="btn-back" onclick="window.location.href='index.html'"><i class="fa-solid fa-arrow-left"></i></div>
            <h2>Pengaturan Profil</h2>
        </div>

        <div class="content-area">
            <div class="profile-card glass-panel">
                <div class="profile-avatar" id="avatarPreview">
                    <span id="avatarInitials">...</span>
                    <!-- FIX: Di-pindahkan ke dalam kontainer avatar agar menempel sempurna -->
                    <div class="btn-edit-foto" onclick="document.getElementById('uploadFoto').click()"><i class="fa-solid fa-camera"></i></div>
                </div>
                <input type="file" id="uploadFoto" accept="image/*" hidden onchange="previewImage(event)">
                
                <div class="role-badge" id="uiRoleBadge"><i class="fa-solid fa-spinner fa-spin" style="margin-right: 4px;"></i> Memuat...</div>

                <div class="form-group">
                    <label class="form-label">Nama Lengkap</label>
                    <input type="text" id="inputNama" class="form-input" value="Memuat..." oninput="checkChanges()">
                </div>
                
                <div class="form-group">
                    <label class="form-label">Nomor WhatsApp Aktif</label>
                    <input type="tel" id="inputWa" class="form-input" value="Memuat..." oninput="this.value = this.value.replace(/[^0-9]/g, ''); checkChanges();">
                </div>

                <!-- ADDED: Form Input NIK Terkunci (Hanya Baca) -->
                <div class="form-group">
                    <label class="form-label">Nomor Induk Kependudukan (NIK) </label>
                    <input type="text" id="inputNik" class="form-input" value="Memuat..." disabled>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Terdaftar (Login)</label>
                    <input type="email" id="inputEmail" class="form-input" value="Memuat..." disabled>
                </div>

                <button class="btn-save" id="btnSave" onclick="saveProfile()" disabled><i class="fa-solid fa-floppy-disk"></i> Simpan Perubahan</button>
            </div>

            <button id="btnPanelAdmin" class="btn-superadmin" style="display: none;" onclick="window.location.href='index.html'">
                <i class="fa-solid fa-user-shield"></i> Akses Menu Pengurus (Di Beranda)
            </button>

            <button class="btn-logout" onclick="confirmLogout()"><i class="fa-solid fa-arrow-right-from-bracket"></i> Keluar Akun (Sign Out)</button>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js';
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        let currentUserEmail = "";
        let originalName = "";
        let originalWa = "";
        let newImageUploaded = false;
        let currentBase64Image = null;

        // ===================================================
        // SECURITY MODULE: OBFUSCATION / LIGHTWEIGHT ENCRYPTION
        // ===================================================
        const CRYPTO_OFFSET = 7; 
        function decryptData(cipherText) {
            if (!cipherText) return "Tidak ada data NIK";
            try {
                // Dekripsi base64 + karakter shifting cipher
                let decoded = decodeURIComponent(escape(atob(cipherText)));
                return decoded.split("").map(char => String.fromCharCode(char.charCodeAt(0) - CRYPTO_OFFSET)).join("");
            } catch (e) {
                // Fallback otomatis: jika data di DB masih berupa string NIK mentah (plain text)
                return cipherText;
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserEmail = user.email;
                const userRef = doc(db, "users", currentUserEmail);
                
                try {
                    const docSnap = await getDoc(userRef);
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        const role = (data.role || "member").toLowerCase();
                        const namaLengkap = data.nama_lengkap || "Tanpa Nama";
                        const nomorWa = data.no_wa || "";
                        
                        // Proses dekripsi data NIK pengaman
                        const nikAman = decryptData(data.nik);

                        document.getElementById('uiRoleBadge').innerHTML = `<i class="fa-solid fa-star" style="margin-right: 4px;"></i> ${role.toUpperCase()}`;
                        document.getElementById('inputNama').value = namaLengkap;
                        document.getElementById('inputWa').value = nomorWa;
                        document.getElementById('inputNik').value = nikAman; // Tampilkan NIK terenkripsi
                        document.getElementById('inputEmail').value = currentUserEmail;
                        
                        originalName = namaLengkap; 
                        originalWa = nomorWa;

                        if(data.profile_image) {
                            document.getElementById('avatarInitials').style.display = 'none';
                            document.getElementById('avatarPreview').style.backgroundImage = `url('${data.profile_image}')`;
                        } else {
                            document.getElementById('avatarPreview').style.backgroundImage = "none";
                            document.getElementById('avatarInitials').innerText = namaLengkap.charAt(0).toUpperCase();
                        }

                        if (role === "superadmin" || role === "admin" || role === "bendahara") {
                            document.getElementById('btnPanelAdmin').style.display = 'flex';
                        }
                    } else { auth.signOut(); }
                } catch (error) { console.error("Gagal memuat profil:", error); }
            } else { window.location.href = 'login.html'; }
        });

        window.confirmLogout = function() { 
            if(confirm("Yakin ingin keluar?")) { signOut(auth).then(() => { window.location.href = 'login.html'; }); }
        }

        window.checkChanges = function() {
            const currentName = document.getElementById('inputNama').value;
            const currentWa = document.getElementById('inputWa').value;
            document.getElementById('btnSave').disabled = !(currentName !== originalName || currentWa !== originalWa || newImageUploaded);
        }

        window.previewImage = function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentBase64Image = e.target.result;
                    document.getElementById('avatarInitials').style.display = 'none';
                    document.getElementById('avatarPreview').style.backgroundImage = `url('${currentBase64Image}')`;
                    newImageUploaded = true; checkChanges();
                }
                reader.readAsDataURL(file);
            }
        }

        window.saveProfile = async function() {
            const btnSave = document.getElementById('btnSave');
            btnSave.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Menyimpan...'; 
            btnSave.disabled = true;

            const newName = document.getElementById('inputNama').value;
            const newWa = document.getElementById('inputWa').value;

            try {
                const userRef = doc(db, "users", currentUserEmail);
                let dataUpdate = { nama_lengkap: newName, no_wa: newWa };
                
                if (newImageUploaded && currentBase64Image) {
                    dataUpdate.profile_image = currentBase64Image;
                }

                await updateDoc(userRef, dataUpdate);
                
                originalName = newName; originalWa = newWa; newImageUploaded = false;
                
                btnSave.innerHTML = '<i class="fa-solid fa-check" style="color: #059669;"></i> Berhasil Disimpan';
                setTimeout(() => { btnSave.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Simpan Perubahan'; btnSave.disabled = true; }, 2000);
            } catch (error) {
                alert("Gagal menyimpan!"); btnSave.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Coba Lagi'; btnSave.disabled = false;
            }
        }
    </script>
</body>
</html>
