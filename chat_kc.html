<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC Chat Room</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA HITAM PEKAT (KC) === */
        :root { 
            --kc-yellow: #D4FF00; 
            --kc-green: #10B981; 
            --bg-black: #000000;
            --bubble-other: #1e293b;
            --bubble-mine: linear-gradient(135deg, #10B981 0%, #047857 100%);
        }
        
        /* FIX LAYAR TENGGELAM DI BROWSER HP */
        body { margin: 0; background: var(--bg-black); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; text-decoration: none; outline: none; }

        /* WRAPPER MUTLAK AGAR PAS DI LAYAR */
        .app-wrapper { position: absolute; top: 0; bottom: 0; left: 0; right: 0; display: flex; flex-direction: column; }

        /* HEADER */
        .header { background: rgba(15,15,15,0.95); backdrop-filter: blur(20px); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); flex-shrink: 0;}
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; font-size: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s;}
        .header-title { display: flex; flex-direction: column; }
        .header-title h1 { margin: 0; font-family: 'Space Grotesk'; font-size: 18px; color: var(--kc-yellow); letter-spacing: 1px; display: flex; align-items: center; gap: 6px;}
        .header-title p { margin: 0; font-size: 10px; color: #94a3b8; font-weight: 600; letter-spacing: 1px; }

        /* AREA CHAT */
        .chat-container { flex: 1; padding: 20px 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%); scroll-behavior: smooth;}
        
        .msg-wrapper { display: flex; flex-direction: column; max-width: 85%; animation: fadeIn 0.3s ease-out; }
        .msg-wrapper.mine { align-self: flex-end; align-items: flex-end; }
        .msg-wrapper.other { align-self: flex-start; align-items: flex-start; }

        .sender-info { font-size: 10px; color: #94a3b8; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; font-weight: 600;}
        .msg-wrapper.mine .sender-info { flex-direction: row-reverse; color: var(--kc-yellow); }
        .role-badge { font-size: 8px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; color: white; font-family: 'Space Grotesk'; font-weight: 900; letter-spacing: 0.5px;}
        .msg-wrapper.mine .role-badge { background: rgba(212,255,0,0.2); color: var(--kc-yellow); }

        .bubble { padding: 12px 16px; border-radius: 20px; font-size: 13px; line-height: 1.5; position: relative; word-wrap: break-word; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        .msg-wrapper.other .bubble { background: var(--bubble-other); color: #f8fafc; border-top-left-radius: 4px; border: 1px solid rgba(255,255,255,0.05); }
        .msg-wrapper.mine .bubble { background: var(--bubble-mine); color: white; border-top-right-radius: 4px; }

        /* KOTAK KUTIPAN REPLY DI DALAM CHAT */
        .quote-box { background: rgba(0,0,0,0.25); border-left: 3px solid var(--kc-yellow); padding: 6px 10px; border-radius: 6px; margin-bottom: 8px; font-size: 11px; color: #cbd5e1; display: flex; flex-direction: column;}
        .quote-name { font-weight: 700; color: var(--kc-yellow); margin-bottom: 2px; font-size: 10px;}
        .msg-wrapper.other .quote-box { border-left-color: var(--kc-green); }
        .msg-wrapper.other .quote-name { color: var(--kc-green); }

        .bubble-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; gap: 15px; }
        .btn-reply-chat { font-size: 10px; color: rgba(255,255,255,0.5); cursor: pointer; font-weight: 600; }
        .btn-reply-chat:active { color: white; }
        .timestamp { font-size: 9px; opacity: 0.6; font-family: monospace;}

        /* PREVIEW REPLY SEBELUM DIKIRIM */
        .reply-preview-area { background: #1e293b; padding: 10px 20px; display: none; justify-content: space-between; align-items: center; border-top: 1px solid #334155; flex-shrink: 0; }
        .reply-preview-content { display: flex; flex-direction: column; flex: 1; border-left: 3px solid var(--kc-yellow); padding-left: 10px; }
        .rp-title { font-size: 10px; color: var(--kc-yellow); font-weight: 700; margin-bottom: 2px;}
        .rp-text { font-size: 11px; color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px;}
        .btn-cancel-reply { background: none; border: none; color: #ef4444; font-size: 16px; cursor: pointer; padding: 5px; }

        /* INPUT AREA YANG NIKMAT */
        .input-area { background: rgba(15,15,15,1); padding: 10px 15px; display: flex; gap: 10px; align-items: flex-end; border-top: 1px solid rgba(255,255,255,0.05); flex-shrink: 0; }
        .chat-input { flex: 1; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 12px 15px; color: white; font-family: 'Inter'; font-size: 13px; resize: none; outline: none; max-height: 100px; min-height: 42px; line-height: 1.4;}
        .chat-input:focus { border-color: var(--kc-yellow); }
        .chat-input::placeholder { color: #64748b; }
        
        .btn-send { width: 42px; height: 42px; border-radius: 50%; background: var(--kc-yellow); color: black; border: none; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; flex-shrink: 0; transition: 0.2s;}
        .btn-send:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loader { text-align: center; color: #64748b; font-size: 11px; padding: 10px; font-weight: 600; font-family: 'Space Grotesk'; letter-spacing: 1px;}
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="header">
        <div class="header-left">
            <a href="dashboard_kc.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <div class="header-title">
                <h1><i class="fas fa-comments"></i> TONGKRONGAN KC</h1>
                <p>INTERNAL LINTAS KARTIKA CHANDRA</p>
            </div>
        </div>
        <div style="color: var(--kc-yellow); opacity: 0.5;"><i class="fas fa-shield-alt"></i></div>
    </div>

    <div class="chat-container" id="chatBox">
        <div id="loader"><i class="fas fa-circle-notch fa-spin"></i> MENGHUBUNGKAN...</div>
        </div>

    <div class="reply-preview-area" id="replyPreviewArea">
        <div class="reply-preview-content">
            <span class="rp-title" id="rpName">Membalas...</span>
            <span class="rp-text" id="rpText">Pesan...</span>
        </div>
        <button class="btn-cancel-reply" onclick="batalBalas()"><i class="fas fa-times"></i></button>
    </div>

    <div class="input-area">
        <textarea id="msgInput" class="chat-input" placeholder="Ketik pesan..." rows="1"></textarea>
        <button id="btnSend" class="btn-send" onclick="kirimPesan()"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // DATABASE MLU
        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // AMBIL DATA USER
        let uData = null;
        try { uData = JSON.parse(localStorage.getItem('maka_user')); } catch (e) {}
        if (!uData || !uData.plat) window.location.href = 'index_kc.html';

        const myName = uData.namaKtp || uData.namaWa || "Member KC";
        const myPlat = uData.plat || "B XXXX XX";
        
        // Cek Bypass Dewa (B4248SWF)
        let myRole = uData.role || "MEMBER";
        if(myPlat.replace(/\s+/g, '').toUpperCase() === "B4248SWF") myRole = "PA BOS";

        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const btnSend = document.getElementById('btnSend');
        
        // Variabel untuk menyimpan data pesan yang sedang di-reply
        let currentReplyData = null;

        // Auto-resize textarea
        msgInput.addEventListener('input', function() {
            this.style.height = '42px';
            this.style.height = (this.scrollHeight) + 'px';
            btnSend.disabled = this.value.trim() === '';
        });

        // FUNGSI SIAPKAN BALASAN (REPLY)
        window.siapkanBalasan = (encName, encText) => {
            const name = decodeURIComponent(encName);
            const text = decodeURIComponent(encText);
            
            currentReplyData = { name: name, text: text };
            
            document.getElementById('rpName').innerText = `Membalas ${name}`;
            document.getElementById('rpText').innerText = text;
            document.getElementById('replyPreviewArea').style.display = 'flex';
            msgInput.focus();
        };

        // FUNGSI BATAL BALAS
        window.batalBalas = () => {
            currentReplyData = null;
            document.getElementById('replyPreviewArea').style.display = 'none';
        };

        // FUNGSI KIRIM PESAN
        window.kirimPesan = async () => {
            const text = msgInput.value.trim();
            if (!text) return;

            msgInput.value = '';
            msgInput.style.height = '42px';
            btnSend.disabled = true;
            
            // Siapkan payload
            let payload = {
                senderId: uData.id || myPlat,
                senderName: myName,
                senderPlat: myPlat,
                senderRole: myRole,
                text: text,
                timestamp: Date.now()
            };

            // Masukkan data reply kalau ada
            if(currentReplyData) {
                payload.replyTo = currentReplyData;
                batalBalas(); // Tutup preview setelah kirim
            }

            try {
                await addDoc(collection(db, "mlu_kc_chats"), payload);
            } catch (error) {
                alert("Gagal mengirim pesan: " + error.message);
                btnSend.disabled = false;
            }
        };

        // TARIK PESAN REALTIME
        const q = query(collection(db, "mlu_kc_chats"), orderBy("timestamp", "desc"), limit(100));
        
        onSnapshot(q, (snapshot) => {
            const messages = [];
            snapshot.forEach((doc) => {
                messages.push({ id: doc.id, ...doc.data() });
            });

            messages.reverse();
            chatBox.innerHTML = ''; 
            
            if(messages.length === 0) {
                chatBox.innerHTML = '<div style="text-align:center; color:#64748b; font-size:12px; margin-top:30px;">Belum ada obrolan. Jadilah yang pertama menyapa! 👋</div>';
                return;
            }

            messages.forEach(msg => {
                const isMine = msg.senderId === (uData.id || myPlat);
                const alignClass = isMine ? 'mine' : 'other';
                
                const date = new Date(msg.timestamp);
                const timeStr = date.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                const safeText = msg.text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");
                const safeName = msg.senderName.split(' ')[0];

                // Render Box Reply jika pesan ini adalah balasan
                let replyHtml = '';
                if(msg.replyTo) {
                    const safeReplyText = msg.replyTo.text.replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    replyHtml = `
                        <div class="quote-box">
                            <span class="quote-name">${msg.replyTo.name}</span>
                            <span>${safeReplyText}</span>
                        </div>
                    `;
                }

                // Encrypt data buat dikirim ke fungsi JS (biar ga error kalau ada tanda petik)
                const encName = encodeURIComponent(safeName);
                const encText = encodeURIComponent(msg.text);

                const bubbleHtml = `
                    <div class="msg-wrapper ${alignClass}">
                        <div class="sender-info">
                            <span>${isMine ? 'Anda' : safeName}</span>
                            <span class="role-badge">${msg.senderRole}</span>
                        </div>
                        <div class="bubble">
                            ${replyHtml}
                            ${safeText}
                            <div class="bubble-footer">
                                <span class="btn-reply-chat" onclick="siapkanBalasan('${encName}', '${encText}')"><i class="fas fa-reply"></i> Balas</span>
                                <span class="timestamp">${timeStr}</span>
                            </div>
                        </div>
                    </div>
                `;
                chatBox.innerHTML += bubbleHtml;
            });

            setTimeout(() => { chatBox.scrollTop = chatBox.scrollHeight; }, 100);
        });
    </script>
</body>
</html>
