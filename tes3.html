<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU Top Anchor Logo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@500;700&display=swap');

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Teko', sans-serif;
            overflow: hidden;
        }

        .poster {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 850px;
            /* Background dengan tekstur garis diagonal industri */
            background: 
                repeating-linear-gradient(45deg, rgba(197, 160, 89, 0.05) 0px, rgba(197, 160, 89, 0.05) 2px, transparent 2px, transparent 10px),
                linear-gradient(180deg, #222 0%, #000 100%);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border: 3px solid #111;
        }

        /* HEADER AREA: LOGO DI KIRI ATAS */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 25px 20px;
            border-bottom: 3px solid #c5a059;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        /* Logo di pojok kiri atas dengan shadow tegas */
        .anchor-logo {
            width: 130px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8)) drop-shadow(0 0 5px rgba(197, 160, 89, 0.3));
        }

        /* Status kecil di kanan atas untuk penyeimbang */
        .top-status {
            text-align: right;
        }
        .status-label { font-size: 0.8rem; color: #888; letter-spacing: 1px; }
        .status-active { color: #c5a059; font-weight: 700; font-size: 1.1rem; }
        .blink { animation: blink 1s infinite alternate; }
        @keyframes blink { 0% { opacity: 0.3; } 100% { opacity: 1; } }


        /* AREA JUDUL RAKSASA DI TENGAH */
        .hero-title-block {
            flex-grow: 1; /* Mengisi ruang tengah */
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            text-align: left;
        }

        /* Teks Putih Besar */
        .mega-text {
            font-family: 'Anton', sans-serif;
            font-size: 5rem; /* SANGAT BESAR */
            line-height: 0.85;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 5px 5px 0px #000;
        }
        
        /* Teks Emas Metalik Besar */
        .gold-text {
            font-family: 'Anton', sans-serif;
            font-size: 5rem; /* SANGAT BESAR */
            line-height: 0.85;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -2px;
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(5px 5px 0px rgba(0,0,0,0.8));
        }

        .sub-hero {
            font-size: 1.2rem;
            color: #fff;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 15px;
            letter-spacing: 4px;
            border-left: 5px solid #c5a059;
            padding-left: 15px;
        }


        /* FOOTER INFO AREA */
        .info-footer {
            background: #111;
            padding: 25px 20px;
            border-top: 3px solid #c5a059;
        }

        .grid-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-box {
            background: #000;
            padding: 12px;
            border: 1px solid #333;
        }

        .label { font-size: 0.9rem; color: #888; letter-spacing: 1px; display: block; margin-bottom: 5px;}
        .value { font-size: 1.5rem; color: #c5a059; font-weight: 700; line-height: 1; }

        .location-final { text-align: left; }
        .loc-huge {
            font-family: 'Anton', sans-serif;
            font-size: 2.2rem;
            color: #fff;
            line-height: 0.9;
            text-transform: uppercase;
            margin: 5px 0;
        }
        .loc-detail { color: #ccc; font-size: 1rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="poster">
        <div class="header-bar">
            <img src="logomlu.png" alt="MLU Emblem" class="anchor-logo">
            <div class="top-status">
                <div class="status-label">PRIORITY STATUS:</div>
                <div class="status-active">⚡ ALL UNITS ACTIVE <span class="blink">///</span></div>
            </div>
        </div>

        <div class="hero-title-block">
            <h1 class="mega-text">MEGA KOPDAR</h1>
            <h1 class="gold-text">KELUARGA MLU</h1>
            <div class="sub-hero">BEDA RANGKA BEDA WARNA SATU KELUARGA</div>
        </div>

        <div class="info-footer">
            <div class="grid-info">
                <div class="info-box">
                    <span class="label">EXECUTION DATE</span>
                    <span class="value">08.03.26</span>
                </div>
                <div class="info-box">
                    <span class="label">START TIME</span>
                    <span class="value">17:00 WIB</span>
                </div>
            </div>
            
            <div class="location-final">
                <span class="label">RENDEZVOUS POINT (TITIK KUMPUL)</span>
                <div class="loc-huge">JAKARTA INTERNATIONAL STADIUM</div>
                <div class="loc-detail">SUNTER - JAKARTA UTARA</div>
            </div>
        </div>
    </div>

</body>
</html>
