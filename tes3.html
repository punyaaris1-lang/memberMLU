<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mockup Animasi Login MLU</title>
    <style>
        /* RESET & BASIC */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; font-family: sans-serif; overflow: hidden; }

        /* SIMULASI DASHBOARD (DI BELAKANG) */
        .dashboard-mockup {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, #0A2259 0%, #15398F 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 1;
            opacity: 0; transform: scale(0.9); transition: all 1s ease-out;
        }
        .dashboard-mockup.show { opacity: 1; transform: scale(1); }
        .dashboard-mockup h1 { font-size: 30px; letter-spacing: 2px; margin-bottom: 10px; }
        .dashboard-mockup p { color: #93C5FD; }

        /* OVERLAY ANIMASI (PINTU GERBANG) */
        .gate-overlay {
            position: absolute; inset: 0;
            background: #000; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.5s;
        }
        .gate-overlay.fade-out { background: transparent; pointer-events: none; }

        /* WADAH LOGO YANG AKAN DIBELAH */
        .logo-container {
            position: relative;
            width: 250px; height: 250px;
            /* Efek getar pelan sebelum dipotong */
            animation: floatLogo 3s ease-in-out infinite; 
        }

        /* BAGIAN LOGO ATAS & BAWAH */
        .logo-half {
            position: absolute; left: 0; width: 100%; height: 100%;
            background-image: url('logomlumaster.png'); /* PANGGIL LOGO MLU */
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: transform 1.2s cubic-bezier(0.86, 0, 0.07, 1), opacity 1s;
        }

        /* MEMOTONG LOGO PAKAI CSS CLIP-PATH */
        /* Setengah Atas */
        .logo-top { clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%); top: 0; }
        /* Setengah Bawah */
        .logo-bottom { clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%); top: 0; }

        /* ANIMASI KETIKA TERBELAH */
        .logo-top.split { transform: translateY(-150vh) rotate(-5deg); opacity: 0; }
        .logo-bottom.split { transform: translateY(150vh) rotate(5deg); opacity: 0; }

        /* EFEK KILAT (LIGHTNING SLASH) */
        .slash-line {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 0%; height: 4px;
            background: #fff;
            box-shadow: 0 0 20px #00f2fe, 0 0 40px #00f2fe, 0 0 80px #fff;
            border-radius: 10px; z-index: 20; opacity: 0;
        }
        
        .slash-line.strike { animation: slashAnim 0.6s ease-out forwards; }

        @keyframes slashAnim {
            0% { width: 0%; opacity: 1; height: 2px; }
            40% { width: 150vw; opacity: 1; height: 8px; box-shadow: 0 0 50px #00f2fe, 0 0 100px #fff; }
            100% { width: 200vw; opacity: 0; height: 0px; }
        }

        /* EFEK KILAT LAYAR (FLASH BLIND) */
        .screen-flash {
            position: absolute; inset: 0; background: white; z-index: 100;
            opacity: 0; pointer-events: none;
        }
        .screen-flash.flash { animation: flashAnim 0.8s ease-out forwards; }

        @keyframes flashAnim {
            0% { opacity: 0; }
            10% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 10px rgba(212,175,55,0.3)); }
            50% { transform: translateY(-10px); filter: drop-shadow(0 0 20px rgba(212,175,55,0.6)); }
        }

        /* TOMBOL UNTUK MENTRIGGER ANIMASI */
        .btn-trigger {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #D4AF37; color: black; border: none;
            font-weight: bold; border-radius: 30px; cursor: pointer; z-index: 1000;
            font-size: 16px; box-shadow: 0 5px 20px rgba(212,175,55,0.4);
        }
        .btn-trigger:active { transform: translateX(-50%) scale(0.95); }

    </style>
</head>
<body>

    <div class="screen-flash" id="screenFlash"></div>

    <div class="dashboard-mockup" id="dashboardMockup">
        <h1>DASHBOARD MLU</h1>
        <p>Login Berhasil. Memuat Data...</p>
    </div>

    <div class="gate-overlay" id="gateOverlay">
        <div class="logo-container" id="logoContainer">
            <div class="slash-line" id="slashLine"></div>
            
            <div class="logo-half logo-top" id="logoTop"></div>
            <div class="logo-half logo-bottom" id="logoBottom"></div>
        </div>
    </div>

    <button class="btn-trigger" id="btnTrigger" onclick="playCinematic()">SIMULASI LOGIN</button>

    <script>
        function playCinematic() {
            // Sembunyikan tombol
            document.getElementById('btnTrigger').style.display = 'none';

            const topHalf = document.getElementById('logoTop');
            const botHalf = document.getElementById('logoBottom');
            const slash = document.getElementById('slashLine');
            const flash = document.getElementById('screenFlash');
            const gate = document.getElementById('gateOverlay');
            const dash = document.getElementById('dashboardMockup');
            const container = document.getElementById('logoContainer');

            // Hentikan efek melayang (kunci posisi)
            container.style.animation = 'none';

            // 1. Munculkan garis kilat & layar berkedip putih
            slash.classList.add('strike');
            flash.classList.add('flash');

            // 2. Beri jeda sangat sedikit (0.1 detik) agar kilat terasa menebas logo
            setTimeout(() => {
                // Logo terbelah ke atas & bawah
                topHalf.classList.add('split');
                botHalf.classList.add('split');
                
                // Hilangkan background hitam pekat
                gate.classList.add('fade-out');

                // Munculkan Dashboard (Zoom in perlahan)
                dash.classList.add('show');
            }, 150);
        }
    </script>

</body>
</html>
