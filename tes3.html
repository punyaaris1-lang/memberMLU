<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KopSan MLU</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Background gelap nuansa biru/cyan untuk acara santai */
            background: #0f2027; 
            background: linear-gradient(to bottom, #203a43, #0f2027);
            font-family: 'Montserrat', sans-serif;
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 210, 255, 0.3);
            width: 380px;
            max-width: 90vw;
            box-sizing: border-box;
            border-radius: 20px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            overflow: hidden;
            color: white;
        }

        /* Efek glow biru santai */
        .card::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: #3a7bd5;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: #00d2ff;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
        }

        /* --- Bagian Logo --- */
        .logo-container {
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
        }

        .mlu-logo {
            width: 100px; 
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.4));
        }

        h2 {
            margin: 0;
            font-size: 14px;
            letter-spacing: 3px;
            color: #00d2ff;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 5px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 900;
            line-height: 1.2;
            text-transform: uppercase;
            margin-bottom: 20px;
            background: -webkit-linear-gradient(#fff, #b3e5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .details-box {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid rgba(0, 210, 255, 0.2);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .detail-item {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
            font-size: 15px;
            font-weight: 600;
        }

        .detail-item:last-child {
            margin-bottom: 0;
        }

        .icon {
            font-size: 20px;
            margin-right: 15px;
            width: 25px;
            text-align: center;
        }

        .warning-box {
            background: rgba(255, 193, 7, 0.15); /* Kuning transparan */
            border-left: 4px solid #ffc107; /* Garis peringatan kuning */
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: left;
        }

        .warning-title {
            color: #ffc107;
            font-size: 13px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .warning-text {
            font-size: 14px;
            color: #fff;
            line-height: 1.5;
            font-weight: 600;
        }

        .footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed rgba(255,255,255,0.2);
            font-size: 14px;
            font-weight: 700;
            color: #888;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .footer span {
            color: #00d2ff;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="logo.png" alt="Logo MLU" class="mlu-logo">
        </div>

        <h2>☕ AGENDA MLU ☕</h2>
        <h1>KOPDAR SANTAI</h1>

        <div class="details-box">
            <div class="detail-item">
                <span class="icon">📅</span> 
                <span>Sabtu, 4 April</span>
            </div>
            <div class="detail-item">
                <span class="icon">📍</span> 
                <span>Rumah Bapak Ubay</span>
            </div>
        </div>

        <div class="warning-box">
            <div class="warning-title">⚠️ PERHATIAN:</div>
            <div class="warning-text">
                Mohon untuk membawa makanan, kopi, <br>dan rokok masing-masing. 
            </div>
        </div>

        <div class="footer">
            SALAM SATU ASPAL<br>
            <span>PENGURUS MLU</span>
        </div>
    </div>

</body>
</html>
