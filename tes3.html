<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Saber Gold</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;700&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* TOMBOL MULAI */
        #btnStart {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 9999;
            background: #D4AF37; color: #000; 
            border: 2px solid #fff; padding: 15px 40px;
            font-size: 18px; font-weight: 800; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 30px #D4AF37;
            animation: pulseBtn 1s infinite;
        }
        @keyframes pulseBtn { 0%{transform:translate(-50%,-50%) scale(1);} 50%{transform:translate(-50%,-50%) scale(1.1);} 100%{transform:translate(-50%,-50%) scale(1);} }

        /* CONTAINER UTAMA */
        .poster-container {
            width: 100vw; height: 100vh;
            background: #050505;
            position: relative;
            overflow: hidden;
        }

        /* === LAYER KONTEN (YANG AKAN DI-REVEAL) === */
        .content-layer {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between;
            padding: 60px 20px 100px 20px;
            z-index: 1;
        }

        /* FOTO BACKGROUND FULL */
        .photo-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
        .photo-bg img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: top center; /* Fokus Wajah */
            filter: brightness(0.6) contrast(1.1);
        }
        .gradient-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, #000 10%, transparent 80%);
        }

        /* LOGO BESAR */
        .logo-area {
            width: 220px; /* Logo Besar */
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8));
            animation: floatLogo 3s ease-in-out infinite;
            margin-top: 40px;
        }
        .logo-area img { width: 100%; }

        /* TEKS NAMA */
        .text-area { text-align: center; }
        .jabatan {
            display: inline-block; background: #D4AF37; color: #000;
            padding: 5px 30px; font-weight: 800; letter-spacing: 2px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            margin-bottom: 10px;
        }
        .nama {
            font-family: 'Teko', sans-serif;
            font-size: 75px; line-height: 0.9; color: white;
            text-transform: uppercase; margin: 0;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .org {
            color: #ccc; letter-spacing: 5px; font-size: 14px; margin-top: 5px;
        }

        /* === LAYER PENUTUP (CURTAIN) === */
        .curtain {
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%;
            background: #000; /* Layar Hitam */
            z-index: 100;
            display: flex; align-items: center;
        }
        
        /* SABER LIGHT (GARIS EMAS) */
        .saber-line {
            position: absolute; right: -5px; top: 0;
            width: 8px; height: 100%;
            background: #fff;
            box-shadow: 0 0 20px #D4AF37, 0 0 50px #D4AF37;
            z-index: 101;
            display: none; /* Muncul pas animasi */
        }

        /* BORDER MEWAH */
        .border-frame {
            position: absolute; inset: 15px;
            border: 2px solid #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            z-index: 50;
            pointer-events: none;
        }

        /* ANIMASI */
        @keyframes floatLogo { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
        
        /* KELAS ANIMASI JS */
        .anim-reveal {
            animation: swipeRight 2.5s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }
        @keyframes swipeRight {
            0% { width: 100%; }
            100% { width: 0%; }
        }

    </style>
</head>
<body>

    <button id="btnStart" onclick="startShow()">● MULAI REKAM</button>

    <div class="poster-container">
        <div class="border-frame"></div>

        <div class="curtain" id="curtainLayer">
            <div class="saber-line" id="saberLine"></div>
        </div>

        <div class="content-layer">
            <div class="logo-area">
                <img src="logomlu.png" alt="Logo MLU">
            </div>

            <div class="photo-bg">
                <img src="ipung.jpg" alt="Foto">
                <div class="gradient-overlay"></div>
            </div>

            <div class="text-area">
                <div class="jabatan">PUBLIC RELATION</div>
                <h1 class="nama">PURNOMO</h1>
                <div class="org">MAKA LINTAS UTARA</div>
            </div>
        </div>
    </div>

    <script>
        function startShow() {
            const btn = document.getElementById('btnStart');
            const curtain = document.getElementById('curtainLayer');
            const saber = document.getElementById('saberLine');

            // 1. Coba Fullscreen (Pake Try Catch biar ga Eror)
            try {
                var elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            } catch(e) {
                console.log("Fullscreen ditolak, animasi tetap jalan.");
            }

            // 2. Hilangkan Tombol
            btn.style.display = 'none';

            // 3. Jalankan Animasi
            saber.style.display = 'block'; // Nyalakan pedang
            
            // Tunggu 0.5 detik biar siap rekam
            setTimeout(() => {
                curtain.classList.add('anim-reveal'); // Geser layar hitam
            }, 500);
        }
    </script>

</body>
</html>
