<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRANSGO - Screenshot List</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@800;900&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 15px; /* Jarak luar diperkecil */
            background-color: #0A2259;
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .capture-area {
            width: 100%;
            max-width: 480px; 
            background: #FFFFFF;
            border-radius: 16px;
            padding: 20px 15px; /* Padding atas bawah dikurangi biar hemat space */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            overflow: hidden; /* Biar watermark ga keluar batas putih */
        }

        /* WATERMARK LOGO BESAR MIRING */
        .watermark-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130%;
            transform: translate(-50%, -50%) rotate(-15deg);
            opacity: 0.08; /* Transparan supaya teks tetap jelas */
            z-index: 1;
            pointer-events: none;
        }

        /* Wrapper konten biar di atas watermark */
        .content-wrapper {
            position: relative;
            z-index: 2;
        }

        .tagline-container {
            font-family: 'Outfit', sans-serif;
            font-size: 15px; /* Sedikit dikecilin dari 16px */
            font-weight: 900;
            color: #0A2259;
            text-transform: uppercase;
            line-height: 1.4;
            margin-bottom: 15px;
            border-bottom: 3px solid #D4AF37;
            padding-bottom: 12px;
        }

        .patched-text {
            display: inline-block;
            background-color: #D4AF37;
            color: #000000;
            padding: 2px 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 14px;
            transform: rotate(-4deg);
            box-shadow: 2px 3px 0px rgba(0,0,0,0.2);
            border-radius: 2px;
            margin-left: 4px;
            position: relative;
            top: -2px;
        }

        .sub-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 12px; /* Dikecilin biar rapet */
            font-weight: 900;
            color: #2D63ED;
            background: #EBF0FE;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 2px solid #2D63ED;
        }

        .member-table {
            width: 100%;
            border-collapse: collapse;
        }

        .member-table th {
            background-color: #0A2259;
            color: #FFFFFF;
            padding: 10px 5px; /* Hemat space atas bawah */
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            border: 2px solid #0A2259;
        }

        .member-table td {
            border: 2px solid #0A2259;
            padding: 8px 5px; /* Hemat space atas bawah */
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #000000;
            text-transform: uppercase;
            vertical-align: middle;
        }

        .td-no { text-align: center; width: 10%; }
        .td-nama { text-align: left; }
        .td-plat { 
            text-align: center; 
            color: #2D63ED; 
            font-family: 'Space Grotesk', sans-serif; 
            width: 35%; 
        }

        .loading-text {
            font-weight: 900;
            color: #2D63ED;
            font-size: 14px;
            text-transform: uppercase;
            margin: 15px 0;
        }
    </style>
</head>
<body>

    <div class="capture-area" id="captureArea">
        <img src="logomlumaster.png" class="watermark-logo" alt="">
        
        <div class="content-wrapper">
            <div class="tagline-container">
                BEDA RANGKA BEDA WARNA <span class="patched-text">BEDA VENDOR</span><br>
                SATU KELUARGA<br>
                MAKA LINTAS UTARA
            </div>

            <div class="sub-title">
                DAFTAR NAMA KELUARGA MLU DARI TRANSGO
            </div>

            <div id="loadingText" class="loading-text">Menarik Data Transgo...</div>
            
            <table class="member-table" id="memberTable" style="display: none;">
                <thead>
                    <tr>
                        <th>NO</th>
                        <th>NAMA</th>
                        <th>PLAT</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", 
            authDomain: "rtomaka-e67b5.firebaseapp.com", 
            projectId: "rtomaka-e67b5", 
            storageBucket: "rtomaka-e67b5.firebasestorage.app", 
            messagingSenderId: "472036722228", 
            appId: "1:472036722228:web:11d520f9204db317d02c61" 
        };
        
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        async function loadTransgoMembers() {
            try {
                const snap = await getDocs(collection(db, "mlu_members"));
                let transgoData = [];

                snap.forEach(doc => {
                    const m = doc.data();
                    if (m.type === "TRANSGO" || m.divisi === "TRANSGO") {
                        transgoData.push(m);
                    }
                });

                document.getElementById("loadingText").style.display = "none";
                const tbody = document.getElementById("tableBody");
                const table = document.getElementById("memberTable");

                if (transgoData.length === 0) {
                    document.getElementById("captureArea").querySelector('.content-wrapper').innerHTML += "<div style='color: #E00000; font-weight: 900; font-size: 16px; margin-top:20px;'>DATA TRANSGO MASIH KOSONG</div>";
                    return;
                }

                transgoData.sort((a, b) => {
                    let nameA = (a.namaKtp || a.namaWa || "").toUpperCase();
                    let nameB = (b.namaKtp || b.namaWa || "").toUpperCase();
                    return nameA.localeCompare(nameB);
                });

                transgoData.forEach((m, index) => {
                    const nama = m.namaKtp || m.namaWa || "-";
                    const plat = m.plat || "-";

                    tbody.innerHTML += `
                        <tr>
                            <td class="td-no">${index + 1}</td>
                            <td class="td-nama">${nama}</td>
                            <td class="td-plat">${plat}</td>
                        </tr>
                    `;
                });

                table.style.display = "table";

            } catch (error) {
                document.getElementById("loadingText").innerText = "GAGAL MENARIK DATA";
                document.getElementById("loadingText").style.color = "#E00000";
            }
        }

        loadTransgoMembers();
    </script>
</body>
</html>
