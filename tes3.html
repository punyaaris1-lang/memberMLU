<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU Family Invitation</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@500;700&display=swap');

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Teko', sans-serif;
            overflow-y: auto;
        }

        .poster {
            position: relative;
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            background: 
                repeating-linear-gradient(45deg, rgba(197, 160, 89, 0.05) 0px, rgba(197, 160, 89, 0.05) 2px, transparent 2px, transparent 10px),
                linear-gradient(180deg, #151515 0%, #000 100%);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border-left: 3px solid #111;
            border-right: 3px solid #111;
        }

        /* HEADER */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 20px 20px;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            border-bottom: 2px solid #c5a059; 
        }

        .anchor-logo {
            width: 110px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.8));
        }

        .top-status {
            text-align: right;
        }
        .status-label { font-size: 0.7rem; color: #888; letter-spacing: 1px; }
        .status-active { color: #c5a059; font-weight: 700; font-size: 0.9rem; }
        .blink { animation: blink 1s infinite alternate; }
        @keyframes blink { 0% { opacity: 0.3; } 100% { opacity: 1; } }

        /* AREA JUDUL */
        .hero-title-block {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            text-align: left;
        }

        /* KOPDAR GEDE BANGET */
        .mega-text {
            font-family: 'Anton', sans-serif;
            font-size: 6.5rem; /* Ukuran diperbesar drastis */
            line-height: 0.85;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -2px;
            text-shadow: 5px 5px 0px #000;
        }
        
        /* KELUARGA MLU (Satu Baris) */
        .gold-text {
            font-family: 'Anton', sans-serif;
            font-size: 3rem; /* Disesuaikan agar muat satu baris */
            line-height: 1;
            text-transform: uppercase;
            margin-top: 5px;
            letter-spacing: 0px; /* Rapatkan dikit biar muat */
            white-space: nowrap; /* Paksa satu baris */
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(3px 3px 0px rgba(0,0,0,0.8));
        }

        .sub-hero {
            font-size: 1.2rem;
            color: #fff;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 25px;
            letter-spacing: 2px;
            border-left: 5px solid #c5a059;
            padding-left: 15px;
            line-height: 1.2;
        }

        /* INFO BAWAH */
        .info-footer {
            background: #111;
            padding: 20px;
            border-top: 3px solid #c5a059;
            padding-bottom: 40px; 
        }

        .grid-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-box {
            background: #000;
            padding: 10px;
            border: 1px solid #333;
        }

        .label { font-size: 0.8rem; color: #888; letter-spacing: 1px; display: block; margin-bottom: 5px;}
        .value { font-size: 1.3rem; color: #c5a059; font-weight: 700; line-height: 1; }

        .location-final { text-align: left; }
        .loc-huge {
            font-family: 'Anton', sans-serif;
            font-size: 1.8rem;
            color: #fff;
            line-height: 1;
            text-transform: uppercase;
            margin: 5px 0;
        }
        .loc-detail { color: #ccc; font-size: 1rem; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="poster">
        <div class="header-bar">
            <img src="logomlu.png" alt="MLU Emblem" class="anchor-logo">
            <div class="top-status">
                <div class="status-label">PRIORITY STATUS:</div>
                <div class="status-active">⚡ ALL UNITS ACTIVE <span class="blink">///</span></div>
            </div>
        </div>

        <div class="hero-title-block">
            <h1 class="mega-text">KOPDAR</h1>
            <h1 class="gold-text">KELUARGA MLU</h1>
            
            <div class="sub-hero">
                BEDA RANGKA BEDA WARNA<br>
                <span style="color: #c5a059; font-size: 1.4rem;">SATU KELUARGA</span>
            </div>
        </div>

        <div class="info-footer">
            <div class="grid-info">
                <div class="info-box">
                    <span class="label">EXECUTION DATE</span>
                    <span class="value">08.03.26</span>
                </div>
                <div class="info-box">
                    <span class="label">START TIME</span>
                    <span class="value">17:00 WIB</span>
                </div>
            </div>
            
            <div class="location-final">
                <span class="label">RENDEZVOUS POINT (TITIK KUMPUL)</span>
                <div class="loc-huge">JAKARTA INTERNATIONAL STADIUM</div>
                <div class="loc-detail">SUNTER - JAKARTA UTARA</div>
            </div>
        </div>
    </div>

</body>
</html>
