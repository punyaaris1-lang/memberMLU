<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU Industrial Gold</title>
    <style>
        /* Import Font yang Sangat Tebal dan Padat */
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@500;700&display=swap');

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Teko', sans-serif;
            overflow: hidden;
        }

        .poster {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 850px;
            /* Background dengan tekstur garis industri halus */
            background: 
                repeating-linear-gradient(90deg, rgba(255,255,255,0.03) 0px, rgba(255,255,255,0.03) 1px, transparent 1px, transparent 10px),
                linear-gradient(180deg, #151515 0%, #000 100%);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            border: 2px solid #111;
        }

        /* STATUS BAR ATAS */
        .status-bar {
            background: #c5a059;
            color: #000;
            padding: 8px 15px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5;
            box-shadow: 0 5px 15px rgba(197, 160, 89, 0.2);
        }
        
        .status-blink {
            animation: blink 1s infinite alternate;
        }
        @keyframes blink { 0% { opacity: 0.4; } 100% { opacity: 1; } }

        /* BLOK JUDUL PADAT */
        .title-block {
            padding: 30px 20px 0 20px;
            z-index: 2;
            display: flex;
            flex-direction: column;
        }

        .main-title {
            font-family: 'Anton', sans-serif;
            font-size: 4.5rem;
            line-height: 0.85;
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -1px;
            /* Bayangan hitam tebal biar teks 'pop up' dari logo */
            text-shadow: 0 5px 10px rgba(0,0,0,1); 
        }
        
        /* INI YANG DIUBAH: TEXT EMAS METALIK */
        .gold-title {
            font-family: 'Anton', sans-serif;
            font-size: 4.5rem;
            line-height: 0.85;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -1px;
            /* Efek Gradasi Emas */
            background: linear-gradient(to bottom, #ffd700 0%, #c5a059 50%, #8a6e3e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Drop shadow khusus untuk teks gradasi */
            filter: drop-shadow(0 5px 0px rgba(0,0,0,0.8));
        }

        .sub-title {
            font-size: 1.5rem;
            color: #fff;
            text-transform: uppercase;
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 4px;
            border-bottom: 2px solid #c5a059;
            display: inline-block;
            align-self: flex-start;
            text-shadow: 2px 2px 4px #000;
        }

        /* CONTAINER LOGO RAKSASA (Melayang di depan) */
        .giant-logo-overlay {
            position: absolute;
            top: 48%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg); 
            width: 120%; 
            z-index: 10; 
            pointer-events: none; 
        }

        .giant-logo {
            width: 100%;
            /* Drop shadow lebih gelap biar logo kelihatan nyata */
            filter: drop-shadow(0 20px 10px rgba(0,0,0,0.9)) drop-shadow(0 0 20px rgba(197, 160, 89, 0.2));
        }

        /* DATA BLOCK BAWAH */
        .data-block {
            margin-top: auto; 
            background: #0f0f0f;
            padding: 25px 20px 20px 20px;
            position: relative;
            z-index: 5;
            border-top: 4px solid #c5a059;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.8);
        }
        
        .grid-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-box {
            background: #1a1a1a;
            padding: 10px;
            border-left: 3px solid #fff;
        }

        .label { font-size: 0.9rem; color: #888; letter-spacing: 1px; }
        .value { font-size: 1.4rem; color: #c5a059; font-weight: 700; line-height: 1; }

        .location-final {
            text-align: left;
        }
        .loc-huge {
            font-family: 'Anton', sans-serif;
            font-size: 2.2rem;
            color: #fff;
            line-height: 0.9;
            text-transform: uppercase;
            margin: 5px 0;
        }
        .loc-detail { color: #888; font-size: 1rem; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="poster">
        <div class="status-bar">
            <span>SYSTEM STATUS:</span>
            <span>⚡ RECHARGE MODE <span class="status-blink">ON</span></span>
        </div>

        <div class="title-block">
            <h1 class="main-title">MEGA KOPDAR</h1>
            <h1 class="gold-title">MEMBER MLU</h1>
            <div class="sub-title">SOLIDARITY CHARGE</div>
        </div>

        <div class="giant-logo-overlay">
            <img src="logomlu.png" alt="MLU Giant" class="giant-logo">
        </div>

        <div class="data-block">
            <div class="grid-info">
                <div class="info-box">
                    <div class="label">DATE</div>
                    <div class="value">08.03.26</div>
                </div>
                <div class="info-box">
                    <div class="label">TIME</div>
                    <div class="value">17:00 WIB</div>
                </div>
            </div>
            
            <div class="location-final">
                <div class="label">RENDEZVOUS POINT</div>
                <div class="loc-huge">KOLONG JEMBATAN JIS</div>
                <div class="loc-detail">SUNTER - JAKARTA UTARA</div>
            </div>
        </div>
    </div>

</body>
</html>
