<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU Giant Logo</title>
    <style>
        /* Font Impact/Anton yang tebal dan padat */
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@400;600&display=swap');

        body {
            background-color: #050505;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            font-family: 'Teko', sans-serif;
        }

        .poster-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 100vh; /* Full layar HP */
            max-height: 800px;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px;
            box-sizing: border-box;
            border: 4px solid #000;
        }

        /* BACKGROUND MESH (Jaring-jaring halus) */
        .poster-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.2;
            z-index: 0;
        }

        /* LOGO RAKSASA MIRING */
        .giant-logo-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg); /* Miring 15 derajat */
            width: 100%;
            display: flex;
            justify-content: center;
            z-index: 1;
            opacity: 1; /* Logo Jelas */
        }

        .giant-logo {
            width: 110%; /* Lebih lebar dari layar sedikit biar sangar */
            max-width: 380px;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
            /* Animasi halus biar kerasa 3D */
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* KONTEN TEKS (Di atas logo) */
        .content-top {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        /* Badge Baru */
        .badge-energy {
            display: inline-block;
            background: #c5a059;
            color: #000;
            padding: 5px 20px;
            font-weight: 700;
            font-size: 1.2rem;
            transform: skew(-10deg);
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.5);
            margin-bottom: 20px;
        }

        .title-event {
            font-family: 'Anton', sans-serif;
            font-size: 3.5rem;
            line-height: 0.85;
            color: #fff;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #000; /* Outline hitam biar teks kebaca di atas logo */
            margin-bottom: 5px;
        }

        .title-event span {
            color: transparent;
            -webkit-text-stroke: 1px #fff; /* Teks bolong (outline only) */
        }

        /* KONTEN BAWAH */
        .content-bottom {
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.8); /* Gelap transparan biar teks kebaca */
            border: 1px solid #333;
            backdrop-filter: blur(5px);
            padding: 20px;
            border-radius: 10px;
            border-left: 5px solid #c5a059;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
        }

        .info-label {
            color: #aaa;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .info-val {
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .location-big {
            font-size: 1.5rem;
            color: #c5a059;
            font-weight: 700;
            line-height: 1;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .cta-footer {
            margin-top: 5px;
            font-size: 0.9rem;
            color: #fff;
            letter-spacing: 2px;
        }

    </style>
</head>
<body>

    <div class="poster-container">
        
        <div class="content-top">
            <div class="badge-energy">⚡ ENERGY RECHARGE ⚡</div>
            
            <div class="title-event">
                MEGA<br>KOPDAR<br><span>MLU 2026</span>
            </div>
        </div>

        <div class="giant-logo-container">
            <img src="logomlu.png" alt="MLU" class="giant-logo">
        </div>

        <div class="content-bottom">
            <div class="info-row">
                <span class="info-label">DATE</span>
                <span class="info-val">08 MARET</span>
            </div>
            <div class="info-row">
                <span class="info-label">TIME</span>
                <span class="info-val">17:00 WIB</span>
            </div>
            
            <div style="text-align: left;">
                <span class="info-label" style="font-size: 0.8rem;">TITIK KUMPUL:</span>
                <div class="location-big">KOLONG JEMBATAN JIS</div>
                <div class="cta-footer">Sunter, Jakarta Utara</div>
            </div>
        </div>

    </div>

</body>
</html>
