<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Info Penting MLU - FC Kelapa Gading</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Background gelap */
            background: #0f0c29; 
            background: linear-gradient(to bottom, #1a0b12, #0f0c29);
            font-family: 'Montserrat', sans-serif;
        }

        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 65, 108, 0.3);
            width: 380px;
            max-width: 90vw; /* Agar tidak terpotong di layar HP */
            box-sizing: border-box;
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
            overflow: hidden;
            color: white;
        }

        /* Efek glow merah/oranye tanda bahaya */
        .card::before {
            content: '';
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150px;
            height: 150px;
            background: #ff4b2b;
            filter: blur(80px);
            opacity: 0.5;
            z-index: -1;
        }

        .card::after {
            content: '';
            position: absolute;
            bottom: -50px;
            right: -50px;
            width: 150px;
            height: 150px;
            background: #ff416c;
            filter: blur(80px);
            opacity: 0.4;
            z-index: -1;
        }

        /* --- Bagian Logo --- */
        .logo-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
        }

        .mlu-logo {
            width: 110px; 
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(255, 65, 108, 0.4));
        }

        h2 {
            margin: 0;
            font-size: 16px;
            letter-spacing: 3px;
            color: #ff4b2b;
            text-transform: uppercase;
            font-weight: 900;
            margin-bottom: 5px;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 900;
            line-height: 1.3;
            text-transform: uppercase;
            margin-bottom: 20px;
            background: -webkit-linear-gradient(#fff, #ffcccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info-text {
            font-size: 15px;
            color: #cfd8dc;
            margin-bottom: 20px;
            line-height: 1.6;
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #ff4b2b;
            text-align: left;
        }

        .info-text strong {
            color: #ffb3b3;
        }

        .warning-text {
            font-size: 14px;
            color: #ff4b2b;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .footer {
            margin-top: 10px;
            padding-top: 20px;
            border-top: 1px dashed rgba(255,255,255,0.2);
            font-size: 10px;
            font-weight: 700;
            color: #999;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .footer span {
            color: #fff;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="logo-container">
            <img src="logomlumaster.png" alt="Logo MLU" class="mlu-logo">
        </div>

        <h2>⚠️ INFO PENTING ⚠️</h2>
        <h1>FC KELAPA GADING<br>DITUTUP SEMENTARA</h1>

        <div class="info-text">
            Karena <strong>kabel Indomaret terbakar</strong>, FC Kelapa Gading sementara tidak dapat digunakan menunggu penanganan dari pihak <strong>PLN</strong>.
        </div>

        <div class="warning-text">
            SILAHKAN MENGGUNAKAN <br>FC MOTORIZ SUKAPURA ATAU TIMAH
        </div>

        <div class="footer">
            Ttd,<br>
            <span>Divisi Komunikasi Digital <br> Maka Lintas Utara</span>
        </div>
    </div>

</body>
</html>
