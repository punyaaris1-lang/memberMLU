<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRANSGO - Screenshot List</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@800;900&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #0A2259; /* Background luar biru tua */
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Area putih khusus untuk screenshot */
        .capture-area {
            width: 100%;
            max-width: 480px; 
            background: #FFFFFF;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
        }

        /* Styling Tagline */
        .tagline-container {
            font-family: 'Outfit', sans-serif;
            font-size: 16px;
            font-weight: 900;
            color: #0A2259; /* Biru Tua Solid */
            text-transform: uppercase;
            line-height: 1.6;
            margin-bottom: 25px;
            border-bottom: 4px solid #D4AF37; /* Garis bawah emas */
            padding-bottom: 20px;
        }

        /* Efek tempelan/lakban untuk "Beda Vendor" */
        .patched-text {
            display: inline-block;
            background-color: #D4AF37; /* Kuning Emas MLU */
            color: #000000;
            padding: 2px 10px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 900;
            font-size: 15px;
            transform: rotate(-4deg); /* Efek miring */
            box-shadow: 2px 3px 0px rgba(0,0,0,0.2); /* Efek bayangan biar timbul */
            border-radius: 2px;
            margin-left: 5px;
            position: relative;
            top: -2px;
        }

        /* Keterangan Daftar Nama */
        .sub-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 900;
            color: #2D63ED; /* Biru Elektrik */
            background: #EBF0FE;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #2D63ED;
        }

        /* Tabel Rapi */
        .member-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        .member-table th {
            background-color: #0A2259; /* Header biru tua */
            color: #FFFFFF;
            padding: 12px 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            border: 2px solid #0A2259;
        }

        .member-table td {
            border: 2px solid #0A2259; /* Garis tabel hitam/biru tua jelas */
            padding: 12px 8px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 900;
            color: #000000;
            text-transform: uppercase;
            vertical-align: middle;
        }

        .td-no {
            text-align: center;
            width: 10%;
        }

        .td-nama {
            text-align: left;
        }

        .td-plat {
            text-align: center;
            color: #2D63ED; /* Plat warna biru elektrik biar kontras */
            font-family: 'Space Grotesk', sans-serif;
            width: 35%;
        }

        .loading-text {
            font-weight: 900;
            color: #2D63ED;
            font-size: 16px;
            text-transform: uppercase;
            margin: 20px 0;
        }
    </style>
</head>
<body>

    <div class="capture-area" id="captureArea">
        <img src="logomlumaster.png" alt="Logo MLU" class="logo" onerror="this.style.display='none'">
        
        <div class="tagline-container">
            BEDA RANGKA BEDA WARNA <span class="patched-text">BEDA VENDOR</span><br>
            SATU KELUARGA<br>
            MAKA LINTAS UTARA
        </div>

        <div class="sub-title">
            DAFTAR NAMA KELUARGA MLU DARI TRANSGO
        </div>

        <div id="loadingText" class="loading-text">Menarik Data Transgo...</div>
        
        <table class="member-table" id="memberTable" style="display: none;">
            <thead>
                <tr>
                    <th>NO</th>
                    <th>NAMA</th>
                    <th>PLAT</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Konfigurasi Database
        const firebaseConfig = { 
            apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", 
            authDomain: "rtomaka-e67b5.firebaseapp.com", 
            projectId: "rtomaka-e67b5", 
            storageBucket: "rtomaka-e67b5.firebasestorage.app", 
            messagingSenderId: "472036722228", 
            appId: "1:472036722228:web:11d520f9204db317d02c61" 
        };
        
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        async function loadTransgoMembers() {
            try {
                // Tarik semua data member, lalu filter manual biar aman
                const snap = await getDocs(collection(db, "mlu_members"));
                let transgoData = [];

                snap.forEach(doc => {
                    const m = doc.data();
                    if (m.type === "TRANSGO" || m.divisi === "TRANSGO") {
                        transgoData.push(m);
                    }
                });

                document.getElementById("loadingText").style.display = "none";
                const tbody = document.getElementById("tableBody");
                const table = document.getElementById("memberTable");

                if (transgoData.length === 0) {
                    document.getElementById("captureArea").innerHTML += "<div style='color: #E00000; font-weight: 900; font-size: 18px; margin-top:20px;'>DATA TRANSGO MASIH KOSONG</div>";
                    return;
                }

                // Urutkan berdasarkan nama biar rapi
                transgoData.sort((a, b) => {
                    let nameA = (a.namaKtp || a.namaWa || "").toUpperCase();
                    let nameB = (b.namaKtp || b.namaWa || "").toUpperCase();
                    return nameA.localeCompare(nameB);
                });

                // Masukkan ke tabel
                transgoData.forEach((m, index) => {
                    const nama = m.namaKtp || m.namaWa || "-";
                    const plat = m.plat || "-";

                    tbody.innerHTML += `
                        <tr>
                            <td class="td-no">${index + 1}</td>
                            <td class="td-nama">${nama}</td>
                            <td class="td-plat">${plat}</td>
                        </tr>
                    `;
                });

                table.style.display = "table"; // Munculkan tabel

            } catch (error) {
                document.getElementById("loadingText").innerText = "GAGAL MENARIK DATA";
                document.getElementById("loadingText").style.color = "#E00000";
            }
        }

        loadTransgoMembers();
    </script>
</body>
</html>
