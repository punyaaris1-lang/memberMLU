<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - The Commander</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: #000;
            height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* TOMBOL REKAM */
        #btnFullscreen {
            position: fixed; top: 30px; z-index: 9999;
            background: rgba(255, 255, 255, 0.1); color: #fff; 
            border: 1px solid rgba(255,255,255,0.3); padding: 12px 25px;
            font-weight: 700; border-radius: 50px; cursor: pointer;
            backdrop-filter: blur(10px); letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .poster-frame {
            width: 100vw; height: 100vh;
            background: #050505;
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; /* Konten mulai dari bawah */
            padding-bottom: 80px;
            overflow: hidden;
        }

        /* --- BACKGROUND SMOKE EFFECT --- */
        .smoke {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 120%, #1a1a1a 0%, #000 70%);
            z-index: 0;
        }
        .light-beam {
            position: absolute; top: -20%; left: 50%; transform: translateX(-50%) rotate(15deg);
            width: 200px; height: 120%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            filter: blur(40px);
            animation: beamMove 8s infinite alternate ease-in-out;
            z-index: 1;
        }
        @keyframes beamMove { from {transform: translateX(-60%) rotate(10deg);} to {transform: translateX(-40%) rotate(-10deg);} }

        /* --- LOGO --- */
        .logo-area {
            position: absolute; top: 8%; left: 50%; transform: translateX(-50%);
            z-index: 20; width: 120px;
            animation: fadeInDown 1s ease-out;
        }
        .logo-img {
            width: 100%; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
            animation: breathe 4s infinite ease-in-out;
        }
        
        /* --- ORG NAME --- */
        .org-title {
            position: absolute; top: 20%;
            color: rgba(255,255,255,0.3);
            font-size: 12px; letter-spacing: 8px; text-transform: uppercase;
            font-weight: 700; z-index: 5;
        }

        /* --- PHOTO PERSON --- */
        .photo-container {
            position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 100%; height: 85%;
            z-index: 5;
            display: flex; align-items: flex-end; justify-content: center;
        }
        
        .photo-img {
            height: 90%; width: auto; max-width: 120%;
            object-fit: cover;
            -webkit-mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 70%, transparent 100%);
            filter: contrast(1.1) saturate(1.1);
            animation: slowZoom 15s infinite alternate;
        }

        /* --- TEXT INFORMATION (BAWAH) --- */
        .info-card {
            position: relative; z-index: 30;
            text-align: center; width: 85%;
            padding: 25px 20px; /* Padding sedikit ditambah karena plat hilang */
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #D4AF37;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            animation: slideUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .jabatan {
            font-size: 14px; color: #D4AF37; font-weight: 700; letter-spacing: 3px;
            text-transform: uppercase; margin-bottom: 8px; display: block;
        }

        .nama {
            font-family: 'Playfair Display', serif;
            font-size: 48px; color: #fff; margin: 0; line-height: 1;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff 0%, #ccc 50%, #fff 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* DEKORASI EMAS */
        .deco-line {
            position: absolute; bottom: 120px; width: 100%; height: 1px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            z-index: 10; opacity: 0.5;
        }

        /* ANIMASI */
        @keyframes fadeInDown { from {opacity:0; transform:translate(-50%, -50px);} to {opacity:1; transform:translate(-50%, 0);} }
        @keyframes slideUp { from {opacity:0; transform:translateY(100px);} to {opacity:1; transform:translateY(0);} }
        @keyframes breathe { 0%,100% {transform:scale(1);} 50% {transform:scale(1.05);} }
        @keyframes slowZoom { from {transform:scale(1);} to {transform:scale(1.1);} }

    </style>
</head>
<body>

    <button id="btnFullscreen" onclick="goFullscreen()">● REKAM</button>

    <div class="poster-frame">
        <div class="smoke"></div>
        <div class="light-beam"></div>
        <div class="org-title">MAKA LINTAS UTARA</div>

        <div class="logo-area">
            <img src="logomlu.png" class="logo-img">
        </div>

        <div class="photo-container">
            <img src="akiaki.jpg" class="photo-img">
        </div>

        <div class="deco-line"></div>

        <div class="info-card">
            <span class="jabatan">KETUA UMUM</span>
            <h1 class="nama">KI AHMAD</h1>
            </div>
    </div>

    <script>
        function goFullscreen() {
            var elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            
            document.getElementById('btnFullscreen').style.display = 'none';
        }
    </script>

</body>
</html>
