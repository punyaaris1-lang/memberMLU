<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU Member Poster</title>
    <style>
        /* Font Anton untuk Judul Besar, Roboto untuk teks biasa */
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Roboto:wght@400;500;900&display=swap');

        body {
            background-color: #000;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Roboto', sans-serif;
        }

        .poster {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(180deg, #111 0%, #000 100%);
            position: relative;
            text-align: center;
            padding: 30px 20px;
            border: 1px solid #333;
            box-shadow: 0 20px 50px rgba(0,0,0,1);
        }

        /* Garis Emas di Atas */
        .top-bar {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            background: #c5a059;
            box-shadow: 0 0 15px #c5a059;
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
        }

        /* PUNCHLINE: BADGE MERAH */
        .alert-badge {
            display: inline-block;
            background-color: #d60000;
            color: #fff;
            padding: 5px 15px;
            font-weight: 900;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transform: skew(-10deg); /* Miring dikit biar racing */
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(214, 0, 0, 0.4);
        }

        .alert-badge span {
            display: inline-block;
            transform: skew(10deg); /* Tulisan dilurusin lagi */
        }

        /* JUDUL BESAR - FONT ANTON */
        h1 {
            font-family: 'Anton', sans-serif;
            color: #fff;
            font-size: 3.2rem; /* Sangat Besar */
            line-height: 0.9;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        h1 span {
            color: #c5a059; /* Warna Emas */
        }

        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-top: 10px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* GARIS PEMISAH */
        .divider {
            height: 1px;
            background: #333;
            margin: 20px 0;
            position: relative;
        }
        
        /* INFO GRID (Tanggal & Waktu) */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            text-align: left;
        }

        .label {
            font-size: 0.7rem;
            color: #c5a059;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .value {
            font-size: 1.4rem;
            font-weight: 900;
            color: #fff;
            line-height: 1;
        }

        .value small {
            font-size: 0.9rem;
            font-weight: 400;
            color: #ccc;
        }

        /* LOKASI BESAR DI BAWAH */
        .location-box {
            text-align: left;
            border-left: 4px solid #c5a059;
            padding-left: 15px;
            margin-top: 10px;
        }

        .location-box .value {
            font-size: 1.2rem;
            line-height: 1.2;
        }

        /* FOOTER QUOTE */
        .footer-cta {
            margin-top: 40px;
            font-family: 'Anton', sans-serif;
            font-size: 1.5rem;
            color: #333; /* Warna gelap biar tidak balapan sama judul */
            text-transform: uppercase;
            background: #fff;
            color: #000;
            padding: 10px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
            transform: skew(-10deg);
        }
        
        .footer-cta span {
            display: block;
            transform: skew(10deg);
        }

    </style>
</head>
<body>

    <div class="poster">
        <div class="top-bar"></div>

        <img src="logomlu.png" alt="MLU" class="logo">

        <div class="alert-badge">
            <span>⚠️ Warning: Battery Low</span>
        </div>

        <h1>MEGA<br><span>KOPDAR</span><br>MLU</h1>
        
        <div class="subtitle">Charging Station: Stadion JIS</div>

        <div class="divider"></div>

        <div class="info-grid">
            <div class="info-item">
                <div class="label">Tanggal</div>
                <div class="value">08 <small>MARET</small></div>
            </div>
            <div class="info-item">
                <div class="label">Waktu</div>
                <div class="value">17:00 <small>WIB</small></div>
            </div>
        </div>

        <div class="location-box">
            <div class="label">Titik Kumpul</div>
            <div class="value">KOLONG JEMBATAN<br>DEPAN STADION JIS</div>
            <div style="color: #666; font-size: 0.8rem; margin-top: 5px;">Sunter, Jakarta Utara</div>
        </div>

        <div class="footer-cta">
            <span>SIAPKAN UNIT. KITA GASPOL!</span>
        </div>
    </div>

</body>
</html>
