<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - The Commander</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: #000;
            height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        #btnFullscreen {
            position: fixed; top: 30px; z-index: 9999;
            background: rgba(255, 255, 255, 0.1); color: #fff; 
            border: 1px solid rgba(255,255,255,0.3); padding: 12px 25px;
            font-weight: 700; border-radius: 50px; cursor: pointer;
            backdrop-filter: blur(10px); letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .poster-frame {
            width: 100vw; height: 100vh;
            background: #050505;
            position: relative;
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end;
            padding-bottom: 80px;
            overflow: hidden;
        }

        .smoke {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 120%, #1a1a1a 0%, #000 70%);
            z-index: 0;
        }
        .light-beam {
            position: absolute; top: -20%; left: 50%; transform: translateX(-50%) rotate(15deg);
            width: 200px; height: 120%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
            filter: blur(40px);
            animation: beamMove 8s infinite alternate ease-in-out;
            z-index: 1;
        }
        @keyframes beamMove { from {transform: translateX(-60%) rotate(10deg);} to {transform: translateX(-40%) rotate(-10deg);} }

        /* --- LOGO DIPERBESAR --- */
        .logo-area {
            position: absolute; top: 5%; left: 50%; transform: translateX(-50%);
            z-index: 20; 
            width: 280px; /* UKURAN LOGO JADI BESAR */
            animation: fadeInDown 1s ease-out;
            display: flex; justify-content: center;
        }
        .logo-img {
            width: 100%; 
            filter: drop-shadow(0 10px 30px rgba(0,0,0,0.8)); /* Bayangan lebih tebal biar logo pop-up */
            animation: breathe 4s infinite ease-in-out;
        }
        
        .org-title {
            position: absolute; top: 25%; /* Turunkan dikit biar ga nabrak logo */
            color: rgba(255,255,255,0.4);
            font-size: 14px; letter-spacing: 8px; text-transform: uppercase;
            font-weight: 700; z-index: 5;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        /* --- FOTO PERBAIKAN --- */
        .photo-container {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            z-index: 5;
            display: flex; align-items: flex-end; justify-content: center;
        }
        
        .photo-img {
            width: 100%; height: 100%;
            object-fit: cover; /* Memenuhi layar tanpa gepeng */
            object-position: center top; /* FOKUS KE WAJAH (ATAS) */
            /* Masking halus di bawah */
            -webkit-mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            mask-image: linear-gradient(to bottom, black 60%, transparent 100%);
            filter: contrast(1.15) brightness(1.1); /* Tajamkan sedikit */
            transform: scale(1.1); /* Zoom dikit biar penuh */
            animation: slowZoom 15s infinite alternate;
        }

        /* --- TEXT INFORMATION --- */
        .info-card {
            position: relative; z-index: 30;
            text-align: center; width: 90%;
            padding: 30px 20px;
            background: rgba(0, 0, 0, 0.75); /* Lebih gelap biar tulisan jelas */
            backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.3); /* Border emas tipis */
            border-top: 4px solid #D4AF37; 
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            animation: slideUp 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 20px;
        }

        .jabatan {
            font-size: 16px; color: #D4AF37; font-weight: 800; letter-spacing: 4px;
            text-transform: uppercase; margin-bottom: 5px; display: block;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .nama {
            font-family: 'Playfair Display', serif;
            font-size: 52px; color: #fff; margin: 0; line-height: 1;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff 40%, #ccc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.8));
        }

        .deco-line {
            position: absolute; bottom: 150px; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, #D4AF37, transparent);
            z-index: 10; opacity: 0.6; box-shadow: 0 0 10px #D4AF37;
        }

        @keyframes fadeInDown { from {opacity:0; transform:translate(-50%, -50px);} to {opacity:1; transform:translate(-50%, 0);} }
        @keyframes slideUp { from {opacity:0; transform:translateY(100px);} to {opacity:1; transform:translateY(0);} }
        @keyframes breathe { 0%,100% {transform:scale(1);} 50% {transform:scale(1.05);} }
        @keyframes slowZoom { from {transform:scale(1.1);} to {transform:scale(1.2);} }

    </style>
</head>
<body>

    <button id="btnFullscreen" onclick="goFullscreen()">● REKAM</button>

    <div class="poster-frame">
        <div class="smoke"></div>
        <div class="light-beam"></div>
        <div class="org-title">MAKA LINTAS UTARA</div>

        <div class="logo-area">
            <img src="logomlu.png" class="logo-img">
        </div>

        <div class="photo-container">
            <img src="akiaki.jpg" class="photo-img">
        </div>

        <div class="deco-line"></div>

        <div class="info-card">
            <span class="jabatan">KETUA UMUM</span>
            <h1 class="nama">KI AHMAD</h1>
        </div>
    </div>

    <script>
        function goFullscreen() {
            var elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            document.getElementById('btnFullscreen').style.display = 'none';
        }
    </script>

</body>
</html>
