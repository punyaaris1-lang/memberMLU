<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Clean Record</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;700&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        /* TOMBOL TAHAP 1: SIAPKAN LAYAR */
        #btnSetup {
            position: fixed; z-index: 9999;
            background: #fff; color: #000; 
            border: 2px solid #D4AF37; padding: 15px 30px;
            font-size: 16px; font-weight: 800; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px #D4AF37;
        }

        /* TOMBOL TAHAP 2: MULAI AKSI (MUNCUL NANTI) */
        #btnAction {
            position: fixed; z-index: 9999; display: none;
            background: #D4AF37; color: #000; 
            border: none; padding: 20px 50px;
            font-size: 20px; font-weight: 900; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 40px #D4AF37;
            animation: pulseBtn 1s infinite;
        }

        @keyframes pulseBtn { 0%{transform:scale(1);} 50%{transform:scale(1.1);} 100%{transform:scale(1);} }

        /* CONTAINER UTAMA */
        .poster-container {
            width: 100vw; height: 100vh;
            background: #050505;
            position: relative;
            overflow: hidden;
        }

        /* === LAYER KONTEN === */
        .content-layer {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: space-between;
            padding: 60px 20px 120px 20px;
            z-index: 1;
        }

        /* FOTO BACKGROUND (TERANG) */
        .photo-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
        .photo-bg img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: top center; 
            filter: brightness(1.1) contrast(1.05); 
        }
        .gradient-overlay {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; 
            background: linear-gradient(to top, #000 30%, transparent 100%);
            z-index: 0; opacity: 0.9;
        }

        /* LOGO BESAR */
        .logo-area {
            width: 220px; 
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.8));
            animation: floatLogo 3s ease-in-out infinite;
            margin-top: 30px;
            position: relative; z-index: 2;
        }
        .logo-area img { width: 100%; }

        /* TEKS NAMA */
        .text-area { text-align: center; position: relative; z-index: 2; }
        .jabatan {
            display: inline-block; background: #D4AF37; color: #000;
            padding: 5px 30px; font-weight: 800; letter-spacing: 2px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            margin-bottom: 10px;
            box-shadow: 0 0 10px rgba(212,175,55,0.5);
        }
        .nama {
            font-family: 'Teko', sans-serif;
            font-size: 75px; line-height: 0.9; color: white;
            text-transform: uppercase; margin: 0;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }
        .org {
            color: #ccc; letter-spacing: 5px; font-size: 14px; margin-top: 5px;
            text-shadow: 0 0 5px #000;
        }

        /* === CURTAIN (LAYER PENUTUP) === */
        .curtain {
            position: absolute; top: 0; left: 0; 
            width: 100%; height: 100%;
            background: #000;
            z-index: 100;
            display: flex; align-items: center;
            transition: width 2.5s cubic-bezier(0.65, 0, 0.35, 1);
        }
        
        .saber-line {
            position: absolute; right: -5px; top: 0;
            width: 8px; height: 100%;
            background: #fff;
            box-shadow: 0 0 20px #D4AF37, 0 0 50px #D4AF37;
            z-index: 101;
            display: none;
        }

        /* BORDER MEWAH */
        .border-frame {
            position: absolute; inset: 15px;
            border: 2px solid #D4AF37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            z-index: 50;
            pointer-events: none;
        }

        @keyframes floatLogo { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }
        .anim-reveal { width: 0%; }

    </style>
</head>
<body>

    <button id="btnSetup" onclick="setupScreen()">1. SIAPKAN LAYAR</button>

    <button id="btnAction" onclick="playShow()">● MULAI AKSI</button>

    <div class="poster-container">
        <div class="border-frame"></div>

        <div class="curtain" id="curtainLayer">
            <div class="saber-line" id="saberLine"></div>
        </div>

        <div class="content-layer">
            <div class="logo-area">
                <img src="logomlu.png" alt="Logo MLU">
            </div>

            <div class="photo-bg">
                <img src="iwan.jpg" alt="Foto">
                <div class="gradient-overlay"></div>
            </div>

            <div class="text-area">
                <div class="jabatan">PEMBINA</div>
                <h1 class="nama">IWAN</h1>
                <div class="org">MAKA LINTAS UTARA</div>
            </div>
        </div>
    </div>

    <script>
        function setupScreen() {
            // 1. Masuk Fullscreen
            try {
                var elem = document.documentElement;
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            } catch(e) {}

            // 2. Ganti Tombol
            document.getElementById('btnSetup').style.display = 'none';
            
            // Tampilkan tombol ACTION setelah jeda sebentar
            setTimeout(() => {
                document.getElementById('btnAction').style.display = 'block';
            }, 500);
        }

        function playShow() {
            // Hilangkan semua tombol
            document.getElementById('btnAction').style.display = 'none';
            
            // Nyalakan Saber
            document.getElementById('saberLine').style.display = 'block';
            
            // Jalankan Animasi
            setTimeout(() => {
                document.getElementById('curtainLayer').classList.add('anim-reveal'); 
            }, 100); 
        }
    </script>

</body>
</html>
