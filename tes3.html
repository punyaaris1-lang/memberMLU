<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mockup Animasi Login MLU - V3 (Real Lightning)</title>
    <style>
        /* RESET & BASIC */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050505; font-family: sans-serif; overflow: hidden; }

        /* SIMULASI DASHBOARD (DI BELAKANG) */
        .dashboard-mockup {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, #0A2259 0%, #15398F 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; z-index: 1;
            opacity: 0; transform: scale(0.95); transition: all 2s ease-out;
        }
        .dashboard-mockup.show { opacity: 1; transform: scale(1); }
        .dashboard-mockup h1 { font-size: 30px; letter-spacing: 2px; margin-bottom: 10px; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .dashboard-mockup p { color: #93C5FD; }

        /* OVERLAY PINTU GERBANG */
        .gate-overlay {
            position: absolute; inset: 0;
            background: #000; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            transition: background 1.5s;
        }
        .gate-overlay.fade-out { background: transparent; pointer-events: none; }

        /* WADAH LOGO */
        .logo-container {
            position: relative;
            width: 380px; height: 380px; 
            max-width: 85vw; max-height: 85vw; 
            animation: floatLogo 3s ease-in-out infinite; 
            z-index: 15;
        }

        /* LOGO KESETRUM (GETAR) */
        .logo-container.shock { animation: electroShock 0.1s infinite; }

        /* BAGIAN LOGO ATAS & BAWAH */
        .logo-half {
            position: absolute; left: 0; width: 100%; height: 100%;
            background-image: url('logomlumaster.png'); /* PANGGIL LOGO MLU */
            background-size: contain; background-repeat: no-repeat; background-position: center;
            transition: transform 2.5s cubic-bezier(0.68, -0.05, 0.265, 1.15), opacity 2s ease-in;
        }

        /* CSS CLIP-PATH MEMOTONG TENGAH */
        .logo-top { clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%); top: 0; }
        .logo-bottom { clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%); top: 0; }

        /* ANIMASI TERBELAH LAMBAT */
        .logo-top.split { transform: translateY(-120vh) rotate(-4deg); opacity: 0; }
        .logo-bottom.split { transform: translateY(120vh) rotate(4deg); opacity: 0; }

        /* --- REAL LIGHTNING SVG EFEK --- */
        .lightning-svg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200vw; /* Panjang menyambar seisi layar */
            height: 200px;
            z-index: 25;
            pointer-events: none;
            opacity: 0;
        }
        
        .lightning-svg.strike { opacity: 1; animation: flashOut 1s ease-out forwards; }

        /* Style Garis Petir */
        .bolt {
            fill: none;
            stroke-width: 4px;
            stroke-linecap: square;
            stroke-linejoin: miter;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000; /* Disembunyikan dulu */
        }

        /* Animasi Menjalar dan Berkedip */
        .lightning-svg.strike .bolt {
            animation: drawBolt 0.15s forwards, strobeBolt 0.1s 0.15s infinite;
        }

        /* Warna Petir & Glow */
        .bolt-cyan { stroke: #00f2fe; filter: drop-shadow(0 0 8px #00f2fe) drop-shadow(0 0 20px #fff); }
        .bolt-magenta { stroke: #fe0979; filter: drop-shadow(0 0 8px #fe0979) drop-shadow(0 0 20px #fff); animation-delay: 0.05s; }
        .bolt-yellow { stroke: #fcd34d; filter: drop-shadow(0 0 8px #fcd34d) drop-shadow(0 0 20px #fff); stroke-width: 2px; }

        /* FLASH BLIND PUTIH */
        .screen-flash {
            position: absolute; inset: 0; background: white; z-index: 100;
            opacity: 0; pointer-events: none;
        }
        .screen-flash.flash { animation: flashAnim 1.5s ease-out forwards; }


        /* === KEYFRAMES (ANIMASI) === */
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); }
            50% { transform: translateY(-15px); filter: drop-shadow(0 0 30px rgba(212,175,55,0.8)); }
        }

        @keyframes electroShock {
            0% { transform: translate(0, 0) scale(1); filter: brightness(1) saturate(1); }
            25% { transform: translate(-5px, 5px) scale(1.02); filter: brightness(1.8) hue-rotate(90deg); }
            50% { transform: translate(5px, -5px) scale(0.98); filter: brightness(2) invert(0.8); }
            75% { transform: translate(-5px, -5px) scale(1.03); filter: brightness(1.2) sepia(1); }
            100% { transform: translate(5px, 5px) scale(1); filter: brightness(1); }
        }

        /* Efek Petir Menjalar */
        @keyframes drawBolt {
            to { stroke-dashoffset: 0; }
        }

        /* Efek Konslet / Flicker Petir */
        @keyframes strobeBolt {
            0%, 100% { opacity: 1; transform: translateY(0px); stroke-width: 6px;}
            50% { opacity: 0.1; transform: translateY(2px); stroke-width: 2px;}
        }

        /* Petir Hilang */
        @keyframes flashOut {
            0%, 30% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes flashAnim {
            0% { opacity: 0; }
            10% { opacity: 0.7; }
            100% { opacity: 0; }
        }

        /* TOMBOL TRIGGER */
        .btn-trigger {
            position: fixed; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: linear-gradient(135deg, #D4AF37, #B45309); color: white; border: none;
            font-weight: 900; border-radius: 30px; cursor: pointer; z-index: 1000;
            font-size: 14px; letter-spacing: 1px; box-shadow: 0 10px 30px rgba(212,175,55,0.4);
            border: 2px solid white;
        }
        .btn-trigger:active { transform: translateX(-50%) scale(0.95); }

    </style>
</head>
<body>

    <div class="screen-flash" id="screenFlash"></div>

    <div class="dashboard-mockup" id="dashboardMockup">
        <h1>DASHBOARD MLU</h1>
        <p>Login Berhasil. Memuat Data...</p>
    </div>

    <div class="gate-overlay" id="gateOverlay">
        
        <svg class="lightning-svg" id="lightningSvg" viewBox="0 0 1000 200" preserveAspectRatio="none">
            <path class="bolt bolt-cyan" d="M0,100 L80,60 L150,130 L220,50 L300,120 L380,60 L450,110 L500,70 L550,120 L620,60 L700,130 L780,50 L850,120 L920,80 L1000,100" />
            <path class="bolt bolt-magenta" d="M0,100 L60,140 L130,70 L200,150 L280,60 L350,140 L430,70 L500,130 L580,60 L660,140 L730,70 L800,150 L880,70 L950,130 L1000,100" />
            <path class="bolt bolt-yellow" d="M220,50 L250,10 L280,30 L320,0" />
            <path class="bolt bolt-yellow" d="M450,110 L480,160 L520,140 L550,190" />
            <path class="bolt bolt-yellow" d="M700,130 L730,180 L760,150 L800,200" />
            <path class="bolt bolt-yellow" d="M380,60 L400,20 L420,40 L450,10" />
        </svg>

        <div class="logo-container" id="logoContainer">
            <div class="logo-half logo-top" id="logoTop"></div>
            <div class="logo-half logo-bottom" id="logoBottom"></div>
        </div>
    </div>

    <button class="btn-trigger" id="btnTrigger" onclick="playCinematic()">SIMULASI LOGIN</button>

    <script>
        function playCinematic() {
            // Sembunyikan tombol
            document.getElementById('btnTrigger').style.display = 'none';

            const topHalf = document.getElementById('logoTop');
            const botHalf = document.getElementById('logoBottom');
            const lightning = document.getElementById('lightningSvg');
            const flash = document.getElementById('screenFlash');
            const gate = document.getElementById('gateOverlay');
            const dash = document.getElementById('dashboardMockup');
            const container = document.getElementById('logoContainer');

            // 1. Hentikan efek melayang, ganti dengan KESETRUM
            container.style.animation = 'none';
            container.classList.add('shock');

            // 2. Munculkan kilat layar
            flash.classList.add('flash');

            // 3. Tembakkan Petir Zig-Zag
            lightning.classList.add('strike');

            // 4. Beri jeda sangat sebentar biar terasa "Dihantam Petir" dulu
            setTimeout(() => {
                
                // Hentikan getaran
                container.classList.remove('shock');

                // Logo terbelah ke atas & bawah
                topHalf.classList.add('split');
                botHalf.classList.add('split');
                
                // Transisikan background gerbang menghilang
                gate.classList.add('fade-out');

                // Munculkan Dashboard
                dash.classList.add('show');

            }, 450); // Waktu logo ditahan setrum (0.45 detik)
        }
    </script>

</body>
</html>
