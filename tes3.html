<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU Full Typo</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anton&family=Teko:wght@400;700&display=swap');

        body {
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Teko', sans-serif;
            overflow-y: auto;
        }

        .poster {
            position: relative;
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            /* Background Tekstur Garis Halus */
            background: 
                linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
                repeating-linear-gradient(0deg, transparent, transparent 2px, #111 2px, #111 4px),
                #000;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Isian disebar rata atas-bawah */
            box-sizing: border-box;
            border: 2px solid #222;
        }

        /* 1. BAGIAN ATAS: LOGO */
        .header-section {
            padding-top: 30px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo {
            width: 130px;
            filter: drop-shadow(0 0 20px rgba(197, 160, 89, 0.4));
            z-index: 10;
        }

        .status-pill {
            margin-top: 15px;
            background: #111;
            color: #888;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 2px;
            border: 1px solid #333;
            text-transform: uppercase;
        }

        /* 2. BAGIAN TENGAH: FULL TEXT (PENGISI KEKOSONGAN) */
        .middle-fill {
            flex-grow: 1; /* Memaksa bagian ini memenuhi ruang kosong */
            display: flex;
            flex-direction: column;
            justify-content: center; /* Teks tepat di tengah vertikal */
            align-items: center;
            position: relative;
            margin: 20px 0;
            line-height: 0.8; /* Rapatkan baris */
        }

        /* KOPDAR: PUTIH RAKSASA */
        .huge-text {
            font-family: 'Anton', sans-serif;
            font-size: 28vw; /* Ukuran dinamis mengikuti lebar layar */
            max-size: 150px; /* Batas maksimal */
            color: #fff;
            text-transform: uppercase;
            margin: 0;
            letter-spacing: -5px;
            text-shadow: 0 10px 30px rgba(0,0,0,1);
            position: relative;
            z-index: 1;
        }

        /* KELUARGA MLU: EMAS (NUMPUK DIKIT) */
        .gold-bar-text {
            font-family: 'Anton', sans-serif;
            font-size: 3rem;
            color: transparent;
            background: linear-gradient(to bottom, #ffd700, #c5a059, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            margin-top: -20px; /* Tarik ke atas biar nempel KOPDAR */
            z-index: 5;
            filter: drop-shadow(0 5px 0 #000);
            white-space: nowrap;
        }

        /* SLOGAN */
        .slogan-block {
            margin-top: 30px;
            text-align: center;
        }
        .slogan-line { font-size: 1.2rem; color: #fff; letter-spacing: 2px; }
        .slogan-gold { font-size: 1.2rem; color: #c5a059; font-weight: 700; letter-spacing: 2px; }

        /* 3. BAGIAN BAWAH: INFO */
        .footer-section {
            background: #0a0a0a;
            padding: 25px 20px;
            border-top: 4px solid #c5a059;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 1px solid #333;
            padding-bottom: 20px;
        }

        .label { font-size: 0.8rem; color: #666; letter-spacing: 1px; display: block; margin-bottom: 3px;}
        .val { font-size: 1.5rem; color: #fff; font-weight: 700; font-family: 'Anton', sans-serif; }

        .loc-box { text-align: left; }
        .loc-title { font-size: 2rem; color: #c5a059; font-family: 'Anton', sans-serif; line-height: 1; text-transform: uppercase;}
        .loc-sub { font-size: 1rem; color: #aaa; margin-top: 5px; }

    </style>
</head>
<body>

    <div class="poster">
        
        <div class="header-section">
            <img src="logomlu.png" alt="MLU" class="logo">
            <div class="status-pill">OFFICIAL INVITATION</div>
        </div>

        <div class="middle-fill">
            <div class="huge-text">KOPDAR</div>
            <div class="gold-bar-text">KELUARGA MLU</div>
            
            <div class="slogan-block">
                <div class="slogan-line">BEDA RANGKA BEDA WARNA</div>
                <div class="slogan-gold">SATU KELUARGA</div>
            </div>
        </div>

        <div class="footer-section">
            <div class="info-grid">
                <div>
                    <span class="label">DATE</span>
                    <span class="val">08.03.26</span>
                </div>
                <div style="text-align: right;">
                    <span class="label">TIME</span>
                    <span class="val">17:00 WIB</span>
                </div>
            </div>

            <div class="loc-box">
                <span class="label">TITIK KUMPUL</span>
                <div class="loc-title">JAKARTA INTERNATIONAL<br>STADIUM</div>
                <div class="loc-sub">SUNTER - JAKARTA UTARA</div>
            </div>
        </div>

    </div>

</body>
</html>
