<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Account Settings</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --royal-blue: #0A2259; --electric-blue: #2D63ED;
            --bg-surface: #F8FAFC; --white: #FFFFFF;
            --text-main: #0F172A; --text-muted: #64748B;
            --danger: #EF4444; --success: #10B981;
            --border-soft: rgba(226, 232, 240, 0.9);
        }

        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 120px; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

        /* --- HEADER & PROFILE PICTURE --- */
        .profile-header {
            background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%);
            padding: 40px 20px 100px; text-align: center;
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }
        .header-title { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--white); letter-spacing: 1px; text-transform: uppercase; }

        .avatar-container {
            position: relative; width: 120px; height: 120px;
            margin: -60px auto 30px; z-index: 10;
        }
        .avatar-img {
            width: 100%; height: 100%; border-radius: 35px; /* Squircle */
            object-fit: cover; background: #F1F5F9;
            border: 4px solid var(--white); box-shadow: 0 15px 35px rgba(10,34,89,0.15);
            transition: 0.3s;
        }
        .btn-edit-photo {
            position: absolute; bottom: -5px; right: -5px;
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--electric-blue); color: var(--white);
            border: 3px solid var(--white); display: flex; align-items: center; justify-content: center;
            font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(45, 99, 237, 0.4);
            transition: 0.2s;
        }
        .btn-edit-photo:active { transform: scale(0.9); }
        #fileInput { display: none; }

        /* --- FORM SECTION --- */
        .form-wrapper { padding: 0 25px; }
        
        .input-group { margin-bottom: 20px; position: relative; }
        .input-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; display: block; margin-left: 5px; }
        
        .input-box { position: relative; }
        .input-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--electric-blue); font-size: 18px; }
        .form-control {
            width: 100%; padding: 18px 18px 18px 50px;
            background: var(--white); border: 1px solid var(--border-soft); border-radius: 20px;
            font-family: 'Inter'; font-weight: 600; font-size: 15px; color: var(--text-main);
            box-shadow: 0 5px 15px rgba(0,0,0,0.02); transition: 0.3s;
        }
        .form-control:focus { border-color: var(--electric-blue); box-shadow: 0 0 0 4px rgba(45, 99, 237, 0.1); }
        .form-control:disabled { background: #F1F5F9; color: var(--text-muted); cursor: not-allowed; }

        /* --- BUTTONS --- */
        .btn-save {
            width: 100%; padding: 20px; margin-top: 10px;
            background: linear-gradient(135deg, var(--royal-blue) 0%, var(--electric-blue) 100%);
            color: var(--white); border: none; border-radius: 20px;
            font-family: 'Space Grotesk'; font-weight: 800; font-size: 15px; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; box-shadow: 0 15px 30px rgba(45, 99, 237, 0.3); transition: 0.3s;
        }
        .btn-save:active { transform: scale(0.97); box-shadow: 0 5px 15px rgba(45, 99, 237, 0.3); }

        .btn-logout {
            width: 100%; padding: 18px; margin-top: 15px;
            background: transparent; color: var(--danger);
            border: 2px dashed #FCA5A5; border-radius: 20px;
            font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-logout:active { background: #FEF2F2; border-color: var(--danger); }

        /* --- DOCK NAV --- */
        .dock-container { position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        .nav-pill { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); padding: 12px 30px; border-radius: 50px; display: flex; gap: 40px; box-shadow: 0 20px 45px rgba(0,0,0,0.15); border: 1px solid var(--border-soft); }
        .nav-tab { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #CBD5E1; transition: 0.3s; }
        .nav-tab.active { color: var(--electric-blue); }
        .nav-tab i { font-size: 22px; margin-bottom: 4px; }
        .nav-tab span { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- MODAL LOADING/SUCCESS --- */
        .overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.8); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-box { background: white; padding: 30px; border-radius: 30px; text-align: center; max-width: 300px; width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .modal-icon { font-size: 40px; color: var(--success); margin-bottom: 15px; }
        .modal-text { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 800; color: var(--royal-blue); }
    </style>
</head>
<body>

    <div class="overlay" id="statusOverlay">
        <div class="modal-box">
            <i class="fas fa-check-circle modal-icon" id="statusIcon"></i>
            <div class="modal-text" id="statusText">Menyimpan...</div>
        </div>
    </div>

    <header class="profile-header">
        <div class="header-title">Pengaturan Akun</div>
    </header>

    <div class="avatar-container">
        <img id="profileImg" src="" class="avatar-img" alt="Profile">
        <label for="fileInput" class="btn-edit-photo"><i class="fas fa-camera"></i></label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="form-wrapper">
        <div class="input-group">
            <label class="input-label">Nomor Plat Kendaraan</label>
            <div class="input-box">
                <i class="fas fa-motorcycle"></i>
                <input type="text" id="inpPlat" class="form-control" disabled>
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Nama Legal (Sesuai KTP)</label>
            <div class="input-box">
                <i class="fas fa-id-card"></i>
                <input type="text" id="inpKtp" class="form-control" placeholder="Nama Lengkap KTP" style="text-transform: uppercase;">
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Nama di WA</label>
            <div class="input-box">
                <i class="fas fa-user"></i>
                <input type="text" id="inpWa" class="form-control" placeholder="Nama Panggilan / Alias" style="text-transform: uppercase;">
            </div>
        </div>

        <div class="input-group">
            <label class="input-label">Nomor WhatsApp Aktif</label>
            <div class="input-box">
                <i class="fab fa-whatsapp"></i>
                <input type="tel" id="inpHp" class="form-control" placeholder="08XX-XXXX-XXXX">
            </div>
        </div>

        <button class="btn-save" onclick="saveProfile()"><i class="fas fa-save" style="margin-right:8px;"></i> SIMPAN PERUBAHAN</button>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> KELUAR DARI SISTEM</button>
    </div>

    <div class="dock-container">
        <nav class="nav-pill">
            <a href="dashboard.html" class="nav-tab"><i class="fas fa-home"></i><span>HOME</span></a>
            <a href="data_anggota.html" class="nav-tab"><i class="fas fa-users"></i><span>MEMBER</span></a>
            <a href="settings.html" class="nav-tab active"><i class="fas fa-user-cog"></i><span>AKUN</span></a>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Load Data dari LocalStorage
        let uData = JSON.parse(localStorage.getItem('maka_user'));
        if (!uData) { window.location.href = 'index.html'; }

        // Populate Form
        document.getElementById('inpPlat').value = uData.plat || "";
        document.getElementById('inpKtp').value = uData.namaKtp || uData.nama || "";
        document.getElementById('inpWa').value = uData.namaWa || uData.nama || "";
        document.getElementById('inpHp').value = uData.hp || "";
        
        let currentPhotoBase64 = uData.foto || `https://ui-avatars.com/api/?background=2D63ED&color=fff&bold=true&size=200&name=${encodeURIComponent(uData.nama)}`;
        document.getElementById('profileImg').src = currentPhotoBase64;

        // --- SMART IMAGE COMPRESSOR ---
        // Agar foto HP (yang ukurannya bisa 5MB) dikompres otomatis jadi sangat ringan (JPEG)
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Maksimal ukuran 400x400
                    const MAX_SIZE = 400;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Convert jadi Base64 kualitas 80%
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                    currentPhotoBase64 = dataUrl;
                    document.getElementById('profileImg').src = dataUrl;
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // --- SAVE TO FIREBASE & LOCALSTORAGE ---
        window.saveProfile = async () => {
            const overlay = document.getElementById('statusOverlay');
            const statusIcon = document.getElementById('statusIcon');
            const statusText = document.getElementById('statusText');
            
            overlay.style.display = 'flex';
            statusIcon.className = 'fas fa-spinner fa-spin';
            statusIcon.style.color = 'var(--electric-blue)';
            statusText.innerText = 'Menyinkronkan Data...';

            const newKtp = document.getElementById('inpKtp').value.trim().toUpperCase();
            const newWa = document.getElementById('inpWa').value.trim().toUpperCase();
            const newHp = document.getElementById('inpHp').value.trim();

            if (!newWa || !newHp) {
                alert("Nama WA dan Nomor HP wajib diisi!");
                overlay.style.display = 'none';
                return;
            }

            // Update Local
            uData.namaKtp = newKtp;
            uData.namaWa = newWa;
            uData.nama = newWa; // Gunakan Nama WA sebagai display utama di App
            uData.hp = newHp;
            uData.foto = currentPhotoBase64;
            
            localStorage.setItem('maka_user', JSON.stringify(uData));

            // Update Firebase Database (Cari berdasarkan Plat)
            try {
                const q = query(collection(db, "mlu_members"), where("plat", "==", uData.plat));
                const querySnapshot = await getDocs(q);
                
                if (!querySnapshot.empty) {
                    // Update semua dokumen yang platnya cocok (idealnya cuma 1)
                    querySnapshot.forEach(async (documentSnap) => {
                        await updateDoc(doc(db, "mlu_members", documentSnap.id), {
                            namaKtp: newKtp,
                            nama: newWa, // Display name
                            hp: newHp,
                            foto: currentPhotoBase64
                        });
                    });
                }

                // Tampilkan Sukses
                statusIcon.className = 'fas fa-check-circle';
                statusIcon.style.color = 'var(--success)';
                statusText.innerText = 'Profil Berhasil Diperbarui!';
                
                setTimeout(() => { overlay.style.display = 'none'; location.reload(); }, 1500);

            } catch (error) {
                console.error("Error updating document: ", error);
                statusIcon.className = 'fas fa-exclamation-triangle';
                statusIcon.style.color = 'var(--danger)';
                statusText.innerText = 'Gagal sinkronisasi ke server.';
                setTimeout(() => { overlay.style.display = 'none'; }, 2000);
            }
        };

        // --- LOGOUT ---
        window.logout = () => {
            if(confirm("Apakah Anda yakin ingin keluar dari aplikasi?")) {
                localStorage.removeItem('maka_user');
                window.location.href = 'index.html';
            }
        };
    </script>
</body>
</html>
