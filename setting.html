<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU - Account Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --royal-blue: #0A2259; --electric-blue: #2D63ED; --bg-surface: #F8FAFC; --white: #FFFFFF; --text-main: #0F172A; --text-muted: #64748B; --danger: #EF4444; --success: #10B981; --border-soft: rgba(226, 232, 240, 0.9); }
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 120px; }
        * { box-sizing: border-box; outline: none; }
        .profile-header { background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); padding: 40px 20px 100px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; }
        .header-title { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--white); text-transform: uppercase; }
        .avatar-container { position: relative; width: 120px; height: 120px; margin: -60px auto 30px; z-index: 10; }
        .avatar-img { width: 100%; height: 100%; border-radius: 35px; object-fit: cover; background: #F1F5F9; border: 4px solid var(--white); box-shadow: 0 15px 35px rgba(10,34,89,0.15); }
        .btn-edit-photo { position: absolute; bottom: -5px; right: -5px; width: 40px; height: 40px; border-radius: 50%; background: var(--electric-blue); color: var(--white); border: 3px solid var(--white); display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #fileInput { display: none; }
        .form-wrapper { padding: 0 25px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; margin-left: 5px; }
        .input-box { position: relative; }
        .input-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--electric-blue); font-size: 18px; z-index: 2;}
        .form-control { width: 100%; padding: 18px 18px 18px 50px; background: var(--white); border: 1px solid var(--border-soft); border-radius: 20px; font-family: 'Inter'; font-weight: 600; font-size: 15px; position: relative; appearance: none; -webkit-appearance: none;}
        .form-control:disabled { background: #F1F5F9; color: var(--text-muted); }
        .btn-save { width: 100%; padding: 20px; margin-top: 10px; background: linear-gradient(135deg, var(--royal-blue) 0%, var(--electric-blue) 100%); color: var(--white); border: none; border-radius: 20px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 15px; cursor: pointer; }
        .btn-logout { width: 100%; padding: 18px; margin-top: 15px; background: transparent; color: var(--danger); border: 2px dashed #FCA5A5; border-radius: 20px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;}
        .dock-container { position: fixed; bottom: 25px; left: 0; width: 100%; display: flex; justify-content: center; z-index: 1000; }
        .nav-pill { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); padding: 12px 30px; border-radius: 50px; display: flex; gap: 40px; border: 1px solid var(--border-soft); }
        .nav-tab { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #CBD5E1; }
        .nav-tab.active { color: var(--electric-blue); }
        .overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.8); display: none; align-items: center; justify-content: center; z-index: 9999; }
        .modal-box { background: white; padding: 30px; border-radius: 30px; text-align: center; width: 90%; max-width: 300px; }
    </style>
</head>
<body>

    <div class="overlay" id="statusOverlay">
        <div class="modal-box">
            <i class="fas fa-spinner fa-spin" id="statusIcon" style="font-size:40px; color:var(--electric-blue); margin-bottom:15px;"></i>
            <div id="statusText" style="font-family:'Space Grotesk'; font-weight:800; color:var(--royal-blue);">Menyimpan...</div>
        </div>
    </div>

    <header class="profile-header"><div class="header-title">Pengaturan Akun</div></header>

    <div class="avatar-container">
        <img id="profileImg" src="" class="avatar-img">
        <label for="fileInput" class="btn-edit-photo"><i class="fas fa-camera"></i></label>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="form-wrapper">
        <div class="input-group"><label class="input-label">Plat Nomor</label><div class="input-box"><i class="fas fa-motorcycle"></i><input type="text" id="inpPlat" class="form-control" disabled></div></div>
        <div class="input-group"><label class="input-label">Nama Legal (KTP)</label><div class="input-box"><i class="fas fa-id-card"></i><input type="text" id="inpKtp" class="form-control" style="text-transform:uppercase;"></div></div>
        <div class="input-group"><label class="input-label">Nama Panggilan (WA)</label><div class="input-box"><i class="fas fa-user"></i><input type="text" id="inpWa" class="form-control" style="text-transform:uppercase;"></div></div>
        <div class="input-group"><label class="input-label">Nomor WhatsApp Pribadi</label><div class="input-box"><i class="fab fa-whatsapp"></i><input type="tel" id="inpHp" class="form-control"></div></div>
        
        <div class="input-group" style="background:#FEF2F2; border:1px dashed #FCA5A5; padding:15px; border-radius:20px; margin-top:25px;">
            <div style="font-size:10px; font-weight:800; color:var(--danger); margin-bottom:15px; text-align:center;"><i class="fas fa-heartbeat"></i> KONTAK DARURAT (WAJIB)</div>
            
            <label class="input-label">No. HP Darurat</label>
            <div class="input-box" style="margin-bottom:15px;"><i class="fas fa-phone-alt" style="color:var(--danger);"></i><input type="tel" id="inpDarurat" class="form-control" placeholder="Cth: 0812345678..."></div>
            
            <label class="input-label">Hubungan</label>
            <div class="input-box">
                <i class="fas fa-users" style="color:var(--danger);"></i>
                <select id="inpHubungan" class="form-control">
                    <option value="">-- Pilih Hubungan --</option>
                    <option value="ISTRI">Istri</option>
                    <option value="SUAMI">Suami</option>
                    <option value="ORANG TUA">Orang Tua</option>
                    <option value="ANAK">Anak</option>
                    <option value="SAUDARA">Saudara / Kakak / Adik</option>
                    <option value="LAINNYA">Lainnya</option>
                </select>
            </div>
        </div>
        
        <div class="input-group" style="margin-top:25px;"><label class="input-label">Ubah PIN Keamanan (Opsional)</label><div class="input-box"><i class="fas fa-lock"></i><input type="password" id="inpPin" class="form-control" placeholder="Kosongkan jika tidak diganti"></div></div>

        <button class="btn-save" onclick="saveProfile()"><i class="fas fa-save"></i> SIMPAN PERUBAHAN</button>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> KELUAR DARI SISTEM</button>
    </div>

    <div class="dock-container">
        <nav class="nav-pill">
            <a href="dashboard.html" class="nav-tab"><i class="fas fa-home"></i></a>
            <a href="data_anggota.html" class="nav-tab"><i class="fas fa-address-book"></i></a>
            <a href="setting.html" class="nav-tab active"><i class="fas fa-user-cog"></i></a>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        let uData = JSON.parse(localStorage.getItem('maka_user'));
        if (!uData) window.location.href = 'index.html';

        document.getElementById('inpPlat').value = uData.plat;
        document.getElementById('inpKtp').value = uData.namaKtp || uData.nama || "";
        document.getElementById('inpWa').value = uData.namaWa || uData.nama || "";
        document.getElementById('inpHp').value = uData.hp || "";
        
        // Injeksi data darurat ke input form
        document.getElementById('inpDarurat').value = uData.darurat || "";
        document.getElementById('inpHubungan').value = uData.hubungan || "";
        
        let currentPhotoBase64 = uData.foto || `https://ui-avatars.com/api/?background=2D63ED&color=fff&bold=true&size=200&name=${encodeURIComponent(uData.nama)}`;
        document.getElementById('profileImg').src = currentPhotoBase64;

        // Image Compressor
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    let w = img.width; let h = img.height;
                    if (w > h) { if (w > 400) { h *= 400/w; w = 400; } } else { if (h > 400) { w *= 400/h; h = 400; } }
                    canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    document.getElementById('profileImg').src = currentPhotoBase64;
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        window.saveProfile = async () => {
            document.getElementById('statusOverlay').style.display = 'flex';
            const newKtp = document.getElementById('inpKtp').value.trim().toUpperCase();
            const newWa = document.getElementById('inpWa').value.trim().toUpperCase();
            const newHp = document.getElementById('inpHp').value.trim();
            const newPin = document.getElementById('inpPin').value.trim();
            
            // Tangkap data darurat baru
            const newDarurat = document.getElementById('inpDarurat').value.trim();
            const newHubungan = document.getElementById('inpHubungan').value;

            if (!newKtp || !newWa) {
                document.getElementById('statusOverlay').style.display = 'none';
                return alert("Nama KTP dan Nama WA wajib diisi!");
            }

            try {
                let updatePayload = {
                    namaKtp: newKtp, namaWa: newWa, nama: newWa, hp: newHp, foto: currentPhotoBase64,
                    darurat: newDarurat, hubungan: newHubungan
                };
                
                if (newPin !== "") updatePayload.pin = newPin;

                await updateDoc(doc(db, "mlu_members", uData.id), updatePayload);

                // Update Local Memori
                uData.namaKtp = newKtp; uData.namaWa = newWa; uData.nama = newWa; uData.hp = newHp; uData.foto = currentPhotoBase64;
                uData.darurat = newDarurat; uData.hubungan = newHubungan;
                localStorage.setItem('maka_user', JSON.stringify(uData));

                document.getElementById('statusIcon').className = 'fas fa-check-circle';
                document.getElementById('statusIcon').style.color = '#10B981';
                document.getElementById('statusText').innerText = 'Berhasil Disimpan!';
                setTimeout(() => { document.getElementById('statusOverlay').style.display = 'none'; location.reload(); }, 1500);

            } catch (e) {
                alert("Gagal sinkronisasi ke server: " + e.message);
                document.getElementById('statusOverlay').style.display = 'none';
            }
        };

        window.logout = () => { if(confirm("Keluar dari aplikasi?")) { localStorage.removeItem('maka_user'); window.location.href = 'index.html'; } };
    </script>
</body>
</html>
