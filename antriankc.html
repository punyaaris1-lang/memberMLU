<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Antrean Live KC</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA HITAM PEKAT (KC) === */
        :root { 
            --kc-yellow: #D4FF00; 
            --kc-green: #10B981; 
            --bg-black: #000000;
            --glass-bg: rgba(15, 15, 15, 0.9); 
        }
        body { margin: 0; background: var(--bg-black); font-family: 'Inter', sans-serif; color: #fff; padding-bottom: 100px; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; text-decoration: none; outline: none;}

        /* HEADER FIXED */
        .header { background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); padding: 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: white; font-size: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .header-title h1 { margin: 0; font-family: 'Space Grotesk'; font-size: 18px; color: var(--kc-yellow); letter-spacing: 1px; }
        .header-title p { margin: 0; font-size: 10px; color: #94a3b8; font-weight: 600; letter-spacing: 1px; }
        .live-indicator { display: flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 800; color: #EF4444; font-family: 'Space Grotesk'; background: rgba(239,68,68,0.1); padding: 4px 8px; border-radius: 12px; border: 1px solid rgba(239,68,68,0.2);}
        .live-dot { width: 6px; height: 6px; background: #EF4444; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .container { padding: 20px; }

        /* STATUS BANNER */
        .status-banner { background: linear-gradient(135deg, #111 0%, #050505 100%); border: 1px solid rgba(212,255,0,0.2); border-radius: 20px; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .sb-left h3 { margin: 0 0 5px 0; font-family: 'Space Grotesk'; font-size: 14px; color: #94a3b8; }
        .sb-left p { margin: 0; font-family: 'Space Grotesk'; font-size: 24px; font-weight: 900; color: white; }
        .sb-right { text-align: right; }
        .sb-right h3 { margin: 0 0 5px 0; font-family: 'Space Grotesk'; font-size: 14px; color: #94a3b8; }
        .sb-right p { margin: 0; font-family: 'Space Grotesk'; font-size: 24px; font-weight: 900; color: var(--kc-yellow); }

        /* GRID SLOT CHARGING (5 SLOT KC) */
        .section-title { font-family: 'Space Grotesk'; font-size: 14px; color: white; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; letter-spacing: 1px;}
        .slot-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 30px; }
        /* Slot ke-5 dibuat membentang penuh di bawah */
        .slot-grid .slot-card:last-child:nth-child(odd) { grid-column: 1 / -1; } 

        .slot-card { background: #111; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; text-align: center; position: relative; overflow: hidden; transition: 0.3s; }
        .slot-card.filled { border-color: var(--kc-yellow); background: linear-gradient(180deg, rgba(212,255,0,0.05) 0%, #050505 100%); }
        .slot-card.mine { border-color: var(--kc-green); background: linear-gradient(180deg, rgba(16,185,129,0.1) 0%, #050505 100%); box-shadow: 0 0 20px rgba(16,185,129,0.2);}
        
        .slot-num { font-size: 10px; font-weight: 800; color: #64748b; margin-bottom: 5px; }
        .slot-status { font-family: 'Space Grotesk'; font-size: 14px; font-weight: 900; color: #334155; }
        .slot-card.filled .slot-status { color: white; font-size: 18px; margin: 5px 0;}
        .slot-name { font-size: 11px; color: var(--kc-yellow); font-weight: 700; }
        .slot-card.mine .slot-name { color: var(--kc-green); }
        .btn-finish { background: #EF4444; color: white; border: none; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; margin-top: 10px; cursor: pointer; width: 100%;}

        /* WAITING LIST */
        .queue-list { display: flex; flex-direction: column; gap: 10px; }
        .queue-item { background: #111; border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .queue-item.mine { border-left: 4px solid var(--kc-green); background: rgba(16,185,129,0.05); }
        .q-left { display: flex; align-items: center; gap: 15px; }
        .q-no { width: 35px; height: 35px; border-radius: 10px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk'; font-size: 16px; font-weight: 900; color: var(--kc-yellow); }
        .queue-item.mine .q-no { background: var(--kc-green); color: black; }
        .q-info h4 { margin: 0 0 3px 0; font-family: 'Space Grotesk'; font-size: 16px; color: white; }
        .q-info p { margin: 0; font-size: 11px; color: #94a3b8; font-weight: 500;}
        .q-batt { font-size: 12px; font-weight: 800; color: #cbd5e1; background: #222; padding: 4px 8px; border-radius: 8px;}

        /* FLOATING ACTION BUTTON */
        .bottom-action { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 380px; z-index: 1000; }
        .btn-main { width: 100%; padding: 18px; border-radius: 20px; border: none; font-family: 'Space Grotesk'; font-size: 16px; font-weight: 900; cursor: pointer; transition: 0.3s; box-shadow: 0 15px 30px rgba(0,0,0,0.8); display: flex; justify-content: center; align-items: center; gap: 10px;}
        .btn-main.join { background: var(--kc-yellow); color: black; box-shadow: 0 10px 25px rgba(212,255,0,0.2); }
        .btn-main.cancel { background: #1e293b; color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
        .btn-main:active { transform: scale(0.95); }

        /* MODAL INPUT BATERAI */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); z-index: 9999; display: none; align-items: center; justify-content: center; }
        .modal-box { background: #111; width: 85%; max-width: 320px; border-radius: 24px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); text-align: center;}
        .modal-title { font-family: 'Space Grotesk'; font-size: 18px; color: var(--kc-yellow); margin: 0 0 15px 0;}
        .modal-desc { font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
        .batt-input { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); background: #000; color: white; font-family: 'Space Grotesk'; font-size: 24px; text-align: center; outline: none; margin-bottom: 20px;}
        .batt-input:focus { border-color: var(--kc-yellow); }
        .modal-btns { display: flex; gap: 10px; }
        .btn-modal { flex: 1; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 13px; border: none; cursor: pointer; font-family: 'Space Grotesk';}
        .btn-modal.no { background: #222; color: white; }
        .btn-modal.yes { background: var(--kc-yellow); color: black; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="dashboard_kc.html" class="btn-back"><i class="fas fa-chevron-left"></i></a>
            <div class="header-title">
                <h1>ANTREAN KC</h1>
                <p>STASIUN KARTIKA CHANDRA</p>
            </div>
        </div>
        <div class="live-indicator"><div class="live-dot"></div> LIVE</div>
    </div>

    <div class="container">
        <div class="status-banner">
            <div class="sb-left">
                <h3>SLOT TERSEDIA</h3>
                <p id="txtAvailable">...</p>
            </div>
            <div class="sb-right">
                <h3>MENUNGGU</h3>
                <p id="txtWaiting">...</p>
            </div>
        </div>

        <div class="section-title"><i class="fas fa-plug" style="color:var(--kc-yellow);"></i> STATUS COLOKAN</div>
        <div class="slot-grid" id="slotGrid">
            <div style="text-align:center; grid-column:1/-1; color:#64748b; font-size:12px;">Memuat data stasiun...</div>
        </div>

        <div class="section-title"><i class="fas fa-users" style="color:var(--kc-yellow);"></i> DAFTAR TUNGGU</div>
        <div class="queue-list" id="queueList">
            <div style="text-align:center; color:#64748b; font-size:12px; padding: 20px;">Memuat antrean...</div>
        </div>
    </div>

    <div class="bottom-action">
        <button class="btn-main join" id="btnAction" onclick="showJoinModal()" style="display: none;"><i class="fas fa-ticket-alt"></i> AMBIL ANTREAN</button>
    </div>

    <div class="modal-overlay" id="joinModal">
        <div class="modal-box">
            <h2 class="modal-title">SISA BATERAI?</h2>
            <p class="modal-desc">Masukkan sisa persentase baterai motor Anda saat ini agar admin bisa memprioritaskan yang darurat.</p>
            <input type="number" id="inputBatt" class="batt-input" placeholder="0 - 100" min="0" max="100">
            <div class="modal-btns">
                <button class="btn-modal no" onclick="document.getElementById('joinModal').style.display='none'">BATAL</button>
                <button class="btn-modal yes" onclick="prosesAmbilAntrean()">GABUNG</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // KONEKSI DATABASE KHUSUS KC
        const appKC = initializeApp({ apiKey: "AIzaSyDDVYQSjmJEn_RvIUotSxbh8L-ysJMCthk", authDomain: "kartikachandrafc.firebaseapp.com", projectId: "kartikachandrafc" }, "AppKC");
        const dbKC = getFirestore(appKC);
        const refKC = doc(dbKC, "antrian", "utama");

        // AMBIL DATA MEMBER
        let uData = null;
        try { uData = JSON.parse(localStorage.getItem('maka_user')); } catch (e) {}
        if (!uData || !uData.plat) window.location.href = 'index_kc.html'; 

        const myName = uData.namaKtp || uData.namaWa || "Member KC";
        const myPlat = uData.plat || "B XXXX XX";
        let myRole = uData.role || "MEMBER";
        
        // Logika Dewa B4248SWF untuk bypass tampilan
        if(myPlat.replace(/\s+/g, '').toUpperCase() === "B4248SWF") myRole = "PA BOS";

        let isMyTurn = false;
        let isWaiting = false;

        // LISTENER REALTIME FIREBASE
        onSnapshot(refKC, (snap) => {
            if(!snap.exists()) return;
            const d = snap.data();
            const slots = d.chargingSlots || [null,null,null,null,null]; // 5 Slot untuk KC
            const queue = d.waitingQueue || [];

            isMyTurn = false;
            isWaiting = false;

            // RENDER 5 SLOT
            const grid = document.getElementById('slotGrid');
            grid.innerHTML = '';
            let available = 0;

            slots.forEach((s, i) => {
                if(!s) {
                    available++;
                    grid.innerHTML += `<div class="slot-card"><div class="slot-num">SLOT ${i+1}</div><div class="slot-status" style="color:#334155;">KOSONG</div></div>`;
                } else if(s.isLocked) {
                    grid.innerHTML += `<div class="slot-card"><div class="slot-num">SLOT ${i+1}</div><div class="slot-status" style="color:#ef4444;"><i class="fas fa-lock"></i> KUNCI</div></div>`;
                } else {
                    const isMe = s.plat === myPlat;
                    if(isMe) isMyTurn = true;
                    
                    const btnSelesai = isMe ? `<button class="btn-finish" onclick="cabutSendiri(${i})">SAYA SELESAI</button>` : '';
                    
                    grid.innerHTML += `
                        <div class="slot-card ${isMe ? 'mine' : 'filled'}">
                            <div class="slot-num">SLOT ${i+1}</div>
                            <div class="slot-status">${s.plat}</div>
                            <div class="slot-name">${s.userName.split(' ')[0]}</div>
                            ${btnSelesai}
                        </div>
                    `;
                }
            });

            document.getElementById('txtAvailable').innerText = available;

            // RENDER ANTREAN
            const qList = document.getElementById('queueList');
            qList.innerHTML = '';
            
            if(queue.length === 0) {
                qList.innerHTML = '<div style="text-align:center; color:#64748b; font-size:12px; padding: 20px;">Belum ada antrean.</div>';
            } else {
                queue.forEach((q, i) => {
                    const isMe = q.plat === myPlat;
                    if(isMe) isWaiting = true;

                    qList.innerHTML += `
                        <div class="queue-item ${isMe ? 'mine' : ''}">
                            <div class="q-left">
                                <div class="q-no">${q.qNo}</div>
                                <div class="q-info">
                                    <h4>${q.plat}</h4>
                                    <p>${isMe ? 'Anda' : q.userName} • ${q.role || 'MEMBER'}</p>
                                </div>
                            </div>
                            <div class="q-batt"><i class="fas fa-battery-half" style="color:var(--kc-yellow);"></i> ${q.batreSisa}%</div>
                        </div>
                    `;
                });
            }

            document.getElementById('txtWaiting').innerText = queue.length;

            // UPDATE TOMBOL BAWAH
            const btnAction = document.getElementById('btnAction');
            btnAction.style.display = 'flex';
            
            if(isMyTurn) {
                btnAction.className = 'btn-main';
                btnAction.style.background = '#10B981';
                btnAction.style.color = 'black';
                btnAction.innerHTML = '<i class="fas fa-bolt"></i> SEDANG CHARGING';
                btnAction.onclick = null;
            } else if (isWaiting) {
                btnAction.className = 'btn-main cancel';
                btnAction.innerHTML = '<i class="fas fa-times"></i> BATAL ANTRE';
                btnAction.onclick = batalAntre;
            } else {
                btnAction.className = 'btn-main join';
                btnAction.innerHTML = '<i class="fas fa-ticket-alt"></i> AMBIL ANTREAN';
                btnAction.onclick = showJoinModal;
            }
        });

        // FUNGSI MODAL & TRANSAKSI
        window.showJoinModal = () => { document.getElementById('joinModal').style.display = 'flex'; };
        
        window.prosesAmbilAntrean = () => {
            const batt = document.getElementById('inputBatt').value;
            if(!batt || batt < 0 || batt > 100) return alert("Masukkan persentase baterai yang benar (0-100)!");
            
            document.getElementById('joinModal').style.display = 'none';
            document.getElementById('btnAction').innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';

            runTransaction(dbKC, async(t) => {
                const d = (await t.get(refKC)).data();
                let queue = d.waitingQueue || [];
                let nextNo = (d.lastTicket || 0) + 1;

                // Cek apakah tiba-tiba ada slot kosong (Bypass antrean langsung masuk slot)
                let emptySlotIndex = -1;
                for(let i=0; i<5; i++) {
                    if(!d.chargingSlots[i]) { emptySlotIndex = i; break; }
                }

                if(emptySlotIndex !== -1 && queue.length === 0) {
                    // Masuk slot langsung karena sepi
                    d.chargingSlots[emptySlotIndex] = {
                        plat: myPlat,
                        userName: myName,
                        role: myRole,
                        batreSisa: batt,
                        startTime: Date.now()
                    };
                    t.update(refKC, { chargingSlots: d.chargingSlots });
                } else {
                    // Masuk antrean normal
                    queue.push({
                        qNo: nextNo,
                        plat: myPlat,
                        userName: myName,
                        role: myRole,
                        batreSisa: batt,
                        joinTime: Date.now()
                    });
                    t.update(refKC, { waitingQueue: queue, lastTicket: nextNo });
                }
            }).catch(e => alert("Gagal mengambil antrean: " + e.message));
        };

        window.batalAntre = () => {
            if(!confirm("Yakin ingin membatalkan antrean Anda?")) return;
            document.getElementById('btnAction').innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMBATALKAN...';
            
            runTransaction(dbKC, async(t) => {
                const d = (await t.get(refKC)).data();
                const newQueue = d.waitingQueue.filter(q => q.plat !== myPlat);
                
                // Re-index sisa antrean
                newQueue.forEach((q, i) => q.qNo = i + 1);
                
                t.update(refKC, { waitingQueue: newQueue, lastTicket: newQueue.length });
            }).catch(e => alert("Gagal membatalkan: " + e.message));
        };

        window.cabutSendiri = (index) => {
            if(!confirm("Anda sudah selesai charging?")) return;
            
            runTransaction(dbKC, async(t) => {
                const d = (await t.get(refKC)).data();
                d.chargingSlots[index] = null;
                t.update(refKC, { chargingSlots: d.chargingSlots });
            });
        };
    </script>
</body>
</html>
