<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Structure</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA ULTRA LUXURY (WHITE & ROYAL BLUE) === */
        :root { 
            --royal-blue: #0A2259; 
            --electric-blue: #2D63ED; 
            --gold-lux: #D4AF37;
            --bg-surface: #F0F4F8; 
            --text-main: #0F172A; 
            --text-muted: #64748B; 
            
            /* Glass Variables */
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 15px 40px rgba(10, 34, 89, 0.08);
            --shadow-gold: 0 15px 40px rgba(212, 175, 55, 0.2);
        }
        
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 120px; overflow-x: hidden; position: relative; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; text-decoration: none; }

        /* AMBIENT LIGHT */
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.5; animation: floatLight 10s infinite alternate; }
        .light-1 { top: -20%; left: -20%; width: 500px; height: 500px; background: #bfdbfe; }
        .light-2 { top: 40%; right: -30%; width: 400px; height: 400px; background: rgba(212, 175, 55, 0.15); animation-delay: 2s; }
        .bg-watermark { position: fixed; top: 15%; right: -15%; width: 100%; height: 80%; background-image: url('logomlu.png'); background-repeat: no-repeat; background-size: contain; background-position: center; opacity: 0.04; transform: rotate(-15deg); z-index: -2; pointer-events: none; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(20px, 40px);} }

        /* HEADER */
        .header-main { padding: 40px 20px 20px; position: relative; z-index: 10; text-align: center; }
        .sub-tag { font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--gold-lux); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .main-title { font-family: 'Outfit'; font-size: 28px; font-weight: 900; color: var(--royal-blue); margin: 0; letter-spacing: -1px; text-shadow: 0 10px 30px rgba(10,34,89,0.1); }

        /* CONTAINER */
        .content-container { padding: 0 25px; position: relative; z-index: 10; display: flex; flex-direction: column; gap: 30px; margin-top: 10px;}

        /* SECTION LABEL */
        .sec-label { text-align: center; font-family: 'Space Grotesk'; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin: 10px 0; position: relative; opacity: 0.7;}
        .sec-label::before, .sec-label::after { content:''; display:inline-block; width:20px; height:1px; background:var(--text-muted); vertical-align:middle; margin: 0 10px; opacity:0.5;}

        /* CARD STYLES */
        .p-card { 
            background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 28px; padding: 25px 20px; 
            text-align: center; display: flex; flex-direction: column; align-items: center; 
            box-shadow: var(--shadow-soft); transition: 0.3s; position: relative; overflow: hidden;
        }
        .p-card:active { transform: scale(0.98); }

        /* KETUM SPECIAL STYLE */
        .card-ketum { 
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(254, 243, 199, 0.5) 100%);
            border: 1px solid rgba(212, 175, 55, 0.4);
            box-shadow: var(--shadow-gold);
            padding: 35px 20px;
        }
        .ketum-crown { position: absolute; top: 15px; font-size: 24px; color: var(--gold-lux); filter: drop-shadow(0 5px 10px rgba(212,175,55,0.4)); animation: floatCrown 3s ease-in-out infinite; }
        @keyframes floatCrown { 0%,100% {transform:translateY(0);} 50% {transform:translateY(-5px);} }

        .p-photo { 
            width: 80px; height: 80px; border-radius: 24px; object-fit: cover; 
            margin-bottom: 15px; border: 3px solid white; background: #F1F5F9;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: 0.3s;
        }
        .card-ketum .p-photo { width: 100px; height: 100px; border-color: rgba(212,175,55,0.3); }

        .p-role { 
            font-family: 'Space Grotesk'; font-size: 9px; font-weight: 900; 
            color: var(--electric-blue); text-transform: uppercase; letter-spacing: 1px; 
            margin-bottom: 6px; background: rgba(255,255,255,0.8); padding: 4px 10px; border-radius: 10px; 
            border: 1px solid rgba(45,99,237,0.1); box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .card-ketum .p-role { color: #B45309; border-color: rgba(212,175,55,0.3); background: rgba(255, 251, 235, 0.8); }

        .p-name { font-family: 'Outfit'; font-size: 16px; font-weight: 900; color: var(--royal-blue); margin: 0; line-height: 1.2; }
        .card-ketum .p-name { font-size: 22px; }
        .p-plat { font-size: 11px; font-weight: 600; color: var(--text-muted); margin-top: 4px; font-family: 'Inter';}

        /* GRIDS */
        .tier-2-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .tier-3-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; }
        .tier-4-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        @media (max-width: 380px) { .tier-4-grid { grid-template-columns: repeat(2, 1fr); } }

        /* BACK NAV */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; text-align: center;}
        .btn-premium-back { background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border: 1px solid white; padding: 14px 25px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 12px; color: var(--royal-blue); text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 30px rgba(10,34,89,0.15); transition: 0.2s;}
        .btn-premium-back:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="bg-watermark"></div>

    <header class="header-main">
        <span class="sub-tag">LEADERSHIP CORE</span>
        <h1 class="main-title">PENGURUS PUSAT</h1>
    </header>

    <div class="content-container">
        <div id="loader" style="text-align:center; padding:40px; color:var(--text-muted); font-weight:600;">
            <i class="fas fa-circle-notch fa-spin" style="font-size:24px; color:var(--electric-blue); margin-bottom:10px;"></i><br>Memuat Struktur...
        </div>

        <div id="tier1"></div>

        <div id="tier2-title" style="display:none;"><div class="sec-label">PIMPINAN EKSEKUTIF</div></div>
        <div id="tier2" class="tier-2-grid"></div>

        <div id="tier3-title" style="display:none;"><div class="sec-label">PENASEHAT & PEMBINA</div></div>
        <div id="tier3" class="tier-3-grid"></div>

        <div id="tier4-title" style="display:none;"><div class="sec-label">DIVISI OPERASIONAL</div></div>
        <div id="tier4" class="tier-4-grid"></div>
    </div>

    <div class="back-nav"><a href="dashboard.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // FOTO LOKAL (Mapping Manual)
        const localPhotos = {
            "AMAR": "amar.jpg", "AJI": "aji.jpg", "DONI": "doni.jpg", "UBAY": "ubay.jpg",
            "AHMAD": "akiaki.jpg", "PURNOMO": "ipung.jpg", "DAYYAN": "dayan.jpg",
            "HENDRO": "hendro.jpg", "IWAN": "iwan.jpg", "JETLEE": "jetlee.jpg", "SANDI": "sandi.jpg"
        };

        function renderCard(containerId, data, isKetum = false, isSmall = false) {
            const container = document.getElementById(containerId);
            const displayName = data.namaKtp || data.namaWa || data.nama || "";
            const cleanName = displayName.toUpperCase().trim();
            
            // LOGIKA FOTO (Lokal -> Database -> Avatar)
            let photoUrl = "";
            let foundLocal = false;
            
            // Cek di list lokal (mengandung kata kunci)
            for (const [key, val] of Object.entries(localPhotos)) {
                if (cleanName.includes(key)) { photoUrl = val; foundLocal = true; break; }
            }

            if (!foundLocal) {
                if (data.foto && data.foto.length > 50) photoUrl = data.foto;
                else photoUrl = `https://ui-avatars.com/api/?background=E0F2FE&color=0A2259&bold=true&name=${encodeURIComponent(displayName)}`;
            }

            const cardClass = isKetum ? 'p-card card-ketum' : 'p-card';
            const crownHtml = isKetum ? '<i class="fas fa-crown ketum-crown"></i>' : '';
            
            // Styling khusus Tier 4 (Kecil)
            const photoStyle = isSmall ? 'width:60px; height:60px;' : '';
            const nameStyle = isSmall ? 'font-size:12px;' : '';
            const roleStyle = isSmall ? 'font-size:7px; padding:2px 6px;' : '';

            const html = `
                <div class="${cardClass}">
                    ${crownHtml}
                    <img src="${photoUrl}" class="p-photo" style="${photoStyle}" onerror="this.onerror=null; this.src='https://ui-avatars.com/api/?background=E0F2FE&color=0A2259&bold=true&name=${encodeURIComponent(displayName)}';">
                    <div class="p-role" style="${roleStyle}">${data.role}</div>
                    <h3 class="p-name" style="${nameStyle}">${displayName}</h3>
                    <div class="p-plat">${data.plat}</div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        }

        async function loadPengurus() {
            const loader = document.getElementById('loader');
            const q = query(collection(db, "mlu_members"), where("role", "!=", "KELUARGA MLU"));
            
            try {
                const querySnapshot = await getDocs(q);
                loader.style.display = 'none';
                
                if (querySnapshot.empty) {
                    document.querySelector('.content-container').innerHTML += '<div style="text-align:center; color:var(--text-muted);">Belum ada data pengurus.</div>';
                    return;
                }

                document.getElementById('tier2-title').style.display = 'block';
                document.getElementById('tier3-title').style.display = 'block';
                document.getElementById('tier4-title').style.display = 'block';

                querySnapshot.forEach((doc) => {
                    const d = doc.data();
                    const r = (d.role || "").toUpperCase();

                    if (r === 'KETUA UMUM') renderCard('tier1', d, true);
                    else if (r === 'WAKIL KETUA' || r === 'SEKRETARIS' || r.includes('WAKIL') || r.includes('SEKRE')) renderCard('tier2', d);
                    else if (r === 'PEMBINA' || r === 'PENASEHAT') renderCard('tier3', d);
                    else renderCard('tier4', d, false, true); // Sisanya masuk grid kecil
                });

            } catch (e) {
                loader.innerHTML = `<span style="color:#EF4444">Gagal memuat: ${e.message}</span>`;
            }
        }

        loadPengurus();
    </script>
</body>
</html>
