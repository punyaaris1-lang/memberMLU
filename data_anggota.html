<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* === TEMA LIGHT GLASSMORPHISM & GLOW === */
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; --bg-surface: #F0F4F8; 
            --white: #FFFFFF; --text-main: #0F172A; --text-muted: #64748B; 
            --danger: #EF4444; --success: #10B981; --gold: #D4AF37;
            
            --border-soft: rgba(45, 99, 237, 0.15); 
            --glow-blue: 0 10px 30px rgba(45, 99, 237, 0.25);
            --glow-red: 0 10px 25px rgba(239, 68, 68, 0.25);
            --glow-gold: 0 10px 25px rgba(212, 175, 55, 0.25);
            --glow-success: 0 10px 25px rgba(16, 185, 129, 0.25);
        }
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; padding-bottom: 120px; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent;}
        
        /* HEADER GLOWING */
        .header-main { 
            background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); 
            padding: 50px 25px 80px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            color: white; text-align: center; position: relative; 
            box-shadow: var(--glow-blue); border-bottom: 2px solid rgba(45,99,237,0.3);
        }
        .sub-tag { font-size: 10px; font-weight: 800; letter-spacing: 3px; color: #93C5FD; text-transform: uppercase; margin-bottom: 5px; display: block; text-shadow: 0 0 10px rgba(147,197,253,0.5);}
        .main-title { font-family: 'Space Grotesk'; font-size: 32px; font-weight: 900; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.2);}

        /* SEARCH BOX GLASS */
        .search-box { 
            margin: -30px 20px 20px; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px);
            border-radius: 20px; padding: 5px 15px; display: flex; align-items: center; 
            box-shadow: 0 10px 25px rgba(45,99,237,0.1); border: 1px solid rgba(45,99,237,0.2); 
            position: relative; z-index: 10; transition: 0.3s;
        }
        .search-box:focus-within { box-shadow: var(--glow-blue); border-color: var(--electric-blue); }
        .search-box i { color: var(--electric-blue); font-size: 18px; margin-right: 10px; }
        .search-box input { flex: 1; border: none; padding: 15px 0; font-family: 'Inter'; font-size: 14px; font-weight: 600; background: transparent; color: var(--text-main);}

        /* KARTU ANGGOTA GLASSMORPHISM */
        .list-container { padding: 0 20px 30px; display: flex; flex-direction: column; gap: 12px; }
        .member-card { 
            background: rgba(255,255,255,0.85); backdrop-filter: blur(10px);
            border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; 
            border: 1px solid var(--border-soft); box-shadow: 0 5px 15px rgba(45,99,237,0.05); transition: 0.3s;
        }
        
        .member-card.is-pengurus { 
            border: 1px solid rgba(212, 175, 55, 0.4); 
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255, 251, 235, 0.9) 100%); 
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.15); 
        }
        
        .m-photo { width: 60px; height: 60px; border-radius: 16px; object-fit: cover; background: #F1F5F9; border: 2px solid rgba(45,99,237,0.2); flex-shrink: 0; cursor: zoom-in; transition: 0.2s;}
        .is-pengurus .m-photo { border-color: rgba(212, 175, 55, 0.5); box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        .m-photo:active { transform: scale(0.95); }

        .m-info { flex: 1; min-width: 0; }
        .m-name { font-family: 'Space Grotesk'; font-size: 14px; font-weight: 900; color: var(--royal-blue); text-transform: uppercase; margin-bottom: 3px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.2;}
        .is-pengurus .m-name { color: #000; }
        .m-wa-name { font-size: 10px; font-weight: 700; color: var(--electric-blue); background: rgba(45,99,237,0.08); padding: 3px 8px; border-radius: 6px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 5px; text-transform: uppercase; }
        .m-plat { font-size: 11px; font-weight: 800; color: var(--text-muted); letter-spacing: 1px; }
        
        /* SALDO CLICKABLE */
        .m-saldo { 
            font-size: 11px; font-weight: 800; color: var(--success); 
            display: flex; align-items: center; gap: 6px; margin-top: 6px; 
            cursor: pointer; padding: 4px 8px; background: rgba(16,185,129,0.1); 
            border-radius: 8px; width: fit-content; transition: 0.2s;
        }
        .m-saldo:active { transform: scale(0.95); background: rgba(16,185,129,0.2); }
        .m-saldo i { font-size: 12px; }

        .m-role { font-size: 9px; font-weight: 800; background: #F1F5F9; color: var(--text-muted); padding: 4px 8px; border-radius: 8px; display: inline-block; margin-top: 5px; border: 1px solid #E2E8F0;}
        .is-pengurus .m-role { background: rgba(212, 175, 55, 0.1); color: #B48500; border: 1px solid rgba(212, 175, 55, 0.3); }

        .m-actions { display: flex; flex-direction: column; gap: 5px; }
        .btn-act { width: 35px; height: 35px; border-radius: 12px; border: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-call { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-call:active { background: var(--success); color: white; box-shadow: var(--glow-success); }
        .btn-edit { background: rgba(45, 99, 237, 0.1); color: var(--electric-blue); border: 1px solid rgba(45, 99, 237, 0.2); display: none; }
        .btn-edit:active { background: var(--electric-blue); color: white; box-shadow: var(--glow-blue); }
        .btn-del { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); display: none; }
        .btn-del:active { background: var(--danger); color: white; box-shadow: var(--glow-red); }
        .btn-act:active { transform: scale(0.9); }

        /* FAB ADD BUTTON */
        .fab-add { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: linear-gradient(135deg, var(--electric-blue) 0%, var(--royal-blue) 100%); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; box-shadow: var(--glow-blue); border: none; cursor: pointer; z-index: 1000; transition: 0.2s;}
        .fab-add:active { transform: scale(0.9); }

        /* --- MODAL HISTORY (BARU) --- */
        .hist-list { margin-top: 15px; max-height: 400px; overflow-y: auto; }
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px dashed #E2E8F0; }
        .hist-item:last-child { border-bottom: none; }
        .hist-left { display: flex; flex-direction: column; gap: 2px; }
        .hist-desc { font-size: 12px; font-weight: 700; color: var(--text-main); }
        .hist-date { font-size: 10px; color: var(--text-muted); }
        .hist-val { font-family: 'Space Grotesk'; font-weight: 800; font-size: 12px; }
        .val-in { color: var(--success); } .val-out { color: var(--danger); }

        /* --- MODAL FORM --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.7); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; z-index: 9999; }
        .modal-box { 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); width: 100%; max-width: 500px; 
            border-top-left-radius: 35px; border-top-right-radius: 35px; padding: 30px 25px; 
            transform: translateY(100%); animation: slideUp 0.3s forwards; max-height: 90vh; overflow-y: auto;
            box-shadow: 0 -10px 40px rgba(45,99,237,0.15); border-top: 1px solid rgba(45,99,237,0.2);
        }
        @keyframes slideUp { to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--royal-blue); }
        .btn-close { background: #F1F5F9; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; color: var(--text-muted); transition: 0.2s;}
        .btn-close:active { background: #E2E8F0; transform: scale(0.9); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .form-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; font-family: 'Inter'; font-weight: 600; font-size: 14px; outline: none; transition: 0.2s;}
        .form-input:focus { border-color: var(--electric-blue); background: white; box-shadow: 0 0 15px rgba(45,99,237,0.1); }

        .upload-area { border: 2px dashed #93C5FD; border-radius: 16px; padding: 15px; text-align: center; background: #F8FAFC; cursor: pointer; position: relative; margin-bottom: 15px; transition: 0.2s;}
        .upload-area:active { background: #EFF6FF; }
        .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .preview-img { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; display: none; margin: 10px auto 0; border: 2px solid var(--electric-blue); box-shadow: 0 5px 15px rgba(45,99,237,0.2); }

        .btn-save { width: 100%; padding: 18px; border: none; border-radius: 16px; background: var(--electric-blue); color: white; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 800; margin-top: 10px; cursor: pointer; box-shadow: var(--glow-blue); letter-spacing: 1px; transition: 0.2s;}
        .btn-save:active { transform: scale(0.98); }

        /* LIGHTBOX */
        .photo-viewer-overlay { position: fixed; inset: 0; background: rgba(5,10,21,0.9); z-index: 99999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); padding: 20px;}
        .pv-container { position: relative; max-width: 400px; width: 100%; text-align: center; }
        .pv-container img { width: 100%; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); object-fit: cover; max-height: 70vh; border: 2px solid rgba(255,255,255,0.2); }
        .pv-close { position: absolute; top: -15px; right: -15px; width: 40px; height: 40px; border-radius: 50%; background: var(--danger); color: white; border: 2px solid white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--glow-red); transition: 0.2s; }
        .pv-close:active { transform: scale(0.9); }

        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 1000;}
        .btn-premium-back { background: rgba(255,255,255,0.95); backdrop-filter: blur(15px); border: 1px solid rgba(45,99,237,0.2); padding: 16px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; color: var(--electric-blue); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: var(--glow-blue); }
    </style>
</head>
<body>

    <header class="header-main" id="mainHeader">
        <span class="sub-tag">Database Komunitas</span>
        <h1 class="main-title">DATA ANGGOTA</h1>
    </header>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="Cari nama atau plat nomor..." onkeyup="filterList()">
    </div>

    <main class="list-container" id="memberList">
        <div style="text-align:center; padding:30px; color:#94A3B8;"><i class="fas fa-spinner fa-spin"></i> Memuat data...</div>
    </main>

    <button class="fab-add" id="btnAdd" onclick="openModal()"><i class="fas fa-plus"></i></button>
    <div class="back-nav"><a href="dashboard.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a></div>

    <div class="photo-viewer-overlay" id="photoViewer" onclick="closePhoto()">
        <div class="pv-container" onclick="event.stopPropagation()">
            <img id="pvImage" src="">
            <button class="pv-close" onclick="closePhoto()"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="modalTitleText">Tambah Anggota</div>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <input type="hidden" id="formId">
            
            <div class="upload-area">
                <i class="fas fa-camera" style="font-size:24px; color:var(--electric-blue); margin-bottom:5px; display:block;"></i>
                <div style="font-size:11px; font-weight:700; color:var(--text-muted);">Tap untuk Upload Foto Wajah (Opsional)</div>
                <input type="file" id="formFoto" accept="image/*">
                <img id="previewFoto" class="preview-img">
            </div>

            <div class="form-group"><label>Nama Asli (Sesuai KTP)</label><input type="text" id="formNamaKtp" class="form-input" style="text-transform:uppercase;" placeholder="Contoh: MUHAMMAD RIZKY"></div>
            <div class="form-group"><label>Nama Panggilan (Grup WA)</label><input type="text" id="formNamaWa" class="form-input" style="text-transform:uppercase;" placeholder="Contoh: RIZKY / RIZKYPoly"></div>
            
            <div class="form-group"><label>Plat Nomor</label><input type="text" id="formPlat" class="form-input" style="text-transform:uppercase;" placeholder="B 1234 XYZ"></div>
            <div class="form-group"><label>Nomor HP (WhatsApp)</label><input type="tel" id="formHp" class="form-input" placeholder="08..."></div>
            
            <div class="form-group">
                <label>Jabatan</label>
                <select id="formRole" class="form-input">
                    <option value="KELUARGA MLU">Keluarga MLU (Member Biasa)</option>
                    <option value="KORLAP">Korlap</option>
                    <option value="HUMAS">Humas</option>
                    <option value="SATGAS">Satgas</option>
                    <option value="SEKRETARIS">Sekretaris</option>
                    <option value="WAKIL KETUA">Wakil Ketua</option>
                    <option value="KETUA UMUM">Ketua Umum</option>
                    <option value="PEMBINA">Pembina</option>
                    <option value="PENASEHAT">Penasehat</option>
                    <option value="TIM SENYAP">Tim Senyap</option>
                </select>
            </div>

            <div class="form-group">
                <label>Divisi Kendaraan</label>
                <select id="formType" class="form-input">
                    <option value="RTO">RTO MAKA</option>
                    <option value="TRANSGO">TRANSGO </option>
                </select>
            </div>

            <div class="form-group">
                <label>PIN Login (4 Angka)</label>
                <input type="text" id="formPin" class="form-input" placeholder="Bisa dikosongkan agar user buat baru" maxlength="4" inputmode="numeric">
            </div>
            
            <button class="btn-save" id="btnSave" onclick="saveData()">SIMPAN DATA</button>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" style="font-size:16px;">Riwayat Tabungan</div>
                <button class="btn-close" onclick="document.getElementById('historyModal').style.display='none'"><i class="fas fa-times"></i></button>
            </div>
            <div id="historyTargetName" style="font-size:12px; font-weight:700; color:#64748B; margin-top:-15px; margin-bottom:15px; text-transform:uppercase;"></div>
            <div id="historyContent" class="hist-list">
                <div style="text-align:center; font-size:12px; color:#aaa; padding:20px;">Memuat...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc, query, orderBy, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // CEK USER
        const u = JSON.parse(localStorage.getItem('maka_user')) || {};
        const platKu = (u.plat || "").replace(/\s+/g, '').toUpperCase();
        let dewaMode = localStorage.getItem('maka_dewa_mode') || 'ON';
        const isUserDewa = (platKu === 'B4248SWF');
        const isAdmin = u.isSuperAdmin || (isUserDewa && dewaMode === 'ON') || (u.role && u.role !== 'KELUARGA MLU' && u.role !== 'GUEST');

        // Render Tombol Dewa
        if (isUserDewa) {
            const header = document.getElementById('mainHeader');
            const btnSaklar = document.createElement('button');
            btnSaklar.innerHTML = dewaMode === 'ON' ? '<i class="fas fa-crown"></i> MODE DEWA: ON' : '<i class="fas fa-user-shield"></i> MODE DEWA: OFF';
            btnSaklar.style.cssText = `margin-top: 15px; background: ${dewaMode === 'ON' ? 'var(--gold)' : 'rgba(255,255,255,0.2)'}; color: ${dewaMode === 'ON' ? '#000' : '#FFF'}; border: 1px solid ${dewaMode === 'ON' ? 'var(--gold)' : 'rgba(255,255,255,0.4)'}; padding: 8px 15px; border-radius: 20px; font-family: 'Space Grotesk'; font-size: 11px; font-weight: 900; cursor: pointer; box-shadow: ${dewaMode === 'ON' ? '0 0 15px rgba(212,175,55,0.6)' : 'none'}; transition: 0.2s;`;
            btnSaklar.onclick = () => { localStorage.setItem('maka_dewa_mode', dewaMode === 'ON' ? 'OFF' : 'ON'); location.reload(); };
            header.appendChild(btnSaklar);
        }

        if (isAdmin) {
            document.getElementById('btnAdd').style.display = 'flex';
            const style = document.createElement('style');
            style.innerHTML = '.btn-del, .btn-edit { display: flex !important; }';
            document.head.appendChild(style);
        }

        let membersData = [];
        let currentPhotoBase64 = "";

        // MESIN KOMPRESOR
        document.getElementById('formFoto').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    let w = img.width; let h = img.height;
                    if (w > h) { if (w > 600) { h *= 600/w; w = 600; } } else { if (h > 600) { w *= 600/h; h = 600; } }
                    canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.85);
                    document.getElementById('previewFoto').src = currentPhotoBase64;
                    document.getElementById('previewFoto').style.display = 'block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        onSnapshot(query(collection(db, "mlu_members"), orderBy("namaKtp", "asc")), (snap) => {
            membersData = [];
            snap.forEach(doc => { membersData.push({ id: doc.id, ...doc.data() }); });
            renderList(membersData);
        });

        function renderList(data) {
            const list = document.getElementById('memberList'); list.innerHTML = '';
            
            data.sort((a, b) => {
                let aIsP = (a.role && a.role !== 'KELUARGA MLU'); let bIsP = (b.role && b.role !== 'KELUARGA MLU');
                if (aIsP && !bIsP) return -1; if (!aIsP && bIsP) return 1; return 0;
            });

            data.forEach(m => {
                const isPengurus = m.role && m.role !== 'KELUARGA MLU';
                const cardClass = isPengurus ? 'member-card is-pengurus' : 'member-card';
                const nameKtp = m.namaKtp || m.nama || "-";
                const nameWa = m.namaWa || "-";
                const photoSrc = m.foto && m.foto.length > 50 ? m.foto : `https://ui-avatars.com/api/?background=${isPengurus ? 'D4AF37' : '2D63ED'}&color=${isPengurus ? '000' : 'fff'}&bold=true&name=${encodeURIComponent(nameKtp)}`;
                let waLink = m.hp && m.hp !== "-" ? `https://wa.me/62${m.hp.replace(/^0+/, '')}` : '#';
                
                // FORMAT SALDO
                const saldo = m.saldoTabungan ? parseInt(m.saldoTabungan).toLocaleString('id-ID') : "0";

                list.innerHTML += `
                    <div class="${cardClass}">
                        <img src="${photoSrc}" class="m-photo" onclick="viewPhoto('${photoSrc}')" title="Ketuk untuk melihat foto">
                        <div class="m-info">
                            <div class="m-name">${nameKtp}</div>
                            <div class="m-wa-name"><i class="fas fa-comment-dots"></i> WA: ${nameWa}</div>
                            <div class="m-plat">${m.plat} • ${m.type || m.divisi || 'RTO'}</div>
                            
                            <div class="m-saldo" onclick="checkSavings('${m.id}', '${nameKtp}')">
                                <i class="fas fa-wallet"></i> Rp ${saldo}
                            </div>

                            <div class="m-role">${m.role}</div>
                        </div>
                        <div class="m-actions">
                            <a href="${waLink}" class="btn-act btn-call" target="_blank"><i class="fab fa-whatsapp"></i></a>
                            <button class="btn-act btn-edit" onclick="openEditModal('${m.id}')"><i class="fas fa-pen"></i></button>
                            <button class="btn-act btn-del" onclick="deleteData('${m.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        window.filterList = () => {
            const txt = document.getElementById('searchInput').value.toLowerCase();
            const filtered = membersData.filter(m => (m.namaKtp && m.namaKtp.toLowerCase().includes(txt)) || (m.namaWa && m.namaWa.toLowerCase().includes(txt)) || (m.plat && m.plat.toLowerCase().includes(txt)));
            renderList(filtered);
        };

        // --- CEK HISTORY TABUNGAN ---
        window.checkSavings = async (id, name) => {
            // PROTEKSI: Cuma boleh liat punya sendiri atau Admin
            if(u.id !== id && !isAdmin) {
                alert("🔒 Maaf, detail tabungan bersifat pribadi. Anda hanya bisa melihat milik sendiri.");
                return;
            }

            document.getElementById('historyTargetName').innerText = name;
            document.getElementById('historyContent').innerHTML = `<div style="text-align:center; padding:20px; color:#94A3B8;">Memuat data...</div>`;
            document.getElementById('historyModal').style.display = 'flex';

            const q = query(collection(db, "mlu_tabungan_trx"), where("memberId", "==", id), orderBy("timestamp", "desc"));
            const snap = await getDocs(q);
            
            const cont = document.getElementById('historyContent');
            cont.innerHTML = "";
            
            if(snap.empty) {
                cont.innerHTML = `<div style="text-align:center; padding:20px; color:#cbd5e1; font-size:12px;">Belum ada riwayat transaksi.</div>`;
                return;
            }

            snap.forEach(d => {
                const data = d.data();
                const isIn = data.type === 'IN';
                const cls = isIn ? 'val-in' : 'val-out';
                const sign = isIn ? '+' : '-';
                const date = new Date(data.timestamp).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'});
                
                cont.innerHTML += `
                <div class="hist-item">
                    <div class="hist-left">
                        <div class="hist-desc">${data.desc || (isIn ? 'Setoran' : 'Penarikan')}</div>
                        <div class="hist-date">${date}</div>
                    </div>
                    <div class="hist-val ${cls}">${sign} Rp ${data.amount.toLocaleString('id-ID')}</div>
                </div>`;
            });
        }

        window.viewPhoto = (src) => { document.getElementById('pvImage').src = src; document.getElementById('photoViewer').style.display = 'flex'; };
        window.closePhoto = () => { document.getElementById('photoViewer').style.display = 'none'; };

        window.openModal = () => { 
            document.getElementById('formId').value = ''; document.getElementById('formNamaKtp').value = ''; document.getElementById('formNamaWa').value = ''; 
            document.getElementById('formPlat').value = ''; document.getElementById('formHp').value = ''; document.getElementById('formRole').value = 'KELUARGA MLU';
            document.getElementById('formType').value = 'RTO'; document.getElementById('formPin').value = ''; 
            currentPhotoBase64 = ""; document.getElementById('previewFoto').style.display = 'none'; document.getElementById('formFoto').value = '';
            document.getElementById('modalTitleText').innerText = "Tambah Anggota"; document.getElementById('formModal').style.display = 'flex'; 
        };

        window.openEditModal = (id) => {
            const m = membersData.find(x => x.id === id); if(!m) return;
            document.getElementById('formId').value = id; document.getElementById('formNamaKtp').value = m.namaKtp || m.nama || ''; 
            document.getElementById('formNamaWa').value = m.namaWa || m.nama || ''; document.getElementById('formPlat').value = m.plat || ''; 
            document.getElementById('formHp').value = m.hp || ''; document.getElementById('formRole').value = m.role || 'KELUARGA MLU';
            document.getElementById('formType').value = m.type || m.divisi || 'RTO'; document.getElementById('formPin').value = m.pin || ''; 
            document.getElementById('modalTitleText').innerText = "Edit Anggota";
            if(m.foto && m.foto.length > 50) { currentPhotoBase64 = m.foto; document.getElementById('previewFoto').src = m.foto; document.getElementById('previewFoto').style.display = 'block'; } 
            else { currentPhotoBase64 = ""; document.getElementById('previewFoto').style.display = 'none'; }
            document.getElementById('formModal').style.display = 'flex'; 
        }

        window.closeModal = () => { document.getElementById('formModal').style.display = 'none'; };

        window.saveData = async () => {
            const id = document.getElementById('formId').value;
            const namaKtp = document.getElementById('formNamaKtp').value.trim().toUpperCase();
            const namaWa = document.getElementById('formNamaWa').value.trim().toUpperCase();
            const plat = document.getElementById('formPlat').value.trim().toUpperCase();
            const hp = document.getElementById('formHp').value.trim();
            const role = document.getElementById('formRole').value;
            const type = document.getElementById('formType').value;
            const pin = document.getElementById('formPin').value.trim(); 

            if(!namaKtp || !namaWa || !plat) return alert("Nama KTP, Nama WA, dan Plat wajib diisi!");

            const btn = document.getElementById('btnSave'); btn.innerText = "MENYIMPAN..."; btn.style.opacity = '0.7';

            try {
                let payload = { namaKtp: namaKtp, namaWa: namaWa, nama: namaWa, plat: plat, hp: hp, role: role, type: type };
                if (pin !== undefined) payload.pin = pin;
                if(currentPhotoBase64 !== "") payload.foto = currentPhotoBase64;

                if (id) await updateDoc(doc(db, "mlu_members", id), payload);
                else await addDoc(collection(db, "mlu_members"), payload);
                closeModal();
            } catch (e) { alert("Gagal menyimpan: " + e.message); } 
            finally { btn.innerText = "SIMPAN DATA"; btn.style.opacity = '1'; }
        };

        window.deleteData = async (id) => { if(confirm("Hapus anggota ini permanen?")) { await deleteDoc(doc(db, "mlu_members", id)); } };
    </script>
</body>
</html>
