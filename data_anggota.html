<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Directory</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA ULTRA LUXURY (WHITE & ROYAL BLUE) === */
        :root { 
            --royal-blue: #0A2259; 
            --electric-blue: #2D63ED; 
            --gold-lux: #D4AF37;
            --bg-surface: #F0F4F8; 
            --text-main: #0F172A; 
            --text-muted: #64748B; 
            --danger: #EF4444;
            
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 10px 40px rgba(10, 34, 89, 0.08);
        }
        
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 120px; overflow-x: hidden; position: relative; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; text-decoration: none; }

        .ambient-light { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.5; animation: floatLight 10s infinite alternate; }
        .light-1 { top: -20%; left: -20%; width: 500px; height: 500px; background: #bfdbfe; }
        .light-2 { top: 40%; right: -30%; width: 400px; height: 400px; background: rgba(212, 175, 55, 0.15); animation-delay: 2s; }
        .bg-watermark { position: fixed; top: 15%; right: -15%; width: 100%; height: 80%; background-image: url('logomlu.png'); background-repeat: no-repeat; background-size: contain; background-position: center; opacity: 0.04; transform: rotate(-15deg); z-index: -2; pointer-events: none; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(20px, 40px);} }

        .header-main { padding: 40px 20px 20px; position: relative; z-index: 10; text-align: center; }
        .sub-tag { font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--electric-blue); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .main-title { font-family: 'Outfit'; font-size: 32px; font-weight: 900; color: var(--royal-blue); margin: 0; letter-spacing: -1px; text-shadow: 0 10px 30px rgba(10,34,89,0.1); }

        .search-container { padding: 0 20px 20px; position: sticky; top: 0; z-index: 99; margin-top: 10px; }
        .search-box { 
            background: rgba(255,255,255,0.8); backdrop-filter: blur(20px);
            border-radius: 20px; padding: 5px 20px; display: flex; align-items: center; 
            box-shadow: 0 10px 30px rgba(10, 34, 89, 0.08); border: 1px solid white;
            transition: 0.3s;
        }
        .search-box:focus-within { transform: scale(1.02); box-shadow: 0 15px 40px rgba(45,99,237,0.15); border-color: var(--electric-blue); }
        .search-box i { color: var(--electric-blue); font-size: 18px; margin-right: 12px; }
        .search-box input { flex: 1; border: none; padding: 16px 0; font-family: 'Inter'; font-size: 14px; font-weight: 600; background: transparent; color: var(--text-main); outline: none; }

        .list-container { padding: 0 20px 30px; display: flex; flex-direction: column; gap: 15px; }
        
        .member-card { 
            background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px; padding: 18px; display: flex; align-items: center; gap: 15px; 
            box-shadow: 0 5px 20px rgba(10, 34, 89, 0.03); transition: 0.3s;
            animation: slideUp 0.5s ease-out backwards;
        }
        .member-card.is-pengurus { 
            background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(254, 243, 199, 0.4) 100%); 
            border-color: rgba(212, 175, 55, 0.3);
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .m-photo { width: 60px; height: 60px; border-radius: 18px; object-fit: cover; background: white; border: 2px solid white; flex-shrink: 0; cursor: zoom-in; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .is-pengurus .m-photo { border-color: #FCD34D; box-shadow: 0 8px 20px rgba(212, 175, 55, 0.15); }

        .m-info { flex: 1; min-width: 0; }
        .m-name { font-family: 'Outfit'; font-size: 16px; font-weight: 800; color: var(--royal-blue); text-transform: uppercase; margin-bottom: 2px; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .m-wa-name { font-size: 10px; font-weight: 700; color: var(--text-muted); display: inline-flex; align-items: center; gap: 4px; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px;}
        
        .m-badges { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 6px; }
        .badge { font-size: 9px; font-weight: 800; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid transparent; }
        .bg-plat { background: #eff6ff; color: var(--electric-blue); border-color: #dbeafe; }
        .bg-role { background: #f8fafc; color: var(--text-muted); border-color: #e2e8f0; }
        .is-pengurus .bg-role { background: #fffbeb; color: #b45309; border-color: #fcd34d; }

        /* KONTAK DARURAT BADGE */
        .m-darurat { margin-top: 8px; display: inline-block; }
        .btn-darurat-call {
            display: inline-flex; align-items: center; gap: 5px; 
            background: rgba(239, 68, 68, 0.1); color: var(--danger); 
            padding: 4px 10px; border-radius: 8px; font-size: 9px; font-weight: 800; 
            text-decoration: none; border: 1px solid rgba(239, 68, 68, 0.2);
            transition: 0.2s;
        }
        .btn-darurat-call:active { transform: scale(0.95); background: var(--danger); color: white; }
        
        /* STATE BELUM ISI DARURAT */
        .btn-darurat-empty {
            display: inline-flex; align-items: center; gap: 5px; 
            background: #F1F5F9; color: #94A3B8; 
            padding: 4px 10px; border-radius: 8px; font-size: 9px; font-weight: 800; 
            border: 1px dashed #CBD5E1; text-decoration: none; pointer-events: none;
        }

        .m-saldo { 
            font-size: 11px; font-weight: 800; color: #10B981; 
            display: inline-flex; align-items: center; gap: 6px; 
            cursor: pointer; padding: 5px 10px; background: rgba(16, 185, 129, 0.1); 
            border-radius: 10px; transition: 0.2s; border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .m-saldo:active { transform: scale(0.95); background: rgba(16, 185, 129, 0.2); }

        .m-actions { display: flex; flex-direction: column; gap: 8px; }
        .btn-act { width: 40px; height: 40px; border-radius: 14px; border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .btn-call { background: white; color: #10B981; border: 1px solid #e2e8f0; }
        .btn-call:active { background: #10B981; color: white; border-color: #10B981; }
        .btn-edit { background: white; color: var(--electric-blue); border: 1px solid #e2e8f0; display: none; }
        .btn-del { background: white; color: var(--danger); border: 1px solid #e2e8f0; display: none; }

        .fab-add { position: fixed; bottom: 30px; right: 25px; width: 55px; height: 55px; background: linear-gradient(135deg, var(--electric-blue) 0%, var(--royal-blue) 100%); color: white; border-radius: 20px; display: none; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 10px 30px rgba(45,99,237,0.4); border: 2px solid white; cursor: pointer; z-index: 1000; transition: 0.2s;}
        .fab-add:active { transform: scale(0.9); }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 9999; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.show { opacity: 1; }
        .modal-box { 
            background: rgba(255,255,255,0.95); width: 90%; max-width: 450px; 
            border-radius: 25px; padding: 25px; transform: scale(0.9); transition: 0.3s; 
            box-shadow: 0 30px 80px rgba(0,0,0,0.2); border: 1px solid white;
            max-height: 85vh; overflow-y: auto;
        }
        .modal-overlay.show .modal-box { transform: scale(1); }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-family: 'Outfit'; font-size: 20px; font-weight: 900; color: var(--royal-blue); }
        .btn-close { background: #F1F5F9; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 14px; cursor: pointer; color: var(--text-muted); transition: 0.2s;}
        
        .form-group { margin-bottom: 15px; }
        .form-group label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; display: block; letter-spacing: 0.5px;}
        .form-input { width: 100%; padding: 14px; border-radius: 14px; border: 1px solid #E2E8F0; background: #F8FAFC; font-family: 'Inter'; font-weight: 600; font-size: 14px; outline: none; transition: 0.2s;}
        .form-input:focus { border-color: var(--electric-blue); background: white; box-shadow: 0 0 0 3px rgba(45,99,237,0.1); }

        .upload-area { border: 2px dashed #93C5FD; border-radius: 18px; padding: 20px; text-align: center; background: #F0F9FF; cursor: pointer; position: relative; margin-bottom: 20px; transition: 0.2s;}
        .upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
        .preview-img { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; display: none; margin: 10px auto 0; border: 2px solid var(--electric-blue); box-shadow: 0 5px 15px rgba(45,99,237,0.2); }

        .btn-save { width: 100%; padding: 16px; border: none; border-radius: 16px; background: var(--electric-blue); color: white; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 800; margin-top: 10px; cursor: pointer; box-shadow: 0 10px 25px rgba(45,99,237,0.25); letter-spacing: 1px; transition: 0.2s;}
        .btn-save:active { transform: scale(0.98); }

        /* LIGHTBOX */
        .photo-viewer-overlay { position: fixed; inset: 0; background: rgba(5,10,21,0.9); z-index: 99999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); padding: 20px;}
        .pv-container { position: relative; max-width: 400px; width: 100%; text-align: center; }
        .pv-container img { width: 100%; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); object-fit: cover; max-height: 70vh; border: 2px solid rgba(255,255,255,0.2); }
        .pv-close { position: absolute; top: -15px; right: -15px; width: 40px; height: 40px; border-radius: 50%; background: var(--danger); color: white; border: 2px solid white; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4); transition: 0.2s; }

        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; text-align: center;}
        .btn-premium-back { background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border: 1px solid white; padding: 14px 25px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 12px; color: var(--royal-blue); text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 30px rgba(10,34,89,0.15); transition: 0.2s;}
        .btn-premium-back:active { transform: scale(0.95); }

        .hist-list { margin-top: 15px; max-height: 400px; overflow-y: auto; }
        .hist-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px dashed #E2E8F0; }
        .hist-item:last-child { border-bottom: none; }
        .hist-desc { font-size: 12px; font-weight: 700; color: var(--text-main); }
        .hist-date { font-size: 10px; color: var(--text-muted); }
        .hist-val { font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; }
        .val-in { color: #10B981; } .val-out { color: var(--danger); }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="bg-watermark"></div>

    <header class="header-main" id="mainHeader">
        <span class="sub-tag">DATABASE KOMUNITAS</span>
        <h1 class="main-title">DATA ANGGOTA</h1>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari nama, plat, atau jabatan..." onkeyup="filterList()">
        </div>
    </div>

    <main class="list-container" id="memberList">
        <div style="text-align:center; padding:50px; color:#94A3B8;"><i class="fas fa-spinner fa-spin"></i> Memuat data...</div>
    </main>

    <button class="fab-add" id="btnAdd" onclick="openModal()"><i class="fas fa-plus"></i></button>
    
    <div class="back-nav">
        <a href="dashboard.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a>
    </div>

    <div class="photo-viewer-overlay" id="photoViewer" onclick="closePhoto()">
        <div class="pv-container" onclick="event.stopPropagation()">
            <img id="pvImage" src="">
            <button class="pv-close" onclick="closePhoto()"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div class="modal-overlay" id="formModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="modalTitleText">Tambah Anggota</div>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <input type="hidden" id="formId">
            
            <div class="upload-area">
                <i class="fas fa-camera" style="font-size:24px; color:var(--electric-blue); margin-bottom:5px; display:block;"></i>
                <div style="font-size:11px; font-weight:700; color:var(--text-muted);">Tap untuk Upload Foto Wajah</div>
                <input type="file" id="formFoto" accept="image/*">
                <img id="previewFoto" class="preview-img">
            </div>

            <div class="form-group"><label>Nama Asli (Sesuai KTP)</label><input type="text" id="formNamaKtp" class="form-input" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Nama Panggilan (Grup WA)</label><input type="text" id="formNamaWa" class="form-input" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Plat Nomor</label><input type="text" id="formPlat" class="form-input" style="text-transform:uppercase;"></div>
            <div class="form-group"><label>Nomor HP Pribadi</label><input type="tel" id="formHp" class="form-input" placeholder="081234..."></div>
            
            <div style="background: rgba(239, 68, 68, 0.05); border: 1px dashed var(--danger); padding: 15px; border-radius: 14px; margin-bottom: 15px;">
                <div style="font-size: 10px; font-weight: 800; color: var(--danger); margin-bottom: 10px; display: flex; align-items: center; gap: 5px;"><i class="fas fa-heartbeat"></i> KONTAK DARURAT (WAJIB)</div>
                <div class="form-group" style="margin-bottom:10px;">
                    <label style="color:#64748B;">No. HP Darurat</label>
                    <input type="tel" id="formDarurat" class="form-input" style="background: white;" placeholder="085678...">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label style="color:#64748B;">Hubungan Kontak Darurat</label>
                    <select id="formHubungan" class="form-input" style="background: white; appearance:none; -webkit-appearance:none;">
                        <option value="">-- Pilih Hubungan --</option>
                        <option value="ISTRI">Istri</option>
                        <option value="SUAMI">Suami</option>
                        <option value="ORANG TUA">Orang Tua</option>
                        <option value="ANAK">Anak</option>
                        <option value="SAUDARA">Saudara / Kakak / Adik</option>
                        <option value="LAINNYA">Lainnya</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Jabatan</label>
                <select id="formRole" class="form-input" style="appearance:none; -webkit-appearance:none;">
                    <option value="KELUARGA MLU">Keluarga MLU (Member)</option>
                    <option value="KORLAP">Korlap</option>
                    <option value="HUMAS">Humas</option>
                    <option value="SATGAS">Satgas</option>
                    <option value="SEKRETARIS">Sekretaris</option>
                    <option value="WAKIL KETUA">Wakil Ketua</option>
                    <option value="KETUA UMUM">Ketua Umum</option>
                    <option value="PEMBINA">Pembina</option>
                    <option value="PENASEHAT">Penasehat</option>
                    <option value="TIM SENYAP">Tim Senyap</option>
                </select>
            </div>

            <div class="form-group">
                <label>Divisi</label>
                <select id="formType" class="form-input" style="appearance:none; -webkit-appearance:none;">
                    <option value="RTO">RTO MAKA</option>
                    <option value="TRANSGO">TRANSGO</option>
                </select>
            </div>

            <div class="form-group"><label>PIN Login (4 Angka)</label><input type="text" id="formPin" class="form-input" maxlength="4" inputmode="numeric"></div>
            
            <button class="btn-save" id="btnSave" onclick="saveData()">SIMPAN DATA</button>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">Riwayat Tabungan</div>
                <button class="btn-close" onclick="document.getElementById('historyModal').classList.remove('show'); setTimeout(()=>document.getElementById('historyModal').style.display='none',300);"><i class="fas fa-times"></i></button>
            </div>
            <div id="historyTargetName" style="font-size:12px; font-weight:800; color:#64748B; margin-top:-15px; margin-bottom:15px; text-transform:uppercase; border-bottom:1px solid #eee; padding-bottom:10px;"></div>
            <div id="historyContent" class="hist-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc, query, orderBy, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // HAK AKSES ADMIN & SENSOR DATA
        const u = JSON.parse(localStorage.getItem('maka_user')) || {};
        const platKu = (u.plat || "").replace(/\s+/g, '').toUpperCase();
        let dewaMode = localStorage.getItem('maka_dewa_mode') || 'ON';
        const isUserDewa = (platKu === 'B4248SWF'); // HANYA PLAT SUPER ADMIN
        
        const myRoleUpper = (u.role || "").toUpperCase();
        const isKetum = myRoleUpper.includes("KETUM") || myRoleUpper === "KETUA UMUM" || myRoleUpper === "KETUA";
        const isWaketum = myRoleUpper.includes("WAKETUM") || myRoleUpper.includes("WAKIL");
        
        // Pengecekan Atasan: Yang boleh lihat nomor darurat secara Full
        const isAtasan = isKetum || isWaketum || (isUserDewa && dewaMode === 'ON');
        
        // Pengecekan Admin Umum (Bisa Edit/Hapus User)
        const isAdmin = u.isSuperAdmin || (isUserDewa && dewaMode === 'ON') || (u.role && u.role !== 'KELUARGA MLU' && u.role !== 'GUEST');

        // Render Tombol Saklar Khusus Bapak
        if (isUserDewa) {
            const header = document.getElementById('mainHeader');
            const btnSaklar = document.createElement('button');
            btnSaklar.innerHTML = dewaMode === 'ON' ? '<i class="fas fa-crown"></i> ADMIN: ON' : '<i class="fas fa-user-shield"></i> ADMIN: OFF';
            btnSaklar.style.cssText = `margin-top:10px; background:${dewaMode==='ON'?'#D4AF37':'rgba(255,255,255,0.2)'}; color:${dewaMode==='ON'?'#000':'#FFF'}; border:1px solid ${dewaMode==='ON'?'#D4AF37':'rgba(255,255,255,0.4)'}; padding:6px 12px; border-radius:20px; font-family:'Space Grotesk'; font-size:10px; font-weight:800; cursor:pointer; box-shadow:${dewaMode==='ON'?'0 0 15px rgba(212,175,55,0.6)':'none'}; transition:0.2s;`;
            btnSaklar.onclick = () => { localStorage.setItem('maka_dewa_mode', dewaMode === 'ON' ? 'OFF' : 'ON'); location.reload(); };
            header.appendChild(btnSaklar);
        }

        if (isAdmin) {
            document.getElementById('btnAdd').style.display = 'flex';
            const style = document.createElement('style'); style.innerHTML = '.btn-del, .btn-edit { display: flex !important; }'; document.head.appendChild(style);
        }

        let membersData = [];
        let currentPhotoBase64 = "";

        // KOMPRESOR FOTO
        document.getElementById('formFoto').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    let w = img.width; let h = img.height;
                    if (w > h) { if (w > 600) { h *= 600/w; w = 600; } } else { if (h > 600) { w *= 600/h; h = 600; } }
                    canvas.width = w; canvas.height = h; ctx.drawImage(img, 0, 0, w, h);
                    currentPhotoBase64 = canvas.toDataURL('image/jpeg', 0.85);
                    document.getElementById('previewFoto').src = currentPhotoBase64;
                    document.getElementById('previewFoto').style.display = 'block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // LOAD DATA
        onSnapshot(query(collection(db, "mlu_members"), orderBy("namaKtp", "asc")), (snap) => {
            membersData = [];
            snap.forEach(doc => { 
                const data = doc.data();
                const platClean = (data.plat || "").replace(/\s+/g, '').toUpperCase();
                
                // MODE SILUMAN: Hide B4248SWF dari semua orang
                if (platClean === "B4248SWF" || doc.id === "ghost_admin") {
                    // Hanya muncul kalau Bapak sendiri yang buka dan Dewa Mode lagi ON
                    if (isUserDewa && dewaMode === 'ON') {
                        membersData.push({ id: doc.id, ...data });
                    }
                } else {
                    membersData.push({ id: doc.id, ...data }); 
                }
            });
            renderList(membersData);
        });

        function renderList(data) {
            const list = document.getElementById('memberList'); list.innerHTML = '';
            
            // Urutkan: Pengurus di atas
            data.sort((a, b) => {
                let aIsP = (a.role && a.role !== 'KELUARGA MLU'); let bIsP = (b.role && b.role !== 'KELUARGA MLU');
                if (aIsP && !bIsP) return -1; if (!aIsP && bIsP) return 1; return 0;
            });

            data.forEach((m, index) => {
                const isPengurus = m.role && m.role !== 'KELUARGA MLU';
                const cardClass = isPengurus ? 'member-card is-pengurus' : 'member-card';
                const nameKtp = m.namaKtp || m.nama || "-";
                const nameWa = m.namaWa || "-";
                const photoSrc = m.foto && m.foto.length > 50 ? m.foto : `https://ui-avatars.com/api/?background=${isPengurus ? 'D4AF37' : '2D63ED'}&color=${isPengurus ? '000' : 'fff'}&bold=true&name=${encodeURIComponent(nameKtp)}`;
                let waLink = m.hp && m.hp !== "-" ? `https://wa.me/62${m.hp.replace(/^0+/, '')}` : '#';
                const saldo = m.saldoTabungan ? parseInt(m.saldoTabungan).toLocaleString('id-ID') : "0";

                const isMe = (m.id === u.id); 
                
                // LOGIKA PRIVASI TABUNGAN
                let saldoHtml = '';
                if (isMe || isAtasan) {
                    saldoHtml = `
                    <div class="m-saldo" onclick="checkSavings('${m.id}', '${nameKtp}')">
                        <i class="fas fa-wallet"></i> Rp ${saldo}
                    </div>`;
                }

                // LOGIKA SENSOR KONTAK DARURAT
                let daruratHtml = '';
                if (m.darurat && m.darurat !== "-" && m.darurat !== "") {
                    let displayDarurat = m.darurat;
                    let linkDarurat = `tel:${m.darurat}`;
                    
                    // Samarkan nomor jika bukan atasan DAN bukan dirinya sendiri
                    if (!isAtasan && !isMe) {
                        displayDarurat = m.darurat.substring(0, 4) + 'x'.repeat(Math.max(0, m.darurat.length - 4));
                        linkDarurat = '#'; 
                    }

                    daruratHtml = `<div class="m-darurat"><a href="${linkDarurat}" class="btn-darurat-call"><i class="fas fa-heartbeat fa-beat"></i> DARURAT (${m.hubungan || 'KELUARGA'}): ${displayDarurat}</a></div>`;
                } else {
                    // Jika belum mengisi, tampilkan badge abu-abu
                    daruratHtml = `<div class="m-darurat"><span class="btn-darurat-empty"><i class="fas fa-exclamation-circle"></i> BELUM ISI DARURAT</span></div>`;
                }

                const delay = index * 0.05; 

                list.innerHTML += `
                    <div class="${cardClass}" style="animation-delay:${delay}s">
                        <img src="${photoSrc}" class="m-photo" onclick="viewPhoto('${photoSrc}')">
                        <div class="m-info">
                            <div class="m-name">${nameKtp}</div>
                            <div class="m-wa-name">WA: ${nameWa}</div>
                            <div class="m-badges">
                                <span class="badge bg-plat">${m.plat}</span>
                                <span class="badge bg-role">${m.type||'RTO'}</span>
                                ${isPengurus ? `<span class="badge bg-role" style="color:#B45309">${m.role}</span>` : ''}
                            </div>
                            ${saldoHtml}
                            ${daruratHtml}
                        </div>
                        <div class="m-actions">
                            <a href="${waLink}" class="btn-act btn-call" target="_blank"><i class="fab fa-whatsapp"></i></a>
                            <button class="btn-act btn-edit" onclick="openEditModal('${m.id}')"><i class="fas fa-pen"></i></button>
                            <button class="btn-act btn-del" onclick="deleteData('${m.id}')"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        window.filterList = () => {
            const txt = document.getElementById('searchInput').value.toLowerCase();
            const filtered = membersData.filter(m => (m.namaKtp && m.namaKtp.toLowerCase().includes(txt)) || (m.namaWa && m.namaWa.toLowerCase().includes(txt)) || (m.plat && m.plat.toLowerCase().includes(txt)) || (m.role && m.role.toLowerCase().includes(txt)));
            renderList(filtered);
        };

        window.checkSavings = async (id, name) => {
            document.getElementById('historyTargetName').innerText = name;
            document.getElementById('historyContent').innerHTML = `<div style="text-align:center; padding:20px; color:#94A3B8;">Memuat data...</div>`;
            const m = document.getElementById('historyModal'); m.style.display='flex'; setTimeout(()=>m.classList.add('show'),10);

            const q = query(collection(db, "mlu_tabungan_trx"), where("memberId", "==", id));
            const snap = await getDocs(q);
            
            let dataArr = [];
            snap.forEach(d => dataArr.push(d.data()));
            dataArr.sort((a,b) => b.timestamp - a.timestamp); 

            const cont = document.getElementById('historyContent'); cont.innerHTML = "";
            
            if(dataArr.length === 0) {
                cont.innerHTML = `<div style="text-align:center; padding:20px; color:#cbd5e1; font-size:12px;">Belum ada riwayat transaksi.</div>`;
                return;
            }

            dataArr.forEach(data => {
                const isIn = data.type === 'IN';
                const cls = isIn ? 'val-in' : 'val-out';
                const sign = isIn ? '+' : '-';
                const date = new Date(data.timestamp).toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit'});
                
                cont.innerHTML += `
                <div class="hist-item">
                    <div style="flex:1;">
                        <div class="hist-desc">${data.desc || (isIn ? 'Setoran Tabungan' : 'Penarikan')}</div>
                        <div class="hist-date">${date} • oleh ${data.adminName||'Admin'}</div>
                    </div>
                    <div class="hist-val ${cls}">${sign} Rp ${data.amount.toLocaleString('id-ID')}</div>
                </div>`;
            });
        }

        window.viewPhoto = (src) => { document.getElementById('pvImage').src = src; document.getElementById('photoViewer').style.display = 'flex'; };
        window.closePhoto = () => { document.getElementById('photoViewer').style.display = 'none'; };

        // MODAL LOGIC
        const modal = document.getElementById('formModal');
        window.openModal = () => { 
            document.getElementById('formId').value = ''; document.getElementById('formNamaKtp').value = ''; document.getElementById('formNamaWa').value = ''; 
            document.getElementById('formPlat').value = ''; document.getElementById('formHp').value = ''; document.getElementById('formRole').value = 'KELUARGA MLU';
            document.getElementById('formType').value = 'RTO'; document.getElementById('formPin').value = ''; 
            document.getElementById('formDarurat').value = ''; document.getElementById('formHubungan').value = '';
            currentPhotoBase64 = ""; document.getElementById('previewFoto').style.display = 'none'; document.getElementById('formFoto').value = '';
            document.getElementById('modalTitleText').innerText = "Tambah Anggota"; 
            modal.style.display = 'flex'; setTimeout(()=>modal.classList.add('show'),10);
        };

        window.openEditModal = (id) => {
            const m = membersData.find(x => x.id === id); if(!m) return;
            document.getElementById('formId').value = id; document.getElementById('formNamaKtp').value = m.namaKtp || m.nama || ''; 
            document.getElementById('formNamaWa').value = m.namaWa || m.nama || ''; document.getElementById('formPlat').value = m.plat || ''; 
            document.getElementById('formHp').value = m.hp || ''; document.getElementById('formRole').value = m.role || 'KELUARGA MLU';
            document.getElementById('formType').value = m.type || m.divisi || 'RTO'; document.getElementById('formPin').value = m.pin || ''; 
            document.getElementById('formDarurat').value = m.darurat || ''; document.getElementById('formHubungan').value = m.hubungan || '';
            document.getElementById('modalTitleText').innerText = "Edit Anggota";
            if(m.foto && m.foto.length > 50) { currentPhotoBase64 = m.foto; document.getElementById('previewFoto').src = m.foto; document.getElementById('previewFoto').style.display = 'block'; } 
            else { currentPhotoBase64 = ""; document.getElementById('previewFoto').style.display = 'none'; }
            modal.style.display = 'flex'; setTimeout(()=>modal.classList.add('show'),10);
        }

        window.closeModal = () => { modal.classList.remove('show'); setTimeout(()=>modal.style.display = 'none',300); };

        window.saveData = async () => {
            const id = document.getElementById('formId').value;
            const namaKtp = document.getElementById('formNamaKtp').value.trim().toUpperCase();
            const namaWa = document.getElementById('formNamaWa').value.trim().toUpperCase();
            const plat = document.getElementById('formPlat').value.trim().toUpperCase();
            const hp = document.getElementById('formHp').value.trim();
            const role = document.getElementById('formRole').value;
            const type = document.getElementById('formType').value;
            const pin = document.getElementById('formPin').value.trim(); 
            const darurat = document.getElementById('formDarurat').value.trim();
            const hubungan = document.getElementById('formHubungan').value;

            if(!namaKtp || !namaWa || !plat) return alert("Nama KTP, Nama WA, dan Plat wajib diisi!");

            const btn = document.getElementById('btnSave'); btn.innerText = "MENYIMPAN..."; btn.style.opacity = '0.7';

            try {
                let payload = { namaKtp: namaKtp, namaWa: namaWa, nama: namaWa, plat: plat, hp: hp, role: role, type: type, darurat: darurat, hubungan: hubungan };
                if (pin !== undefined && pin !== "") payload.pin = pin;
                if(currentPhotoBase64 !== "") payload.foto = currentPhotoBase64;

                if (id) await updateDoc(doc(db, "mlu_members", id), payload);
                else await addDoc(collection(db, "mlu_members"), payload);
                closeModal();
            } catch (e) { alert("Gagal menyimpan: " + e.message); } 
            finally { btn.innerText = "SIMPAN DATA"; btn.style.opacity = '1'; }
        };

        window.deleteData = async (id) => { if(confirm("Hapus anggota ini permanen?")) { await deleteDoc(doc(db, "mlu_members", id)); } };
    </script>
</body>
</html>
