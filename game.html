<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Game Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        /* === TEMA ULTRA LUXURY GLASS === */
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; 
            --gold-lux: #D4AF37; --bg-surface: #F0F4F8; 
            --text-main: #0F172A; --text-muted: #64748B; 
            
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 15px 40px rgba(10, 34, 89, 0.08);
        }

        body { margin:0; background: var(--bg-surface); font-family:'Inter',sans-serif; color:var(--text-main); overflow-x:hidden; user-select:none; -webkit-tap-highlight-color: transparent; padding-bottom: 100px;}
        * { box-sizing: border-box; outline: none; }

        /* AMBIENT LIGHT & BACKGROUND */
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.5; animation: floatLight 10s infinite alternate; }
        .light-1 { top: -20%; left: -20%; width: 500px; height: 500px; background: #bfdbfe; }
        .light-2 { top: 40%; right: -30%; width: 400px; height: 400px; background: rgba(212, 175, 55, 0.15); animation-delay: 2s; }
        .bg-watermark { position: fixed; top: 15%; right: -15%; width: 100%; height: 80%; background-image: url('logomlu.png'); background-repeat: no-repeat; background-size: contain; background-position: center; opacity: 0.04; transform: rotate(-15deg); z-index: -2; pointer-events: none; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(20px, 40px);} }

        /* HEADER */
        .header-main { padding: 40px 20px 20px; position: relative; z-index: 10; text-align: center; }
        .sub-tag { font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--gold-lux); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .main-title { font-family: 'Outfit'; font-size: 28px; font-weight: 900; color: var(--royal-blue); margin: 0; letter-spacing: -1px; text-shadow: 0 10px 30px rgba(10,34,89,0.1); }

        /* MENU GRID (LUXURY STYLE) */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 600px; margin: 0 auto; position: relative; z-index: 2; }
        .game-card { 
            background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.9);
            border-radius: 24px; padding: 25px 15px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; 
            box-shadow: var(--shadow-soft); cursor: pointer; transition: 0.3s;
        }
        .game-card:active { transform: scale(0.95); background: rgba(255,255,255,0.9); border-color: var(--electric-blue); }
        
        .icon-box { 
            width: 55px; height: 55px; border-radius: 18px; 
            display: flex; align-items: center; justify-content: center; font-size: 24px; 
            margin-bottom: 12px; color: white; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.15), inset 0 2px 0 rgba(255,255,255,0.4);
        }
        .gc-name { font-family: 'Outfit'; font-size: 14px; font-weight: 800; color: var(--royal-blue); margin-bottom: 2px; letter-spacing: 0.5px;}
        .gc-badge { font-size: 9px; font-weight: 800; background: rgba(16, 185, 129, 0.1); color: #10B981; padding: 3px 8px; border-radius: 6px; letter-spacing: 1px; }

        /* Ikon Gradient */
        .ig-gaple { background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); }
        .ig-pool { background: linear-gradient(135deg, #10B981 0%, #059669 100%); }
        .ig-ludo { background: linear-gradient(135deg, #EF4444 0%, #B91C1C 100%); }
        .ig-chess { background: linear-gradient(135deg, #64748B 0%, #334155 100%); }
        .ig-ttt { background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%); }
        .ig-sudoku { background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%); }
        .ig-puzzle { background: linear-gradient(135deg, #EC4899 0%, #BE185D 100%); }

        /* GAME SCREEN */
        .game-wrapper { display: none; flex-direction: column; align-items: center; min-height: 85vh; padding: 20px; width: 100%; max-width:500px; margin:0 auto; animation: slideUp 0.3s ease-out; }
        .game-wrapper.active { display: flex; }
        @keyframes slideUp { from{opacity:0; transform:translateY(20px);} to{opacity:1; transform:translateY(0);} }

        /* GAME UI ELEMENTS */
        .btn-action { 
            background: linear-gradient(135deg, var(--electric-blue), var(--royal-blue)); 
            color: white; border: none; padding: 14px 30px; border-radius: 50px; 
            font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; letter-spacing: 1px;
            margin-top: 20px; cursor: pointer; box-shadow: 0 10px 25px rgba(45,99,237,0.3); width: 100%; max-width: 280px; transition:0.2s;
        }
        .btn-action:active { transform: scale(0.95); }

        .mabar-panel { 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); 
            padding: 20px; border-radius: 20px; width: 100%; text-align: center; margin-bottom: 20px; 
            border: 1px solid white; box-shadow: var(--shadow-soft); display: none; 
        }
        .inp-code { padding: 12px; border-radius: 12px; border: 1px solid #E2E8F0; width: 80%; text-align: center; font-weight: 800; margin: 10px 0; font-family:'Space Grotesk'; font-size:18px; letter-spacing: 2px;}

        /* --- GAPLE --- */
        .gaple-board {
            width: 100%; height: 350px; background: rgba(30, 58, 138, 0.9); border-radius: 20px; 
            border: 4px solid rgba(255,255,255,0.3); position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.5), 0 15px 40px rgba(0,0,0,0.2);
        }
        .gaple-deck { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-top: 20px; width: 100%; }
        .domino-card {
            width: 32px; height: 64px; background: white; border-radius: 6px; border: 1px solid #ccc;
            display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); cursor: pointer;
        }
        .domino-card.horizontal { width: 64px; height: 32px; flex-direction: row; }
        .d-half { width: 100%; height: 50%; display: flex; align-items: center; justify-content: center; position: relative; }
        .domino-card.horizontal .d-half { width: 50%; height: 100%; border-right: 1px solid #ccc; border-bottom: none; }
        .domino-card:not(.horizontal) .d-half:first-child { border-bottom: 1px solid #ccc; }
        .d-val { font-size: 16px; font-weight: 900; color: #DC2626; }
        .domino-chain { display: flex; align-items: center; gap: 2px; overflow-x: auto; padding: 20px; max-width: 100%; }

        /* --- BILYAR --- */
        #poolCanvas { background: #15803D; border: 8px solid #482307; border-radius: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); touch-action: none; }

        /* --- CATUR --- */
        .chess-board { display: grid; grid-template-columns: repeat(8, 1fr); width: 100%; aspect-ratio: 1/1; border: 5px solid #334155; border-radius: 5px; box-shadow: 0 15px 40px rgba(0,0,0,0.2); overflow: hidden; background:white;}
        .c-sq { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 26px; }
        .c-white { background: #F1F5F9; } .c-black { background: #94A3B8; }
        .c-hl { background: rgba(253, 224, 71, 0.6); }
        .piece-w { color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.4); } .piece-b { color: #1e293b; text-shadow: 0 2px 4px rgba(255,255,255,0.4); }

        /* --- LUDO --- */
        .ludo-board { display: grid; grid-template-columns: repeat(15, 1fr); grid-template-rows: repeat(15, 1fr); width: 100%; aspect-ratio: 1/1; background: white; border: 3px solid #1e293b; box-shadow: 0 15px 40px rgba(0,0,0,0.2); border-radius: 10px; overflow: hidden; }
        .l-cell { border: 0.5px solid rgba(0,0,0,0.05); position: relative; display: flex; align-items: center; justify-content: center; }
        .base-r { grid-column: 1/7; grid-row: 1/7; background: #EF4444; border: 2px solid #1e293b; }
        .base-g { grid-column: 10/16; grid-row: 1/7; background: #10B981; border: 2px solid #1e293b; }
        .base-b { grid-column: 1/7; grid-row: 10/16; background: #3B82F6; border: 2px solid #1e293b; }
        .base-y { grid-column: 10/16; grid-row: 10/16; background: #F59E0B; border: 2px solid #1e293b; }
        .center { grid-column: 7/10; grid-row: 7/10; background: conic-gradient(#10B981 90deg, #F59E0B 90deg 180deg, #3B82F6 180deg 270deg, #EF4444 270deg); border: 2px solid #1e293b; }
        .l-token { width: 70%; height: 70%; border-radius: 50%; border: 2px solid white; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); z-index: 10; position: absolute; transition: all 0.3s ease; }
        .tok-r { background: radial-gradient(circle at 30% 30%, #ff8a80, #d32f2f); } .tok-b { background: radial-gradient(circle at 30% 30%, #82b1ff, #1976d2); }
        .dice-box { width: 65px; height: 65px; background: white; border: 2px solid var(--electric-blue); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 32px; margin: 0 auto; cursor: pointer; box-shadow: 0 10px 20px rgba(45,99,237,0.15); }
        .rolling { animation: shake 0.5s infinite; background: #FCD34D; color: white; border-color: #F59E0B; }
        @keyframes shake { 0%{transform:rotate(0)} 25%{transform:rotate(10deg)} 75%{transform:rotate(-10deg)} }

        /* --- TTT & SUDOKU --- */
        .ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 260px; margin: 0 auto;}
        .ttt-cell { aspect-ratio: 1; background: rgba(255,255,255,0.9); display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 900; border-radius: 15px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .sudoku-board { display: grid; grid-template-columns: repeat(9, 1fr); gap: 1px; background: var(--royal-blue); border: 4px solid var(--royal-blue); width: 100%; aspect-ratio: 1; margin-bottom: 20px; border-radius: 8px; overflow: hidden;}
        .s-cell { background: white; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; font-weight: 700;}
        .s-cell.sel { background: var(--electric-blue); color: white; }

        /* BACK NAV */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; text-align: center;}
        .btn-premium-back { background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); border: 1px solid white; padding: 14px 25px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 12px; color: var(--royal-blue); text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 30px rgba(10,34,89,0.15); transition: 0.2s;}
        .btn-premium-back:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="bg-watermark"></div>

    <header class="header-main">
        <span class="sub-tag">PLAY ZONE</span>
        <h1 class="main-title">GAME CENTER</h1>
    </header>

    <div id="mainMenu" class="menu-grid">
        <div class="game-card" onclick="startGame('gaple')">
            <div class="icon-box ig-gaple"><i class="fas fa-bars" style="transform:rotate(90deg)"></i></div>
            <div class="gc-name">GAPLE (DOMINO)</div><div class="gc-badge">NEW</div>
        </div>
        <div class="game-card" onclick="startGame('pool')">
            <div class="icon-box ig-pool"><i class="fas fa-dot-circle"></i></div>
            <div class="gc-name">BILYAR PRO</div>
        </div>
        <div class="game-card" onclick="startGame('ludo', true)">
            <div class="icon-box ig-ludo"><i class="fas fa-dice"></i></div>
            <div class="gc-name">LUDO ONLINE</div>
        </div>
        <div class="game-card" onclick="startGame('chess', true)">
            <div class="icon-box ig-chess"><i class="fas fa-chess"></i></div>
            <div class="gc-name">CATUR</div>
        </div>
        <div class="game-card" onclick="startGame('ttt', true)">
            <div class="icon-box ig-ttt"><i class="fas fa-hashtag"></i></div>
            <div class="gc-name">TIC TAC TOE</div>
        </div>
        <div class="game-card" onclick="startGame('sudoku')">
            <div class="icon-box ig-sudoku"><i class="fas fa-border-all"></i></div>
            <div class="gc-name">SUDOKU</div>
        </div>
        <div class="game-card" onclick="startGame('puzzle')">
            <div class="icon-box ig-puzzle"><i class="fas fa-puzzle-piece"></i></div>
            <div class="gc-name">PUZZLE</div>
        </div>
    </div>

    <div id="game-gaple" class="game-wrapper">
        <div style="text-align:center; color:white; background:var(--royal-blue); padding:12px; border-radius:16px; margin-bottom:15px; width:100%; box-shadow:var(--shadow-soft);">
            <div style="font-size:10px; opacity:0.7; letter-spacing:1px;">GILIRAN</div>
            <div id="gapleTurn" style="font-weight:900; font-size:18px; color:#FCD34D;">ANDA (PLAYER)</div>
        </div>
        <div class="gaple-board" id="gapleTable"><div class="domino-chain" id="dominoChain"></div></div>
        <div class="gaple-deck" id="playerDeck"></div>
        <button class="btn-action" id="btnPass" onclick="gaplePass()" style="background:linear-gradient(135deg,#EF4444,#991B1B); display:none;">LEWAT (PASS)</button>
        <button class="btn-action" onclick="initGaple()">MAIN ULANG</button>
    </div>

    <div id="game-pool" class="game-wrapper">
        <canvas id="poolCanvas" width="320" height="550"></canvas>
        <div style="font-size:11px; text-align:center; margin-top:15px; color:var(--text-muted); font-weight:600;">
            <i class="fas fa-hand-pointer"></i> Tarik layar untuk membidik & tembak!
        </div>
        <button class="btn-action" onclick="initPool()">RESET BOLA</button>
    </div>

    <div id="game-ludo" class="game-wrapper">
        <div id="ludoMabar" class="mabar-panel"></div>
        <div id="ludoGrid" class="ludo-board"></div>
        <div style="display:flex; align-items:center; gap:20px; margin-top:20px; width:100%; padding:0 10px;">
            <div id="lDice" class="dice-box" onclick="rollDice()">🎲</div>
            <div style="flex:1;">
                <div style="font-size:10px; color:var(--text-muted); font-weight:800; letter-spacing:1px;">GILIRAN</div>
                <div id="lTurn" style="font-size:24px; font-weight:900; color:var(--danger);">MERAH</div>
            </div>
        </div>
    </div>

    <div id="game-chess" class="game-wrapper">
        <div id="chessMabar" class="mabar-panel"></div>
        <div id="chessGrid" class="chess-board"></div>
        <div id="cStatus" style="font-weight:800; color:var(--royal-blue); margin-top:15px; text-align:center; font-family:'Space Grotesk'; font-size:18px;">Giliran: Putih</div>
        <button class="btn-action" onclick="initChess()">RESET PAPAN</button>
    </div>

    <div id="game-ttt" class="game-wrapper">
        <div id="tttMabar" class="mabar-panel"></div>
        <h2 id="tStatus" style="text-align:center; color:var(--royal-blue); margin-bottom:20px; font-family:'Outfit';">Giliran: X</h2>
        <div id="tttGrid" class="ttt-grid"></div>
        <button class="btn-action" onclick="initTTT()">RESET</button>
    </div>

    <div id="game-sudoku" class="game-wrapper">
        <div class="sudoku-board" id="sGrid"></div>
        <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:8px; width:100%;">
            <button onclick="fillS(1)" style="padding:15px; border-radius:10px; border:1px solid #ccc; background:white; font-weight:800;">1</button>
            <button onclick="fillS(2)" style="padding:15px; border-radius:10px; border:1px solid #ccc; background:white; font-weight:800;">2</button>
            <button onclick="fillS(3)" style="padding:15px; border-radius:10px; border:1px solid #ccc; background:white; font-weight:800;">3</button>
            <button onclick="fillS(4)" style="padding:15px; border-radius:10px; border:1px solid #ccc; background:white; font-weight:800;">4</button>
            <button onclick="fillS(5)" style="padding:15px; border-radius:10px; border:1px solid #ccc; background:white; font-weight:800;">5</button>
            <button onclick="fillS(6)" style="padding:15px; border-radius:10px; border:1px solid #ccc; background:white; font-weight:800;">6</button>
            <button onclick="fillS(7)" style="padding:15px; border-radius:10px; border:1px solid #ccc; background:white; font-weight:800;">7</button>
            <button onclick="fillS(8)" style="padding:15px; border-radius:10px; border:1px solid #ccc; background:white; font-weight:800;">8</button>
            <button onclick="fillS(9)" style="padding:15px; border-radius:10px; border:1px solid #ccc; background:white; font-weight:800;">9</button>
            <button onclick="fillS(0)" style="padding:15px; border-radius:10px; border:1px solid #ccc; background:#fee2e2; color:red; font-weight:800;">X</button>
        </div>
        <button class="btn-action" onclick="initSudoku()">GAME BARU</button>
    </div>

    <div id="game-puzzle" class="game-wrapper">
        <div id="puzGrid" class="ttt-grid" style="gap:4px;"></div>
        <button class="btn-action" onclick="initPuzzle()">ACAK ULANG</button>
    </div>

    <div class="back-nav"><a href="javascript:void(0)" onclick="backToMenu()" class="btn-premium-back" id="backBtn"><i class="fas fa-home"></i> MENU GAME</a></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", databaseURL: "https://rtomaka-e67b5-default-rtdb.firebaseio.com", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        // GLOBAL VARS
        window.activeRoom = null; window.myRole = null; 
        
        window.startGame = (id, online=false) => {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.game-wrapper').forEach(e=>e.classList.remove('active'));
            document.getElementById('game-'+id).classList.add('active');
            document.getElementById('backBtn').innerHTML = `<i class="fas fa-arrow-left"></i> KEMBALI KE MENU`;
            
            if(online) showMabarUI(id);
            
            if(id==='gaple') initGaple();
            if(id==='pool') initPool();
            if(id==='ludo') initLudo();
            if(id==='chess') initChess();
            if(id==='ttt') initTTT();
            if(id==='sudoku') initSudoku();
            if(id==='puzzle') initPuzzle();
        }

        window.backToMenu = () => {
            const activeGame = document.querySelector('.game-wrapper.active');
            if(activeGame) {
                document.getElementById('mainMenu').style.display = 'grid';
                activeGame.classList.remove('active');
                if(window.poolLoop) cancelAnimationFrame(window.poolLoop);
                window.activeRoom = null;
                document.getElementById('backBtn').innerHTML = `<i class="fas fa-home"></i> MENU UTAMA APLIKASI`;
                document.getElementById('backBtn').onclick = () => window.location.href = 'dashboard.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }
        
        // Fix Back Button Logic Init
        document.getElementById('backBtn').onclick = () => window.location.href = 'dashboard.html';

        // --- MABAR SYSTEM ---
        function showMabarUI(id) {
            const el = document.getElementById(id+'Mabar');
            if(!el) return;
            el.style.display = 'block';
            el.innerHTML = `
                <div style="font-size:12px; color:var(--royal-blue); font-weight:800; letter-spacing:1px; margin-bottom:10px;">ONLINE MULTIPLAYER</div>
                <div style="display:flex; gap:10px;">
                    <button onclick="createRoom('${id}')" style="flex:1; padding:12px; background:white; border:1px solid #ccc; border-radius:12px; font-weight:700; cursor:pointer;">BUAT ROOM</button>
                    <div style="flex:1; display:flex; flex-direction:column; gap:5px;">
                        <input id="${id}Code" class="inp-code" placeholder="KODE" maxlength="5" style="margin:0; width:100%; font-size:14px; padding:10px;">
                        <button onclick="joinRoom('${id}')" style="width:100%; padding:8px; background:var(--electric-blue); color:white; border:none; border-radius:8px; font-weight:700; cursor:pointer;">GABUNG</button>
                    </div>
                </div>
            `;
        }
        window.createRoom = (id) => {
            const code = Math.floor(10000 + Math.random() * 90000); window.activeRoom = code; window.myRole = 'host';
            document.getElementById(id+'Mabar').innerHTML = `<div style="font-size:10px; font-weight:700; color:#64748B;">ROOM CODE:</div><div style="font-size:32px; font-weight:900; color:var(--electric-blue); font-family:'Space Grotesk'; letter-spacing:3px;">${code}</div><div style="font-size:10px; color:#10B981; font-weight:700; margin-top:5px;"><i class="fas fa-spinner fa-spin"></i> MENUNGGU LAWAN...</div>`;
            let data = {};
            if(id==='ludo') data={p1:-1, p2:-1, turn:0, dice:0};
            if(id==='chess') data={fen:'start', turn:'w'};
            if(id==='ttt') data={board:Array(9).fill(''), turn:'X'};
            set(ref(db, 'games/'+code), data); listenRoom(id, code);
        }
        window.joinRoom = (id) => {
            const code = document.getElementById(id+'Code').value; if(!code) return alert("Kode kosong");
            window.activeRoom = code; window.myRole = 'guest';
            document.getElementById(id+'Mabar').innerHTML = `<div style="color:var(--success); font-weight:800; font-size:14px; padding:15px;"><i class="fas fa-check-circle"></i> TERHUBUNG!</div>`;
            listenRoom(id, code);
        }
        function listenRoom(id, code) {
            onValue(ref(db, 'games/'+code), (snap)=>{
                const d = snap.val(); if(!d) return;
                if(id==='ludo') updateLudo(d);
                if(id==='chess') updateChess(d);
                if(id==='ttt') updateTTT(d);
            });
        }

        // =======================
        // GAPLE LOGIC
        // =======================
        let gDeck=[], gP=[], gB1=[], gB2=[], gB3=[], gTable=[];
        let gTurn=0; 

        window.initGaple = () => {
            gDeck=[]; for(let i=0;i<=6;i++){ for(let j=i;j<=6;j++){ gDeck.push([i,j]); } }
            gDeck.sort(()=>Math.random()-0.5);
            gP = gDeck.slice(0,7); gB1 = gDeck.slice(7,14); gB2 = gDeck.slice(14,21); gB3 = gDeck.slice(21,28);
            gTable = []; gTurn = 0; renderGaple();
        }

        function renderGaple() {
            const tableEl = document.getElementById('dominoChain'); tableEl.innerHTML = '';
            if(gTable.length === 0) tableEl.innerHTML = '<div style="color:rgba(255,255,255,0.5); font-size:12px;">Meja Kosong</div>';
            else gTable.forEach(c => {
                let d = document.createElement('div'); d.className = (c[0]===c[1]) ? 'domino-card horizontal' : 'domino-card';
                d.innerHTML = `<div class="d-half"><span class="d-val">${c[0]}</span></div><div class="d-half"><span class="d-val">${c[1]}</span></div>`;
                tableEl.appendChild(d);
            });

            const handEl = document.getElementById('playerDeck'); handEl.innerHTML = '';
            let canMove = false;
            gP.forEach((c, idx) => {
                let d = document.createElement('div'); d.className = 'domino-card';
                d.innerHTML = `<div class="d-half"><span class="d-val">${c[0]}</span></div><div class="d-half"><span class="d-val">${c[1]}</span></div>`;
                let isValid = false;
                if(gTable.length === 0) isValid = true;
                else {
                    let left = gTable[0][0]; let right = gTable[gTable.length-1][1];
                    if(c[0]==left || c[1]==left || c[0]==right || c[1]==right) isValid = true;
                }
                if(isValid && gTurn===0) { d.style.border="2px solid #10B981"; d.onclick = () => playDomino(idx); canMove = true; } 
                else { d.style.opacity = "0.5"; }
                handEl.appendChild(d);
            });

            document.getElementById('btnPass').style.display = (!canMove && gTurn===0 && gTable.length>0) ? 'block' : 'none';
            let names = ["ANDA", "BOT 1", "BOT 2", "BOT 3"];
            document.getElementById('gapleTurn').innerText = names[gTurn];
            if(gTurn > 0) setTimeout(botPlayDomino, 1000);
        }

        window.playDomino = (idx) => { let card = gP.splice(idx, 1)[0]; placeCard(card); nextTurn(); }
        window.gaplePass = () => { nextTurn(); }

        function placeCard(c) {
            if(gTable.length === 0) gTable.push(c);
            else {
                let left = gTable[0][0]; let right = gTable[gTable.length-1][1];
                if(c[1] === left) gTable.unshift(c); 
                else if(c[0] === left) gTable.unshift([c[1], c[0]]); 
                else if(c[0] === right) gTable.push(c); 
                else if(c[1] === right) gTable.push([c[1], c[0]]); 
            }
        }

        function botPlayDomino() {
            let botHand = (gTurn===1) ? gB1 : (gTurn===2 ? gB2 : gB3);
            let validIdx = -1;
            if(gTable.length === 0) validIdx = 0; 
            else {
                let left = gTable[0][0]; let right = gTable[gTable.length-1][1];
                validIdx = botHand.findIndex(c => c[0]==left || c[1]==left || c[0]==right || c[1]==right);
            }
            if(validIdx !== -1) { let card = botHand.splice(validIdx, 1)[0]; placeCard(card); }
            nextTurn();
        }

        function nextTurn() {
            if(gP.length==0) return alert("ANDA MENANG!");
            if(gB1.length==0 || gB2.length==0 || gB3.length==0) return alert("BOT MENANG!");
            gTurn = (gTurn + 1) % 4; renderGaple();
        }

        // =======================
        // POOL (BILYAR)
        // =======================
        const pCvs = document.getElementById('poolCanvas'); const pCtx = pCvs.getContext('2d');
        let balls = [], cueBall, isDragging=false, dragStart={x:0,y:0};
        const poolColors = ['#FCD34D', '#3B82F6', '#EF4444', '#A855F7', '#F97316', '#22C55E', '#881337', '#000000']; 

        window.initPool = () => {
            if(window.poolLoop) cancelAnimationFrame(window.poolLoop);
            balls = []; cueBall = {x: 160, y: 400, vx: 0, vy: 0, r: 10, color: '#fff', type: 'cue'}; balls.push(cueBall);
            let startX = 160, startY = 150, rows = 5, cIdx = 0;
            for(let i=0; i<rows; i++){ for(let j=0; j<=i; j++){
                let cx = startX - (i*11) + (j*22); let cy = startY - (i*19);
                balls.push({x: cx, y: cy, vx: 0, vy: 0, r: 10, color: poolColors[cIdx++ % poolColors.length], type: 'ball'});
            }}
            pCvs.addEventListener('mousedown', startDrag); pCvs.addEventListener('touchstart', startDrag);
            window.addEventListener('mouseup', endDrag); window.addEventListener('touchend', endDrag);
            window.poolLoop = requestAnimationFrame(updatePool);
        }
        function startDrag(e) { 
            let r = pCvs.getBoundingClientRect(); let tx = (e.touches?e.touches[0].clientX:e.clientX) - r.left; let ty = (e.touches?e.touches[0].clientY:e.clientY) - r.top; 
            if(Math.hypot(tx-cueBall.x, ty-cueBall.y) < 40 && Math.abs(cueBall.vx)<0.1) { isDragging = true; dragStart = {x: tx, y: ty}; } 
        }
        function endDrag(e) { 
            if(!isDragging) return; isDragging = false; 
            let r = pCvs.getBoundingClientRect(); let tx = (e.changedTouches?e.changedTouches[0].clientX:e.clientX) - r.left; let ty = (e.changedTouches?e.changedTouches[0].clientY:e.clientY) - r.top; 
            let fx = (dragStart.x - tx) * 0.15; let fy = (dragStart.y - ty) * 0.15;
            if(Math.abs(fx)>15) fx=15*Math.sign(fx); if(Math.abs(fy)>15) fy=15*Math.sign(fy);
            cueBall.vx = fx; cueBall.vy = fy; 
        }
        function updatePool() {
            pCtx.fillStyle = '#15803d'; pCtx.fillRect(0,0,320,550);
            pCtx.fillStyle = '#000'; [[0,0],[160,0],[320,0],[0,550],[160,550],[320,550]].forEach(p=>{ pCtx.beginPath(); pCtx.arc(p[0],p[1],20,0,Math.PI*2); pCtx.fill(); });
            balls.forEach((b, i) => {
                b.x += b.vx; b.y += b.vy; b.vx *= 0.985; b.vy *= 0.985;
                if(b.x<b.r) { b.x=b.r; b.vx *= -0.9; } if(b.x>320-b.r) { b.x=320-b.r; b.vx *= -0.9; }
                if(b.y<b.r) { b.y=b.r; b.vy *= -0.9; } if(b.y>550-b.r) { b.y=550-b.r; b.vy *= -0.9; }
                for(let j=i+1; j<balls.length; j++){
                    let b2 = balls[j]; let dx = b2.x - b.x; let dy = b2.y - b.y; let dist = Math.hypot(dx, dy);
                    if(dist < b.r + b2.r){
                        let angle = Math.atan2(dy, dx); let sin = Math.sin(angle), cos = Math.cos(angle);
                        let vx1 = b.vx*cos + b.vy*sin; let vy1 = b.vy*cos - b.vx*sin;
                        let vx2 = b2.vx*cos + b2.vy*sin; let vy2 = b2.vy*cos - b2.vx*sin;
                        b.vx = vx2*cos - vy1*sin; b.vy = vy1*cos + vx2*sin;
                        b2.vx = vx1*cos - vy2*sin; b2.vy = vy2*cos + vx1*sin;
                        let overlap = (b.r + b2.r - dist) / 2; b.x -= overlap * Math.cos(angle); b.y -= overlap * Math.sin(angle); b2.x += overlap * Math.cos(angle); b2.y += overlap * Math.sin(angle);
                    }
                }
                if((b.x<20 && b.y<20) || (b.x>300 && b.y<20) || (b.x<20 && b.y>530) || (b.x>300 && b.y>530)) {
                    if(b.type === 'cue') { b.x = 160; b.y = 400; b.vx=0; b.vy=0; } else { balls.splice(i, 1); }
                }
                pCtx.beginPath(); pCtx.arc(b.x, b.y, b.r, 0, Math.PI*2); pCtx.fillStyle = b.color; pCtx.fill();
                pCtx.shadowBlur=5; pCtx.shadowColor="rgba(0,0,0,0.5)"; pCtx.fillStyle="rgba(255,255,255,0.3)"; pCtx.beginPath(); pCtx.arc(b.x-3,b.y-3,3,0,Math.PI*2); pCtx.fill(); pCtx.shadowBlur=0;
            });
            if(isDragging) {
                pCtx.strokeStyle="white"; pCtx.lineWidth=2; pCtx.setLineDash([5, 5]);
                pCtx.beginPath(); pCtx.moveTo(cueBall.x, cueBall.y); 
                let aimX = cueBall.x + (cueBall.x - dragStart.x)*3; let aimY = cueBall.y + (cueBall.y - dragStart.y)*3;
                pCtx.lineTo(aimX, aimY); pCtx.stroke(); pCtx.setLineDash([]);
            }
            window.poolLoop = requestAnimationFrame(updatePool);
        }

        // =======================
        // LUDO
        // =======================
        let lP1=-1, lP2=-1, lTurn=0; 
        window.initLudo = () => { lP1=-1; lP2=-1; lTurn=0; renderLudoBoard(); }
        function updateLudo(d) {
            lP1 = d.p1; lP2 = d.p2; lTurn = d.turn;
            document.getElementById('lDice').innerText = d.dice || '🎲';
            let t = lTurn===0 ? "MERAH" : "BIRU"; let c = lTurn===0 ? "var(--danger)" : "var(--electric-blue)";
            document.getElementById('lTurn').innerHTML = `<span style="color:${c}">${t}</span>`;
            renderLudoBoard();
        }
        window.renderLudoBoard = () => {
            const el = document.getElementById('ludoGrid'); el.innerHTML = '';
            for(let y=0; y<15; y++) {
                for(let x=0; x<15; x++) {
                    let div = document.createElement('div'); div.className = 'l-cell';
                    if(x<6 && y<6) div.classList.add('base-r'); else if(x>8 && y<6) div.classList.add('base-g');
                    else if(x<6 && y>8) div.classList.add('base-b'); else if(x>8 && y>8) div.classList.add('base-y');
                    else if(x>=6 && x<=8 && y>=6 && y<=8) div.classList.add('center');
                    else {
                        if(y==7 && x>0 && x<6) div.classList.add('path-r'); else if(x==7 && y>0 && y<6) div.classList.add('path-g');
                        else if(y==7 && x>8 && x<14) div.classList.add('path-y'); else if(x==7 && y>8 && y<14) div.classList.add('path-b');
                    }
                    let p1Pos = getLudoXY(lP1, 0); let p2Pos = getLudoXY(lP2, 1);
                    if(p1Pos.x===x && p1Pos.y===y) div.innerHTML += '<div class="l-token tok-r"></div>';
                    if(p2Pos.x===x && p2Pos.y===y) div.innerHTML += '<div class="l-token tok-b" style="margin-left:5px; margin-top:5px;"></div>';
                    el.appendChild(div);
                }
            }
        }
        const lPath = [{x:1,y:6},{x:2,y:6},{x:3,y:6},{x:4,y:6},{x:5,y:6},{x:6,y:5},{x:6,y:4},{x:6,y:3},{x:6,y:2},{x:6,y:1},{x:6,y:0},{x:7,y:0},{x:8,y:0},{x:8,y:1},{x:8,y:2},{x:8,y:3},{x:8,y:4},{x:8,y:5},{x:8,y:6},{x:9,y:6},{x:10,y:6},{x:11,y:6},{x:12,y:6},{x:13,y:6},{x:14,y:6},{x:14,y:7},{x:14,y:8},{x:13,y:8},{x:12,y:8},{x:11,y:8},{x:10,y:8},{x:9,y:8},{x:8,y:8},{x:8,y:9},{x:8,y:10},{x:8,y:11},{x:8,y:12},{x:8,y:13},{x:8,y:14},{x:7,y:14},{x:6,y:14},{x:6,y:13},{x:6,y:12},{x:6,y:11},{x:6,y:10},{x:6,y:9},{x:6,y:8},{x:5,y:8},{x:4,y:8},{x:3,y:8},{x:2,y:8},{x:1,y:8},{x:0,y:8}];
        function getLudoXY(step, pIdx) { if(step===-1) return pIdx===0 ? {x:2,y:2} : {x:2,y:12}; let offset = pIdx===0 ? 0 : 39; return lPath[(step+offset)%52]; }
        window.rollDice = () => {
            const btn = document.getElementById('lDice'); btn.classList.add('rolling');
            setTimeout(()=>{
                let d = Math.ceil(Math.random()*6); btn.classList.remove('rolling'); btn.innerText = d;
                if(window.activeRoom) {
                    let myTurn = (window.myRole==='host') ? 0 : 1; if(lTurn !== myTurn) return alert("Bukan giliranmu!");
                    let cur = (myTurn===0) ? lP1 : lP2; if(cur===-1) { if(d===6) cur=0; } else { cur+=d; }
                    let next = (d===6) ? myTurn : (myTurn===0?1:0);
                    let up = {dice:d, turn:next}; if(myTurn===0) up.p1 = cur; else up.p2 = cur;
                    update(ref(db, 'games/'+window.activeRoom), up);
                } else {
                    if(lTurn===0) { if(lP1===-1 && d===6) lP1=0; else if(lP1!==-1) lP1+=d; if(d!==6) lTurn=1; } else { if(lP2===-1 && d===6) lP2=0; else if(lP2!==-1) lP2+=d; if(d!==6) lTurn=0; }
                    renderLudoBoard(); let t = lTurn===0 ? "MERAH" : "BIRU"; let c = lTurn===0 ? "var(--danger)" : "var(--electric-blue)"; document.getElementById('lTurn').innerHTML = `<span style="color:${c}">${t}</span>`;
                }
            }, 500);
        }

        // =======================
        // CATUR
        // =======================
        window.cGame = new Chess(); window.cSel = null;
        window.initChess = () => { window.cGame.reset(); if(window.activeRoom) update(ref(db,'games/'+window.activeRoom), {fen:'start', turn:'w'}); renderChess(); }
        window.renderChess = () => {
            const el = document.getElementById('chessGrid'); el.innerHTML = '';
            const board = window.cGame.board();
            const icons = { 'p': 'chess-pawn', 'r': 'chess-rook', 'n': 'chess-knight', 'b': 'chess-bishop', 'q': 'chess-queen', 'k': 'chess-king' };
            for(let i=0; i<8; i++) { for(let j=0; j<8; j++) {
                const sq = String.fromCharCode(97+j) + (8-i); const p = board[i][j];
                let d = document.createElement('div'); d.className = `c-sq ${(i+j)%2?'c-black':'c-white'}`;
                if(window.cSel === sq) d.classList.add('c-hl');
                if(p) { let iName = icons[p.type]; let cClass = p.color==='w' ? 'piece-w' : 'piece-b'; d.innerHTML = `<i class="fas fa-${iName} ${cClass}"></i>`; }
                d.onclick = () => clickChess(sq); el.appendChild(d);
            }}
            document.getElementById('cStatus').innerText = "Giliran: " + (window.cGame.turn()=='w'?"Putih":"Hitam");
        }
        window.clickChess = (sq) => {
            if(window.activeRoom) { let me=window.myRole==='host'?'w':'b'; if(window.cGame.turn()!==me) return; }
            if(!window.cSel) { let p=window.cGame.get(sq); if(p && p.color===window.cGame.turn()){ window.cSel=sq; renderChess(); } }
            else {
                let m = window.cGame.move({from:window.cSel, to:sq, promotion:'q'}); window.cSel = null;
                if(m) { if(window.activeRoom) update(ref(db, 'games/'+window.activeRoom), {fen:window.cGame.fen(), turn:window.cGame.turn()}); renderChess(); } 
                else { let p=window.cGame.get(sq); if(p && p.color===window.cGame.turn()){ window.cSel=sq; renderChess(); } else renderChess(); }
            }
        }
        function updateChess(d) { window.cGame.load(d.fen==='start'?'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1':d.fen); renderChess(); }

        // =======================
        // TIC TAC TOE & SUDOKU
        // =======================
        let tttB=[], tttT='X'; window.initTTT=()=>{ tttB=Array(9).fill(''); tttT='X'; drawTTT(); }
        function drawTTT(){ document.getElementById('tttGrid').innerHTML=tttB.map((v,i)=>`<div class="ttt-cell" onclick="clickTTT(${i})" style="color:${v=='X'?'var(--royal-blue)':'var(--danger)'}">${v}</div>`).join(''); }
        window.clickTTT=(i)=>{ if(tttB[i])return; if(window.activeRoom){ let s=window.myRole==='host'?'X':'O'; if(tttT!==s)return; tttB[i]=s; update(ref(db,'games/'+window.activeRoom),{board:tttB, turn:s=='X'?'O':'X'}); } else { tttB[i]=tttT; tttT=tttT=='X'?'O':'X'; drawTTT(); } }
        function updateTTT(d){ tttB=d.board; tttT=d.turn; document.getElementById('tStatus').innerText="Giliran: "+d.turn; drawTTT(); }

        let sGrid=[], sSel=null; window.initSudoku=()=>{ let b=document.getElementById('sGrid'); b.innerHTML=''; for(let i=0;i<81;i++){ let d=document.createElement('div'); d.className='s-cell'; if(Math.random()>0.7){ d.innerText=Math.ceil(Math.random()*9); d.style.color='var(--royal-blue)'; d.style.fontWeight='900'; d.classList.add('given'); } d.onclick=()=>{if(!d.classList.contains('given')){ if(sSel)sSel.classList.remove('sel'); sSel=d; sSel.classList.add('sel'); }}; b.appendChild(d); } }
        window.fillS=(n)=>{ if(sSel){ sSel.innerText=n||''; sSel.style.color='#000'; } }

        // =======================
        // PUZZLE
        // =======================
        let puz=[1,2,3,4,5,6,7,8,0]; window.initPuzzle=()=>{ puz.sort(()=>Math.random()-0.5); drawPuz(); }
        function drawPuz(){ document.getElementById('puzGrid').innerHTML=puz.map((v,i)=>`<div class="ttt-cell" style="font-size:24px; background:${v?'white':'#eee'}" onclick="movePuz(${i})">${v||''}</div>`).join(''); }
        window.movePuz=(i)=>{ let e=puz.indexOf(0); if([e-1,e+1,e-3,e+3].includes(i)){ [puz[i],puz[e]]=[puz[e],puz[i]]; drawPuz(); } }

    </script>
