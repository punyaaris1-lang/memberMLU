<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Game Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;900&family=Inter:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/css/chessboard-1.0.0.min.css">
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://unpkg.com/@chrisoakman/chessboardjs@1.0.0/dist/js/chessboard-1.0.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <style>
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; --bg-surface: #F0F4F8; 
            --text-main: #0F172A; --white: #FFFFFF; --danger: #EF4444; --success: #10B981; --warning: #F59E0B;
        }

        body { margin:0; background: var(--bg-surface); font-family:'Space Grotesk',sans-serif; color:var(--text-main); overflow-x:hidden; touch-action:manipulation; user-select:none; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* HEADER */
        .header { padding:20px; display:flex; justify-content:space-between; align-items:center; background:white; box-shadow:0 5px 20px rgba(0,0,0,0.05); }
        .title { font-size:20px; color:var(--royal-blue); display:flex; align-items:center; gap:10px; }
        .close-btn { color:var(--text-main); font-size:24px; text-decoration:none; }

        /* MENU GRID */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; padding: 20px; max-width: 600px; margin: 0 auto; }
        .game-card { 
            background: white; border-radius: 20px; padding: 20px; text-align: center; 
            box-shadow: 0 5px 15px rgba(45,99,237,0.1); border: 1px solid rgba(45,99,237,0.1); 
            cursor: pointer; transition: 0.2s; display:flex; flex-direction:column; align-items:center; justify-content:center;
        }
        .game-card:active { transform: scale(0.95); background: var(--bg-surface); }
        .gc-icon { font-size: 35px; color: var(--electric-blue); margin-bottom: 10px; }
        .gc-name { font-size: 14px; font-weight: 900; color: var(--royal-blue); }
        .gc-badge { font-size: 9px; background: var(--success); color: white; padding: 2px 6px; border-radius: 4px; margin-top: 5px; }

        /* GAME AREA */
        .game-wrapper { display: none; flex-direction: column; align-items: center; min-height: 80vh; padding: 20px; width: 100%; max-width:500px; margin:0 auto; animation: fadeIn 0.3s; }
        .game-wrapper.active { display: flex; }
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

        /* COMMON UI */
        .btn-back { background: transparent; border: 1px solid var(--royal-blue); color: var(--royal-blue); padding: 10px 20px; border-radius: 50px; font-weight: 800; font-size: 12px; margin-bottom: 20px; cursor: pointer; display: inline-flex; align-items: center; gap: 5px;}
        .btn-action { background: var(--electric-blue); color: white; border: none; padding: 12px 30px; border-radius: 50px; font-weight: 900; margin-top: 20px; cursor: pointer; box-shadow: 0 5px 15px rgba(45,99,237,0.3); width: 100%; max-width: 250px;}
        .btn-action:active { transform: scale(0.95); }
        .score-display { font-size: 24px; color: var(--royal-blue); margin-bottom: 10px; }

        /* MABAR PANEL */
        .mabar-panel { background: #E0F2FE; padding: 15px; border-radius: 15px; margin-bottom: 20px; width: 100%; text-align: center; border: 1px solid #BAE6FD; display:none; }
        .room-code { font-size: 24px; font-weight: 900; color: var(--royal-blue); letter-spacing: 2px; margin: 10px 0; background: white; padding: 10px; border-radius: 10px; border: 2px dashed var(--royal-blue); }
        .room-input { padding: 12px; border-radius: 10px; border: 1px solid #ccc; width: 100%; text-align: center; font-weight: 800; font-size: 16px; margin-bottom: 10px; text-transform: uppercase;}

        /* --- SNAKE --- */
        #snakeCanvas { background: var(--white); border: 2px solid var(--electric-blue); border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .controls { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .c-btn { width: 60px; height: 60px; background: white; border: 1px solid #E2E8F0; border-radius: 15px; font-size: 24px; color: var(--royal-blue); display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 10px rgba(0,0,0,0.05); }
        .c-btn:active { background: var(--electric-blue); color: white; }

        /* --- TIC TAC TOE --- */
        .ttt-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; background: var(--royal-blue); padding: 8px; border-radius: 15px; }
        .ttt-cell { width: 80px; height: 80px; background: white; display: flex; align-items: center; justify-content: center; font-size: 40px; font-weight: 900; cursor: pointer; border-radius: 8px; }
        .ttt-cell.x { color: var(--danger); } .ttt-cell.o { color: var(--electric-blue); }

        /* --- CHESS --- */
        #myBoard { width: 100%; }
        
        /* --- SUDOKU --- */
        .sudoku-board { display: grid; grid-template-columns: repeat(9, 1fr); gap: 1px; background: var(--royal-blue); border: 2px solid var(--royal-blue); width: 100%; aspect-ratio: 1; }
        .sudoku-cell { background: white; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; color: var(--text-main); cursor: pointer; }
        .sudoku-cell.given { background: #F1F5F9; color: var(--royal-blue); }
        .sudoku-cell.selected { background: var(--electric-blue); color: white; }
        .sudoku-cell.error { color: var(--danger); background: #FEF2F2; }
        .sudoku-cell:nth-child(3n) { border-right: 2px solid var(--royal-blue); }
        .sudoku-cell:nth-child(9n) { border-right: none; }
        .sudoku-cell:nth-child(n+19):nth-child(-n+27), .sudoku-cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--royal-blue); }
        .numpad { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin-top: 20px; width: 100%; }
        .num-btn { background: white; border: 1px solid #E2E8F0; padding: 15px 0; border-radius: 10px; font-size: 18px; font-weight: 700; color: var(--royal-blue); }
        .num-btn:active { background: var(--electric-blue); color: white; }

        /* --- MOTO RUN --- */
        #motoCanvas { background: #334155; border-left: 10px solid #FFF; border-right: 10px solid #FFF; border-radius: 5px; width: 300px; height: 400px; display: block; }
        .moto-controls { display: flex; gap: 20px; margin-top: 20px; width: 300px; }
        .btn-steer { flex: 1; background: var(--electric-blue); color: white; border: none; padding: 20px; border-radius: 15px; font-size: 24px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-steer:active { transform: scale(0.95); }

        /* --- ULAR TANGGA (VISUAL BAGUS) --- */
        .ut-board { 
            display: grid; grid-template-columns: repeat(5, 1fr); /* 5 Kolom x 6 Baris = 30 Kotak */
            gap: 2px; width: 100%; background: #CBD5E1; padding: 5px; border-radius: 10px; border: 4px solid var(--royal-blue);
        }
        .ut-cell { 
            aspect-ratio: 1; background: white; display: flex; align-items: flex-start; justify-content: flex-start; 
            font-size: 10px; font-weight: 800; padding: 2px; position: relative; border-radius: 4px; color: #94A3B8;
        }
        /* Warna-warni papan */
        .ut-cell:nth-child(even) { background: #EFF6FF; }
        .ut-cell:nth-child(3n) { background: #F0FDF4; }
        .ut-cell:nth-child(5n) { background: #FEF2F2; }

        .ut-p1, .ut-p2 { width: 18px; height: 18px; border-radius: 50%; position: absolute; border: 2px solid white; box-shadow: 0 3px 6px rgba(0,0,0,0.3); transition: 0.3s; z-index: 10; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .ut-p1 { background: var(--danger); }
        .ut-p2 { background: var(--electric-blue); margin-left: 5px; margin-top: 5px; } /* Biar ga numpuk */
        
        /* Ikon Tangga & Ular */
        .ut-icon { position: absolute; font-size: 18px; bottom: 2px; right: 2px; opacity: 0.8; }
        .icon-ladder { color: var(--success); }
        .icon-snake { color: var(--danger); }
        
        /* --- PUZZLE --- */
        .puzzle-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; background: var(--royal-blue); padding: 5px; border-radius: 10px; width: 100%; max-width: 300px; }
        .puz-tile { aspect-ratio: 1; background: white; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; color: var(--royal-blue); cursor: pointer; border-radius: 5px; box-shadow: inset 0 -3px 0 rgba(0,0,0,0.1); }
        .puz-tile.empty { background: transparent; cursor: default; box-shadow: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title"><i class="fas fa-gamepad"></i> GAME CENTER</div>
        <a href="dashboard.html" class="close-btn"><i class="fas fa-times"></i></a>
    </div>

    <div id="mainMenu" class="menu-grid">
        <div class="game-card" onclick="startGame('snake')">
            <i class="fas fa-worm gc-icon"></i>
            <div class="gc-name">SNAKE</div>
        </div>
        <div class="game-card" onclick="startGame('moto')">
            <i class="fas fa-motorcycle gc-icon"></i>
            <div class="gc-name">MOTO RUN</div>
        </div>
        <div class="game-card" onclick="startGame('sudoku')">
            <i class="fas fa-border-all gc-icon"></i>
            <div class="gc-name">SUDOKU</div>
        </div>
        <div class="game-card" onclick="startGame('puzzle')">
            <i class="fas fa-puzzle-piece gc-icon"></i>
            <div class="gc-name">PUZZLE</div>
        </div>
        <div class="game-card" onclick="startGame('ttt', true)">
            <i class="fas fa-times gc-icon"></i>
            <div class="gc-name">TIC TAC TOE</div>
            <div class="gc-badge">ONLINE</div>
        </div>
        <div class="game-card" onclick="startGame('chess', true)">
            <i class="fas fa-chess gc-icon"></i>
            <div class="gc-name">CATUR</div>
            <div class="gc-badge">ONLINE</div>
        </div>
        <div class="game-card" onclick="startGame('ut', true)">
            <i class="fas fa-dice gc-icon"></i>
            <div class="gc-name">ULAR TANGGA</div>
            <div class="gc-badge">ONLINE</div>
        </div>
    </div>

    <div id="game-snake" class="game-wrapper">
        <button class="btn-back" onclick="backToMenu()"><i class="fas fa-arrow-left"></i> KEMBALI</button>
        <div class="score-display">SKOR: <span id="snakeScore">0</span></div>
        <canvas id="snakeCanvas" width="300" height="300"></canvas>
        <div class="controls">
            <div></div><button class="c-btn" onclick="snakeDir(0,-1)"><i class="fas fa-chevron-up"></i></button><div></div>
            <button class="c-btn" onclick="snakeDir(-1,0)"><i class="fas fa-chevron-left"></i></button>
            <button class="c-btn" onclick="initSnake()"><i class="fas fa-redo"></i></button>
            <button class="c-btn" onclick="snakeDir(1,0)"><i class="fas fa-chevron-right"></i></button>
            <div></div><button class="c-btn" onclick="snakeDir(0,1)"><i class="fas fa-chevron-down"></i></button><div></div>
        </div>
    </div>

    <div id="game-moto" class="game-wrapper">
        <button class="btn-back" onclick="backToMenu()"><i class="fas fa-arrow-left"></i> KEMBALI</button>
        <div class="score-display">JARAK: <span id="motoScore">0</span>m</div>
        <canvas id="motoCanvas" width="300" height="400"></canvas>
        <div class="moto-controls">
            <button class="btn-steer" onmousedown="moveMoto(-1)" onmouseup="stopMoto()" ontouchstart="moveMoto(-1)" ontouchend="stopMoto()"><i class="fas fa-arrow-left"></i></button>
            <button class="btn-steer" onmousedown="moveMoto(1)" onmouseup="stopMoto()" ontouchstart="moveMoto(1)" ontouchend="stopMoto()"><i class="fas fa-arrow-right"></i></button>
        </div>
        <button class="btn-action" onclick="initMoto()">MULAI BALAP</button>
    </div>

    <div id="game-ttt" class="game-wrapper">
        <button class="btn-back" onclick="backToMenu()"><i class="fas fa-arrow-left"></i> KEMBALI</button>
        <div id="tttMabar" class="mabar-panel"></div>
        <h2 id="tttStatus" style="color:var(--royal-blue);">Giliran: X</h2>
        <div class="ttt-grid" id="tttBoard"></div>
        <button class="btn-action" onclick="initTTT()">RESET GAME</button>
    </div>

    <div id="game-chess" class="game-wrapper">
        <button class="btn-back" onclick="backToMenu()"><i class="fas fa-arrow-left"></i> KEMBALI</button>
        <div id="chessMabar" class="mabar-panel"></div>
        <div id="myBoard"></div>
        <p id="chessStatus" style="text-align:center; font-size:12px; margin-top:10px;">Status: Menunggu...</p>
        <button class="btn-action" onclick="initChess()">RESET PAPAN</button>
    </div>

    <div id="game-sudoku" class="game-wrapper">
        <button class="btn-back" onclick="backToMenu()"><i class="fas fa-arrow-left"></i> KEMBALI</button>
        <div class="sudoku-board" id="sudokuBoard"></div>
        <div class="numpad">
            <button class="num-btn" onclick="fillSudoku(1)">1</button>
            <button class="num-btn" onclick="fillSudoku(2)">2</button>
            <button class="num-btn" onclick="fillSudoku(3)">3</button>
            <button class="num-btn" onclick="fillSudoku(4)">4</button>
            <button class="num-btn" onclick="fillSudoku(5)">5</button>
            <button class="num-btn" onclick="fillSudoku(6)">6</button>
            <button class="num-btn" onclick="fillSudoku(7)">7</button>
            <button class="num-btn" onclick="fillSudoku(8)">8</button>
            <button class="num-btn" onclick="fillSudoku(9)">9</button>
            <button class="num-btn" onclick="fillSudoku(0)" style="color:var(--danger);"><i class="fas fa-eraser"></i></button>
        </div>
        <button class="btn-action" onclick="initSudoku()">GAME BARU</button>
    </div>

    <div id="game-ut" class="game-wrapper">
        <button class="btn-back" onclick="backToMenu()"><i class="fas fa-arrow-left"></i> KEMBALI</button>
        <div id="utMabar" class="mabar-panel"></div>
        <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:10px;">
            <div style="font-size:12px; font-weight:800; color:var(--danger);"><i class="fas fa-circle"></i> MERAH (P1): <span id="p1Pos">1</span></div>
            <div style="font-size:12px; font-weight:800; color:var(--electric-blue);"><i class="fas fa-circle"></i> BIRU (P2): <span id="p2Pos">1</span></div>
        </div>
        <div class="ut-board" id="utBoard"></div>
        <div style="margin-top:20px; text-align:center;">
            <div id="diceRes" style="font-size:30px; font-weight:900; margin-bottom:10px;">🎲 -</div>
            <button id="btnRoll" class="btn-action" onclick="rollDice()">KOCOK DADU</button>
        </div>
    </div>

    <div id="game-puzzle" class="game-wrapper">
        <button class="btn-back" onclick="backToMenu()"><i class="fas fa-arrow-left"></i> KEMBALI</button>
        <div class="puzzle-grid" id="puzzleBoard"></div>
        <button class="btn-action" onclick="initPuzzle()">ACAK ULANG</button>
    </div>

    <script type="module">
        // FIREBASE SETUP UNTUK MULTIPLAYER
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", databaseURL: "https://rtomaka-e67b5-default-rtdb.firebaseio.com", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // GLOBAL VARS
        window.activeRoom = null;
        window.myRole = null; // 'host' or 'guest'
        window.gameType = null;

        window.startGame = (id, online=false) => {
            document.getElementById('mainMenu').style.display = 'none';
            document.querySelectorAll('.game-wrapper').forEach(el => el.classList.remove('active'));
            document.getElementById('game-'+id).classList.add('active');
            
            if(online) {
                window.gameType = id;
                showMabarPanel(id);
            }

            if(id==='snake') initSnake();
            if(id==='moto') initMoto();
            if(id==='sudoku') initSudoku();
            if(id==='puzzle') initPuzzle();
            if(id==='ttt' && !online) initTTT(); // Offline mode
            if(id==='chess' && !online) initChess(); 
            if(id==='ut' && !online) initUT();
        }

        window.backToMenu = () => {
            document.querySelectorAll('.game-wrapper').forEach(el => el.classList.remove('active'));
            document.getElementById('mainMenu').style.display = 'grid';
            if(snakeGameLoop) clearInterval(snakeGameLoop);
            if(motoLoop) cancelAnimationFrame(motoLoop);
            if(window.activeRoom) window.activeRoom = null; // Disconnect
        }

        // --- MABAR SYSTEM ---
        function showMabarPanel(gameId) {
            const panelId = gameId + 'Mabar';
            const el = document.getElementById(panelId);
            if(el) {
                el.style.display = 'block';
                el.innerHTML = `
                    <div style="font-size:12px; font-weight:700;">MODE ONLINE</div>
                    <button class="btn-action" style="margin:5px 0; font-size:10px; padding:8px;" onclick="createRoom('${gameId}')">BUAT KAMAR (HOST)</button>
                    <div style="margin:5px 0;">atau</div>
                    <input type="text" id="${gameId}RoomInput" class="room-input" placeholder="KODE KAMAR" maxlength="5">
                    <button class="btn-action" style="margin:5px 0; background:var(--success); font-size:10px; padding:8px;" onclick="joinRoom('${gameId}')">GABUNG</button>
                `;
            }
        }

        window.createRoom = (gameId) => {
            const code = Math.floor(1000 + Math.random() * 9000);
            window.activeRoom = code;
            window.myRole = 'host';
            const panel = document.getElementById(gameId + 'Mabar');
            panel.innerHTML = `KODE KAMAR: <div class="room-code">${code}</div><div style="font-size:10px;">Berikan kode ini ke teman.</div>`;
            
            // Init DB for Room
            let initData = {};
            if(gameId === 'ttt') initData = { board: ['','','','','','','','',''], turn: 'X' };
            if(gameId === 'chess') initData = { fen: 'start', turn: 'w' };
            if(gameId === 'ut') initData = { p1: 1, p2: 1, turn: 1, lastRoll: 0 };
            
            set(ref(db, 'games/' + code), initData);
            listenRoom(gameId, code);
        }

        window.joinRoom = (gameId) => {
            const code = document.getElementById(gameId+'RoomInput').value;
            if(!code) return alert("Masukkan kode!");
            window.activeRoom = code;
            window.myRole = 'guest';
            document.getElementById(gameId + 'Mabar').innerHTML = `<div style="color:var(--success); font-weight:800;">TERHUBUNG KE ${code}</div>`;
            listenRoom(gameId, code);
        }

        function listenRoom(gameId, code) {
            onValue(ref(db, 'games/' + code), (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                if(gameId === 'ttt') {
                    // Update Board TTT
                    window.tttBoard = data.board;
                    window.tttTurn = data.turn;
                    document.getElementById('tttStatus').innerText = "Giliran: " + data.turn;
                    renderTTT();
                }
                if(gameId === 'chess') {
                    // Update Chess
                    if(data.fen !== 'start') window.chessBoard.position(data.fen);
                    window.gameChess.load(data.fen === 'start' ? 'rnbqkbnr/pppppppp/8/8/8/8/PPPPPPPP/RNBQKBNR w KQkq - 0 1' : data.fen);
                    document.getElementById('chessStatus').innerText = "Giliran: " + (data.turn==='w'?'Putih':'Hitam');
                }
                if(gameId === 'ut') {
                    // Update UT
                    window.p1 = data.p1; window.p2 = data.p2; window.utTurn = data.turn;
                    drawUT();
                    document.getElementById('diceRes').innerText = `🎲 ${data.lastRoll}`;
                    document.getElementById('btnRoll').innerText = `GILIRAN P${data.turn}`;
                    // Disable button if not my turn
                    let myTurnNum = (window.myRole === 'host') ? 1 : 2;
                    document.getElementById('btnRoll').disabled = (data.turn !== myTurnNum);
                    document.getElementById('btnRoll').style.opacity = (data.turn !== myTurnNum) ? 0.5 : 1;
                }
            });
        }

        // ===================================
        // 1. SNAKE
        // ===================================
        const sCvs = document.getElementById('snakeCanvas');
        const sCtx = sCvs.getContext('2d');
        const box = 15;
        let snake, food, d, snakeScore, snakeGameLoop;

        window.initSnake = () => {
            if(snakeGameLoop) clearInterval(snakeGameLoop);
            snake = [{x: 9*box, y: 10*box}];
            food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box};
            snakeScore = 0; d = null;
            document.getElementById('snakeScore').innerText = '0';
            snakeGameLoop = setInterval(drawSnake, 120);
        }

        window.snakeDir = (x,y) => {
            if(x===0 && y===-1 && d!='DOWN') d='UP';
            else if(x===0 && y===1 && d!='UP') d='DOWN';
            else if(x===-1 && y===0 && d!='RIGHT') d='LEFT';
            else if(x===1 && y===0 && d!='LEFT') d='RIGHT';
        }

        function drawSnake() {
            sCtx.fillStyle = '#FFF'; sCtx.fillRect(0,0,300,300);
            for(let i=0; i<snake.length; i++){
                sCtx.fillStyle = (i===0)? '#2D63ED' : '#93C5FD';
                sCtx.fillRect(snake[i].x, snake[i].y, box, box);
                sCtx.strokeStyle = '#FFF'; sCtx.strokeRect(snake[i].x, snake[i].y, box, box);
            }
            sCtx.fillStyle = '#EF4444'; sCtx.fillRect(food.x, food.y, box, box);

            let snakeX = snake[0].x; let snakeY = snake[0].y;
            if(d == 'LEFT') snakeX -= box;
            if(d == 'UP') snakeY -= box;
            if(d == 'RIGHT') snakeX += box;
            if(d == 'DOWN') snakeY += box;

            if(snakeX == food.x && snakeY == food.y){
                snakeScore++; document.getElementById('snakeScore').innerText = snakeScore;
                food = {x: Math.floor(Math.random()*19+1)*box, y: Math.floor(Math.random()*19+1)*box};
            } else { snake.pop(); }

            let newHead = {x: snakeX, y: snakeY};
            if(snakeX < 0 || snakeX >= 300 || snakeY < 0 || snakeY >= 300 || snakeCollision(newHead, snake)){
                clearInterval(snakeGameLoop); 
            }
            snake.unshift(newHead);
        }
        function snakeCollision(h,arr){ for(let i=0; i<arr.length; i++){ if(h.x==arr[i].x && h.y==arr[i].y) return true; } return false; }

        // ===================================
        // 2. MOTO RUN
        // ===================================
        const mCvs = document.getElementById('motoCanvas');
        const mCtx = mCvs.getContext('2d');
        let motoX = 130, motoSpeed = 0, obstacles = [], motoScore = 0, motoLoop;
        let motoGameOver = false;

        window.initMoto = () => {
            motoX = 130; motoSpeed = 0; obstacles = []; motoScore = 0; motoGameOver = false;
            if(motoLoop) cancelAnimationFrame(motoLoop);
            motoUpdate();
        }

        window.moveMoto = (dir) => { motoSpeed = dir * 5; }
        window.stopMoto = () => { motoSpeed = 0; }

        function motoUpdate() {
            if(motoGameOver) return;
            mCtx.clearRect(0,0,300,400);
            
            mCtx.fillStyle = "#334155"; mCtx.fillRect(0,0,300,400);
            mCtx.fillStyle = "#FFF"; 
            for(let i=0; i<400; i+=40) mCtx.fillRect(145, (i + motoScore*5)%400, 10, 20);

            motoX += motoSpeed;
            if(motoX < 10) motoX = 10; if(motoX > 250) motoX = 250;
            mCtx.fillStyle = "#2D63ED"; mCtx.fillRect(motoX, 320, 40, 60); 
            mCtx.fillStyle = "#000"; mCtx.fillRect(motoX+10, 300, 20, 20);

            if(Math.random() < 0.02) obstacles.push({x: Math.random()*240 + 10, y: -50});
            
            for(let i=0; i<obstacles.length; i++){
                obstacles[i].y += 5;
                mCtx.fillStyle = "#EF4444"; mCtx.fillRect(obstacles[i].x, obstacles[i].y, 40, 40);
                if(motoX < obstacles[i].x + 30 && motoX + 30 > obstacles[i].x && 
                   320 < obstacles[i].y + 30 && 320 + 50 > obstacles[i].y) {
                    motoGameOver = true; alert("CRASH! Jarak: " + Math.floor(motoScore) + "m"); return;
                }
            }
            motoScore += 0.1;
            document.getElementById('motoScore').innerText = Math.floor(motoScore);
            motoLoop = requestAnimationFrame(motoUpdate);
        }

        // ===================================
        // 3. TIC TAC TOE (HYBRID ONLINE)
        // ===================================
        window.tttBoard = []; window.tttTurn = 'X';
        window.initTTT = () => {
            window.tttBoard = ['','','','','','','','','']; window.tttTurn = 'X';
            document.getElementById('tttStatus').innerText = "Giliran: X";
            renderTTT();
        }
        window.renderTTT = () => {
            const el = document.getElementById('tttBoard'); el.innerHTML = '';
            window.tttBoard.forEach((val, i) => {
                el.innerHTML += `<div class="ttt-cell ${val.toLowerCase()}" onclick="clickTTT(${i})">${val}</div>`;
            });
        }
        window.clickTTT = (i) => {
            if(window.tttBoard[i] !== '') return;
            
            // ONLINE LOGIC
            if(window.activeRoom) {
                // Cek giliran
                let mySym = (window.myRole === 'host') ? 'X' : 'O';
                if(window.tttTurn !== mySym) return alert("Bukan giliranmu!");
                
                window.tttBoard[i] = mySym;
                let nextTurn = (mySym === 'X') ? 'O' : 'X';
                update(ref(db, 'games/' + window.activeRoom), { board: window.tttBoard, turn: nextTurn });
            } else {
                // OFFLINE
                window.tttBoard[i] = window.tttTurn;
                window.tttTurn = (window.tttTurn==='X'?'O':'X');
                document.getElementById('tttStatus').innerText = "Giliran: " + window.tttTurn;
                renderTTT();
            }
        }

        // ===================================
        // 4. CHESS (ONLINE + VISUAL FIX)
        // ===================================
        window.chessBoard = null;
        window.gameChess = new Chess();

        window.initChess = () => {
            window.gameChess.reset();
            if(window.chessBoard) window.chessBoard.destroy();
            
            window.chessBoard = Chessboard('myBoard', {
                draggable: true,
                position: 'start',
                pieceTheme: 'https://chessboardjs.com/img/chesspieces/wikipedia/{piece}.png', // FIX GAMBAR
                onDragStart: (source, piece) => {
                    if (window.gameChess.game_over()) return false;
                    // ONLINE CHECK
                    if(window.activeRoom) {
                        let myColor = (window.myRole==='host') ? 'w' : 'b';
                        if(window.gameChess.turn() !== myColor) return false; // Bukan giliranmu
                    }
                },
                onDrop: (source, target) => {
                    let move = window.gameChess.move({ from: source, to: target, promotion: 'q' });
                    if (move === null) return 'snapback';
                    
                    if(window.activeRoom) {
                        update(ref(db, 'games/' + window.activeRoom), { fen: window.gameChess.fen(), turn: window.gameChess.turn() });
                    }
                }
            });
            $(window).resize(window.chessBoard.resize);
        }

        // ===================================
        // 5. ULAR TANGGA (VISUAL BAGUS)
        // ===================================
        window.p1 = 1; window.p2 = 1; window.utTurn = 1;
        const jumps = {3:11, 6:17, 9:18, 10:12, 14:4, 19:8, 22:20, 24:16}; // Shortcut
        
        window.initUT = () => {
            window.p1=1; window.p2=1; window.utTurn=1;
            drawUT();
        }
        window.drawUT = () => {
            const b = document.getElementById('utBoard'); b.innerHTML = '';
            // Render 30 Kotak (ZigZag sederhana agar mudah)
            for(let i=1; i<=30; i++) {
                let content = i;
                if(i===window.p1) content += `<div class="ut-p1"></div>`;
                if(i===window.p2) content += `<div class="ut-p2"></div>`;
                
                // Add Icon
                if(jumps[i]) content += (jumps[i] > i ? `<i class="fas fa-ladder ut-icon icon-ladder"></i>` : `<i class="fas fa-staff-snake ut-icon icon-snake"></i>`);
                
                b.innerHTML += `<div class="ut-cell" style="order:${i}">${content}</div>`;
            }
            document.getElementById('p1Pos').innerText = window.p1;
            document.getElementById('p2Pos').innerText = window.p2;
        }
        window.rollDice = () => {
            let d = Math.ceil(Math.random()*6);
            
            // ONLINE LOGIC
            if(window.activeRoom) {
                let myTurn = (window.myRole === 'host') ? 1 : 2;
                if(window.utTurn !== myTurn) return; // Tombol mestinya disabled, tapi double check
                
                let currPos = (myTurn===1) ? window.p1 : window.p2;
                currPos += d; 
                if(currPos > 30) currPos = 30 - (currPos-30);
                if(jumps[currPos]) currPos = jumps[currPos];
                
                let updates = { lastRoll: d, turn: (myTurn===1?2:1) };
                if(myTurn===1) updates.p1 = currPos; else updates.p2 = currPos;
                update(ref(db, 'games/' + window.activeRoom), updates);
            
            } else {
                // OFFLINE
                document.getElementById('diceRes').innerText = `🎲 ${d}`;
                if(window.utTurn === 1) {
                    window.p1 += d; if(window.p1 > 30) window.p1 = 30 - (window.p1-30);
                    if(jumps[window.p1]) window.p1 = jumps[window.p1];
                    window.utTurn = 2; document.getElementById('btnRoll').innerText = "KOCOK (P2)";
                } else {
                    window.p2 += d; if(window.p2 > 30) window.p2 = 30 - (window.p2-30);
                    if(jumps[window.p2]) window.p2 = jumps[window.p2];
                    window.utTurn = 1; document.getElementById('btnRoll').innerText = "KOCOK (P1)";
                }
                drawUT();
            }
        }

        // ===================================
        // 6. SUDOKU & PUZZLE (OFFLINE)
        // ===================================
        // (Logika sama seperti sebelumnya, ringkas)
        let sGrid=[], sSel=null;
        window.initSudoku = () => { sGrid=Array(81).fill(0); for(let i=0;i<30;i++)sGrid[Math.floor(Math.random()*81)]=Math.ceil(Math.random()*9); renderSudoku(); }
        window.renderSudoku = () => { 
            const el=document.getElementById('sudokuBoard'); el.innerHTML=''; 
            sGrid.forEach((v,i)=>{ let d=document.createElement('div'); d.className=`sudoku-cell ${v?'given':''}`; d.innerText=v||''; d.onclick=()=>{if(!v){if(sSel)sSel.classList.remove('selected');sSel=d;sSel.classList.add('selected');}}; el.appendChild(d); });
        }
        window.fillSudoku = (n) => { if(sSel){sSel.innerText=n||''; sSel.style.color=n?'var(--electric-blue)':'inherit';} }

        let puzArr=[1,2,3,4,5,6,7,8,0];
        window.initPuzzle = () => { puzArr.sort(()=>Math.random()-0.5); renderPuzzle(); }
        function renderPuzzle() { document.getElementById('puzzleBoard').innerHTML=puzArr.map((v,i)=>`<div class="puz-tile ${v?'':'empty'}" onclick="moveTile(${i})">${v||''}</div>`).join(''); }
        window.moveTile = (i) => { let e=puzArr.indexOf(0); if([e-1,e+1,e-3,e+3].includes(i)){ [puzArr[i],puzArr[e]]=[puzArr[e],puzArr[i]]; renderPuzzle(); }}

    </script>
</body>
</html>
