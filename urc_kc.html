<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>URC Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        :root { --bg: #141414; --surface: #1e1e1e; --border: #333; --text: #eee; --urc-red: #ff4444; --radar-green: #10B981; }
        body { margin: 0; background: var(--bg); font-family: 'Inter', sans-serif; color: var(--text); overflow: hidden; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; }

        /* HEADER CLEAN */
        .header { position: absolute; top: 0; left: 0; right: 0; z-index: 1000; padding: 15px 20px; background: rgba(20,20,20,0.9); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;}
        .header-left { display: flex; align-items: center; gap: 15px;}
        .btn-back { color: var(--text); font-size: 20px; text-decoration: none;}
        .header-title h1 { margin: 0; font-size: 16px; color: var(--urc-red); letter-spacing: 1px;}
        .header-title p { margin: 0; font-size: 10px; color: #888; letter-spacing: 1px;}

        /* MAP AREA (Dark Map Murni) */
        #map { position: absolute; top: 65px; bottom: 0; left: 0; right: 0; width: 100vw; height: 50vh; z-index: 1; background: #111;}
        
        /* BOTTOM PANEL (Solid Admin Style) */
        .bottom-panel { position: absolute; bottom: 0; left: 0; right: 0; height: calc(50vh - 10px); z-index: 1000; background: var(--bg); border-top: 1px solid var(--border); display: flex; flex-direction: column;}
        
        .panel-header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--surface);}
        .stats-box { display: flex; gap: 20px;}
        .stat-item { display: flex; flex-direction: column;}
        .stat-val { font-size: 20px; font-weight: 900;}
        .stat-lbl { font-size: 10px; font-weight: 600; color: #888; margin-top: 2px;}
        
        button { padding: 10px 15px; border: none; border-radius: 8px; font-weight: 900; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'Inter'; text-transform: uppercase;}
        .btn-scan { background: #333; color: #fff; border: 1px solid #555; }
        .btn-scan:active { background: #444; }

        /* LIST RIDER (Gaya Admin Log) */
        .rider-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: var(--bg);}
        
        .log-card { background: #252525; padding: 12px; border-radius: 8px; border-left: 4px solid #555; font-size: 13px; display: flex; justify-content: space-between; align-items: center;}
        .log-card.urc { border-left-color: var(--urc-red); }
        .log-card.member { border-left-color: var(--radar-green); }
        
        .log-head { font-weight: bold; color: #eee; margin-bottom: 4px; font-size: 14px;}
        .log-body { color: #888; font-size: 11px; display: flex; align-items: center; gap: 5px;}
        
        .btn-call { width: 35px; height: 35px; border-radius: 8px; background: rgba(16, 185, 129, 0.15); color: var(--radar-green); display: flex; align-items: center; justify-content: center; font-size: 18px; text-decoration: none; border: 1px solid var(--radar-green);}

        /* MARKER MAP BERSIH */
        .custom-div-icon { background: transparent; border: none; }
        .map-marker { width: 16px; height: 16px; border: 2px solid #000; border-radius: 50%; }
        .map-marker.urc { background: var(--urc-red); }
        .map-marker.member { background: var(--radar-green); }
        .marker-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); background: #222; color: #eee; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; white-space: nowrap; border: 1px solid #444;}
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="dashboard_kc.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <div class="header-title">
                <h1>URC COMMAND</h1>
                <p>RADAR KARTIKA CHANDRA</p>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div class="bottom-panel">
        <div class="panel-header">
            <div class="stats-box">
                <div class="stat-item">
                    <div class="stat-val" id="valUrc" style="color:var(--urc-red);">0</div>
                    <div class="stat-lbl">URC AKTIF</div>
                </div>
                <div class="stat-item">
                    <div class="stat-val" id="valMember" style="color:var(--radar-green);">0</div>
                    <div class="stat-lbl">MEMBER</div>
                </div>
            </div>
            <button class="btn-scan" onclick="recenterMap()"><i class="fas fa-crosshairs"></i> PUSATKAN PETA</button>
        </div>

        <div class="rider-list" id="riderList">
            <div style="text-align:center; color:#666; font-size:12px; padding:30px;">Menunggu Data KC...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // MURNI DATABASE KC (AppKC)
        const appKC = initializeApp({ apiKey: "AIzaSyDDVYQSjmJEn_RvIUotSxbh8L-ysJMCthk", authDomain: "kartikachandrafc.firebaseapp.com", projectId: "kartikachandrafc" }, "AppKC");
        const dbKC = getFirestore(appKC);

        let map = null;
        let markers = {};

        // INISIALISASI PETA DENGAN DARK MATTER BAWAAN
        map = L.map('map', { zoomControl: false }).setView([-6.2285953, 106.819502], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CartoDB'
        }).addTo(map);

        // TARIK DATA DARI KOLEKSI "anggota" MILIK DATABASE KC
        onSnapshot(collection(dbKC, "anggota"), (snap) => { 
            let countUrc = 0;
            let countMember = 0;
            let listHtml = '';
            const riderContainer = document.getElementById('riderList');

            snap.forEach(doc => { 
                const m = doc.data(); 
                if(m.isSharing && m.lat && m.lng) { 
                    const isUrc = (m.role || "").toUpperCase().includes("URC");
                    if(isUrc) countUrc++; else countMember++;
                    
                    const mType = isUrc ? "urc" : "member";
                    
                    // RENDER MAP MARKER BERSIH
                    const iconHtml = `
                        <div class="map-marker ${mType}"></div>
                        <div class="marker-label">${m.nama.split(' ')[0]}</div>
                    `;
                    const icon = L.divIcon({ className: 'custom-div-icon', html: iconHtml, iconSize:[16,16], iconAnchor:[8,8] }); 
                    
                    if(markers[doc.id]) { markers[doc.id].setLatLng([m.lat, m.lng]); } 
                    else { markers[doc.id] = L.marker([m.lat, m.lng], {icon}).addTo(map); }

                    // RENDER LIST (Gaya log-card admin.html)
                    const waNum = m.hp ? m.hp.replace(/^0/, '62') : '';
                    
                    const cardHtml = `
                        <div class="log-card ${mType}">
                            <div>
                                <div class="log-head">${m.nama} ${isUrc ? '<span style="color:var(--urc-red); font-size:10px; margin-left:5px;">[URC]</span>' : ''}</div>
                                <div class="log-body"><i class="fas fa-motorcycle"></i> ${m.plat}</div>
                            </div>
                            ${waNum ? `<a href="https://wa.me/${waNum}" target="_blank" class="btn-call"><i class="fab fa-whatsapp"></i></a>` : ''}
                        </div>
                    `;
                    
                    if(isUrc) listHtml = cardHtml + listHtml; else listHtml += cardHtml;

                } else if(markers[doc.id]) { 
                    map.removeLayer(markers[doc.id]); delete markers[doc.id]; 
                } 
            }); 

            document.getElementById('valUrc').innerText = countUrc;
            document.getElementById('valMember').innerText = countMember;
            
            if(countUrc === 0 && countMember === 0) {
                listHtml = '<div style="text-align:center; color:#666; font-size:12px; padding:30px;">Tidak ada radar aktif di KC.</div>';
            }
            riderContainer.innerHTML = listHtml;
        }); 

        // FUNGSI SCAN PETA
        window.recenterMap = () => {
            if(Object.keys(markers).length > 0) {
                const group = new L.featureGroup(Object.values(markers));
                map.fitBounds(group.getBounds(), { padding: [30, 30] });
            } else {
                alert("Tidak ada anggota aktif untuk dipetakan.");
            }
        };
    </script>
</body>
</html>
