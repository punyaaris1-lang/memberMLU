<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC - URC Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700;900&family=Outfit:wght@800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        /* === TEMA TACTICAL KC === */
        :root { 
            --kc-yellow: #D4FF00; 
            --bg-black: #050505;
            --danger: #EF4444;
            --info: #3B82F6;
            --wa-green: #10B981;
        }
        body { margin: 0; background: var(--bg-black); font-family: 'Inter', sans-serif; color: #fff; overflow: hidden; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; }

        /* HEADER PANIC ROOM */
        .header { position: absolute; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; z-index: 1000; border-bottom: 2px solid var(--kc-yellow); box-shadow: 0 5px 20px rgba(0,0,0,0.8);}
        .header-left { display: flex; align-items: center; gap: 15px; }
        .btn-back { color: black; font-size: 18px; width: 35px; height: 35px; background: var(--kc-yellow); border-radius: 8px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-weight: 900;}
        .header-title h1 { margin: 0; font-family: 'Space Grotesk'; font-size: 20px; color: var(--kc-yellow); letter-spacing: 1px; }
        .header-title p { margin: 0; font-size: 10px; color: #94a3b8; font-weight: 600; letter-spacing: 2px; }
        
        .live-indicator { display: flex; align-items: center; gap: 8px; font-family: 'Space Grotesk'; font-size: 12px; font-weight: 900; color: var(--kc-yellow); background: rgba(212,255,0,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(212,255,0,0.3);}
        .dot-pulse { width: 8px; height: 8px; background: var(--danger); border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.2;} 100% {opacity:1;} }

        /* MAP AREA (FULL SCREEN) */
        #map { width: 100vw; height: 100vh; z-index: 1; background: #E5E3DF; }

        /* MARKERS */
        .fc-marker { width: 40px; height: 40px; background: #000; border: 3px solid var(--kc-yellow); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--kc-yellow); font-size: 18px; box-shadow: 0 0 20px rgba(212,255,0,0.8); z-index: 1000 !important;}
        .member-normal { width: 15px; height: 15px; background: var(--info); border: 2px solid white; border-radius: 50%; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .member-label { background: rgba(0,0,0,0.8); color: white; border: 1px solid #333; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; font-family: 'Outfit'; white-space: nowrap; margin-top: -5px; margin-left: 10px;}
        .member-sos { width: 25px; height: 25px; background: var(--danger); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 20px rgba(239,68,68,0.8); animation: pulseSOS 1s infinite; }
        .sos-label { background: var(--danger); color: white; border: 1px solid white; padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 900; font-family: 'Outfit'; white-space: nowrap; margin-top: -10px; margin-left: 15px; box-shadow: 0 0 10px rgba(239,68,68,0.5);}
        @keyframes pulseSOS { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0.7); } 70% { transform: scale(1.2); box-shadow: 0 0 0 20px rgba(239,68,68,0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239,68,68,0); } }

        /* PANEL KIRI BAWAH (DAFTAR SOS & AGEN TERDEKAT) */
        .sos-panel { position: absolute; bottom: 30px; left: 20px; width: 340px; max-width: calc(100% - 40px); background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border: 1px solid var(--danger); border-radius: 16px; padding: 15px; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; gap: 10px; max-height: 80vh; overflow-y: auto;}
        .panel-header { font-family: 'Outfit'; font-size: 14px; font-weight: 900; color: var(--danger); display: flex; align-items: center; gap: 8px; border-bottom: 1px dashed #333; padding-bottom: 10px;}
        
        .sos-card { background: #111; border: 1px solid #333; border-top: 4px solid var(--danger); padding: 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 8px; position: relative;}
        .sos-name { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 900; color: white; margin: 0; line-height: 1;}
        .sos-plat { font-size: 11px; color: var(--kc-yellow); font-weight: 800; background: rgba(212,255,0,0.1); padding: 2px 6px; border-radius: 4px; width: fit-content;}
        
        /* DAFTAR AGEN TERDEKAT */
        .nearest-box { background: #000; border: 1px solid #222; border-radius: 8px; padding: 10px; margin-top: 5px;}
        .nearest-title { font-size: 9px; color: var(--info); font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; border-bottom: 1px dashed #222; padding-bottom: 5px; display: flex; align-items: center; gap: 5px;}
        .nearest-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding-bottom: 6px; border-bottom: 1px solid #111;}
        .nearest-item:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none;}
        .ni-name { font-family: 'Outfit'; font-size: 12px; font-weight: 800; color: white; margin-bottom: 2px;}
        .ni-dist { font-size: 9px; font-weight: 700; color: var(--kc-yellow); background: rgba(212,255,0,0.1); padding: 2px 6px; border-radius: 4px;}
        
        .btn-wa-mini { background: var(--wa-green); color: white; border: none; padding: 6px 10px; border-radius: 6px; font-weight: 900; font-family: 'Space Grotesk'; font-size: 10px; cursor: pointer; text-decoration: none; display: flex; align-items: center; gap: 5px; transition: 0.2s;}
        .btn-wa-mini:active { transform: scale(0.9); }

        .btn-lacak { background: var(--danger); color: white; border: none; padding: 8px; border-radius: 6px; font-family: 'Outfit'; font-weight: 900; font-size: 11px; cursor: pointer; margin-top: 5px; width: 100%;}
        .btn-resolve { background: transparent; color: #94a3b8; border: 1px dashed #444; padding: 6px; border-radius: 6px; font-size: 10px; font-weight: 800; cursor: pointer; width: 100%; transition: 0.2s;}
        .btn-resolve:hover { background: #222; color: white; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-left">
            <a href="dashboard_kc.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
            <div class="header-title">
                <h1>COMMAND CENTER</h1>
                <p>URC TACTICAL RADAR</p>
            </div>
        </div>
        <div class="live-indicator">
            <div class="dot-pulse"></div> LIVE
        </div>
    </div>

    <div id="map"></div>

    <div class="sos-panel" id="sosPanel">
        <div class="panel-header">
            <i class="fas fa-exclamation-triangle"></i> ACTIVE SOS ALERTS
        </div>
        <div id="sosList">
            <div style="text-align:center; color:#94A3B8; font-size:11px; padding: 20px 0;">Menunggu sinyal darurat...</div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // 1. SISTEM HAK AKSES (KICK JIKA BUKAN URC/KETUM)
        // ==========================================
        let uData = null;
        try { uData = JSON.parse(localStorage.getItem('maka_user')); } catch (e) {}
        
        if (!uData) {
            window.location.href = 'index.html';
        } else {
            const role = (uData.role || "").toUpperCase();
            const plat = (uData.plat || "").replace(/\s+/g, '').toUpperCase();
            const isAllowed = role.includes("URC") || role.includes("KETUM") || role.includes("WAKIL") || plat === "B4124SWI" || plat === "B4248SWF";
            
            if (!isAllowed) {
                alert("AKSES DITOLAK! Command Center khusus untuk URC, KETUM, dan WAKETUM.");
                window.location.href = 'dashboard_kc.html';
            }
        }

        // KONEKSI DATABASE KC
        const firebaseConfig = {
            apiKey: "AIzaSyDfsTAGclYUSRe6YhiljS-xb-v-9RBYVEM",
            authDomain: "antriankcnew.firebaseapp.com",
            projectId: "antriankcnew"
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // ==========================================
        // 2. INISIALISASI MAP TERANG
        // ==========================================
        const STATION_LAT = -6.2285953; 
        const STATION_LNG = 106.819502;

        const map = L.map('map', { zoomControl: false }).setView([STATION_LAT, STATION_LNG], 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap KC',
            maxZoom: 19
        }).addTo(map);

        const fcIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div class='fc-marker'><i class='fas fa-charging-station'></i></div>",
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });
        L.marker([STATION_LAT, STATION_LNG], {icon: fcIcon, zIndexOffset: 1000}).addTo(map).bindPopup("<b style='font-family:Space Grotesk; font-size:14px;'>FC KARTIKA CHANDRA</b><br>Command Center").openPopup();

        // RUMUS HAVERSINE UNTUK HITUNG JARAK (Dalam Meter)
        function hitungJarak(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Radius bumi dalam meter
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; 
        }

        // ==========================================
        // 3. SISTEM RADAR LIVE TRACKING
        // ==========================================
        let activeMarkers = {}; 

        onSnapshot(collection(db, "live_tracking"), (snap) => {
            const sosListContainer = document.getElementById('sosList');
            let hasSOS = false;
            let sosHTML = "";

            let sosUsers = [];
            let normalUsers = [];

            // Pisahkan yang SOS dan yang normal
            snap.forEach(docSnap => {
                const data = docSnap.data();
                data.id = docSnap.id;
                if(data.lat && data.lng) {
                    if (data.isSOS) sosUsers.push(data);
                    else normalUsers.push(data);
                }
            });

            // UPDATE MARKER DI MAP
            const allUsers = [...sosUsers, ...normalUsers];
            allUsers.forEach(data => {
                const isSOS = data.isSOS === true;
                const userIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: isSOS 
                        ? `<div class='member-sos'></div><div class='sos-label'>SOS: ${data.nama || data.plat}</div>` 
                        : `<div class='member-normal'></div><div class='member-label'>${data.nama || data.plat}</div>`,
                    iconSize: isSOS ? [25, 25] : [15, 15],
                    iconAnchor: isSOS ? [12, 12] : [7, 7]
                });

                if(activeMarkers[data.id]) {
                    activeMarkers[data.id].setLatLng([data.lat, data.lng]);
                    activeMarkers[data.id].setIcon(userIcon);
                    activeMarkers[data.id].setZIndexOffset(isSOS ? 999 : 1);
                } else {
                    activeMarkers[data.id] = L.marker([data.lat, data.lng], {icon: userIcon, zIndexOffset: isSOS ? 999 : 1}).addTo(map);
                }
            });

            // BUILD UI UNTUK PANEL SOS
            sosUsers.forEach(sos => {
                hasSOS = true;
                
                // Cari 3 agen terdekat
                let distances = normalUsers.map(n => {
                    return {
                        ...n,
                        jarakMeter: hitungJarak(sos.lat, sos.lng, n.lat, n.lng)
                    };
                });
                
                // Urutkan dari yang terdekat
                distances.sort((a, b) => a.jarakMeter - b.jarakMeter);
                let top3 = distances.slice(0, 3); // Ambil 3 teratas

                // Buat list HTML untuk 3 terdekat
                let nearestHTML = "";
                if (top3.length === 0) {
                    nearestHTML = `<div style="font-size:10px; color:#aaa;">Tidak ada member lain yang aktif di radar.</div>`;
                } else {
                    top3.forEach((n, index) => {
                        let distText = n.jarakMeter > 1000 ? (n.jarakMeter/1000).toFixed(1) + " KM" : Math.round(n.jarakMeter) + " METER";
                        
                        // Nomor WA Agent (Hapus angka 0 di depan, ganti 62)
                        let rawHp = n.hp || n.wa || n.whatsapp || "";
                        let cleanHp = rawHp.replace(/^0+/, '62');
                        
                        // Pesan WA Otomatis
                        let waLink = cleanHp ? `https://wa.me/${cleanHp}?text=*URC%20COMMAND%20CENTER*%0A%0AInstruksi%20Intersep!%0ATolong%20merapat%20ke%20lokasi%20SOS%20milik%20*${sos.nama}*.%0AJarak%20dari%20posisi%20lu%20sekarang%20sekitar%20*${distText}*.%0A%0ACek%20map%20di%20aplikasi%20lu%20sekarang!` : '#';

                        nearestHTML += `
                            <div class="nearest-item">
                                <div>
                                    <div class="ni-name">${index+1}. ${n.nama || n.plat}</div>
                                    <span class="ni-dist"><i class="fas fa-route"></i> ${distText}</span>
                                </div>
                                ${cleanHp ? `<a href="${waLink}" target="_blank" class="btn-wa-mini"><i class="fab fa-whatsapp"></i> INTERSEP</a>` : `<span style="font-size:9px; color:#555;">No WA Kosong</span>`}
                            </div>
                        `;
                    });
                }

                sosHTML += `
                    <div class="sos-card">
                        <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                            <div>
                                <h3 class="sos-name">${sos.nama || "Unknown"}</h3>
                                <div class="sos-plat">${sos.plat || "B XXXX XX"}</div>
                            </div>
                            <div style="font-size: 24px; color: var(--danger);"><i class="fas fa-skull-crossbones"></i></div>
                        </div>
                        
                        <div class="nearest-box">
                            <div class="nearest-title"><i class="fas fa-satellite-dish"></i> 3 AGEN TERDEKAT</div>
                            ${nearestHTML}
                        </div>

                        <button class="btn-lacak" onclick="fokusKeTarget(${sos.lat}, ${sos.lng})">
                            <i class="fas fa-crosshairs"></i> LACAK LOKASI KORBAN
                        </button>
                        <button class="btn-resolve" onclick="resolveSOS('${sos.id}')">
                            <i class="fas fa-check-circle"></i> Selesai Ditangani
                        </button>
                    </div>
                `;
            });

            // Update isi panel SOS
            if(hasSOS) {
                sosListContainer.innerHTML = sosHTML;
                document.querySelector('.sos-panel').style.borderColor = "var(--danger)";
                document.querySelector('.sos-panel').style.boxShadow = "0 0 30px rgba(239,68,68,0.5)";
            } else {
                sosListContainer.innerHTML = `<div style="text-align:center; color:#94A3B8; font-size:11px; padding: 20px 0;"><i class="fas fa-shield-alt" style="font-size:24px; color:#333; margin-bottom:10px; display:block;"></i>Area Aman. Tidak ada sinyal SOS.</div>`;
                document.querySelector('.sos-panel').style.borderColor = "#333";
                document.querySelector('.sos-panel').style.boxShadow = "0 10px 30px rgba(0,0,0,0.8)";
            }
        });

        // 4. FUNGSI KLIK LACAK (Zoom ke target SOS)
        window.fokusKeTarget = (lat, lng) => {
            map.flyTo([lat, lng], 17, {
                animate: true,
                duration: 1.5
            });
        };

        // 5. FUNGSI RESOLVE (Matikan SOS dari Command Center jika sudah ditangani)
        window.resolveSOS = async (userId) => {
            if(confirm("Yakin situasi sudah aman dan ingin mematikan sinyal SOS ini?")) {
                try {
                    await updateDoc(doc(db, "live_tracking", userId), {
                        isSOS: false
                    });
                } catch(e) {
                    console.error("Gagal mematikan SOS:", e);
                }
            }
        };

    </script>
</body>
</html>
