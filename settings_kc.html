<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC - Pengaturan Akun</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA HITAM PEKAT (PITCH BLACK KC) === */
        :root { 
            --royal-blue: #D4FF00; /* Kuning Neon KC */
            --electric-blue: #10B981; /* Hijau Emerald KC */
            --bg-surface: #000000; 
            --white: #FFFFFF; 
            --text-main: #F8FAFC; 
            --text-muted: #94A3B8; 
            --danger: #EF4444; 
            --border-soft: rgba(255, 255, 255, 0.1); 
        }
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 120px; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; text-decoration: none;}

        /* HEADER GAHAR */
        .profile-header { background: linear-gradient(160deg, #111 0%, #000 100%); padding: 40px 20px 100px; text-align: center; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; border-bottom: 1px solid var(--royal-blue); position: relative; overflow: hidden;}
        .profile-header::before { content: ''; position: absolute; width: 150px; height: 150px; background: var(--royal-blue); filter: blur(80px); opacity: 0.15; top: -50px; left: 50%; transform: translateX(-50%);}
        .header-title { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--royal-blue); text-transform: uppercase; position: relative; z-index: 2;}

        /* AVATAR UPLOAD */
        .avatar-container { position: relative; width: 120px; height: 120px; margin: -60px auto 30px; z-index: 10; }
        .avatar-bg-gahar { position: absolute; inset: 0; background-image: url('bg_maka.jpg'); background-size: cover; background-position: center; border-radius: 30px; z-index: 1;}
        .avatar-img { position: relative; width: 100%; height: 100%; border-radius: 30px; object-fit: cover; background: transparent; border: 3px solid var(--royal-blue); box-shadow: 0 15px 35px rgba(0,0,0,0.8); z-index: 2;}
        .btn-edit-photo { position: absolute; bottom: -5px; right: -5px; width: 40px; height: 40px; border-radius: 50%; background: var(--royal-blue); color: black; border: 3px solid #000; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 3; box-shadow: 0 5px 15px rgba(212, 255, 0, 0.4);}
        #fileInput { display: none; }

        /* FORM INPUT */
        .form-wrapper { padding: 0 25px; }
        .input-group { margin-bottom: 20px; position: relative; }
        .input-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block; margin-left: 5px; letter-spacing: 1px;}
        .input-box { position: relative; }
        .input-box i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--royal-blue); font-size: 18px; }
        .form-control { width: 100%; padding: 18px 18px 18px 50px; background: #111; border: 1px solid var(--border-soft); border-radius: 20px; font-family: 'Inter'; font-weight: 600; font-size: 15px; color: var(--white); transition: 0.3s;}
        .form-control:focus { border-color: var(--royal-blue); box-shadow: 0 0 15px rgba(212, 255, 0, 0.1);}
        .form-control:disabled { background: #0a0a0a; color: var(--text-muted); border-color: #222;}

        /* BUTTONS */
        .btn-save { width: 100%; padding: 20px; margin-top: 10px; background: var(--royal-blue); color: black; border: none; border-radius: 20px; font-family: 'Space Grotesk'; font-weight: 900; font-size: 15px; cursor: pointer; box-shadow: 0 10px 25px rgba(212, 255, 0, 0.2); transition: 0.3s;}
        .btn-save:active { transform: scale(0.98); }
        .btn-logout { width: 100%; padding: 18px; margin-top: 15px; background: rgba(239, 68, 68, 0.05); color: var(--danger); border: 1px dashed rgba(239, 68, 68, 0.3); border-radius: 20px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s;}
        .btn-logout:active { background: rgba(239, 68, 68, 0.1); }

        /* DOCK KC */
        .dock-container { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 88%; max-width: 380px; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.15); padding: 15px 35px; border-radius: 50px; display: flex; justify-content: space-around; align-items: center; z-index: 9999; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #64748b; transition: 0.3s; gap: 4px; }
        .nav-item.active { color: var(--royal-blue); transform: translateY(-4px);}
        .nav-text { font-family: 'Space Grotesk'; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;}

        /* LOADING OVERLAY */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; z-index: 99999; }
        .modal-box { background: #111; padding: 30px; border-radius: 30px; text-align: center; width: 90%; max-width: 300px; border: 1px solid var(--border-soft); box-shadow: 0 20px 50px rgba(0,0,0,0.8);}
    </style>
</head>
<body>

    <div class="overlay" id="statusOverlay">
        <div class="modal-box">
            <i class="fas fa-spinner fa-spin" id="statusIcon" style="font-size:40px; color:var(--royal-blue); margin-bottom:15px;"></i>
            <div id="statusText" style="font-family:'Space Grotesk'; font-weight:800; color:var(--royal-blue);">Menyimpan...</div>
        </div>
    </div>

    <header class="profile-header"><div class="header-title">PENGATURAN AKUN KC</div></header>

    <div class="avatar-container">
        <div class="avatar-bg-gahar"></div>
        <img id="profileImg" src="" class="avatar-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
        
        <label for="fileInput" class="btn-edit-photo"><i class="fas fa-camera"></i></label>
        <input type="file" id="fileInput" accept="image/png, image/jpeg">
    </div>

    <div class="form-wrapper">
        <div class="input-group">
            <label class="input-label">Plat Nomor (ID)</label>
            <div class="input-box"><i class="fas fa-motorcycle"></i><input type="text" id="inpPlat" class="form-control" disabled></div>
        </div>
        <div class="input-group">
            <label class="input-label">Nama Legal (KTP)</label>
            <div class="input-box"><i class="fas fa-id-card"></i><input type="text" id="inpKtp" class="form-control" style="text-transform:uppercase;"></div>
        </div>
        <div class="input-group">
            <label class="input-label">Nama Panggilan (WA)</label>
            <div class="input-box"><i class="fas fa-user"></i><input type="text" id="inpWa" class="form-control" style="text-transform:uppercase;"></div>
        </div>
        <div class="input-group">
            <label class="input-label">Nomor WhatsApp</label>
            <div class="input-box"><i class="fab fa-whatsapp"></i><input type="tel" id="inpHp" class="form-control"></div>
        </div>
        
        <div class="input-group">
            <label class="input-label">Ubah PIN Login App</label>
            <div class="input-box"><i class="fas fa-lock"></i><input type="password" id="inpPin" class="form-control" placeholder="Kosongkan jika tidak diganti"></div>
            <div style="font-size: 9px; color: var(--danger); margin-top: 5px; margin-left: 5px; font-weight: 600;">*Ini adalah PIN Login Aplikasi (Bukan PIN Tabungan)</div>
        </div>

        <button class="btn-save" onclick="saveProfile()"><i class="fas fa-save"></i> SIMPAN PERUBAHAN</button>
        <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> KELUAR DARI APLIKASI</button>
    </div>

    <div class="dock-container">
        <a href="lokasi_fc.html" class="nav-item"><i class="fas fa-map-marker-alt"></i><span class="nav-text">LOKASI</span></a>
        <a href="dashboard_kc.html" class="nav-item"><i class="fas fa-home"></i><span class="nav-text">HOME</span></a>
        <a href="settings_kc.html" class="nav-item active"><i class="fas fa-cog"></i><span class="nav-text">SETTING</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // MURNI TERHUBUNG KE DATABASE KARTIKA CHANDRA (antriankcnew)
        const firebaseConfig = {
            apiKey: "AIzaSyDfsTAGclYUSRe6YhiljS-xb-v-9RBYVEM",
            authDomain: "antriankcnew.firebaseapp.com",
            projectId: "antriankcnew",
            storageBucket: "antriankcnew.firebasestorage.app",
            messagingSenderId: "348986439499",
            appId: "1:348986439499:web:99578753dc9547d727dace"
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        let uData = JSON.parse(localStorage.getItem('maka_user'));
        if (!uData || !uData.plat) window.location.href = 'index_kc.html';

        // Pastikan kita punya ID yang benar
        const userId = uData.id || uData.plat.replace(/\s+/g, '').toUpperCase();

        // Tampilkan Data yang sudah ada
        document.getElementById('inpPlat').value = uData.plat;
        document.getElementById('inpKtp').value = uData.namaKtp || uData.nama || "";
        document.getElementById('inpWa').value = uData.namaWa || uData.nama || "";
        document.getElementById('inpHp').value = uData.hp || "";
        
        let currentPhotoBase64 = uData.foto || "";
        if(currentPhotoBase64.length > 50) {
            document.getElementById('profileImg').src = currentPhotoBase64;
        }

        // COMPRESSOR CERDAS (MENJAGA TRANSPARANSI PNG)
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    let w = img.width; let h = img.height;
                    
                    // Resize maksimal 400px agar ringan, tapi bentuk tetap proporsional
                    if (w > h) { if (w > 400) { h *= 400/w; w = 400; } } else { if (h > 400) { w *= 400/h; h = 400; } }
                    canvas.width = w; canvas.height = h; 
                    
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    // Format ke image/png agar transparansi TIDAK berubah jadi hitam!
                    currentPhotoBase64 = canvas.toDataURL('image/png');
                    document.getElementById('profileImg').src = currentPhotoBase64;
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // SIMPAN PERUBAHAN KE FIREBASE KC
        window.saveProfile = async () => {
            document.getElementById('statusOverlay').style.display = 'flex';
            const newKtp = document.getElementById('inpKtp').value.trim().toUpperCase();
            const newWa = document.getElementById('inpWa').value.trim().toUpperCase();
            const newHp = document.getElementById('inpHp').value.trim();
            const newPin = document.getElementById('inpPin').value.trim();

            if (!newKtp || !newWa) {
                document.getElementById('statusOverlay').style.display = 'none';
                return alert("Nama KTP dan Nama WA wajib diisi!");
            }

            try {
                let updatePayload = {
                    namaKtp: newKtp, namaWa: newWa, nama: newWa, hp: newHp, foto: currentPhotoBase64
                };
                
                // Tambahkan ganti PIN Login (disimpan di field 'pin_login' agar sinkron dgn index_kc.html)
                if (newPin !== "") {
                    updatePayload.pin_login = newPin;
                }

                // SIMPAN KE KOLEKSI 'anggota' di DATABASE KC
                await updateDoc(doc(db, "anggota", userId), updatePayload);

                // Update Local Memori di HP Member
                uData.namaKtp = newKtp; uData.namaWa = newWa; uData.nama = newWa; uData.hp = newHp; uData.foto = currentPhotoBase64;
                if (newPin !== "") uData.pin_login = newPin;
                
                localStorage.setItem('maka_user', JSON.stringify(uData));

                document.getElementById('statusIcon').className = 'fas fa-check-circle';
                document.getElementById('statusIcon').style.color = 'var(--royal-blue)';
                document.getElementById('statusText').innerText = 'Berhasil Disimpan!';
                
                setTimeout(() => { 
                    document.getElementById('statusOverlay').style.display = 'none'; 
                    location.href = 'dashboard_kc.html'; 
                }, 1000);

            } catch (e) {
                alert("Gagal sinkronisasi ke server KC: " + e.message);
                document.getElementById('statusOverlay').style.display = 'none';
            }
        };

        window.logout = () => { 
            if(confirm("Yakin ingin keluar dari Aplikasi KC?")) { 
                localStorage.removeItem('maka_user'); 
                localStorage.removeItem('maka_loc_share');
                localStorage.removeItem('myPlat');
                window.location.href = 'index_kc.html'; 
            } 
        };
    </script>
</body>
</html>
