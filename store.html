<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU Market - Official Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA ULTRA LUXURY GLASS (MARKET EDITION) === */
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; 
            --gold-lux: #D4AF37; --bg-surface: #F0F4F8; 
            --white: #FFFFFF; --text-main: #0F172A; --text-muted: #64748B; 
            --danger: #EF4444; --success: #10B981;
            
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 15px 40px rgba(10, 34, 89, 0.08);
            --glow-gold: 0 5px 20px rgba(212, 175, 55, 0.3);
            --glow-green: 0 5px 20px rgba(16, 185, 129, 0.3);
            --glow-blue: 0 5px 20px rgba(45, 99, 237, 0.3);
        }
        
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 120px; -webkit-font-smoothing: antialiased; overflow-x: hidden; position: relative; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        /* AMBIENT LIGHT & BACKGROUND */
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.5; animation: floatLight 10s infinite alternate; }
        .light-1 { top: -20%; left: -20%; width: 500px; height: 500px; background: #bfdbfe; }
        .light-2 { top: 40%; right: -30%; width: 400px; height: 400px; background: rgba(212, 175, 55, 0.15); animation-delay: 2s; }
        .bg-watermark { position: fixed; top: 15%; right: -15%; width: 100%; height: 80%; background-image: url('logomlu.png'); background-repeat: no-repeat; background-size: contain; background-position: center; opacity: 0.04; transform: rotate(-15deg); z-index: -2; pointer-events: none; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(20px, 40px);} }

        /* HERO HEADER (SEARCH FOCUSED) */
        .header-market { 
            background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); 
            padding: 40px 20px 80px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            position: relative; z-index: 10; box-shadow: 0 10px 30px rgba(45, 99, 237, 0.25);
        }
        .market-brand { text-align: center; color: white; margin-bottom: 20px; }
        .main-title { font-family: 'Outfit'; font-size: 32px; font-weight: 900; margin: 0; letter-spacing: -1px; text-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .sub-tag { font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; letter-spacing: 3px; color: var(--gold-lux); text-transform: uppercase; margin-bottom: 5px; display: block; }

        /* SEARCH BAR MEWAH */
        .search-wrapper { position: relative; max-width: 600px; margin: 0 auto; }
        .search-input { 
            width: 100%; padding: 16px 20px 16px 50px; border-radius: 20px; border: none; 
            background: rgba(255,255,255,0.9); font-family: 'Inter'; font-weight: 600; font-size: 14px; 
            color: var(--royal-blue); box-shadow: 0 10px 30px rgba(0,0,0,0.15); outline: none; transition: 0.3s;
        }
        .search-input:focus { transform: scale(1.02); background: white; box-shadow: 0 15px 40px rgba(45,99,237,0.25); }
        .search-icon { position: absolute; left: 20px; top: 16px; color: var(--text-muted); font-size: 16px; }

        /* --- PRODUCT GRID (E-COMMERCE STYLE) --- */
        .feed-container { padding: 0 15px; margin-top: -40px; position: relative; z-index: 101; display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 800px; margin-left: auto; margin-right: auto;}
        
        .product-card { 
            background: var(--white); border-radius: 18px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.5); 
            position: relative; overflow: hidden; display: flex; flex-direction: column;
            transition: 0.3s; transform: translateY(0);
        }
        .product-card:active { transform: scale(0.97); }
        
        /* IMAGE AREA */
        .p-image-box { position: relative; width: 100%; aspect-ratio: 1; overflow: hidden; background: #F8FAFC; }
        .p-image { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        
        /* BADGES */
        .p-price-tag { 
            position: absolute; bottom: 8px; left: 8px; 
            background: rgba(10, 34, 89, 0.9); backdrop-filter: blur(5px);
            padding: 4px 10px; border-radius: 8px; 
            font-family: 'Space Grotesk'; font-size: 13px; font-weight: 900; color: var(--gold-lux); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); border: 1px solid rgba(212,175,55,0.3);
        }
        
        /* ADMIN/OWNER BUTTONS ON CARD */
        .card-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; z-index: 5; }
        .btn-mini { 
            width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            border: none; cursor: pointer; font-size: 12px; backdrop-filter: blur(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .bm-del { background: rgba(255,255,255,0.9); color: var(--danger); }
        .bm-share { background: rgba(255,255,255,0.9); color: var(--electric-blue); }

        .p-content { padding: 12px; display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .p-title { font-family: 'Inter'; font-size: 13px; font-weight: 700; color: var(--text-main); line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 34px;}
        .p-seller { font-size: 10px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-top: auto; }
        
        .btn-buy-card {
            width: 100%; padding: 10px; background: linear-gradient(135deg, var(--success) 0%, #059669 100%); 
            color: white; border: none; font-family: 'Space Grotesk'; font-weight: 800; font-size: 11px; 
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 5px;
            margin-top: 10px; border-radius: 10px; box-shadow: 0 4px 10px rgba(16,185,129,0.2);
        }

        /* --- FAB (TOMBOL BUKA LAPAK - MEMBER ONLY) --- */
        .fab-sell { 
            position: fixed; bottom: 100px; right: 20px; padding: 0 25px; height: 60px; 
            background: linear-gradient(135deg, var(--electric-blue) 0%, var(--royal-blue) 100%); 
            color: white; border-radius: 30px; display: none; align-items: center; justify-content: center; gap: 10px;
            font-family: 'Space Grotesk'; font-weight: 800; font-size: 14px;
            box-shadow: var(--glow-gold); border: 2px solid rgba(255,255,255,0.2); cursor: pointer; z-index: 1000; transition: 0.3s;
        }
        .fab-sell:active { transform: scale(0.95); }

        /* --- MODAL FORM & DETAIL --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.6); backdrop-filter: blur(10px); display: none; align-items: flex-end; justify-content: center; z-index: 99999; }
        
        .modal-box { 
            background: #F8FAFC; width: 100%; max-width: 500px; 
            border-top-left-radius: 35px; border-top-right-radius: 35px; border-top: 1px solid rgba(255,255,255,0.5);
            padding: 0; box-shadow: 0 -10px 50px rgba(0,0,0,0.2); transform: translateY(100%); 
            animation: slideUp 0.4s forwards cubic-bezier(0.19, 1, 0.22, 1); max-height: 95vh; display: flex; flex-direction: column;
        }
        @keyframes slideUp { to { transform: translateY(0); } }

        /* DETAIL IMAGE HEADER */
        .detail-header { position: relative; height: 350px; width: 100%; background: #ddd; flex-shrink: 0;}
        .detail-img { width: 100%; height: 100%; object-fit: cover; }
        .btn-close-modal { 
            position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px);
            border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; font-size: 18px;
        }

        .detail-body { padding: 25px 25px 100px; overflow-y: auto; background: white; border-radius: 30px 30px 0 0; margin-top: -30px; position: relative; z-index: 5; flex: 1; }
        
        .d-price { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 900; color: var(--electric-blue); margin-bottom: 5px; }
        .d-title { font-family: 'Outfit'; font-size: 22px; font-weight: 800; color: var(--royal-blue); line-height: 1.3; margin-bottom: 15px; }
        
        .d-seller-box { display: flex; align-items: center; gap: 12px; padding: 15px; background: #F8FAFC; border-radius: 16px; border: 1px solid #E2E8F0; margin-bottom: 20px; }
        .d-avatar { width: 45px; height: 45px; background: var(--royal-blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .d-desc-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .d-desc { font-size: 14px; line-height: 1.6; color: var(--text-main); white-space: pre-wrap; }

        /* FIXED BOTTOM BAR DI DETAIL */
        .detail-actions { 
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; 
            background: white; border-top: 1px solid #E2E8F0; display: flex; gap: 10px; z-index: 10;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.05);
        }
        .btn-action-l { flex: 1; padding: 16px; border-radius: 16px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 14px; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 8px;}
        .act-share { background: #F1F5F9; color: var(--electric-blue); }
        .act-buy { background: var(--success); color: white; flex: 2; box-shadow: var(--glow-green); }

        /* FORM INPUT STYLES */
        .form-padding { padding: 30px 25px; overflow-y: auto; }
        .inp-group { margin-bottom: 15px; }
        .inp-label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
        .inp-text { width: 100%; padding: 15px; border-radius: 14px; border: 1px solid #E2E8F0; background: #F8FAFC; font-family: 'Inter'; font-weight: 600; outline: none; transition: 0.2s;}
        .inp-text:focus { border-color: var(--electric-blue); background: white; }
        
        .upload-box { 
            width: 100%; padding: 30px; border: 2px dashed #93C5FD; border-radius: 18px; text-align: center; 
            color: var(--electric-blue); font-weight: 800; font-size: 12px; cursor: pointer; background: #F0F9FF;
            position: relative; overflow: hidden;
        }
        .upload-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }

        .btn-submit { width: 100%; padding: 18px; border: none; border-radius: 18px; background: var(--electric-blue); color: white; font-family: 'Space Grotesk'; font-size: 15px; font-weight: 800; cursor: pointer; box-shadow: var(--glow-blue); margin-top: 10px; }

        /* BACK NAV */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; }
        .btn-premium-back { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(45,99,237,0.2); color: var(--royal-blue); padding: 16px; border-radius: 50px; font-family: 'Space Grotesk'; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="bg-watermark"></div>

    <header class="header-market">
        <div class="market-brand">
            <span class="sub-tag">OFFICIAL STORE & COMMUNITY</span>
            <h1 class="main-title">PASAR MLU</h1>
        </div>
        
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-input" placeholder="Cari barang (misal: Velg, Rem)..." onkeyup="filterProduct()">
        </div>
    </header>

    <div class="feed-container" id="productList">
        <div style="grid-column: 1 / -1; text-align:center; padding: 50px; color: #94A3B8; font-weight: 600;">
            <i class="fas fa-circle-notch fa-spin" style="font-size:24px; color:var(--electric-blue); margin-bottom:10px;"></i><br>
            Sedang memuat lapak...
        </div>
    </div>

    <button class="fab-sell" id="btnSell" onclick="openModal()">
        <i class="fas fa-camera"></i> JUAL BARANG
    </button>

    <div class="back-nav">
        <a href="javascript:void(0)" onclick="handleBack()" class="btn-premium-back">
            <i class="fas fa-home"></i> KEMBALI KE MENU
        </a>
    </div>

    <div class="modal-overlay" id="postModal">
        <div class="modal-box" style="height: auto; max-height: 90vh;">
            <div class="form-padding">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div style="font-family:'Space Grotesk'; font-size:20px; font-weight:900; color:var(--royal-blue);">Buka Lapak</div>
                    <button class="btn-close-modal" style="position:static; background:#F1F5F9; color:#64748B;" onclick="closeModal()"><i class="fas fa-times"></i></button>
                </div>

                <div class="inp-group">
                    <label class="inp-label">Foto Barang (Wajib)</label>
                    <label class="upload-box" for="fileInput">
                        <i class="fas fa-camera" style="font-size: 28px; margin-bottom: 8px; display: block;"></i>
                        TAP UNTUK PILIH FOTO
                        <img id="imgPreview" src="">
                    </label>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
                
                <div class="inp-group">
                    <label class="inp-label">Nama Barang</label>
                    <input type="text" id="inpTitle" class="inp-text" placeholder="Contoh: Shockbreaker Tabung">
                </div>

                <div class="inp-group">
                    <label class="inp-label">Harga (Rp)</label>
                    <input type="number" id="inpPrice" class="inp-text" style="font-family:'Space Grotesk'; font-size:18px;" placeholder="150000">
                </div>

                <div class="inp-group">
                    <label class="inp-label">Kondisi & Keterangan</label>
                    <textarea id="inpDesc" class="inp-text" style="height:100px; resize:none;" placeholder="Jelaskan minus (jika ada), lokasi COD, dll."></textarea>
                </div>

                <button class="btn-submit" id="btnSave" onclick="saveProduct()">TAYANGKAN IKLAN</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="detail-box">
            <div class="detail-header">
                <img id="detailImage" class="detail-img" src="">
                <button class="btn-close-modal" onclick="closeDetailModal()"><i class="fas fa-arrow-down"></i></button>
            </div>
            
            <div class="detail-body">
                <div id="detailPrice" class="d-price">Rp 0</div>
                <div id="detailTitle" class="d-title">Nama Barang</div>
                
                <div class="d-seller-box">
                    <div class="d-avatar"><i class="fas fa-user"></i></div>
                    <div>
                        <div style="font-size: 10px; font-weight: 800; color: #64748B; text-transform: uppercase;">Penjual</div>
                        <div id="detailSeller" style="font-weight: 800; font-size: 14px; color: var(--royal-blue);">Nama Penjual</div>
                    </div>
                </div>

                <div class="d-desc-label"><i class="fas fa-info-circle"></i> Deskripsi Barang</div>
                <div id="detailDesc" class="d-desc">Deskripsi di sini...</div>
            </div>

            <div class="detail-actions">
                <button class="btn-action-l act-share" id="btnDetailShare"><i class="fas fa-share-alt"></i> SHARE</button>
                <button class="btn-action-l act-buy" id="btnDetailContact"><i class="fab fa-whatsapp"></i> BELI / NEGO</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // LOGIKA GUEST / MEMBER
        let u = null;
        let isGuest = true;
        
        try {
            const rawUser = localStorage.getItem('maka_user');
            if (rawUser) {
                u = JSON.parse(rawUser);
                isGuest = false;
            }
        } catch(e) {}

        const myPlat = isGuest ? "GUEST" : u.plat;
        const isAdmin = !isGuest && (u.isSuperAdmin || (u.role && u.role !== 'KELUARGA MLU' && u.role !== 'GUEST'));

        // Jika Member: Tampilkan Tombol Jual
        if (!isGuest) {
            document.getElementById('btnSell').style.display = 'flex';
        }

        // Logic Tombol Kembali
        window.handleBack = () => {
            if (isGuest) window.location.href = 'index.html'; // Tamu balik ke Halaman Login
            else window.location.href = 'dashboard.html'; // Member balik ke Dashboard
        };

        let currentImageBase64 = ""; 
        window.productsData = {}; 
        let productsArray = [];
        let urlIdToCheck = new URLSearchParams(window.location.search).get('id');

        // --- RENDER PRODUK ---
        onSnapshot(query(collection(db, 'mlu_store'), orderBy('timestamp', 'desc')), (snap) => {
            const list = document.getElementById('productList');
            if (snap.empty) {
                list.innerHTML = '<div style="grid-column: 1 / -1; text-align:center; color:#94A3B8; padding:30px; border:1px dashed #CBD5E1; border-radius:20px;"><i class="fas fa-box-open" style="font-size:30px; margin-bottom:10px;"></i><br>Pasar masih sepi.</div>';
                return;
            }
            
            window.productsData = {}; 
            productsArray = [];

            snap.forEach(docSnap => {
                const d = docSnap.data();
                const item = { id: docSnap.id, ...d };
                window.productsData[docSnap.id] = item; 
                productsArray.push(item);
            });
            
            renderGrid(productsArray);

            // LOGIC AUTO-OPEN JIKA ADA URL PARAMETER "?id=..."
            if (urlIdToCheck && window.productsData[urlIdToCheck]) {
                window.openDetailModal(urlIdToCheck);
                urlIdToCheck = null; // Hapus dari antrean biar gak kebuka terus tiap refresh database
            }
        });

        function renderGrid(dataArr) {
            const list = document.getElementById('productList');
            list.innerHTML = "";
            
            dataArr.forEach(d => {
                // Tombol Delete (Hanya Pemilik/Admin)
                const canDelete = !isGuest && (isAdmin || (cleanStr(d.sellerPlat) === cleanStr(myPlat)));
                const btnDelHtml = canDelete ? `<button class="btn-mini bm-del" onclick="event.stopPropagation(); window.delProduct('${d.id}')"><i class="fas fa-trash"></i></button>` : '';
                
                const imageSrc = d.image ? d.image : 'https://placehold.co/400x400/E2E8F0/94A3B8?text=NO+IMAGE';

                list.innerHTML += `
                    <div class="product-card" onclick="window.openDetailModal('${d.id}')">
                        <div class="p-image-box">
                            <div class="card-actions">
                                <button class="btn-mini bm-share" onclick="event.stopPropagation(); window.shareProduct('${d.id}')"><i class="fas fa-share-alt"></i></button>
                                ${btnDelHtml}
                            </div>
                            <div class="p-price-tag">Rp ${formatK(d.price)}</div>
                            <img src="${imageSrc}" class="p-image">
                        </div>
                        <div class="p-content">
                            <div class="p-title">${d.title}</div>
                            <div class="p-seller"><i class="fas fa-user-circle"></i> ${d.sellerName}</div>
                            <button class="btn-buy-card"><i class="fab fa-whatsapp"></i> LIHAT DETAIL</button>
                        </div>
                    </div>`;
            });
        }

        window.filterProduct = () => {
            const key = document.getElementById('searchInput').value.toLowerCase();
            const filtered = productsArray.filter(p => p.title.toLowerCase().includes(key));
            renderGrid(filtered);
        }

        function formatK(num) {
            if(num >= 1000000) return (num/1000000).toFixed(1) + 'jt';
            if(num >= 1000) return (num/1000).toFixed(0) + 'rb';
            return num;
        }

        // --- DETAIL MODAL ---
        window.openDetailModal = (id) => {
            const data = window.productsData[id];
            if(!data) return;

            document.getElementById('detailImage').src = data.image ? data.image : '';
            document.getElementById('detailTitle').innerText = data.title;
            document.getElementById('detailPrice').innerText = "Rp " + Number(data.price).toLocaleString('id-ID');
            document.getElementById('detailSeller').innerText = data.sellerName;
            document.getElementById('detailDesc').innerText = data.desc ? data.desc : "Tidak ada deskripsi tambahan.";
            
            document.getElementById('btnDetailShare').onclick = () => window.shareProduct(id);
            document.getElementById('btnDetailContact').onclick = () => window.hubungiPenjual(id);

            document.getElementById('detailModal').style.display = 'flex';
        };

        window.closeDetailModal = () => document.getElementById('detailModal').style.display = 'none';

        // --- SHARE & CONTACT ---
        window.shareProduct = (id) => {
            const data = window.productsData[id];
            
            // Generate link dinamis sesuai letak aplikasi berjalan
            const baseUrl = window.location.href.split('?')[0]; 
            const productUrl = `${baseUrl}?id=${id}`;

            const shareText = `🔥 *PASAR MLU*\n\n*${data.title}*\n💰 *Rp ${Number(data.price).toLocaleString('id-ID')}*\n\n${data.desc}\n\n_Klik link ini untuk melihat foto & detail barang:_\n${productUrl}`;
            
            if (navigator.share) { 
                navigator.share({ 
                    title: `Pasar MLU - ${data.title}`, 
                    text: shareText,
                    url: productUrl
                }).catch(console.error); 
            } 
            else { 
                window.location.href = `https://wa.me/?text=${encodeURIComponent(shareText)}`; 
            }
        };

        window.hubungiPenjual = (id) => {
            const data = window.productsData[id];
            
            if(!isGuest && cleanStr(data.sellerPlat) === cleanStr(myPlat)) return alert("Ini lapak Anda sendiri!");
            
            let noWa = data.sellerWa;
            if(noWa.startsWith('0')) noWa = '62' + noWa.substring(1);
            
            const baseUrl = window.location.href.split('?')[0]; 
            const productUrl = `${baseUrl}?id=${id}`;

            const msg = `Halo *${data.sellerName}*, saya lihat iklan Anda di *Pasar MLU*.\n\nBarang: *${data.title}*\nHarga: *Rp ${Number(data.price).toLocaleString('id-ID')}*\nLink: ${productUrl}\n\nApakah barang ini masih tersedia?`;
            window.location.href = `https://wa.me/${noWa}?text=${encodeURIComponent(msg)}`;
        };

        function cleanStr(s) { return s ? s.replace(/[^A-Z0-9]/gi, '').toUpperCase() : ''; }

        // --- IMAGE COMPRESSOR ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d');
                    const MAX_WIDTH = 800; let width = img.width; let height = img.height;
                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height; ctx.drawImage(img, 0, 0, width, height);
                    currentImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    const preview = document.getElementById('imgPreview'); preview.src = currentImageBase64; preview.style.display = 'block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // --- POSTING ---
        window.openModal = () => document.getElementById('postModal').style.display = 'flex';
        window.closeModal = () => document.getElementById('postModal').style.display = 'none';

        window.saveProduct = async () => {
            const title = document.getElementById('inpTitle').value.trim();
            const price = parseInt(document.getElementById('inpPrice').value) || 0;
            const desc = document.getElementById('inpDesc').value.trim();
            const btn = document.getElementById('btnSave');

            if(!title || !price || !currentImageBase64) return alert("Lengkapi data & foto!");

            btn.innerText = "MENGUNGGAH..."; btn.style.opacity = '0.7';

            try {
                await addDoc(collection(db, 'mlu_store'), {
                    title: title, price: price, desc: desc, image: currentImageBase64, 
                    sellerName: u.namaKtp || u.namaWa, sellerPlat: myPlat, sellerWa: u.hp || "", timestamp: Date.now()
                });
                closeModal();
            } catch(e) { alert("Gagal: " + e.message); } 
            finally { btn.innerText = "TAYANGKAN IKLAN"; btn.style.opacity = '1'; }
        };

        window.delProduct = async (id) => { if(confirm("Hapus?")) await deleteDoc(doc(db, 'mlu_store', id)); };
    </script>
</body>
</html>
