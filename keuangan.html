<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU Finance - Transparency Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --royal-blue: #0A2259; --electric-blue: #2D63ED; --bg-surface: #F8FAFC; --white: #FFFFFF; --income: #10B981; --expense: #EF4444; --text-main: #0F172A; --text-muted: #64748B; }
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; padding-bottom: 120px; }
        * { box-sizing: border-box; outline: none; }
        
        /* --- HEADER --- */
        .header-finance { background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); padding: 50px 25px 90px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white; text-align: center; }
        .date-label { font-size: 10px; font-weight: 800; letter-spacing: 2px; opacity: 0.8; text-transform: uppercase; }
        .total-balance { font-family: 'Space Grotesk'; font-size: 38px; font-weight: 900; margin: 5px 0; letter-spacing: -1px; }

        /* --- SUMMARY CARD --- */
        .card-overlap { padding: 0 20px; margin-top: -40px; position: relative; z-index: 10; }
        .summary-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 25px; padding: 25px; display: flex; justify-content: space-between; box-shadow: 0 20px 40px rgba(10,34,89,0.1); border: 1px solid rgba(255,255,255,0.8); }
        .stat-box { text-align: center; width: 48%; }
        .stat-val { font-family: 'Space Grotesk'; font-size: 16px; font-weight: 800; margin-top: 5px; }

        /* --- TAB NAVIGATION --- */
        .tab-wrapper { display: flex; margin: 30px 20px 15px; background: #E2E8F0; border-radius: 16px; padding: 4px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-family: 'Space Grotesk'; font-size: 13px; font-weight: 800; color: var(--text-muted); cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--white); color: var(--royal-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* --- LIST SECTION --- */
        .list-section { padding: 0 20px 30px; }
        
        .month-divider { display: flex; justify-content: space-between; align-items: flex-end; font-family: 'Space Grotesk'; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px dashed #CBD5E1; padding-bottom: 8px; margin: 25px 0 15px 0; letter-spacing: 1px; }
        .month-divider:first-child { margin-top: 5px; }
        .m-total { font-size: 13px; font-weight: 900; }

        .tx-card { background: var(--white); border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; align-items: flex-start; gap: 15px; border: 1px solid #E2E8F0; position: relative; }
        .icon-box { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink:0; }
        .bg-in { background: #ECFDF5; color: var(--income); } 
        .bg-out { background: #FEF2F2; color: var(--expense); }
        
        .tx-info { flex: 1; padding-bottom: 15px; }
        .tx-title { font-weight: 700; font-size: 14px; color: var(--royal-blue); line-height: 1.3;}
        .tx-meta { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
        
        .tx-amount { font-family: 'Space Grotesk'; font-weight: 800; font-size: 15px; text-align:right;}
        .tx-sub { font-size: 9px; color: var(--text-muted); font-family: 'Inter'; font-weight: 600; text-transform: uppercase;}
        
        .audit-trail { font-size: 9px; color: #94A3B8; font-weight: 700; margin-top: 8px; display: flex; align-items: center; gap: 4px; border-top: 1px dashed #E2E8F0; padding-top: 8px;}
        
        /* ACTION BUTTONS IN CARD */
        .btn-edit { position: absolute; right: 48px; bottom: 12px; font-size: 12px; color: var(--electric-blue); background: #EFF6FF; border: none; width: 28px; height: 28px; border-radius: 8px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-edit:active { transform: scale(0.9); }
        .btn-del { position: absolute; right: 15px; bottom: 12px; font-size: 12px; color: var(--danger); background: #FEF2F2; border: none; width: 28px; height: 28px; border-radius: 8px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-del:active { transform: scale(0.9); }

        .btn-lihat-kolektif { background: rgba(45,99,237,0.1); color: var(--electric-blue); border: none; padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 800; font-family: 'Inter'; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; margin-top: 5px; transition: 0.2s;}
        .btn-lihat-kolektif:active { transform: scale(0.95); background: var(--electric-blue); color: white; }

        /* --- ACTION & NAV BUTTONS --- */
        .fab-admin { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--royal-blue); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 10px 25px rgba(10,34,89,0.3); border: none; cursor: pointer; z-index: 1000; transition: 0.2s;}
        .fab-admin:active { transform: scale(0.9); }
        
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 1000;}
        .btn-premium-back { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid #E2E8F0; padding: 16px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; color: var(--royal-blue); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

        /* --- MODAL FORM --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.8); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; z-index: 9999; }
        .modal-box { background: white; width: 100%; max-width: 500px; border-top-left-radius: 35px; border-top-right-radius: 35px; padding: 30px 25px; transform: translateY(100%); animation: slideUp 0.3s forwards; max-height: 90vh; overflow-y: auto;}
        @keyframes slideUp { to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--royal-blue); }
        .btn-close { background: #F1F5F9; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; color: var(--text-muted); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .form-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; font-family: 'Inter'; font-weight: 600; font-size: 14px; }
        .form-input:focus { border-color: var(--electric-blue); background: white; }
        
        .btn-save-modal { width: 100%; padding: 18px; border: none; border-radius: 16px; background: var(--royal-blue); color: white; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 800; margin-top: 10px; cursor: pointer; box-shadow: 0 10px 20px rgba(10,34,89,0.2); }

        /* KOLEKTIF AREA UI (UPDATE BARU UNTUK CICILAN) */
        .coll-area { display: none; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        .coll-item { background: white; border: 1px solid #E2E8F0; padding: 15px; border-radius: 12px; margin-bottom: 12px; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .coll-row-top { display: flex; gap: 10px; margin-bottom: 10px; padding-right: 35px; }
        .k-in { padding: 12px; border-radius: 10px; border: 1px solid #CBD5E1; font-family: 'Inter'; font-size: 13px; font-weight: 600; outline: none; width: 100%; box-sizing: border-box; }
        .k-in:focus { border-color: var(--electric-blue); }
        .btn-del-coll { position: absolute; top: 15px; right: 15px; background: #FEF2F2; color: var(--danger); border: none; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

    </style>
</head>
<body>

    <header class="header-finance">
        <div class="date-label" id="lblDate">SALDO KAS MLU PER HARI INI</div>
        <h1 class="total-balance" id="totalCash">Rp 0</h1>
    </header>

    <div class="card-overlap">
        <div class="summary-card">
            <div class="stat-box">
                <div style="font-size:9px; font-weight:800; color:var(--text-muted); text-transform:uppercase;">Total Masuk</div>
                <div class="stat-val" style="color:var(--income);" id="totalIn">Rp 0</div>
            </div>
            <div style="width:1px; background:#E2E8F0;"></div>
            <div class="stat-box">
                <div style="font-size:9px; font-weight:800; color:var(--text-muted); text-transform:uppercase;">Total Keluar</div>
                <div class="stat-val" style="color:var(--expense);" id="totalOut">Rp 0</div>
            </div>
        </div>
    </div>

    <div class="tab-wrapper">
        <div class="tab-btn active" id="tabBtnIn" onclick="switchTab('IN')">Pemasukan Kas</div>
        <div class="tab-btn" id="tabBtnOut" onclick="switchTab('OUT')">Pengeluaran Kas</div>
    </div>

    <main class="list-section">
        <div id="txInContainer"></div>
        <div id="txOutContainer" style="display:none;"></div>
    </main>

    <button class="fab-admin" id="btnAddTx" onclick="openTxModal()"><i class="fas fa-plus"></i></button>
    <div class="back-nav"><a href="dashboard.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a></div>

    <div class="modal-overlay" id="txModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" id="modalTitleText">Catat Transaksi</div>
                <button class="btn-close" onclick="closeTxModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <input type="hidden" id="formEditId">

            <div class="form-group">
                <label>Jenis Transaksi</label>
                <select id="formTxType" class="form-input" style="font-weight: 800;" onchange="toggleFormType()">
                    <option value="IN">PEMASUKAN KAS (1 Item)</option>
                    <option value="IN_COLLECTIVE" style="color:var(--electric-blue); font-weight:bold;">P. KOLEKTIF (Bisa Dicicil / Banyak Orang)</option>
                    <option value="OUT" style="color:var(--danger);">PENGELUARAN KAS</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Nama Transaksi / Acara</label>
                <input type="text" id="formTxDesc" class="form-input" placeholder="Contoh: Dana Bukber 2026 / Iuran Kas">
            </div>

            <div class="form-group" id="formNormalAmount">
                <label>Jumlah Nominal (Rp)</label>
                <input type="number" id="formTxAmount" class="form-input" placeholder="Contoh: 150000" style="font-family:'Space Grotesk'; font-size:18px;">
            </div>

            <div class="coll-area" id="formCollective">
                <label style="font-size:10px; font-weight:800; color:var(--royal-blue); margin-bottom:10px; display:block;">DAFTAR PENYUMBANG & CICILAN</label>
                <div id="collList"></div>
                <button type="button" style="width:100%; padding:12px; border:1px dashed var(--electric-blue); border-radius:10px; background:transparent; color:var(--electric-blue); font-weight:800; font-family:'Space Grotesk'; cursor:pointer; margin-top:5px;" onclick="addCollRow()">+ TAMBAH ORANG</button>
                <div style="margin-top:15px; text-align:right; font-family:'Space Grotesk'; font-size:16px; font-weight:900; color:var(--success);">
                    TOTAL TERKUMPUL: Rp <span id="collTotalDisplay">0</span>
                </div>
            </div>
            
            <button class="btn-save-modal" id="btnSaveTx" onclick="saveTxData()">SIMPAN TRANSAKSI</button>
        </div>
    </div>

    <div class="modal-overlay" id="detailModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title" style="font-size:16px;">Rincian Pemasukan</div>
                <button class="btn-close" onclick="document.getElementById('detailModal').style.display='none'"><i class="fas fa-times"></i></button>
            </div>
            <div id="detailListBody" style="background:#F8FAFC; border:1px solid #E2E8F0; border-radius:16px; max-height: 50vh; overflow-y:auto;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, addDoc, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // CEK JABATAN ADMIN
        const u = JSON.parse(localStorage.getItem('maka_user')) || {};
        const isAdmin = u.isSuperAdmin || (u.role && u.role !== 'KELUARGA MLU' && u.role !== 'GUEST');

        if (isAdmin) document.getElementById('btnAddTx').style.display = 'flex';

        // Set Tanggal Header
        const todayOptions = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('lblDate').innerText = `SALDO KAS MLU PER ${new Date().toLocaleDateString('id-ID', todayOptions).toUpperCase()}`;

        window.txGlobalMap = {};

        window.switchTab = (type) => {
            if (type === 'IN') {
                document.getElementById('tabBtnIn').classList.add('active'); document.getElementById('tabBtnOut').classList.remove('active');
                document.getElementById('txInContainer').style.display = 'block'; document.getElementById('txOutContainer').style.display = 'none';
            } else {
                document.getElementById('tabBtnOut').classList.add('active'); document.getElementById('tabBtnIn').classList.remove('active');
                document.getElementById('txOutContainer').style.display = 'block'; document.getElementById('txInContainer').style.display = 'none';
            }
        };

        onSnapshot(query(collection(db, "mlu_finance"), orderBy("timestamp", "desc")), (snap) => {
            let balance = 0, globalIn = 0, globalOut = 0;
            let groupIn = new Map(); let groupOut = new Map();
            window.txGlobalMap = {}; 

            snap.forEach(docSnap => {
                const d = docSnap.data();
                const amt = d.amount || 0;
                window.txGlobalMap[docSnap.id] = { id: docSnap.id, ...d }; 
                
                const type = d.type === 'IN_COLLECTIVE' ? 'IN' : d.type; 
                const dateObj = new Date(d.timestamp);
                const monthYear = dateObj.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

                if (type === 'IN') { 
                    globalIn += amt; balance += amt; 
                    if(!groupIn.has(monthYear)) groupIn.set(monthYear, { total: 0, items: [] });
                    let grp = groupIn.get(monthYear);
                    grp.total += amt;
                    grp.items.push({ id: docSnap.id, ...d });
                } else { 
                    globalOut += amt; balance -= amt; 
                    if(!groupOut.has(monthYear)) groupOut.set(monthYear, { total: 0, items: [] });
                    let grp = groupOut.get(monthYear);
                    grp.total += amt;
                    grp.items.push({ id: docSnap.id, ...d });
                }
            });

            document.getElementById('totalCash').innerText = "Rp " + balance.toLocaleString('id-ID');
            document.getElementById('totalIn').innerText = "Rp " + globalIn.toLocaleString('id-ID');
            document.getElementById('totalOut').innerText = "Rp " + globalOut.toLocaleString('id-ID');

            const renderGroupHtml = (mapData, isMasuk) => {
                if(mapData.size === 0) return `<div style="text-align:center; padding:40px; color:#94A3B8;">Belum ada catatan ${isMasuk ? 'pemasukan' : 'pengeluaran'}.</div>`;
                let html = '';
                const colorTotal = isMasuk ? 'var(--income)' : 'var(--expense)';
                const sign = isMasuk ? '+' : '-';

                mapData.forEach((val, monthName) => {
                    html += `<div class="month-divider"><span><i class="far fa-calendar-alt"></i> ${monthName}</span><span class="m-total" style="color:${colorTotal}">TOTAL: Rp ${val.total.toLocaleString('id-ID')}</span></div>`;

                    val.items.forEach(d => {
                        let subHtml = '';
                        if (d.isCollective && d.details) {
                            const encData = encodeURIComponent(JSON.stringify(d.details));
                            subHtml = `<button class="btn-lihat-kolektif" onclick="showCollectiveDetail('${encData}')"><i class="fas fa-users"></i> LIHAT RINCIAN (${d.details.length} DATA)</button>`;
                        }

                        let actionBtns = '';
                        if (isAdmin) {
                            actionBtns = `
                                <button class="btn-edit" onclick="window.editTx('${d.id}')"><i class="fas fa-pen"></i></button>
                                <button class="btn-del" onclick="window.delTx('${d.id}')"><i class="fas fa-trash"></i></button>
                            `;
                        }
                        
                        html += `
                            <div class="tx-card">
                                <div class="icon-box ${isMasuk ? 'bg-in' : 'bg-out'}"><i class="fas ${isMasuk ? 'fa-arrow-down' : 'fa-arrow-up'}"></i></div>
                                <div class="tx-info">
                                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                        <div class="tx-title">${d.description}</div>
                                        <div style="text-align:right;">
                                            <div class="tx-amount" style="color:${colorTotal}">${sign} Rp ${d.amount.toLocaleString('id-ID')}</div>
                                            <div class="tx-sub">${d.isCollective ? 'Kolektif / Patungan' : (isMasuk ? 'Pemasukan' : 'Pengeluaran')}</div>
                                        </div>
                                    </div>
                                    <div class="tx-meta">${d.date}</div>
                                    ${subHtml}
                                    <div class="audit-trail"><i class="fas fa-user-shield"></i> Oleh: ${d.actor}</div>
                                </div>
                                ${actionBtns}
                            </div>`;
                    });
                });
                return html;
            };

            document.getElementById('txInContainer').innerHTML = renderGroupHtml(groupIn, true);
            document.getElementById('txOutContainer').innerHTML = renderGroupHtml(groupOut, false);
        });

        // --- UI FORM DINAMIS ---
        window.toggleFormType = () => {
            const type = document.getElementById('formTxType').value;
            if (type === 'IN_COLLECTIVE') {
                document.getElementById('formNormalAmount').style.display = 'none';
                document.getElementById('formCollective').style.display = 'block';
                if(document.getElementById('collList').children.length === 0) addCollRow();
            } else {
                document.getElementById('formNormalAmount').style.display = 'block';
                document.getElementById('formCollective').style.display = 'none';
            }
        };

        // KOTAK INPUT KOLEKTIF DIPERBARUI AGAR BISA ADA KETERANGAN CICILAN
        window.addCollRow = (nameVal = "", amountVal = "", noteVal = "") => {
            const list = document.getElementById('collList');
            const div = document.createElement('div');
            div.className = 'coll-item';
            div.innerHTML = `
                <button type="button" class="btn-del-coll" onclick="this.parentElement.remove(); calcCollTotal();"><i class="fas fa-trash"></i></button>
                <div class="coll-row-top">
                    <input type="text" class="k-in c-name" placeholder="Nama" style="flex:1;" value="${nameVal}">
                    <input type="number" class="k-in c-amt" placeholder="Rp Total" style="flex:1;" onkeyup="calcCollTotal()" value="${amountVal}">
                </div>
                <input type="text" class="k-in c-note" placeholder="Ket (Misal: LUNAS / Cicilan 1)" value="${noteVal}">
            `;
            list.appendChild(div);
        };

        window.calcCollTotal = () => {
            let total = 0;
            document.querySelectorAll('.c-amt').forEach(el => { total += parseInt(el.value) || 0; });
            document.getElementById('collTotalDisplay').innerText = total.toLocaleString('id-ID');
            return total;
        };

        // --- SISTEM MODAL (TAMBAH & EDIT) ---
        window.openTxModal = () => { 
            document.getElementById('formEditId').value = ''; 
            document.getElementById('modalTitleText').innerText = 'Catat Transaksi Baru';
            document.getElementById('formTxAmount').value = '';
            document.getElementById('formTxDesc').value = '';
            document.getElementById('collList').innerHTML = '';
            document.getElementById('collTotalDisplay').innerText = '0';
            
            document.getElementById('formTxType').value = 'IN';
            toggleFormType();

            document.getElementById('txModal').style.display = 'flex'; 
        };
        
        window.editTx = (id) => {
            const data = window.txGlobalMap[id];
            if(!data) return;

            document.getElementById('formEditId').value = id;
            document.getElementById('modalTitleText').innerText = 'Edit Transaksi';
            document.getElementById('formTxDesc').value = data.description;
            
            if(data.isCollective) {
                document.getElementById('formTxType').value = 'IN_COLLECTIVE';
                toggleFormType();
                document.getElementById('collList').innerHTML = ''; 
                
                if(data.details && data.details.length > 0) {
                    data.details.forEach(d => addCollRow(d.name, d.amount, d.note || ''));
                } else {
                    addCollRow(); 
                }
                calcCollTotal();
            } else {
                document.getElementById('formTxType').value = data.type; 
                toggleFormType();
                document.getElementById('formTxAmount').value = data.amount;
            }

            document.getElementById('txModal').style.display = 'flex'; 
        };

        window.closeTxModal = () => { document.getElementById('txModal').style.display = 'none'; };

        // MENAMPILKAN KETERANGAN DI POPUP RINCIAN
        window.showCollectiveDetail = (encData) => {
            const data = JSON.parse(decodeURIComponent(encData));
            const body = document.getElementById('detailListBody');
            body.innerHTML = '';
            data.forEach((d, i) => {
                let noteHtml = d.note ? `<div style="font-size:10px; color:var(--text-muted); margin-top:4px;"><i class="fas fa-tag"></i> ${d.note}</div>` : '';
                body.innerHTML += `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; padding:15px; border-bottom:1px dashed #E2E8F0;">
                        <div>
                            <div style="font-weight:700; font-size:13px; color:var(--text-main); text-transform:uppercase;">${i+1}. ${d.name}</div>
                            ${noteHtml}
                        </div>
                        <div style="font-family:'Space Grotesk'; font-weight:800; color:var(--success);">Rp ${d.amount.toLocaleString('id-ID')}</div>
                    </div>
                `;
            });
            document.getElementById('detailModal').style.display = 'flex';
        };

        window.saveTxData = async () => {
            const editId = document.getElementById('formEditId').value;
            const rawType = document.getElementById('formTxType').value;
            const description = document.getElementById('formTxDesc').value.trim();
            if(!description) return alert("Nama Transaksi / Acara wajib diisi!");

            let finalAmount = 0; let finalDetails = []; let isCollective = false; let finalType = rawType; 

            if (rawType === 'IN_COLLECTIVE') {
                isCollective = true; finalType = 'IN'; 
                document.querySelectorAll('.coll-item').forEach(row => {
                    let n = row.querySelector('.c-name').value.trim();
                    let a = parseInt(row.querySelector('.c-amt').value) || 0;
                    let note = row.querySelector('.c-note').value.trim();
                    if(n && a > 0) { finalDetails.push({ name: n, amount: a, note: note }); finalAmount += a; }
                });
                if (finalDetails.length === 0) return alert("Daftar donatur/penyumbang tidak boleh kosong!");
            } else {
                finalAmount = parseInt(document.getElementById('formTxAmount').value);
                if(!finalAmount) return alert("Nominal wajib diisi!");
            }

            const btn = document.getElementById('btnSaveTx');
            btn.innerText = "MENYIMPAN..."; btn.style.opacity = '0.7';

            try {
                if (editId) {
                    await updateDoc(doc(db, "mlu_finance", editId), {
                        type: finalType, amount: finalAmount, description: description,
                        isCollective: isCollective,
                        details: isCollective ? finalDetails : []
                    });
                } else {
                    let payload = {
                        type: finalType, amount: finalAmount, description: description,
                        date: new Date().toLocaleDateString('id-ID'),
                        timestamp: Date.now(),
                        actor: `${u.namaKtp || u.nama} (${u.plat})`,
                        isCollective: isCollective
                    };
                    if(isCollective) payload.details = finalDetails;
                    await addDoc(collection(db, "mlu_finance"), payload);
                }
                closeTxModal();
            } catch (e) {
                alert("Gagal menyimpan: " + e.message);
            } finally {
                btn.innerText = "SIMPAN TRANSAKSI"; btn.style.opacity = '1';
            }
        };

        window.delTx = async (id) => { if(confirm("Hapus catatan transaksi ini permanen?")) await deleteDoc(doc(db, "mlu_finance", id)); };
    </script>
</body>
</html>
