<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU Finance - Transparency Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --royal-blue: #0A2259; --electric-blue: #2D63ED; --bg-surface: #F8FAFC; --white: #FFFFFF; --income: #10B981; --expense: #EF4444; --text-main: #0F172A; --text-muted: #64748B; }
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; padding-bottom: 120px; }
        * { box-sizing: border-box; outline: none; }
        
        /* --- HEADER --- */
        .header-finance { background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); padding: 50px 25px 90px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white; text-align: center; }
        .date-label { font-size: 10px; font-weight: 800; letter-spacing: 2px; opacity: 0.8; text-transform: uppercase; }
        .total-balance { font-family: 'Space Grotesk'; font-size: 38px; font-weight: 900; margin: 5px 0; letter-spacing: -1px; }

        /* --- SUMMARY CARD --- */
        .card-overlap { padding: 0 20px; margin-top: -40px; position: relative; z-index: 10; }
        .summary-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 25px; padding: 25px; display: flex; justify-content: space-between; box-shadow: 0 20px 40px rgba(10,34,89,0.1); border: 1px solid rgba(255,255,255,0.8); }
        .stat-box { text-align: center; width: 48%; }
        .stat-val { font-family: 'Space Grotesk'; font-size: 16px; font-weight: 800; margin-top: 5px; }

        /* --- TAB NAVIGATION --- */
        .tab-wrapper { display: flex; margin: 30px 20px 15px; background: #E2E8F0; border-radius: 16px; padding: 4px; }
        .tab-btn { flex: 1; padding: 12px; text-align: center; font-family: 'Space Grotesk'; font-size: 13px; font-weight: 800; color: var(--text-muted); cursor: pointer; border-radius: 12px; transition: 0.3s; }
        .tab-btn.active { background: var(--white); color: var(--royal-blue); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* --- LIST SECTION --- */
        .list-section { padding: 0 20px 30px; }
        
        /* PEMISAH BULAN (MONTH HEADER) */
        .month-divider { display: flex; justify-content: space-between; align-items: flex-end; font-family: 'Space Grotesk'; font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px dashed #CBD5E1; padding-bottom: 8px; margin: 25px 0 15px 0; letter-spacing: 1px; }
        .month-divider:first-child { margin-top: 5px; }
        .m-total { font-size: 13px; font-weight: 900; }

        .tx-card { background: var(--white); border-radius: 20px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; border: 1px solid #E2E8F0; position: relative; }
        .icon-box { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .bg-in { background: #ECFDF5; color: var(--income); } 
        .bg-out { background: #FEF2F2; color: var(--expense); }
        
        .tx-info { flex: 1; }
        .tx-title { font-weight: 700; font-size: 14px; color: var(--royal-blue); }
        .tx-meta { font-size: 11px; color: var(--text-muted); }
        .tx-amount { font-family: 'Space Grotesk'; font-weight: 800; font-size: 14px; }
        
        .audit-trail { font-size: 9px; color: #CBD5E1; font-weight: 600; margin-top: 5px; display: flex; align-items: center; gap: 4px; }
        .btn-del { position: absolute; right: 15px; bottom: 10px; font-size: 10px; color: var(--expense); background: none; border: none; font-weight: 800; cursor: pointer; padding: 5px; }

        /* --- ACTION & NAV BUTTONS --- */
        .fab-admin { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--royal-blue); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 10px 25px rgba(10,34,89,0.3); border: none; cursor: pointer; z-index: 1000; transition: 0.2s;}
        .fab-admin:active { transform: scale(0.9); }
        
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 1000;}
        .btn-premium-back { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid #E2E8F0; padding: 16px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; color: var(--royal-blue); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

        /* --- MODAL FORM --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.8); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; z-index: 9999; }
        .modal-box { background: white; width: 100%; max-width: 500px; border-top-left-radius: 35px; border-top-right-radius: 35px; padding: 30px 25px; transform: translateY(100%); animation: slideUp 0.3s forwards; }
        @keyframes slideUp { to { transform: translateY(0); } }
        
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-title { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--royal-blue); }
        .btn-close { background: #F1F5F9; border: none; width: 30px; height: 30px; border-radius: 50%; font-size: 14px; cursor: pointer; color: var(--text-muted); }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .form-input { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; font-family: 'Inter'; font-weight: 600; font-size: 14px; }
        .form-input:focus { border-color: var(--electric-blue); background: white; }
        
        .btn-save-modal { width: 100%; padding: 18px; border: none; border-radius: 16px; background: var(--royal-blue); color: white; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 800; margin-top: 10px; cursor: pointer; box-shadow: 0 10px 20px rgba(10,34,89,0.2); }
    </style>
</head>
<body>

    <header class="header-finance">
        <div class="date-label" id="lblDate">SALDO KAS MLU PER HARI INI</div>
        <h1 class="total-balance" id="totalCash">Rp 0</h1>
    </header>

    <div class="card-overlap">
        <div class="summary-card">
            <div class="stat-box">
                <div style="font-size:9px; font-weight:800; color:var(--text-muted); text-transform:uppercase;">Total Masuk</div>
                <div class="stat-val" style="color:var(--income);" id="totalIn">Rp 0</div>
            </div>
            <div style="width:1px; background:#E2E8F0;"></div>
            <div class="stat-box">
                <div style="font-size:9px; font-weight:800; color:var(--text-muted); text-transform:uppercase;">Total Keluar</div>
                <div class="stat-val" style="color:var(--expense);" id="totalOut">Rp 0</div>
            </div>
        </div>
    </div>

    <div class="tab-wrapper">
        <div class="tab-btn active" id="tabBtnIn" onclick="switchTab('IN')">Pemasukan Kas</div>
        <div class="tab-btn" id="tabBtnOut" onclick="switchTab('OUT')">Pengeluaran Kas</div>
    </div>

    <main class="list-section">
        <div id="txInContainer"></div>
        <div id="txOutContainer" style="display:none;"></div>
    </main>

    <button class="fab-admin" id="btnAddTx" onclick="openTxModal()"><i class="fas fa-plus"></i></button>

    <div class="back-nav"><a href="dashboard.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a></div>

    <div class="modal-overlay" id="txModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title">Catat Transaksi Kas</div>
                <button class="btn-close" onclick="closeTxModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="form-group">
                <label>Jenis Transaksi</label>
                <select id="formTxType" class="form-input" style="font-weight: 800;">
                    <option value="IN">PEMASUKAN KAS (Uang Masuk)</option>
                    <option value="OUT">PENGELUARAN KAS (Uang Keluar)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Jumlah Nominal (Rp)</label>
                <input type="number" id="formTxAmount" class="form-input" placeholder="Contoh: 150000" style="font-family:'Space Grotesk'; font-size:18px;">
            </div>
            <div class="form-group">
                <label>Keterangan / Rincian Transaksi</label>
                <input type="text" id="formTxDesc" class="form-input" placeholder="Contoh: Iuran Bulanan / Beli Kopi">
            </div>
            
            <button class="btn-save-modal" id="btnSaveTx" onclick="saveTxData()">SIMPAN TRANSAKSI</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // CEK JABATAN ADMIN
        const u = JSON.parse(localStorage.getItem('maka_user')) || {};
        const isAdmin = u.isSuperAdmin || (u.role === 'KETUA UMUM' || u.role === 'WAKIL KETUA' || u.role === 'SEKRETARIS');

        if (isAdmin) document.getElementById('btnAddTx').style.display = 'flex';

        // Set Tanggal Hari Ini di Header
        const todayOptions = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById('lblDate').innerText = `SALDO KAS MLU PER ${new Date().toLocaleDateString('id-ID', todayOptions).toUpperCase()}`;

        // --- SISTEM TABS ---
        window.switchTab = (type) => {
            if (type === 'IN') {
                document.getElementById('tabBtnIn').classList.add('active');
                document.getElementById('tabBtnOut').classList.remove('active');
                document.getElementById('txInContainer').style.display = 'block';
                document.getElementById('txOutContainer').style.display = 'none';
            } else {
                document.getElementById('tabBtnOut').classList.add('active');
                document.getElementById('tabBtnIn').classList.remove('active');
                document.getElementById('txOutContainer').style.display = 'block';
                document.getElementById('txInContainer').style.display = 'none';
            }
        };

        // --- AMBIL DATA REALTIME & AUTO-SORTING PER BULAN ---
        onSnapshot(query(collection(db, "mlu_finance"), orderBy("timestamp", "desc")), (snap) => {
            let balance = 0, globalIn = 0, globalOut = 0;
            
            // Map akan secara otomatis menyimpan data berurutan sesuai dari Snapshot (descending)
            let groupIn = new Map();
            let groupOut = new Map();

            snap.forEach(docSnap => {
                const d = docSnap.data();
                const amt = d.amount || 0;
                const type = d.type;
                
                // Ambil Bulan & Tahun dari timestamp
                const dateObj = new Date(d.timestamp);
                const monthYear = dateObj.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });

                if (type === 'IN') { 
                    globalIn += amt; balance += amt; 
                    if(!groupIn.has(monthYear)) groupIn.set(monthYear, { total: 0, items: [] });
                    let grp = groupIn.get(monthYear);
                    grp.total += amt;
                    grp.items.push({ id: docSnap.id, ...d });
                } else { 
                    globalOut += amt; balance -= amt; 
                    if(!groupOut.has(monthYear)) groupOut.set(monthYear, { total: 0, items: [] });
                    let grp = groupOut.get(monthYear);
                    grp.total += amt;
                    grp.items.push({ id: docSnap.id, ...d });
                }
            });

            // Update Global Summary
            document.getElementById('totalCash').innerText = "Rp " + balance.toLocaleString('id-ID');
            document.getElementById('totalIn').innerText = "Rp " + globalIn.toLocaleString('id-ID');
            document.getElementById('totalOut').innerText = "Rp " + globalOut.toLocaleString('id-ID');

            // Fungsi Merender HTML per Group
            const renderGroupHtml = (mapData, isMasuk) => {
                if(mapData.size === 0) return `<div style="text-align:center; padding:40px; color:#94A3B8;"><i class="fas fa-folder-open" style="font-size:30px; margin-bottom:10px;"></i><br>Belum ada catatan ${isMasuk ? 'pemasukan' : 'pengeluaran'}.</div>`;
                
                let html = '';
                const colorTotal = isMasuk ? 'var(--income)' : 'var(--expense)';
                const sign = isMasuk ? '+' : '-';

                mapData.forEach((val, monthName) => {
                    // Header Bulan & Sub-total
                    html += `
                        <div class="month-divider">
                            <span><i class="far fa-calendar-alt"></i> ${monthName}</span>
                            <span class="m-total" style="color:${colorTotal}">TOTAL: Rp ${val.total.toLocaleString('id-ID')}</span>
                        </div>
                    `;

                    // Loop daftar di bulan tersebut
                    val.items.forEach(d => {
                        const auditHtml = isAdmin ? `<div class="audit-trail"><i class="fas fa-user-shield"></i> Oleh: ${d.actor}</div><button class="btn-del" onclick="window.delTx('${d.id}')"><i class="fas fa-trash"></i></button>` : '';
                        html += `
                            <div class="tx-card">
                                <div class="icon-box ${isMasuk ? 'bg-in' : 'bg-out'}"><i class="fas ${isMasuk ? 'fa-arrow-down' : 'fa-arrow-up'}"></i></div>
                                <div class="tx-info">
                                    <div class="tx-title">${d.description}</div>
                                    <div class="tx-meta">${d.date}</div>
                                    ${auditHtml}
                                </div>
                                <div class="tx-amount" style="color:${colorTotal}">${sign} Rp ${d.amount.toLocaleString('id-ID')}</div>
                            </div>
                        `;
                    });
                });
                return html;
            };

            // Injeksi ke container
            document.getElementById('txInContainer').innerHTML = renderGroupHtml(groupIn, true);
            document.getElementById('txOutContainer').innerHTML = renderGroupHtml(groupOut, false);
        });

        // --- SISTEM MODAL INPUT ---
        window.openTxModal = () => { document.getElementById('txModal').style.display = 'flex'; };
        window.closeTxModal = () => {
            document.getElementById('txModal').style.display = 'none';
            document.getElementById('formTxAmount').value = '';
            document.getElementById('formTxDesc').value = '';
        };

        window.saveTxData = async () => {
            const type = document.getElementById('formTxType').value;
            const amount = parseInt(document.getElementById('formTxAmount').value);
            const description = document.getElementById('formTxDesc').value.trim();

            if(!amount || !description) return alert("Nominal dan Keterangan wajib diisi!");

            const btn = document.getElementById('btnSaveTx');
            btn.innerText = "MENYIMPAN..."; btn.style.opacity = '0.7';

            try {
                await addDoc(collection(db, "mlu_finance"), {
                    type, amount, description,
                    date: new Date().toLocaleDateString('id-ID'),
                    timestamp: Date.now(),
                    actor: `${u.namaKtp || u.nama} (${u.plat})` // Menyimpan jejak siapa yang input
                });
                closeTxModal();
            } catch (e) {
                alert("Gagal menyimpan: " + e.message);
            } finally {
                btn.innerText = "SIMPAN TRANSAKSI"; btn.style.opacity = '1';
            }
        };

        window.delTx = async (id) => {
            if(confirm("Hapus catatan transaksi ini permanen?")) await deleteDoc(doc(db, "mlu_finance", id));
        };
    </script>
</body>
</html>
