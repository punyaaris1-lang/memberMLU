<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADMIN PANEL - FC KG</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@300;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --navy-dark: #071022; --navy-main: #0A1931; --navy-light: #15305B;
            --gold-dark: #B48608; --gold-main: #D4AF37; --gold-light: #FDE047;
            --bg-body: #E2E8F0; --white: #FFFFFF; 
            --text-dark: #0F172A; --text-gray: #64748B; 
            --success: #10B981; --danger: #EF4444; --electric-blue: #2D63ED;
            --purple: #8B5CF6; --cyan: #06B6D4;
        }

        body { 
            background-color: var(--bg-body); color: var(--text-dark); 
            font-family: 'Inter', sans-serif; padding: 15px; font-size: 12px; margin: 0;
            min-height: 100vh; position: relative;
        }
        
        body::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at top left, #FFFFFF 0%, transparent 60%),
                        radial-gradient(circle at bottom right, rgba(45,99,237,0.1) 0%, transparent 60%);
            z-index: -2; pointer-events: none;
        }

        * { box-sizing: border-box; outline: none; }

        .adm-header { 
            display: flex; align-items: center; justify-content: space-between; 
            margin-bottom: 20px; background: rgba(255,255,255,0.8); backdrop-filter: blur(15px);
            padding: 15px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(10,25,49,0.05); 
            border: 1px solid rgba(255,255,255,0.9);
        }
        
        .box { 
            background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.9); padding: 20px; margin-bottom: 15px; 
            border-radius: 20px; box-shadow: 0 10px 30px rgba(10,25,49,0.04); 
        }
        
        h3 { 
            margin: 0 0 15px 0; color: var(--navy-main); border-bottom: 2px solid #F1F5F9; 
            padding-bottom: 10px; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 900; 
            display: flex; justify-content: space-between; align-items: center; 
        }
        
        button { 
            cursor: pointer; padding: 10px 15px; font-weight: 900; font-family: 'Space Grotesk'; 
            font-size: 11px; letter-spacing: 1px; border-radius: 12px; transition: 0.2s; 
            border: none; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,0,0,0.05); 
        }
        button:active { transform: scale(0.95); }
        
        .btn-red { background: var(--danger); color: white; box-shadow: 0 5px 15px rgba(239,68,68,0.2); }
        .btn-green { background: var(--success); color: white; box-shadow: 0 5px 15px rgba(16,185,129,0.2); }
        .btn-blue { background: var(--electric-blue); color: white; box-shadow: 0 5px 15px rgba(45,99,237,0.2); }
        .btn-gold { background: var(--gold-main); color: var(--navy-dark); box-shadow: 0 5px 15px rgba(212,175,55,0.2); }
        .btn-cyan { background: var(--cyan); color: white; }
        .btn-mini { padding: 6px 10px; font-size: 10px; margin: 2px; box-shadow: none; }

        input, select { 
            background: #F8FAFC; color: var(--navy-main); border: 1px solid #E2E8F0; 
            padding: 12px; border-radius: 12px; font-family: 'Inter'; font-weight:700; font-size: 12px;
            width: 100%; box-sizing: border-box; margin-bottom:5px; text-transform: uppercase; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--electric-blue); background: white; box-shadow: 0 0 0 3px rgba(45,99,237,0.1); }
        
        table { width: 100%; border-collapse: separate; border-spacing: 0 6px; margin-top: 5px; font-size: 11px; }
        td, th { padding: 10px 12px; text-align: left; vertical-align: middle; background: white; border-top: 1px solid #F1F5F9; border-bottom: 1px solid #F1F5F9; }
        th { color: var(--text-gray); font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; letter-spacing: 1px; background: transparent; border: none; padding-bottom: 5px;}
        tr td:first-child { border-left: 1px solid #F1F5F9; border-top-left-radius: 12px; border-bottom-left-radius: 12px; }
        tr td:last-child { border-right: 1px solid #F1F5F9; border-top-right-radius: 12px; border-bottom-right-radius: 12px; }

        /* MODIFIKASI GAP AGAR LEBIH LEGA */
        .slot-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        
        /* MODIFIKASI PADDING DAN WORD-WRAP */
        .slot-item { 
            border: 1px solid rgba(255,255,255,0.9); padding: 10px; background: rgba(255,255,255,0.5); 
            text-align: center; border-radius: 16px; min-height: 140px; display: flex; 
            flex-direction: column; justify-content: space-between; position: relative; overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03); transition: 0.3s;
            word-wrap: break-word; overflow-wrap: break-word;
        }
        .slot-item.active { border: 2px solid var(--electric-blue); background: #FFFFFF; box-shadow: 0 10px 25px rgba(45,99,237,0.1); }
        
        .adm-badge { font-family: 'Space Grotesk'; font-size: 9px; padding: 4px 8px; border-radius: 6px; font-weight: 900; display: inline-block; margin-top: 5px; letter-spacing: 1px;}
        .bg-pea { background: var(--purple); color: #fff; }
        .bg-gold { background: var(--gold-main); color: var(--navy-dark); }
        .bg-red { background: var(--danger); color: #fff; }
        .bg-green { background: var(--success); color: #fff; }
        .bg-cyan { background: var(--cyan); color: #fff; }
        .bg-guest { background: #E2E8F0; color: var(--text-gray); }

        .term-container { 
            background: #F8FAFC; border: 1px solid #E2E8F0; height: 150px; overflow-y: auto; 
            padding: 12px; font-family: 'Courier New', monospace; font-size: 11px; 
            color: var(--text-dark); border-radius: 12px; display: flex; flex-direction: column; 
        }
        .log-line { margin-bottom: 6px; border-bottom: 1px dashed #E2E8F0; padding-bottom: 4px; }

        #customModal, #editModal { display: none; position: fixed; inset: 0; background: rgba(10,25,49,0.8); z-index: 9999; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-box { background: white; border: 1px solid #E2E8F0; width: 85%; max-width: 320px; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2); }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        .mb-yes { flex:1; background: var(--electric-blue); color: white; box-shadow: 0 10px 20px rgba(45,99,237,0.2); }
        .mb-no { flex:1; background: #F1F5F9; color: var(--text-gray); box-shadow: none; }

        #adminDashboard { display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="adminDashboard">
        <div class="adm-header">
            <div>
                <div style="font-family:'Outfit'; font-weight:900; font-size:22px; color:var(--navy-main); letter-spacing:-1px; display:flex; align-items:center; gap:8px;">
                    <i class="fas fa-shield-alt" style="color:var(--gold-main);"></i> ADMIN PANEL
                </div>
                <div style="font-family:'Space Grotesk'; font-size:10px; font-weight:800; color:var(--text-gray); letter-spacing:1px; margin-top:4px;">
                    SYSTEM ACTIVE <span id="admNameDisplay" style="color:var(--success); margin-left:5px;">• ONLINE</span>
                </div>
            </div>
            <div style="display:flex; gap:8px;">
                <button onclick="window.location.href='system.html'" class="btn-blue" style="font-size:12px; padding:10px; border-radius:12px;"><i class="fas fa-cog"></i></button>
                <button onclick="window.location.href='index.html'" class="btn-red" style="font-size:12px; padding:10px; border-radius:12px;" title="Keluar"><i class="fas fa-power-off"></i></button>
            </div>
        </div>

        <div class="box">
            <h3><span style="display:flex; align-items:center; gap:8px;"><i class="fas fa-tv" style="color:var(--electric-blue);"></i> LIVE MONITORING</span></h3>
            <div class="slot-grid">
                <div id="slot1" class="slot-item">...</div>
                <div id="slot2" class="slot-item">...</div>
                <div id="slot3" class="slot-item">...</div>
            </div>
            
            <div style="margin-top:15px; background:#F8FAFC; padding:12px; border-radius:12px; border:1px solid #E2E8F0; display:flex; align-items:center; gap:8px;">
                <span style="font-size:11px; font-weight:700; color:var(--text-gray);">SWAP:</span>
                <select id="moveSrc" style="padding:8px; width:auto; border-radius:8px;"><option value="0">SLOT 1</option><option value="1">SLOT 2</option><option value="2">SLOT 3</option></select>
                <span style="color:var(--text-gray); font-size:14px;"><i class="fas fa-exchange-alt"></i></span>
                <select id="moveDest" style="padding:8px; width:auto; border-radius:8px;"><option value="1">SLOT 2</option><option value="2">SLOT 3</option><option value="0">SLOT 1</option></select>
                <button onclick="askConfirm('Tukar Posisi User?', moveSlotUser)" class="btn-blue btn-mini" style="border-radius:8px; padding:8px 12px;">GO</button>
            </div>
        </div>

        <div class="box">
            <h3>
                <span style="display:flex; align-items:center; gap:8px;"><i class="fas fa-users" style="color:var(--gold-main);"></i> DAFTAR ANTRIAN</span>
                <button onclick="askConfirm('RESET URUTAN NOMOR JADI 1? (ORANG TETAP ADA)', resetTicketNumbers)" class="btn-red btn-mini" style="border-radius:8px;"><i class="fas fa-sync-alt"></i> RESET NO</button>
            </h3>
            
            <div id="queueTable" style="max-height:300px; overflow-y:auto; margin-bottom:15px; padding-right:5px;"></div>
            
            <div style="background:#F8FAFC; padding:15px; border-radius:12px; border: 1px solid #E2E8F0;">
                <div style="font-family:'Space Grotesk'; font-size:10px; font-weight:800; color:var(--navy-main); margin-bottom:8px; display:flex; align-items:center; gap:5px;"><i class="fas fa-bolt" style="color:var(--gold-main);"></i> FORCE INPUT (MANUAL)</div>
                <div style="display:flex; gap:8px; margin-bottom:8px;">
                    <input id="newPlat" placeholder="PLAT (Cth: B 7777 PEA)" style="flex:2;">
                    <input id="newNama" placeholder="NAMA" style="flex:2;">
                    <input id="newBatre" type="number" placeholder="BATRE (%)" style="flex:1;" max="100">
                </div>
                <div style="display:flex; gap:8px;">
                    <button onclick="manualAdd('queue')" class="btn-green" style="flex:2;">+ ANTRIAN</button>
                    <button onclick="manualAdd(0)" class="btn-gold" style="flex:1;">S1</button>
                    <button onclick="manualAdd(1)" class="btn-gold" style="flex:1;">S2</button>
                    <button onclick="manualAdd(2)" class="btn-gold" style="flex:1;">S3</button>
                </div>
            </div>
        </div>

        <div class="box" style="background: #FEF2F2; border: 1px solid #FECACA;">
            <h3 style="color:var(--danger); border-bottom-color: #FCA5A5;"><span style="display:flex; align-items:center; gap:8px;"><i class="fas fa-exclamation-triangle"></i> EMERGENCY ZONE</span></h3>
            <div style="display:flex; gap:10px;">
                <button onclick="checkRecovery()" class="btn-blue" style="flex:1;"><i class="fas fa-folder-open"></i> CEK SNAPSHOT</button>
                <button onclick="askConfirm('RESET SEMUA DATA (HAPUS SEMUA)?', hardReset)" class="btn-red" style="flex:1;"><i class="fas fa-skull"></i> KOSONGKAN SISTEM</button>
            </div>
            <div id="recoveryPanel" style="display:none; margin-top:15px; background:white; padding:15px; border:1px dashed var(--danger); border-radius:12px;">
                <div id="recList" style="font-size:11px; font-weight:700; margin-bottom:10px; color:var(--navy-main);"></div>
                <button onclick="executeRestore()" class="btn-green" style="width:100%;"><i class="fas fa-trash-restore"></i> PULIHKAN DATA</button>
            </div>
        </div>

        <div style="font-family:'Space Grotesk'; font-size:10px; font-weight:800; color:var(--text-gray); margin-bottom:8px; letter-spacing:1px;"><i class="fas fa-terminal"></i> SYSTEM LOGS</div>
        <div class="term-container" id="termLog"></div>
    </div>

    <div id="customModal">
        <div class="modal-box">
            <div style="width:50px; height:50px; border-radius:50%; background:rgba(239,68,68,0.1); color:var(--danger); display:flex; align-items:center; justify-content:center; font-size:24px; margin:0 auto 15px;"><i class="fas fa-exclamation"></i></div>
            <h2 style="margin:0 0 10px 0; font-family:'Outfit'; font-weight:900; color:var(--navy-main); font-size:20px;">KONFIRMASI</h2>
            <div id="modalText" style="color:var(--text-gray); font-weight:500; margin-bottom:25px; font-size:13px; line-height:1.5;">Text</div>
            <div class="modal-btns">
                <button onclick="closeModal()" class="mb-no">BATAL</button>
                <button id="btnYes" class="mb-yes">YA, LANJUTKAN</button>
            </div>
        </div>
    </div>

    <div id="editModal">
        <div class="modal-box">
            <h2 style="margin:0 0 20px 0; font-family:'Outfit'; font-weight:900; color:var(--navy-main); font-size:20px; border-bottom:1px solid #E2E8F0; padding-bottom:10px;">EDIT USER</h2>
            
            <label style="display:block; text-align:left; color:var(--text-gray); font-family:'Space Grotesk'; font-size:10px; font-weight:800; margin-bottom:4px; letter-spacing:0.5px;">PLAT NOMOR</label>
            <input id="editPlat" type="text" style="margin-bottom:15px;">
            
            <label style="display:block; text-align:left; color:var(--text-gray); font-family:'Space Grotesk'; font-size:10px; font-weight:800; margin-bottom:4px; letter-spacing:0.5px;">NAMA USER</label>
            <input id="editName" type="text" style="margin-bottom:15px;">
            
            <label style="display:block; text-align:left; color:var(--text-gray); font-family:'Space Grotesk'; font-size:10px; font-weight:800; margin-bottom:4px; letter-spacing:0.5px;">SISA BATRE (%)</label>
            <input id="editBatt" type="number" max="100" style="margin-bottom:20px;">

            <input type="hidden" id="editIndex"> 
            <div class="modal-btns">
                <button onclick="closeEditModal()" class="mb-no">BATAL</button>
                <button onclick="saveEdit()" class="mb-yes">SIMPAN</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, runTransaction, collection, addDoc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyB666i9lYWIpxOdkwpoX9EvFvHLmHczeq8", authDomain: "fcgadingnew22.firebaseapp.com", projectId: "fcgadingnew22", storageBucket: "fcgadingnew22.firebasestorage.app", messagingSenderId: "537736846678", appId: "1:537736846678:web:53788d71a196423ac08af7" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mainRef = doc(db, "antrian", "utama");
        const logRef = collection(db, "activityLog");
        const snapshotRef = doc(db, "antrian", "snapshot");

        let cachedSlots = [null, null, null];
        let cachedQueue = [];
        let snapshotData = null;

        // --- MODAL LOGIC ---
        let currentCallback = null;
        window.askConfirm = (text, callback) => {
            document.getElementById('modalText').innerText = text;
            document.getElementById('customModal').style.display = 'flex';
            currentCallback = callback;
        };
        document.getElementById('btnYes').onclick = () => { if(currentCallback) currentCallback(); closeModal(); };
        window.closeModal = () => { document.getElementById('customModal').style.display = 'none'; currentCallback = null; };

        // --- EDIT MODAL LOGIC ---
        window.openEdit = (idx) => {
            const user = cachedQueue[idx];
            if(!user) return;
            document.getElementById('editIndex').value = idx;
            document.getElementById('editPlat').value = user.plat;
            document.getElementById('editName').value = user.userName;
            document.getElementById('editBatt').value = user.batreSisa || ""; 
            document.getElementById('editModal').style.display = 'flex';
        };

        window.closeEditModal = () => { document.getElementById('editModal').style.display = 'none'; };

        window.saveEdit = () => {
            const idx = parseInt(document.getElementById('editIndex').value);
            const p = document.getElementById('editPlat').value.toUpperCase();
            const n = document.getElementById('editName').value.toUpperCase();
            const b = document.getElementById('editBatt').value;
            const admName = "ADMIN";

            if(!p || !n) return alert("Plat & Nama tidak boleh kosong!");

            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                let q = d.waitingQueue;
                
                if(q[idx]) {
                    q[idx].plat = p;
                    q[idx].userName = n;
                    q[idx].batreSisa = b; 
                    t.update(mainRef, { waitingQueue: q });
                    addLog(admName, "EDIT_USER", `Update data: ${p}`);
                }
            }).then(() => {
                closeEditModal();
                alert("Data Berhasil Diupdate!");
            }).catch(e => alert("Gagal Update: " + e));
        };

        // === MONITOR ===
        onSnapshot(mainRef, (snap) => {
            if (!snap.exists()) return;
            const d = snap.data();
            cachedSlots = d.chargingSlots || [null,null,null];
            cachedQueue = d.waitingQueue || [];
            updateMonitor();
        });

        function updateMonitor() {
            // UPDATE SLOT
            cachedSlots.forEach((s, i) => {
                const el = document.getElementById(`slot${i+1}`);
                if(s) {
                    let badgeClass = "bg-guest"; let roleText = s.role || "GUEST";
                    if(roleText.includes("MEMBER") || roleText.includes("KELUARGA") || roleText.includes("KETUA")) { badgeClass = "bg-gold"; }
                    else if(roleText.includes("PEA")) { badgeClass = "bg-pea"; }
                    else if(roleText.includes("SATGAS")) { badgeClass = "bg-red"; }
                    else if(roleText.includes("TURTLE")) { badgeClass = "bg-green"; }
                    else if(roleText.includes("OFFICE")) { badgeClass = "bg-cyan"; }

                    el.className = "slot-item active";
                    el.innerHTML = `
                        <div>
                            <div style="font-size:20px; font-family:'Space Grotesk'; font-weight:900; color:var(--navy-main); line-height:1.1; word-break: break-word;">${s.plat}</div>
                            <div style="font-size:11px; font-weight:700; color:var(--text-gray); margin-top:4px;">${s.userName}</div>
                            <div style="font-size:12px; font-weight:900; color:var(--success); background:rgba(16,185,129,0.1); display:inline-block; padding:4px 8px; border-radius:8px; margin-top:6px;">BAT: ${s.batreSisa || '-'}%</div>
                            <div style="margin-top:6px;"><span class="adm-badge ${badgeClass}">${roleText}</span></div>
                        </div>
                        <div style="display:grid; gap:4px; width:100%; margin-top:10px;">
                            <button class="btn-red btn-mini" style="border-radius:8px;" onclick="askConfirm('Keluarkan User ini?', ()=>forceStop(${i}))">STOP / KICK</button>
                            <button class="btn-gold btn-mini" style="border-radius:8px;" onclick="askConfirm('Pindahkan ke Antrian?', ()=>kickToQueue(${i}))">KE ANTRIAN</button>
                        </div>
                    `;
                } else {
                    el.className = "slot-item";
                    el.innerHTML = `<div style="color:var(--text-gray); margin:auto; font-weight:600; font-size:12px;"><i class="fas fa-plug" style="display:block; font-size:24px; color:#CBD5E1; margin-bottom:8px;"></i>KOSONG</div>`;
                }
            });

            // UPDATE QUEUE TABLE
            let h = `<table><tr><th width="30">#</th><th>PLAT / NAMA</th><th width="90" style="text-align:center;">PINDAH KE</th><th width="80" style="text-align:center;">AKSI</th></tr>`;
            if(cachedQueue.length === 0) h += `<tr><td colspan="4" style="text-align:center; padding:20px; color:var(--text-gray); font-weight:600;">TIDAK ADA ANTRIAN</td></tr>`;
            
            cachedQueue.forEach((q, idx) => {
                let badgeClass = "bg-guest"; let roleText = q.role || "GUEST";
                if(roleText.includes("MEMBER") || roleText.includes("KELUARGA")) badgeClass = "bg-gold";
                
                h += `<tr>
                    <td style="font-size:16px; font-weight:900; font-family:'Space Grotesk'; color:var(--navy-main);">${q.qNo}</td>
                    <td>
                        <b style="color:var(--navy-main); font-size:14px; font-family:'Space Grotesk'; font-weight:900;">${q.plat}</b> 
                        <span style="color:var(--success); font-weight:800; font-size:10px; font-family:'Space Grotesk'; background:rgba(16,185,129,0.1); padding:2px 6px; border-radius:6px; margin-left:4px;">${q.batreSisa || '?'}%</span><br>
                        <span style="color:var(--text-gray); font-size:11px; font-weight:600;">${q.userName}</span> 
                        <span class="adm-badge ${badgeClass}" style="font-size:8px; padding:2px 6px;">${roleText}</span>
                    </td>
                    <td>
                        <div style="display:flex; gap:4px; justify-content:center;">
                            <button class="btn-gold btn-mini" style="border-radius:6px; padding:6px; flex:1;" onclick="forceToSlot('${q.plat}', 0)">S1</button>
                            <button class="btn-gold btn-mini" style="border-radius:6px; padding:6px; flex:1;" onclick="forceToSlot('${q.plat}', 1)">S2</button>
                            <button class="btn-gold btn-mini" style="border-radius:6px; padding:6px; flex:1;" onclick="forceToSlot('${q.plat}', 2)">S3</button>
                        </div>
                    </td>
                    <td>
                        <div style="display:flex; gap:4px; justify-content:center;">
                            <button class="btn-cyan btn-mini" style="border-radius:6px; padding:6px;" onclick="openEdit(${idx})" title="Edit User"><i class="fas fa-pen"></i></button> 
                            <button class="btn-blue btn-mini" style="border-radius:6px; padding:6px;" onclick="switchQueue(${idx}, -1)"><i class="fas fa-arrow-up"></i></button>
                            <button class="btn-blue btn-mini" style="border-radius:6px; padding:6px;" onclick="switchQueue(${idx}, 1)"><i class="fas fa-arrow-down"></i></button>
                            <button class="btn-red btn-mini" style="border-radius:6px; padding:6px;" onclick="askConfirm('Hapus dari Antrean?', ()=>delQueue('${q.plat}'))"><i class="fas fa-times"></i></button>
                        </div>
                    </td>
                </tr>`;
            });
            document.getElementById('queueTable').innerHTML = h + `</table>`;
        }

        window.resetTicketNumbers = () => {
            const admName = "ADMIN";
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                let queue = d.waitingQueue || [];
                queue.forEach((q, index) => { q.qNo = index + 1; });
                t.update(mainRef, { waitingQueue: queue, lastTicket: queue.length });
                addLog(admName, "RESET_NUMBER", `Re-indexed ${queue.length} users`);
            }).then(() => alert("Nomor berhasil diurutkan ulang dari 1!")).catch(e => alert("Gagal: " + e));
        };

        window.manualAdd = async (target) => {
            const p = document.getElementById('newPlat').value.trim().toUpperCase();
            const n = document.getElementById('newNama').value.trim().toUpperCase();
            const b = document.getElementById('newBatre').value;
            const admName = "ADMIN";

            if(!p) return alert("Plat Nomor Wajib Diisi!");
            if(!b) return alert("SISA BATERAI WAJIB DIISI!"); 

            let userRole = "GUEST";
            const cleanID = p.replace(/[^A-Z0-9]/g, '');
            try {
                let m = await getDoc(doc(db, "members", cleanID));
                if(m.exists()) userRole = m.data().role || "MEMBER";
            } catch(e) {}

            runTransaction(db, async(t) => {
                const docSnap = await t.get(mainRef);
                let d = docSnap.data();
                if([...(d.chargingSlots||[]), ...d.waitingQueue].some(u => u && u.plat === p)) throw "User sudah ada!";

                const newNo = (d.lastTicket||0)+1;
                const u = { plat:p, userName:n||"MANUAL", qNo:newNo, entryTime:Date.now(), role: userRole, batreSisa: b };

                if(target === 'queue') d.waitingQueue.push(u); 
                else { 
                    if(d.chargingSlots[target]) throw "Slot Penuh!"; 
                    u.startTime = Date.now(); d.chargingSlots[target] = u; 
                }

                t.set(snapshotRef, { ...d, backupTime: new Date() });
                t.update(mainRef, { waitingQueue:d.waitingQueue, chargingSlots:d.chargingSlots, lastTicket:newNo });
                addLog(admName, "MANUAL_INPUT", `Add ${p} (Batre: ${b}%)`);
            }).then(() => {
                document.getElementById('newPlat').value = '';
                document.getElementById('newNama').value = '';
                document.getElementById('newBatre').value = '';
            }).catch(e => alert("GAGAL: " + e));
        };

        window.forceToSlot = (plat, slotIdx) => {
            const admName = "ADMIN";
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                if(d.chargingSlots[slotIdx]) throw "SLOT TERISI!";
                const qIdx = d.waitingQueue.findIndex(x => x.plat === plat);
                if(qIdx === -1) throw "User hilang.";
                const user = d.waitingQueue.splice(qIdx, 1)[0];
                user.startTime = Date.now();
                d.chargingSlots[slotIdx] = user;
                t.update(mainRef, { chargingSlots: d.chargingSlots, waitingQueue: d.waitingQueue });
                addLog(admName, "FORCE_SLOT", `${plat} -> S${slotIdx+1}`);
            }).catch(e => alert(e));
        };

        window.forceStop = (i) => {
            const admName = "ADMIN";
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                d.chargingSlots[i] = null;
                t.update(mainRef, { chargingSlots: d.chargingSlots });
                addLog(admName, "STOP_SLOT", `Kick User dari Slot ${i+1}`);
            });
        };

        window.kickToQueue = (i) => {
            const admName = "ADMIN";
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                const u = d.chargingSlots[i];
                if(u) {
                    d.chargingSlots[i] = null; delete u.startTime; 
                    d.waitingQueue.unshift(u);
                    t.update(mainRef, { chargingSlots: d.chargingSlots, waitingQueue: d.waitingQueue });
                    addLog(admName, "KICK_TO_QUEUE", `Pindah Slot ${i+1} ke Antrian`);
                }
            });
        };

        window.moveSlotUser = () => {
            const s1 = document.getElementById('moveSrc').value;
            const s2 = document.getElementById('moveDest').value;
            const admName = "ADMIN";
            if(s1 == s2) return alert("Pilih slot beda!");
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                const temp = d.chargingSlots[s1];
                d.chargingSlots[s1] = d.chargingSlots[s2];
                d.chargingSlots[s2] = temp;
                t.update(mainRef, { chargingSlots: d.chargingSlots });
                addLog(admName, "SWAP_SLOT", `S${parseInt(s1)+1} <=> S${parseInt(s2)+1}`);
            });
        };

        window.switchQueue = (idx, dir) => {
            const admName = "ADMIN";
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                let q = d.waitingQueue;
                const target = idx + dir;
                if(target >= 0 && target < q.length) {
                    [q[idx], q[target]] = [q[target], q[idx]];
                    t.update(mainRef, { waitingQueue: q });
                    addLog(admName, "MOVE_QUEUE", `Pindah Urutan (Index ${idx})`);
                }
            });
        };

        window.delQueue = (p) => {
            const admName = "ADMIN";
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                const newQ = d.waitingQueue.filter(x => x.plat !== p);
                t.update(mainRef, { waitingQueue: newQ });
                addLog(admName, "DELETE_QUEUE", `Hapus Plat: ${p}`);
            });
        };

        window.checkRecovery = async () => {
            const s = await getDoc(snapshotRef);
            if(!s.exists()) return alert("Tidak ada backup.");
            snapshotData = s.data();
            document.getElementById('recList').innerText = `BACKUP DATE: ${snapshotData.backupTime ? snapshotData.backupTime.toDate().toLocaleString('id-ID') : '-'}`;
            document.getElementById('recoveryPanel').style.display = 'block';
        };

        window.executeRestore = () => {
            const admName = "ADMIN";
            if(!snapshotData) return;
            runTransaction(db, async(t) => {
                t.set(mainRef, { chargingSlots: snapshotData.chargingSlots || [null,null,null], waitingQueue: snapshotData.waitingQueue || [], lastTicket: snapshotData.lastTicket || 0 });
                addLog(admName, "RESTORE", "Restored Snapshot System");
            });
            document.getElementById('recoveryPanel').style.display = 'none';
            alert("Data Pulih!");
        };

        window.hardReset = () => {
            const admName = "ADMIN";
            runTransaction(db, async(t) => {
                t.set(mainRef, { chargingSlots: [null,null,null], waitingQueue: [], lastTicket: 0 });
                addLog(admName, "HARD_RESET", "Wiped All Data");
            });
        };

        onSnapshot(query(logRef, orderBy("timestamp", "desc"), limit(20)), (snap) => {
            let h = '';
            snap.forEach(d => {
                const x = d.data();
                h += `<div class="log-line">[${x.timestamp ? x.timestamp.toDate().toLocaleTimeString('id-ID') : '-'}] <strong style="color:var(--navy-main)">${x.actor}</strong>: <span style="color:var(--electric-blue); font-weight:700;">${x.action}</span> <span style="color:var(--text-gray)">- ${x.details}</span></div>`;
            });
            document.getElementById('termLog').innerHTML = h;
        });

        function addLog(actor, act, det) { 
            addDoc(logRef, { action: act, details: det, actor: actor, timestamp: new Date() }); 
        }
    </script>
</body>
</html>
