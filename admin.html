<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUPER ADMIN - FC KG</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --navy-dark: #071022; --navy-main: #0A1931; --navy-light: #15305B;
            --gold-dark: #B48608; --gold-main: #D4AF37; --gold-light: #FDE047;
            --bg-body: #F1F5F9; --white: #FFFFFF; 
            --text-dark: #0F172A; --text-gray: #64748B; 
            --success: #10B981; --danger: #EF4444; --electric-blue: #2D63ED;
        }

        body { 
            background-color: var(--bg-body); color: var(--text-dark); 
            font-family: 'Inter', sans-serif; padding: 15px; margin: 0; padding-bottom: 50px;
            -webkit-tap-highlight-color: transparent;
        }

        * { box-sizing: border-box; outline: none; }

        /* HEADER */
        .adm-header { 
            display: flex; align-items: center; justify-content: space-between; 
            margin-bottom: 20px; background: var(--white);
            padding: 15px 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); 
            border: 1px solid #E2E8F0;
        }

        /* SECTION BOX */
        .box { 
            background: var(--white); border: 1px solid #E2E8F0; padding: 20px; 
            margin-bottom: 15px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); 
        }
        
        h3 { 
            margin: 0 0 15px 0; color: var(--navy-main); border-bottom: 2px solid #F1F5F9; 
            padding-bottom: 12px; font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 900; 
            display: flex; justify-content: space-between; align-items: center; text-transform: uppercase;
        }

        /* BUTTONS */
        button { 
            cursor: pointer; padding: 12px 15px; font-weight: 800; font-family: 'Space Grotesk'; 
            font-size: 12px; border-radius: 12px; transition: 0.2s; border: none; 
            display: inline-flex; align-items: center; justify-content: center; gap: 6px;
        }
        button:active { transform: scale(0.95); }
        .btn-red { background: rgba(239,68,68,0.1); color: var(--danger); }
        .btn-red:active { background: var(--danger); color: white; }
        .btn-green { background: var(--success); color: white; box-shadow: 0 5px 15px rgba(16,185,129,0.2); }
        .btn-blue { background: rgba(45,99,237,0.1); color: var(--electric-blue); }
        .btn-blue:active { background: var(--electric-blue); color: white; }
        .btn-gold { background: var(--gold-main); color: var(--navy-dark); box-shadow: 0 5px 15px rgba(212,175,55,0.2); }

        /* FORM INPUTS */
        input, select { 
            background: #F8FAFC; color: var(--navy-main); border: 1px solid #E2E8F0; 
            padding: 14px; border-radius: 14px; font-family: 'Inter'; font-weight:700; font-size: 14px;
            width: 100%; box-sizing: border-box; text-transform: uppercase; transition: 0.2s;
        }
        input:focus, select:focus { border-color: var(--electric-blue); background: white; box-shadow: 0 0 0 3px rgba(45,99,237,0.1); }

        /* MODERN CARDS FOR SLOTS & QUEUE */
        .admin-card {
            background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 16px; padding: 15px;
            margin-bottom: 12px; display: flex; flex-direction: column; gap: 12px;
        }
        .admin-card.active {
            background: white; border: 2px solid var(--electric-blue); box-shadow: 0 10px 25px rgba(45,99,237,0.1);
        }
        
        .ac-header { display: flex; justify-content: space-between; align-items: flex-start; }
        .ac-title { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 900; color: var(--navy-main); margin-bottom: 2px;}
        .ac-subtitle { font-size: 11px; font-weight: 700; color: var(--text-gray); text-transform: uppercase;}
        .ac-badge { font-family: 'Space Grotesk'; font-size: 14px; font-weight: 900; padding: 4px 10px; border-radius: 8px;}
        .badge-green { background: rgba(16,185,129,0.1); color: var(--success); }
        .badge-gray { background: #E2E8F0; color: var(--text-gray); font-size: 12px; }

        .ac-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .ac-actions button { flex: 1; padding: 10px; font-size: 11px;}

        /* ANTRIAN LIST SPECIFIC */
        .q-number { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--text-gray); background: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 12px; border: 1px solid #E2E8F0;}
        .q-row { display: flex; align-items: center; gap: 12px; border-bottom: 1px dashed #E2E8F0; padding-bottom: 12px; margin-bottom: 4px;}
        
        .action-group { background: white; border: 1px solid #E2E8F0; border-radius: 12px; padding: 6px; display: flex; gap: 6px; flex: 1;}
        .ag-label { font-size: 9px; font-weight: 800; color: var(--text-gray); display: flex; align-items: center; padding: 0 5px; }

        /* EMERGENCY & LOGS */
        .term-container { background: #0F172A; border-radius: 14px; padding: 15px; height: 200px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 11px; color: #94A3B8; display: flex; flex-direction: column; }
        .log-line { margin-bottom: 8px; border-bottom: 1px solid #1E293B; padding-bottom: 6px; }

        /* MODAL FIX */
        .modal-glass-overlay { 
            position: fixed; inset: 0; background: rgba(10,34,89,0.5); backdrop-filter: blur(8px); 
            z-index: 99999; display: none; align-items: flex-start; justify-content: center; 
            opacity: 0; transition: opacity 0.3s; padding: 10vh 20px 20px; 
            overflow-y: auto; overscroll-behavior: contain;
        }
        .modal-glass-overlay.show { opacity: 1; display: flex; }
        .modal-box { 
            background: white; border-radius: 24px; padding: 25px; width: 100%; max-width: 350px; 
            text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.2); 
            transform: scale(0.9); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            margin: auto; border: 1px solid #E2E8F0;
        }
        .modal-glass-overlay.show .modal-box { transform: scale(1); }
        .modal-btns { display: flex; gap: 10px; margin-top: 20px; }
        
        .role-tag { font-size: 8px; background: var(--navy-main); color: var(--gold-main); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-left: 5px; vertical-align: middle;}
    </style>
</head>
<body>

    <div class="adm-header">
        <div>
            <div style="font-family:'Outfit'; font-weight:900; font-size:22px; color:var(--navy-main); letter-spacing:-1px; display:flex; align-items:center; gap:8px;">
                <i class="fas fa-shield-alt" style="color:var(--danger);"></i> SUPER ADMIN
            </div>
            <div style="font-family:'Space Grotesk'; font-size:10px; font-weight:800; color:var(--text-gray); letter-spacing:1px; margin-top:4px;">
                FC KELAPA GADING <span style="color:var(--success); margin-left:5px;">• ONLINE</span>
            </div>
        </div>
        <div style="display:flex; gap:8px;">
            <button onclick="window.location.href='system.html'" class="btn-blue" style="padding:12px;"><i class="fas fa-cog"></i></button>
            <button onclick="window.location.href='index.html'" class="btn-red" style="padding:12px;" title="Keluar"><i class="fas fa-power-off"></i></button>
        </div>
    </div>

    <div class="box" style="border-top: 3px solid var(--electric-blue);">
        <h3><i class="fas fa-tv" style="color:var(--electric-blue);"></i> SLOT CHARGER</h3>
        <div id="slotContainer">
            <div style="text-align:center; padding:20px; color:var(--text-gray);">Memuat Slot...</div>
        </div>
        
        <div style="margin-top:15px; background:#F8FAFC; padding:15px; border-radius:16px; border:1px solid #E2E8F0;">
            <div style="font-size:10px; font-weight:800; color:var(--text-gray); margin-bottom:8px;">SWAP / TUKAR POSISI USER:</div>
            <div style="display:flex; align-items:center; gap:8px;">
                <select id="moveSrc"><option value="0">S1</option><option value="1">S2</option><option value="2">S3</option></select>
                <i class="fas fa-exchange-alt" style="color:var(--text-gray);"></i>
                <select id="moveDest"><option value="1">S2</option><option value="2">S3</option><option value="0">S1</option></select>
                <button onclick="askConfirm('Tukar Posisi User di Slot?', moveSlotUser)" class="btn-blue" style="padding:14px;"><i class="fas fa-check"></i></button>
            </div>
        </div>
    </div>

    <div class="box" style="border-top: 3px solid var(--gold-main);">
        <h3>
            <span><i class="fas fa-users" style="color:var(--gold-main);"></i> DAFTAR TUNGGU</span>
            <button onclick="askConfirm('RESET URUTAN NOMOR JADI 1? (Orang tetap ada)', resetTicketNumbers)" class="btn-red" style="padding:8px 12px; font-size:10px;"><i class="fas fa-sync-alt"></i> RE-INDEX</button>
        </h3>
        
        <div id="queueContainer" style="max-height:400px; overflow-y:auto; padding-right:5px; margin-bottom:15px;">
            <div style="text-align:center; padding:20px; color:var(--text-gray);">Memuat Antrian...</div>
        </div>
        
        <div style="background:#F8FAFC; padding:15px; border-radius:16px; border: 1px dashed #CBD5E1;">
            <div style="font-size:11px; font-weight:800; color:var(--navy-main); margin-bottom:10px;"><i class="fas fa-bolt" style="color:var(--gold-main);"></i> FORCE INPUT (TAMBAH MANUAL)</div>
            <div style="display:flex; flex-direction:column; gap:8px; margin-bottom:12px;">
                <input id="newPlat" placeholder="PLAT (Contoh: B 7777 PEA)">
                <div style="display:flex; gap:8px;">
                    <input id="newNama" placeholder="NAMA USER" style="flex:2;">
                    <input id="newBatre" type="number" placeholder="BATRE (%)" style="flex:1;" max="100">
                </div>
            </div>
            <div style="display:flex; gap:8px;">
                <button onclick="manualAdd('queue')" class="btn-green" style="flex:2;"><i class="fas fa-plus"></i> ANTRIAN</button>
                <button onclick="manualAdd(0)" class="btn-gold" style="flex:1;">S1</button>
                <button onclick="manualAdd(1)" class="btn-gold" style="flex:1;">S2</button>
                <button onclick="manualAdd(2)" class="btn-gold" style="flex:1;">S3</button>
            </div>
        </div>
    </div>

    <div class="box" style="background: #FEF2F2; border: 1px solid #FECACA; border-top: 3px solid var(--danger);">
        <h3 style="color:var(--danger); border-bottom-color:#FCA5A5;"><i class="fas fa-exclamation-triangle"></i> EMERGENCY ZONE</h3>
        <div style="display:flex; gap:10px;">
            <button onclick="checkRecovery()" class="btn-blue" style="flex:1; background:white; border:1px solid #93C5FD;"><i class="fas fa-folder-open"></i> CEK BACKUP</button>
            <button onclick="askConfirm('HAPUS SEMUA DATA SISTEM? (TIDAK BISA KEMBALI)', hardReset)" class="btn-red" style="flex:1;"><i class="fas fa-skull"></i> FORMAT</button>
        </div>
        <div id="recoveryPanel" style="display:none; margin-top:15px; background:white; padding:15px; border-radius:14px; border:1px dashed var(--danger);">
            <div id="recList" style="font-size:11px; font-weight:800; margin-bottom:12px; color:var(--navy-main);"></div>
            <button onclick="executeRestore()" class="btn-green" style="width:100%;"><i class="fas fa-trash-restore"></i> PULIHKAN DATA SISTEM</button>
        </div>
    </div>

    <div id="logSectionWrapper" style="display: none;">
        <div style="font-family:'Space Grotesk'; font-size:11px; font-weight:900; color:var(--text-gray); margin-bottom:8px; letter-spacing:1px;"><i class="fas fa-terminal"></i> AKTIVITAS SISTEM (PRIVATE)</div>
        <div class="term-container" id="termLog"></div>
    </div>

    <div class="modal-glass-overlay" id="customModal">
        <div class="modal-box">
            <div style="width:60px; height:60px; border-radius:50%; background:rgba(239,68,68,0.1); color:var(--danger); display:flex; align-items:center; justify-content:center; font-size:28px; margin:0 auto 15px;"><i class="fas fa-question"></i></div>
            <h2 style="margin:0 0 10px 0; font-family:'Outfit'; font-weight:900; color:var(--navy-main); font-size:22px;">KONFIRMASI</h2>
            <div id="modalText" style="color:var(--text-gray); font-weight:600; margin-bottom:25px; font-size:14px; line-height:1.5;">Text</div>
            <div class="modal-btns">
                <button onclick="closeModal()" style="flex:1; background:#F1F5F9; color:var(--text-gray);">BATAL</button>
                <button id="btnYes" style="flex:1; background:var(--electric-blue); color:white; box-shadow:0 10px 20px rgba(45,99,237,0.2);">YA, LANJUTKAN</button>
            </div>
        </div>
    </div>

    <div class="modal-glass-overlay" id="editModal">
        <div class="modal-box" style="text-align: left;">
            <h2 style="margin:0 0 20px 0; font-family:'Outfit'; font-weight:900; color:var(--navy-main); font-size:22px; text-align:center; border-bottom:1px solid #E2E8F0; padding-bottom:15px;">EDIT PENGGUNA</h2>
            
            <div style="margin-bottom:15px;">
                <label style="font-size:11px; font-weight:800; color:var(--text-gray); display:block; margin-bottom:6px;">PLAT NOMOR</label>
                <input id="editPlat" type="text">
            </div>
            
            <div style="margin-bottom:15px;">
                <label style="font-size:11px; font-weight:800; color:var(--text-gray); display:block; margin-bottom:6px;">NAMA USER</label>
                <input id="editName" type="text">
            </div>
            
            <div style="margin-bottom:25px;">
                <label style="font-size:11px; font-weight:800; color:var(--text-gray); display:block; margin-bottom:6px;">SISA BATRE (%)</label>
                <input id="editBatt" type="number" max="100">
            </div>

            <input type="hidden" id="editIndex"> 
            <div class="modal-btns">
                <button onclick="closeEditModal()" style="flex:1; background:#F1F5F9; color:var(--text-gray);">BATAL</button>
                <button onclick="saveEdit()" style="flex:1; background:var(--success); color:white; box-shadow:0 10px 20px rgba(16,185,129,0.2);"><i class="fas fa-save"></i> SIMPAN</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, runTransaction, collection, addDoc, query, orderBy, limit, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CEK PLAT UNTUK PRIVATE LOG (Cuma B4248SWF yang bisa liat)
        const checkDewaLog = () => {
            try {
                const uDataGlobal = JSON.parse(localStorage.getItem('maka_user') || '{}');
                const globalPlat = (uDataGlobal.plat || '').replace(/\s+/g, '').toUpperCase();
                if(globalPlat === 'B4248SWF') {
                    document.getElementById('logSectionWrapper').style.display = 'block';
                }
            } catch(e) {}
        };
        checkDewaLog();

        const firebaseConfig = { apiKey: "AIzaSyB666i9lYWIpxOdkwpoX9EvFvHLmHczeq8", authDomain: "fcgadingnew22.firebaseapp.com", projectId: "fcgadingnew22", storageBucket: "fcgadingnew22.firebasestorage.app", messagingSenderId: "537736846678", appId: "1:537736846678:web:53788d71a196423ac08af7" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const mainRef = doc(db, "antrian", "utama");
        const logRef = collection(db, "activityLog");
        const snapshotRef = doc(db, "antrian", "snapshot");

        let cachedSlots = [null, null, null];
        let cachedQueue = [];
        let snapshotData = null;

        // FUNGSI TARIK IDENTITAS ADMIN DARI BROWSER (Maka_User)
        const getAdminName = () => {
            try {
                const uData = JSON.parse(localStorage.getItem('maka_user'));
                if(uData) {
                    const nama = uData.namaKtp || uData.namaWa || uData.nama || "ADMIN";
                    const plat = uData.plat || "SYSTEM";
                    return `${nama} (${plat})`;
                }
            } catch(e) {}
            return "SUPER_ADMIN";
        };

        // --- MODAL LOGIC ---
        let currentCallback = null;
        window.askConfirm = (text, callback) => {
            document.getElementById('modalText').innerText = text;
            const m = document.getElementById('customModal');
            m.style.display = 'flex'; setTimeout(() => m.classList.add('show'), 10);
            currentCallback = callback;
        };
        document.getElementById('btnYes').onclick = () => { if(currentCallback) currentCallback(); closeModal(); };
        window.closeModal = () => { 
            const m = document.getElementById('customModal');
            m.classList.remove('show'); setTimeout(() => m.style.display = 'none', 300);
            currentCallback = null; 
        };

        // --- EDIT MODAL LOGIC ---
        window.openEdit = (idx) => {
            const user = cachedQueue[idx];
            if(!user) return;
            document.getElementById('editIndex').value = idx;
            document.getElementById('editPlat').value = user.plat;
            document.getElementById('editName').value = user.userName;
            document.getElementById('editBatt').value = user.batreSisa || user.batre || ""; 
            const m = document.getElementById('editModal');
            m.style.display = 'flex'; setTimeout(() => m.classList.add('show'), 10);
        };

        window.closeEditModal = () => { 
            const m = document.getElementById('editModal');
            m.classList.remove('show'); setTimeout(() => m.style.display = 'none', 300);
        };

        window.saveEdit = () => {
            const idx = parseInt(document.getElementById('editIndex').value);
            const p = document.getElementById('editPlat').value.toUpperCase();
            const n = document.getElementById('editName').value.toUpperCase();
            const b = document.getElementById('editBatt').value;
            const admName = getAdminName();

            if(!p || !n) return alert("Plat & Nama tidak boleh kosong!");

            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                let q = d.waitingQueue;
                
                if(q[idx]) {
                    const oldPlat = q[idx].plat;
                    const oldName = q[idx].userName;
                    q[idx].plat = p;
                    q[idx].userName = n;
                    q[idx].batreSisa = b; 
                    q[idx].batre = b + "%";
                    t.update(mainRef, { waitingQueue: q });
                    addLog(admName, "EDIT_USER", `Mengubah data [${oldPlat}] menjadi [${p} - ${n}] (Batre: ${b}%)`);
                }
            }).then(() => {
                closeEditModal();
            }).catch(e => alert("Gagal Update: " + e));
        };

        // === REALTIME MONITORING RENDERER ===
        onSnapshot(mainRef, (snap) => {
            if (!snap.exists()) return;
            const d = snap.data();
            cachedSlots = d.chargingSlots || [null,null,null];
            cachedQueue = d.waitingQueue || [];
            updateMonitorUI();
        });

        function cleanName(n) { return n ? n.replace(/👑/g, '').trim() : 'USER'; }

        function updateMonitorUI() {
            // 1. RENDER SLOTS
            const slotCont = document.getElementById('slotContainer');
            let sHtml = '';
            cachedSlots.forEach((s, i) => {
                if(s) {
                    let bat = s.batreSisa || s.batre || s.battery || "-";
                    let role = (s.role && s.role !== 'GUEST') ? `<span class="role-tag">${s.role}</span>` : '';
                    sHtml += `
                        <div class="admin-card active">
                            <div class="ac-header">
                                <div>
                                    <div class="ac-title">${s.plat}</div>
                                    <div class="ac-subtitle">SLOT 0${i+1} • ${cleanName(s.userName)} ${role}</div>
                                </div>
                                <div class="ac-badge badge-green"><i class="fas fa-bolt"></i> ${bat.replace('%','')} %</div>
                            </div>
                            <div class="ac-actions">
                                <button class="btn-red" onclick="askConfirm('Keluarkan user ini dari sistem?', ()=>forceStop(${i}))"><i class="fas fa-times-circle"></i> KICK USER</button>
                                <button class="btn-gold" onclick="askConfirm('Pindahkan kembali ke antrean?', ()=>kickToQueue(${i}))"><i class="fas fa-undo"></i> KE ANTREAN</button>
                            </div>
                        </div>
                    `;
                } else {
                    sHtml += `
                        <div class="admin-card">
                            <div class="ac-header" style="align-items:center;">
                                <div>
                                    <div class="ac-title" style="color:var(--text-gray);">SLOT 0${i+1}</div>
                                    <div class="ac-subtitle">Tersedia / Kosong</div>
                                </div>
                                <div class="ac-badge badge-gray"><i class="fas fa-battery-empty"></i> KOSONG</div>
                            </div>
                        </div>
                    `;
                }
            });
            slotCont.innerHTML = sHtml;

            // 2. RENDER ANTREAN
            const qCont = document.getElementById('queueContainer');
            let qHtml = '';
            if(cachedQueue.length === 0) {
                qHtml = `<div style="text-align:center; padding:30px 20px; color:var(--text-gray); border: 2px dashed #E2E8F0; border-radius:16px;">Antrian Kosong</div>`;
            } else {
                cachedQueue.forEach((q, idx) => {
                    let bat = q.batreSisa || q.batre || q.battery || "-";
                    let role = (q.role && q.role !== 'GUEST') ? `<span class="role-tag">${q.role}</span>` : '';
                    
                    qHtml += `
                        <div class="admin-card" style="padding:12px;">
                            <div class="q-row">
                                <div class="q-number">${q.qNo}</div>
                                <div style="flex:1;">
                                    <div style="font-family:'Space Grotesk'; font-size:15px; font-weight:900; color:var(--navy-main);">${q.plat} <span style="font-size:11px; color:var(--success); background:rgba(16,185,129,0.1); padding:2px 6px; border-radius:6px; margin-left:4px;">${bat.replace('%','')}%</span></div>
                                    <div style="font-size:10px; font-weight:700; color:var(--text-gray); text-transform:uppercase; margin-top:2px;">${cleanName(q.userName)} ${role}</div>
                                </div>
                            </div>
                            <div class="ac-actions">
                                <div class="action-group">
                                    <span class="ag-label">SLOT:</span>
                                    <button class="btn-gold" style="padding:8px;" onclick="forceToSlot('${q.plat}', 0)">1</button>
                                    <button class="btn-gold" style="padding:8px;" onclick="forceToSlot('${q.plat}', 1)">2</button>
                                    <button class="btn-gold" style="padding:8px;" onclick="forceToSlot('${q.plat}', 2)">3</button>
                                </div>
                                <div class="action-group" style="flex:0.8;">
                                    <button class="btn-blue" style="padding:8px; flex:1;" onclick="switchQueue(${idx}, -1)" title="Naik"><i class="fas fa-arrow-up"></i></button>
                                    <button class="btn-blue" style="padding:8px; flex:1;" onclick="switchQueue(${idx}, 1)" title="Turun"><i class="fas fa-arrow-down"></i></button>
                                    <button class="btn-blue" style="padding:8px; flex:1;" onclick="openEdit(${idx})" title="Edit"><i class="fas fa-pen"></i></button>
                                    <button class="btn-red" style="padding:8px; flex:1;" onclick="askConfirm('Hapus user dari daftar?', ()=>delQueue('${q.plat}'))" title="Hapus"><i class="fas fa-times"></i></button>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            qCont.innerHTML = qHtml;
        }

        window.resetTicketNumbers = () => {
            const admName = getAdminName();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                let queue = d.waitingQueue || [];
                queue.forEach((q, index) => { q.qNo = index + 1; });
                t.update(mainRef, { waitingQueue: queue, lastTicket: queue.length });
                addLog(admName, "RESET_NUMBER", `Menyusun ulang nomor urut untuk ${queue.length} antrean`);
            }).catch(e => alert("Gagal: " + e));
        };

        window.manualAdd = async (target) => {
            const p = document.getElementById('newPlat').value.trim().toUpperCase();
            const n = document.getElementById('newNama').value.trim().toUpperCase();
            const b = document.getElementById('newBatre').value;
            const admName = getAdminName();

            if(!p) return alert("Plat Nomor Wajib Diisi!");
            if(!b) return alert("SISA BATERAI WAJIB DIISI!"); 

            let userRole = "GUEST";
            const cleanID = p.replace(/[^A-Z0-9]/g, '');
            try {
                let m = await getDoc(doc(db, "members", cleanID));
                if(m.exists()) userRole = m.data().role || "MEMBER";
            } catch(e) {}

            runTransaction(db, async(t) => {
                const docSnap = await t.get(mainRef);
                let d = docSnap.data();
                if([...(d.chargingSlots||[]), ...d.waitingQueue].some(u => u && u.plat === p)) throw "User sudah ada!";

                const newNo = (d.lastTicket||0)+1;
                const u = { plat:p, userName:n||"MANUAL", qNo:newNo, entryTime:Date.now(), role: userRole, batreSisa: b, batre: b+"%" };

                if(target === 'queue') {
                    d.waitingQueue.push(u); 
                    addLog(admName, "MANUAL_INPUT", `Mendaftarkan manual ${p} (${n||"USER"}) ke Antrean`);
                } else { 
                    if(d.chargingSlots[target]) throw "Slot Penuh!"; 
                    u.startTime = Date.now(); d.chargingSlots[target] = u; 
                    addLog(admName, "BYPASS_SLOT", `Memasukkan manual ${p} (${n||"USER"}) langsung ke Slot 0${target+1}`);
                }

                t.set(snapshotRef, { ...d, backupTime: new Date() });
                t.update(mainRef, { waitingQueue:d.waitingQueue, chargingSlots:d.chargingSlots, lastTicket:newNo });
            }).then(() => {
                document.getElementById('newPlat').value = '';
                document.getElementById('newNama').value = '';
                document.getElementById('newBatre').value = '';
            }).catch(e => alert("GAGAL: " + e));
        };

        window.forceToSlot = (plat, slotIdx) => {
            const admName = getAdminName();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                if(d.chargingSlots[slotIdx]) throw "SLOT TERISI!";
                const qIdx = d.waitingQueue.findIndex(x => x.plat === plat);
                if(qIdx === -1) throw "User hilang dari antrean.";
                const user = d.waitingQueue.splice(qIdx, 1)[0];
                user.startTime = Date.now();
                d.chargingSlots[slotIdx] = user;
                t.update(mainRef, { chargingSlots: d.chargingSlots, waitingQueue: d.waitingQueue });
                addLog(admName, "KUDETA_SLOT", `Menarik paksa ${plat} dari antrean ke Slot 0${slotIdx+1}`);
            }).catch(e => alert(e));
        };

        window.forceStop = (i) => {
            const admName = getAdminName();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                const u = d.chargingSlots[i];
                if(u) {
                    d.chargingSlots[i] = null;
                    t.update(mainRef, { chargingSlots: d.chargingSlots });
                    addLog(admName, "KICK_USER", `Mengusir paksa ${u.plat} (${cleanName(u.userName)}) dari Slot 0${i+1}`);
                }
            });
        };

        window.kickToQueue = (i) => {
            const admName = getAdminName();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                const u = d.chargingSlots[i];
                if(u) {
                    d.chargingSlots[i] = null; delete u.startTime; 
                    d.waitingQueue.unshift(u);
                    t.update(mainRef, { chargingSlots: d.chargingSlots, waitingQueue: d.waitingQueue });
                    addLog(admName, "TURUN_TAHTA", `Menurunkan takhta ${u.plat} dari Slot 0${i+1} kembali ke Antrean`);
                }
            });
        };

        window.moveSlotUser = () => {
            const s1 = document.getElementById('moveSrc').value;
            const s2 = document.getElementById('moveDest').value;
            const admName = getAdminName();
            if(s1 == s2) return alert("Pilih slot beda!");
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                const n1 = d.chargingSlots[s1] ? d.chargingSlots[s1].plat : "KOSONG";
                const n2 = d.chargingSlots[s2] ? d.chargingSlots[s2].plat : "KOSONG";
                const temp = d.chargingSlots[s1];
                d.chargingSlots[s1] = d.chargingSlots[s2];
                d.chargingSlots[s2] = temp;
                t.update(mainRef, { chargingSlots: d.chargingSlots });
                addLog(admName, "SWAP_SLOT", `Tukar posisi: Slot 0${parseInt(s1)+1} (${n1}) dengan Slot 0${parseInt(s2)+1} (${n2})`);
            });
        };

        window.switchQueue = (idx, dir) => {
            const admName = getAdminName();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                let q = d.waitingQueue;
                const target = idx + dir;
                if(target >= 0 && target < q.length) {
                    const p1 = q[idx].plat; const p2 = q[target].plat;
                    const dirTxt = dir === -1 ? "NAIK" : "TURUN";
                    [q[idx], q[target]] = [q[target], q[idx]];
                    t.update(mainRef, { waitingQueue: q });
                    addLog(admName, "GESER_ANTREAN", `Menggeser ${p1} ${dirTxt} bertukar dengan ${p2}`);
                }
            });
        };

        window.delQueue = (p) => {
            const admName = getAdminName();
            runTransaction(db, async(t) => {
                const d = (await t.get(mainRef)).data();
                const u = d.waitingQueue.find(x => x.plat === p);
                const uname = u ? u.userName : '';
                const newQ = d.waitingQueue.filter(x => x.plat !== p);
                t.update(mainRef, { waitingQueue: newQ });
                addLog(admName, "HAPUS_ANTREAN", `Membuang ${p} (${uname}) dari daftar antrean`);
            });
        };

        window.checkRecovery = async () => {
            const s = await getDoc(snapshotRef);
            if(!s.exists()) return alert("Tidak ada backup.");
            snapshotData = s.data();
            document.getElementById('recList').innerText = `BACKUP: ${snapshotData.backupTime ? snapshotData.backupTime.toDate().toLocaleString('id-ID') : '-'}`;
            document.getElementById('recoveryPanel').style.display = 'block';
        };

        window.executeRestore = () => {
            const admName = getAdminName();
            if(!snapshotData) return;
            runTransaction(db, async(t) => {
                t.set(mainRef, { chargingSlots: snapshotData.chargingSlots || [null,null,null], waitingQueue: snapshotData.waitingQueue || [], lastTicket: snapshotData.lastTicket || 0 });
                addLog(admName, "SISTEM_RESTORE", "Melakukan pemulihan data sistem dari backup terakhir");
            });
            document.getElementById('recoveryPanel').style.display = 'none';
            alert("Data Pulih!");
        };

        window.hardReset = () => {
            const admName = getAdminName();
            runTransaction(db, async(t) => {
                t.set(mainRef, { chargingSlots: [null,null,null], waitingQueue: [], lastTicket: 0 });
                addLog(admName, "SISTEM_WIPE", "DANGER: Melakukan format/hapus seluruh data antrian dan slot");
            });
        };

        // --- SISTEM LOGGING ---
        onSnapshot(query(logRef, orderBy("timestamp", "desc"), limit(20)), (snap) => {
            let h = '';
            snap.forEach(d => {
                const x = d.data();
                h += `<div class="log-line">[${x.timestamp ? x.timestamp.toDate().toLocaleTimeString('id-ID') : '-'}] <span style="color:#FDE047">${x.actor}</span>: <span style="color:#93C5FD; font-weight:bold;">${x.action}</span> - ${x.details}</div>`;
            });
            document.getElementById('termLog').innerHTML = h;
        });

        function addLog(actor, act, det) { 
            addDoc(logRef, { action: act, details: det, actor: actor, timestamp: new Date() }); 
        }
    </script>
</body>
</html>
