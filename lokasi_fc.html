<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Smart Station Navigator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA LIGHT GLASSMORPHISM & GLOW (VERSI PUTIH) === */
        :root {
            --royal-blue: #0A2259;
            --electric-blue: #2D63ED;
            --bg-surface: #F0F4F8;
            --white: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --border-soft: rgba(45, 99, 237, 0.15);
            
            --glow-blue: 0 10px 30px rgba(45, 99, 237, 0.25);
            --glow-green: 0 10px 25px rgba(16, 185, 129, 0.25);
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; background: var(--bg-surface); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; text-decoration: none;}

        /* --- FULLSCREEN MAP --- */
        #map { width: 100vw; height: 100vh; z-index: 1; }
        .leaflet-control-attribution { display: none !important; }
        .leaflet-routing-container { display: none !important; } 

        /* --- FLOATING HEADER --- */
        .map-header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            padding: 40px 20px 30px; text-align: center; pointer-events: none;
            background: linear-gradient(180deg, rgba(10,34,89,0.85) 0%, transparent 100%);
        }
        .main-title { 
            font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 900; 
            color: var(--white); margin: 0; letter-spacing: -0.5px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        .live-tag { 
            font-size: 10px; font-weight: 800; color: var(--electric-blue);
            background: rgba(255,255,255,0.95); backdrop-filter: blur(5px);
            padding: 6px 14px; border-radius: 50px; border: 1px solid rgba(45,99,237,0.3);
            display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
            box-shadow: var(--glow-blue); letter-spacing: 2px; text-transform: uppercase;
            pointer-events: auto; cursor: pointer;
        }
        .live-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; box-shadow: 0 0 8px var(--success); }

        /* --- PREMIUM MARKER PIN (STASIUN) --- */
        .marker-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; width: 120px !important; transform: translate(-50%, -100%); }
        
        .pin-tooltip {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(5px); color: var(--royal-blue);
            font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 800;
            padding: 6px 12px; border-radius: 12px; margin-bottom: 8px;
            white-space: nowrap; box-shadow: 0 10px 25px rgba(45,99,237,0.15);
            border: 1px solid rgba(45,99,237,0.3); text-transform: uppercase;
        }

        .pin-body {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, var(--electric-blue) 0%, var(--royal-blue) 100%);
            border: 3px solid var(--white); box-shadow: var(--glow-blue);
            display: flex; align-items: center; justify-content: center; color: white; font-size: 13px;
        }
        
        /* USER MARKER */
        .user-wrap { position: relative; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .user-pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: rgba(16, 185, 129, 0.4); animation: pulseOuter 2s infinite; }
        .user-dot { width: 18px; height: 18px; border-radius: 50%; background: var(--success); border: 3px solid var(--white); position: relative; z-index: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* --- INFO CARD GLASSMORPHISM --- */
        .info-card {
            position: fixed; bottom: 100px; left: 50%; transform: translate(-50%, 150%);
            width: 90%; max-width: 400px; z-index: 1500;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
            border-radius: 35px; padding: 25px;
            box-shadow: 0 -10px 40px rgba(45, 99, 237, 0.15);
            border: 1px solid rgba(45, 99, 237, 0.2);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .info-card.active { transform: translate(-50%, 0); }

        .btn-close {
            position: absolute; top: 15px; right: 20px;
            background: #F1F5F9; color: var(--text-muted);
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; border: none; transition: 0.2s;
        }
        .btn-close:active { transform: scale(0.9); background: #E2E8F0; }

        .routing-info { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
        .card-dist { font-size: 11px; font-weight: 800; color: var(--electric-blue); background: rgba(45,99,237,0.1); padding: 8px 14px; border-radius: 8px; letter-spacing: 1px; border: 1px solid rgba(45,99,237,0.2); width:100%;}
        
        .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 900; color: var(--royal-blue); margin: 0 0 6px; line-height: 1.1; text-transform: uppercase; }
        .card-subtitle { font-size: 10px; font-weight: 700; color: var(--success); margin-bottom: 10px; text-transform: uppercase; display: none; }

        .btn-nav-map {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 16px; border-radius: 20px;
            background: var(--electric-blue);
            color: var(--white); font-family: 'Space Grotesk', sans-serif; font-weight: 800;
            font-size: 14px; text-decoration: none; box-shadow: var(--glow-blue);
            transition: 0.3s; letter-spacing: 1px;
        }
        .btn-nav-map:active { transform: scale(0.97); }

        /* --- FLOATING BACK BUTTON GLASS --- */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 85%; max-width: 350px; }
        .btn-premium-back {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(45,99,237,0.2);
            color: var(--electric-blue); padding: 16px; border-radius: 50px;
            font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 800;
            cursor: pointer; box-shadow: var(--glow-blue);
            display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none;
            transition: 0.3s;
        }
        .btn-premium-back:active { transform: scale(0.95); background: #F8FAFC; }

        /* Animations */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes pulseOuter { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

        .custom-pin, .custom-user { background: transparent; border: none; }
    </style>
</head>
<body>

    <header class="map-header">
        <h1 class="main-title">STATION LOCATOR</h1>
        <div class="live-tag" id="gpsStatus" onclick="recenterMap()"><div class="live-dot"></div> MENCARI LOKASI...</div>
    </header>

    <div id="map"></div>

    <div id="infoCard" class="info-card">
        <button class="btn-close" onclick="closeCard()"><i class="fas fa-times"></i></button>
        
        <div class="card-title" id="fcName">Station Name</div>
        <div class="card-subtitle" id="fcTag">REKOMENDASI TERDEKAT</div>
        
        <div class="routing-info">
            <div class="card-dist" id="fcDist"><i class="fas fa-car"></i> MENGHITUNG JARAK...</div>
        </div>

        <a href="#" id="btnMaps" target="_blank" class="btn-nav-map">
            <i class="fas fa-location-arrow"></i> BUKA NAVIGASI GOOGLE
        </a>
    </div>

    <div class="back-nav">
        <a href="dashboard.html" class="btn-premium-back">
            <i class="fas fa-home"></i> KEMBALI KE HOME
        </a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <script>
        // INIT MAP
        const map = L.map('map', {zoomControl: false}).setView([-6.2, 106.8], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        // DATA SOURCE
        const URL_LOKASI = "https://docs.google.com/spreadsheets/d/1EJOTMMfGpBMFPqR0LzbMbh7tZUcTCZld4x387OO9aJM/export?format=csv";

        let userLat = null, userLng = null;
        let routingControl = null;
        let userMarker = null;
        let fcLocations = []; // Simpan data stasiun di memory

        // RUMUS JARAK (Haversine)
        function getStraightDist(lat1, lon1, lat2, lon2) {
            const R=6371; const dLat=(lat2-lat1)*Math.PI/180; const dLon=(lon2-lon1)*Math.PI/180;
            const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
            return (R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a))).toFixed(1);
        }

        // GPS INIT
        function initGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLat = pos.coords.latitude; userLng = pos.coords.longitude;
                    
                    const uIcon = L.divIcon({
                        className: 'custom-user',
                        html: `<div class="user-wrap"><div class="user-pulse"></div><div class="user-dot"></div></div>`,
                        iconSize: [44, 44], iconAnchor: [22, 22]
                    });
                    
                    if(userMarker) map.removeLayer(userMarker);
                    userMarker = L.marker([userLat, userLng], {icon: uIcon, zIndexOffset: 1000}).addTo(map);
                    
                    // AUTO ZOOM KE USER
                    map.setView([userLat, userLng], 15); 
                    
                    document.getElementById('gpsStatus').innerHTML = '<div class="live-dot"></div> GPS AKTIF (TAP UTK RE-CENTER)';
                    
                    // LOAD DATA & AUTO SUGGEST
                    loadFCData(true); 

                }, (err) => { 
                    document.getElementById('gpsStatus').innerHTML = '<div class="live-dot" style="background:var(--danger)"></div> GPS MATI';
                    loadFCData(false); 
                }, { timeout: 10000, enableHighAccuracy: true });
            } else { 
                document.getElementById('gpsStatus').innerHTML = '<div class="live-dot" style="background:var(--danger)"></div> GPS UNAVAILABLE';
                loadFCData(false); 
            }
        }
        
        window.recenterMap = () => { if(userLat) map.setView([userLat, userLng], 15); }

        initGPS();

        // LOAD DATA & AUTO SUGGEST LOGIC
        async function loadFCData(autoSuggest) {
            try {
                const txtLoc = await fetch(URL_LOKASI).then(r=>r.text());
                const rows = txtLoc.split('\n').slice(1);
                
                fcLocations = []; // Reset

                rows.forEach((r) => {
                    const c = r.split(',');
                    
                    let latStr = c[4] ? c[4].replace(/"/g, '').replace(',', '.') : '';
                    let lngStr = c[5] ? c[5].replace(/"/g, '').replace(',', '.') : '';
                    let name = c[0] ? c[0].replace(/"/g, '').trim() : "STASIUN FC";
                    let mapLink = c[6] ? c[6].replace(/"/g, '').trim() : '';

                    let latVal = parseFloat(latStr);
                    let lngVal = parseFloat(lngStr);
                    
                    if(c.length < 5 || isNaN(latVal) || isNaN(lngVal)) return;

                    // Buat Marker
                    const fcIcon = L.divIcon({ 
                        className: 'custom-pin', 
                        html: `<div class="marker-wrapper"><div class="pin-tooltip">${name}</div><div class="pin-body"><i class="fas fa-bolt"></i></div></div>`, 
                        iconSize: [120, 70], iconAnchor: [60, 70] 
                    });

                    const m = L.marker([latVal, lngVal], {icon: fcIcon}).addTo(map);
                    
                    // Simpan data untuk Auto Suggest
                    fcLocations.push({ name: name, lat: latVal, lng: lngVal, mapLink: mapLink, marker: m });

                    m.on('click', () => {
                        let distStraight = "--";
                        if(userLat && userLng) { distStraight = getStraightDist(userLat, userLng, latVal, lngVal); }
                        showInfo(name, distStraight, latVal, lngVal, mapLink, false);
                    });
                });

                // AUTO SUGGEST: CARI YANG PALING DEKAT SETELAH DATA LOAD
                if (autoSuggest && userLat && userLng && fcLocations.length > 0) {
                    findAndShowNearest();
                }

            } catch(e) { console.error("Data error: ", e); }
        }

        function findAndShowNearest() {
            let nearest = null;
            let minKm = 99999;

            fcLocations.forEach(fc => {
                let dist = parseFloat(getStraightDist(userLat, userLng, fc.lat, fc.lng));
                if (dist < minKm) {
                    minKm = dist;
                    nearest = fc;
                }
            });

            if (nearest) {
                // Buka Info Card Otomatis
                showInfo(nearest.name, minKm, nearest.lat, nearest.lng, nearest.mapLink, true);
                // Zoom Fit Bounds (User + Station)
                const group = new L.featureGroup([userMarker, nearest.marker]);
                map.fitBounds(group.getBounds(), {padding: [50, 200]}); // Padding bawah besar utk card
            }
        }

        function showInfo(name, distStraight, lat, lng, mapLink, isAuto) {
            document.getElementById('fcName').innerText = name;
            
            // Tag Rekomendasi
            const tagEl = document.getElementById('fcTag');
            if(isAuto) tagEl.style.display = 'block'; else tagEl.style.display = 'none';

            if(userLat && userLng) {
                document.getElementById('fcDist').innerHTML = `<i class="fas fa-spinner fa-spin"></i> KALKULASI RUTE...`;
            } else {
                document.getElementById('fcDist').innerHTML = `<i class="fas fa-car"></i> JARAK: ${distStraight} KM (GPS MATI)`;
            }
            
            let finalLink = "";
            if (mapLink && mapLink.startsWith("http")) {
                finalLink = mapLink;
            } else if (userLat && userLng) {
                finalLink = `http://googleusercontent.com/maps.google.com/maps?saddr=${userLat},${userLng}&daddr=${lat},${lng}`;
            } else {
                finalLink = `http://googleusercontent.com/maps.google.com/maps?q=${lat},${lng}`;
            }
            
            document.getElementById('btnMaps').href = finalLink;
            document.getElementById('infoCard').classList.add('active');

            if (routingControl) { map.removeControl(routingControl); }

            if (userLat && userLng) {
                routingControl = L.Routing.control({
                    waypoints: [ L.latLng(userLat, userLng), L.latLng(lat, lng) ],
                    lineOptions: { styles: [{color: '#2D63ED', opacity: 0.8, weight: 6}] }, 
                    createMarker: function() { return null; }, 
                    addWaypoints: false, draggableWaypoints: false, fitSelectedRoutes: false, show: false
                })
                .on('routesfound', function(e) {
                    const distanceRouteKm = (e.routes[0].summary.totalDistance / 1000).toFixed(1);
                    const timeMins = Math.round(e.routes[0].summary.totalTime / 60);
                    document.getElementById('fcDist').innerHTML = `<i class="fas fa-road"></i> ${distanceRouteKm} KM &nbsp;•&nbsp; <i class="fas fa-clock"></i> ${timeMins} MNT`;
                })
                .addTo(map);
            }
        }

        function closeCard() { 
            document.getElementById('infoCard').classList.remove('active'); 
            if (routingControl) { 
                map.removeControl(routingControl); 
                routingControl = null;
            }
            recenterMap();
        }
    </script>
</body>
</html>
