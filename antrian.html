<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU - Smart Queue System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --royal-blue: #0A2259; --electric-blue: #2D63ED; --bg-surface: #F8FAFC; --white: #FFFFFF; --text-main: #0F172A; --text-muted: #64748B; --danger: #EF4444; --success: #10B981; --gold: #D4AF37; }
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; padding-bottom: 120px; }
        * { box-sizing: border-box; outline: none; }

        /* --- HEADER --- */
        .header-premium { background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); padding: 50px 25px 90px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white; text-align: center; position: relative; }
        .sub-tag { font-size: 10px; font-weight: 800; letter-spacing: 3px; color: var(--electric-blue); text-transform: uppercase; margin-bottom: 5px; display: block; }
        .main-title { font-family: 'Space Grotesk'; font-size: 26px; font-weight: 900; margin: 0; }
        
        /* ADMIN BADGE */
        .admin-badge { display: none; background: rgba(212, 175, 55, 0.2); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 9px; font-weight: 800; letter-spacing: 1px; margin-top: 10px; border: 1px solid rgba(212,175,55,0.4); justify-content: center; align-items: center; gap: 5px; width: max-content; margin-inline: auto; text-transform: uppercase; }

        /* --- STATUS CARD --- */
        .card-overlap { padding: 0 20px; margin-top: -45px; position: relative; z-index: 10; }
        .status-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 20px 40px rgba(10,34,89,0.1); border: 1px solid rgba(255,255,255,0.8); }
        .q-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; }
        .q-total { font-family: 'Space Grotesk'; font-size: 48px; font-weight: 900; color: var(--electric-blue); margin: 5px 0; line-height: 1; }

        /* --- BUTTON ACTION --- */
        .btn-action { width: 100%; padding: 18px; border: none; border-radius: 20px; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.1); transition: 0.3s; margin-top: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-join { background: linear-gradient(135deg, var(--success) 0%, #059669 100%); color: white; }
        .btn-join:active { transform: scale(0.97); }
        .btn-leave { background: #FEF2F2; color: var(--danger); border: 1px solid #FCA5A5; display: none; }
        .btn-leave:active { background: var(--danger); color: white; }

        /* --- QUEUE LIST --- */
        .list-section { padding: 30px 20px; display: flex; flex-direction: column; gap: 15px; }
        .q-item { background: var(--white); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #E2E8F0; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        
        .q-rank { font-family: 'Space Grotesk'; font-size: 24px; font-weight: 900; color: var(--royal-blue); width: 35px; text-align: center; }
        .q-item:nth-child(1) .q-rank { color: var(--success); } /* Antrian Pertama Hijau */
        
        .q-photo { width: 50px; height: 50px; border-radius: 16px; object-fit: cover; background: #F1F5F9; border: 2px solid #E2E8F0; }
        .q-info { flex: 1; }
        .q-name { font-family: 'Space Grotesk'; font-size: 15px; font-weight: 900; color: var(--text-main); text-transform: uppercase; }
        .q-plat { font-size: 11px; font-weight: 700; color: var(--electric-blue); margin-top: 3px; letter-spacing: 1px; }
        .q-time { font-size: 9px; font-weight: 700; color: var(--text-muted); margin-top: 5px; }

        /* TOMBOL KICK (KHUSUS ADMIN / PEMILIK ANTRIAN) */
        .btn-kick { background: #F1F5F9; color: var(--danger); border: none; width: 35px; height: 35px; border-radius: 12px; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-kick:active { background: var(--danger); color: white; transform: scale(0.9); }

        /* --- NAV BOTOOM --- */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 1000;}
        .btn-premium-back { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid #E2E8F0; padding: 16px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; color: var(--royal-blue); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header class="header-premium">
        <div class="sub-tag">Fast Charging Hub</div>
        <h1 class="main-title">LIVE ANTRIAN</h1>
        <div class="admin-badge" id="adminBadge"><i class="fas fa-shield-alt"></i> SUPERVISI ADMIN AKTIF</div>
    </header>

    <div class="card-overlap">
        <div class="status-card">
            <div class="q-label">Total Antrian Saat Ini</div>
            <div class="q-total" id="queueTotal">0</div>
            <div style="font-size:11px; color:var(--text-muted); font-weight:600;" id="myStatus">Anda belum mengambil nomor antrian.</div>
            
            <button class="btn-action btn-join" id="btnJoin" onclick="joinQueue()"><i class="fas fa-bolt" style="margin-right:8px;"></i> AMBIL ANTRIAN SEKARANG</button>
            <button class="btn-action btn-leave" id="btnLeave" onclick="leaveQueue('me')"><i class="fas fa-times-circle" style="margin-right:8px;"></i> BATALKAN / SAYA SUDAH SELESAI</button>
        </div>
    </div>

    <main class="list-section" id="queueList">
        <div style="text-align:center; padding:30px; color:#94A3B8;"><i class="fas fa-spinner fa-spin"></i> Memuat data server...</div>
    </main>

    <div class="back-nav"><a href="dashboard.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // DATA PENGGUNA LOKAL
        const u = JSON.parse(localStorage.getItem('maka_user')) || {};
        if(!u.plat) window.location.href = 'index.html';

        // CEK HAK AKSES SUPERVISI (Pengurus / Super Admin)
        const isSupervisi = u.isSuperAdmin || (u.role && u.role !== 'KELUARGA MLU');
        if(isSupervisi) document.getElementById('adminBadge').style.display = 'inline-flex';

        const myPhoto = u.foto || `https://ui-avatars.com/api/?background=2D63ED&color=fff&bold=true&name=${encodeURIComponent(u.nama)}`;
        let myQueueId = null; // Simpan ID dokumen antrian saya sendiri

        // RENDER ANTRIAN SECARA REAL-TIME (FI-FO)
        onSnapshot(query(collection(db, "mlu_queue"), orderBy("timestamp", "asc")), (snap) => {
            const list = document.getElementById('queueList');
            const totalEl = document.getElementById('queueTotal');
            
            list.innerHTML = '';
            myQueueId = null; // Reset tiap kali data berubah
            
            if(snap.empty) {
                totalEl.innerText = "0";
                list.innerHTML = '<div style="text-align:center; padding:40px; color:#94A3B8;"><i class="fas fa-battery-empty" style="font-size:30px; margin-bottom:10px;"></i><br>Stasiun sedang kosong. Silakan merapat.</div>';
                updateMyStatus(false, 0);
                return;
            }

            let rank = 1;
            snap.forEach(docSnap => {
                const d = docSnap.data();
                const isMe = (d.plat === u.plat);
                
                if (isMe) myQueueId = docSnap.id;

                // Logika Tombol Kick (Muncul jika itu antriannya sendiri ATAU yang login adalah Pengurus)
                let kickBtnHtml = '';
                if (isMe || isSupervisi) {
                    kickBtnHtml = `<button class="btn-kick" onclick="window.leaveQueue('${docSnap.id}')" title="Selesaikan Antrian"><i class="fas fa-check"></i></button>`;
                }

                // Format Waktu
                const dateObj = new Date(d.timestamp);
                const timeStr = dateObj.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

                list.innerHTML += `
                    <div class="q-item" ${isMe ? 'style="border-color:var(--success); background:#ECFDF5;"' : ''}>
                        <div class="q-rank">${rank}</div>
                        <img src="${d.foto}" class="q-photo">
                        <div class="q-info">
                            <div class="q-name">${d.nama} ${isMe ? '(SAYA)' : ''}</div>
                            <div class="q-plat">${d.plat}</div>
                            <div class="q-time"><i class="far fa-clock"></i> Tiba pukul ${timeStr} WIB</div>
                        </div>
                        ${kickBtnHtml}
                    </div>
                `;
                
                if (isMe) updateMyStatus(true, rank);
                rank++;
            });

            totalEl.innerText = snap.size;
            if(!myQueueId) updateMyStatus(false, 0); // Jika setelah di-loop tidak ketemu antrian saya
        });

        // UPDATE TAMPILAN TOMBOL SESUAI STATUS
        function updateMyStatus(isInQueue, myRank) {
            const btnJoin = document.getElementById('btnJoin');
            const btnLeave = document.getElementById('btnLeave');
            const myStatus = document.getElementById('myStatus');

            if (isInQueue) {
                btnJoin.style.display = 'none';
                btnLeave.style.display = 'block';
                if(myRank === 1) {
                    myStatus.innerHTML = '<span style="color:var(--success); font-weight:800;">GILIRAN ANDA SEKARANG!</span>';
                } else {
                    myStatus.innerHTML = `Anda berada di urutan ke-<b style="color:var(--royal-blue);">${myRank}</b>. Mohon bersabar.`;
                }
            } else {
                btnJoin.style.display = 'block';
                btnLeave.style.display = 'none';
                myStatus.innerHTML = 'Anda belum mengambil nomor antrian.';
            }
        }

        // FUNGSI GABUNG ANTRIAN
        window.joinQueue = async () => {
            const btn = document.getElementById('btnJoin');
            btn.innerText = "MEMPROSES..."; btn.style.opacity = '0.7';
            try {
                await addDoc(collection(db, "mlu_queue"), {
                    nama: u.namaKtp || u.namaWa || u.nama,
                    plat: u.plat,
                    foto: myPhoto,
                    timestamp: Date.now()
                });
            } catch (e) { alert("Gagal mengambil antrian."); }
            finally { btn.innerText = "AMBIL ANTRIAN SEKARANG"; btn.style.opacity = '1'; }
        };

        // FUNGSI KELUAR/HAPUS ANTRIAN (Diri Sendiri atau Oleh Admin)
        window.leaveQueue = async (targetId) => {
            let idToDelete = targetId;
            
            // Jika dipanggil dari tombol merah besar (Batalkan Antrian Saya)
            if (targetId === 'me') idToDelete = myQueueId;

            if (!idToDelete) return;

            if (confirm("Tandai antrian ini sudah SELESAI / DIBATALKAN?")) {
                try {
                    await deleteDoc(doc(db, "mlu_queue", idToDelete));
                } catch(e) {
                    alert("Gagal menghapus antrian.");
                }
            }
        };
    </script>
</body>
</html>
