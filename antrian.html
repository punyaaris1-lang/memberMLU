<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Smart Station Navigator</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --royal-blue: #0A2259;
            --electric-blue: #2D63ED;
            --bg-surface: #F8FAFC;
            --white: #FFFFFF;
            --text-main: #0F172A;
            --text-muted: #64748B;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --border-soft: rgba(226, 232, 240, 0.9);
        }

        body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; overflow: hidden; background: var(--bg-surface); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        /* --- FULLSCREEN MAP --- */
        #map { width: 100vw; height: 100vh; z-index: 1; }
        .leaflet-control-attribution { display: none; }

        /* --- FLOATING HEADER --- */
        .map-header {
            position: fixed; top: 0; left: 0; width: 100%; z-index: 1000;
            padding: 40px 20px 20px; text-align: center; pointer-events: none;
            background: linear-gradient(180deg, rgba(10,34,89,0.8) 0%, transparent 100%);
        }
        .main-title { 
            font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 900; 
            color: var(--white); margin: 0; letter-spacing: -0.5px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .live-tag { 
            font-size: 10px; font-weight: 800; color: var(--electric-blue);
            background: var(--white); padding: 4px 12px; border-radius: 50px;
            display: inline-flex; align-items: center; gap: 5px; margin-top: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); letter-spacing: 2px; text-transform: uppercase;
        }
        .live-dot { width: 6px; height: 6px; background: var(--success); border-radius: 50%; animation: pulse 1.5s infinite; }

        /* --- PREMIUM MARKER PIN --- */
        .marker-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: flex-end; width: 120px !important; transform: translate(-50%, -100%); }
        
        .pin-tooltip {
            background: var(--white); color: var(--royal-blue);
            font-family: 'Space Grotesk', sans-serif; font-size: 11px; font-weight: 800;
            padding: 6px 12px; border-radius: 12px; margin-bottom: 8px;
            white-space: nowrap; box-shadow: 0 10px 25px rgba(10,34,89,0.15);
            border: 1px solid var(--border-soft); text-transform: uppercase;
        }

        .pin-body {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, var(--royal-blue) 0%, var(--electric-blue) 100%);
            border: 3px solid var(--white); box-shadow: 0 8px 15px rgba(45, 99, 237, 0.4);
            display: flex; align-items: center; justify-content: center; color: white; font-size: 13px;
        }
        
        /* USER MARKER */
        .user-wrap { position: relative; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .user-pulse { position: absolute; width: 100%; height: 100%; border-radius: 50%; background: rgba(16, 185, 129, 0.4); animation: pulseOuter 2s infinite; }
        .user-dot { width: 18px; height: 18px; border-radius: 50%; background: var(--success); border: 3px solid var(--white); position: relative; z-index: 2; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* --- INFO CARD (SMART RECOMMENDATION OSRM) --- */
        .info-card {
            position: fixed; bottom: 100px; left: 50%; transform: translate(-50%, 150%);
            width: 90%; max-width: 400px; z-index: 1500;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
            border-radius: 35px; padding: 25px;
            box-shadow: 0 25px 50px rgba(10, 34, 89, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.8);
            transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .info-card.active { transform: translate(-50%, 0); }

        .btn-close {
            position: absolute; top: 15px; right: 20px;
            background: #F1F5F9; color: var(--text-muted);
            width: 28px; height: 28px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; cursor: pointer; border: none; transition: 0.2s;
        }
        .btn-close:active { transform: scale(0.9); }

        .routing-info { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; flex-wrap: wrap; }
        .card-dist { font-size: 10px; font-weight: 800; color: var(--electric-blue); background: #EFF6FF; padding: 6px 12px; border-radius: 8px; letter-spacing: 1px; }
        .card-eta { font-size: 10px; font-weight: 800; color: var(--warning); background: #FFFBEB; padding: 6px 12px; border-radius: 8px; letter-spacing: 1px; }
        .card-near { font-size: 10px; font-weight: 800; color: var(--success); background: #ECFDF5; padding: 6px 12px; border-radius: 8px; letter-spacing: 1px; display: none; }

        .card-title { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 900; color: var(--royal-blue); margin: 0 0 6px; line-height: 1.1; text-transform: uppercase; }
        .card-addr { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 20px; font-weight: 500; }

        .btn-nav-map {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 14px; border-radius: 16px;
            background: linear-gradient(135deg, var(--royal-blue) 0%, var(--electric-blue) 100%);
            color: var(--white); font-family: 'Space Grotesk', sans-serif; font-weight: 800;
            font-size: 13px; text-decoration: none; box-shadow: 0 10px 25px rgba(45, 99, 237, 0.3);
            transition: 0.3s; margin-top: 10px; border: none; cursor: pointer;
        }
        .btn-nav-map:active { transform: scale(0.97); }

        /* --- TAMBAHAN CSS ANTRIAN --- */
        .queue-box { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 16px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .q-number { font-family: 'Space Grotesk'; font-size: 28px; font-weight: 900; color: var(--royal-blue); line-height: 1; }
        .q-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }
        
        .action-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .btn-vip { background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.2); display: none; }

        /* --- MODAL VIP --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.8); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; z-index: 9999; }
        .modal-box { background: white; width: 100%; max-width: 500px; border-top-left-radius: 35px; border-top-right-radius: 35px; padding: 30px 25px; transform: translateY(100%); animation: slideUp 0.3s forwards; }
        @keyframes slideUp { to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .modal-title { font-family: 'Space Grotesk'; font-size: 18px; font-weight: 900; color: var(--warning); }
        .form-input { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #E2E8F0; background: #F8FAFC; font-family: 'Space Grotesk'; font-weight: 700; font-size: 16px; margin-bottom: 15px; text-transform: uppercase; outline: none;}
        .form-input:focus { border-color: var(--warning); background: white; }

        /* --- FLOATING BACK BUTTON --- */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000; width: 85%; max-width: 350px; }
        .btn-premium-back {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid var(--border-soft);
            color: var(--royal-blue); padding: 16px; border-radius: 50px;
            font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 800;
            cursor: pointer; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none;
            transition: 0.3s;
        }
        .btn-premium-back:active { transform: scale(0.95); background: #F1F5F9; }

        /* Animations */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        @keyframes pulseOuter { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }

    </style>
</head>
<body>

    <header class="map-header">
        <h1 class="main-title">STATION LOCATOR</h1>
        <div class="live-tag" id="gpsStatus"><div class="live-dot"></div> MENCARI LOKASI...</div>
    </header>

    <div id="map"></div>

    <div id="infoCard" class="info-card">
        <button class="btn-close" onclick="closeCard()"><i class="fas fa-times"></i></button>
        
        <div class="routing-info">
            <div class="card-near" id="lblNear"><i class="fas fa-star"></i> REKOMENDASI TERDEKAT</div>
            <div class="card-dist" id="fcDist"><i class="fas fa-car"></i> MENGHITUNG JARAK...</div>
            <div class="card-eta" id="fcEta" style="display:none;"><i class="fas fa-clock"></i> ETA...</div>
        </div>

        <div class="card-title" id="fcName">Station Name</div>
        <div class="card-addr" id="fcAddr">Jl. Alamat Lengkap Stasiun, Jakarta</div>

        <div class="queue-box">
            <div class="q-number" id="lblLiveQueue">...</div>
            <div class="q-label">KENDARAAN MENGANTRI</div>
        </div>

        <div class="action-grid">
            <button class="btn-nav-map" onclick="ambilAntrianReguler()" id="btnAmbilAntrian"><i class="fas fa-ticket-alt"></i> AMBIL ANTRIAN SAYA</button>
            <button class="btn-nav-map btn-vip" id="btnAdminVip" onclick="openVipModal()"><i class="fas fa-crown"></i> TAMBAH VIP (ADMIN)</button>
            <a href="#" id="btnMaps" target="_blank" class="btn-nav-map" style="background: #F1F5F9; color: var(--text-main);"><i class="fas fa-location-arrow"></i> BUKA DI GOOGLE MAPS</a>
        </div>
    </div>

    <div class="modal-overlay" id="vipModal">
        <div class="modal-box">
            <div class="modal-header">
                <div class="modal-title"><i class="fas fa-crown"></i> Jalur Prioritas VIP</div>
                <button class="btn-close" onclick="document.getElementById('vipModal').style.display='none'"><i class="fas fa-times"></i></button>
            </div>
            <p style="font-size:12px; color:var(--text-muted); margin-top:0;">Masukkan Plat Nomor yang ingin diselipkan ke antrian stasiun ini.</p>
            <input type="text" id="inputVipPlat" class="form-input" placeholder="Contoh: B 1234 XYZ">
            <button class="btn-nav-map" style="background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);" onclick="prosesTambahVip()">MASUKKAN KE ANTRIAN</button>
        </div>
    </div>

    <div class="back-nav">
        <a href="dashboard.html" class="btn-premium-back">
            <i class="fas fa-home"></i> KEMBALI KE HOME
        </a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, updateDoc, getDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // INIT FIREBASE
        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // CEK ADMIN UNTUK TOMBOL VIP
        const u = JSON.parse(localStorage.getItem('maka_user')) || {};
        const isAdmin = u.isSuperAdmin || (u.role && u.role !== 'KELUARGA MLU' && u.role !== 'GUEST');
        if (isAdmin) {
            const btnVip = document.getElementById('btnAdminVip');
            if (btnVip) btnVip.style.display = 'flex';
        }

        // 1. INIT MAP
        const map = L.map('map', {zoomControl: false}).setView([-6.2, 106.8], 11);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

        // 2. USER ICON
        const userIcon = L.divIcon({
            className: 'custom-user',
            html: `<div class="user-wrap"><div class="user-pulse"></div><div class="user-dot"></div></div>`,
            iconSize: [44, 44], iconAnchor: [22, 22]
        });
        
        // 3. DATA API SPREADSHEET
        const SHEET_ID = '1EJOTMMfGpBMFPqR0LzbMbh7tZUcTCZld4x387OO9aJM'; 
        const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sheet1`;

        let userLat = null, userLng = null;
        window.allStations = []; // Simpan data stasiun untuk cari terdekat nanti

        // 4. HA-VERSINE FORMULA (Hanya untuk sorting cepat awal)
        function calculateFastDist(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))); 
        }

        // 5. OSRM API INTEGRATION (Actual Driving Distance & ETA)
        async function fetchOSRMData(startLat, startLng, endLat, endLng) {
            try {
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${startLng},${startLat};${endLng},${endLat}?overview=false`);
                const data = await response.json();
                if(data.routes && data.routes.length > 0) {
                    return { distance: data.routes[0].distance, duration: data.routes[0].duration };
                }
            } catch(e) { console.error("OSRM Error:", e); }
            return null;
        }

        // --- PERUBAHAN PENTING: LOAD DATA STASIUN DULUAN SEBELUM GPS ---
        Papa.parse(CSV_URL, {
            download: true, header: true, skipEmptyLines: true,
            complete: function(results) {
                results.data.forEach(row => {
                    let lat = null, lng = null, name = "FC Station", addr = "Alamat tidak tersedia";

                    const keys = Object.keys(row);
                    for(let k of keys) {
                        let cleanKey = k.toLowerCase().trim();
                        if(cleanKey.includes('nama') || cleanKey.includes('station') || cleanKey.includes('lokasi')) { if(row[k]) name = row[k]; }
                        if(cleanKey.includes('alamat')) { if(row[k]) addr = row[k]; }
                    }
                    for(let k of keys) {
                        let val = String(row[k]).replace(',', '.').trim(); let num = parseFloat(val);
                        if(isNaN(num)) continue;
                        let cleanKey = k.toLowerCase();
                        if (cleanKey.includes('lat') && num < -5 && num > -11) lat = num;
                        if ((cleanKey.includes('long') || cleanKey.includes('lng')) && num > 95 && num < 141) lng = num;
                    }
                    if (lat === null || lng === null) {
                        Object.values(row).forEach(val => {
                            let v = String(val).replace(',', '.').trim(); let num = parseFloat(v);
                            if (!isNaN(num)) {
                                if (lat === null && num < 6 && num > -11) lat = num;
                                else if (lng === null && num > 95 && num < 141) lng = num;
                            }
                        });
                    }

                    if (lat && lng) {
                        // Simpan ke array global untuk dicari terdekatnya nanti
                        window.allStations.push({name, addr, lat, lng});

                        // Render Custom Premium Marker Langsung
                        const fcIcon = L.divIcon({ 
                            className: 'custom-pin', 
                            html: `<div class="marker-wrapper"><div class="pin-tooltip">${name}</div><div class="pin-body"><i class="fas fa-bolt"></i></div></div>`, 
                            iconSize: [120, 70], iconAnchor: [60, 70] 
                        });

                        const m = L.marker([lat, lng], {icon: fcIcon}).addTo(map);
                        m.on('click', () => window.showInfo(name, addr, lat, lng, false));
                    }
                });

                // Setelah semua Pin muncul, barulah kita cari GPS User (Tidak memblokir map)
                cariGPSDanTerdekat();
            }
        });

        // 6. FUNGSI MENCARI GPS (Dijalankan SETELAH peta tampil)
        function cariGPSDanTerdekat() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    userLat = pos.coords.latitude;
                    userLng = pos.coords.longitude;
                    L.marker([userLat, userLng], {icon: userIcon, zIndexOffset: 1000}).addTo(map);
                    document.getElementById('gpsStatus').innerHTML = '<div class="live-dot"></div> GPS ACTIVE';
                    
                    // Cek stasiun terdekat
                    let minFastDist = Infinity;
                    let nearestStation = null;
                    window.allStations.forEach(st => {
                        let fDist = calculateFastDist(userLat, userLng, st.lat, st.lng);
                        if (fDist < minFastDist) { minFastDist = fDist; nearestStation = st; }
                    });

                    // AUTO-ZOOM KE YANG TERDEKAT
                    if (nearestStation) {
                        window.showInfo(nearestStation.name, nearestStation.addr, nearestStation.lat, nearestStation.lng, true);
                        const bounds = L.latLngBounds([[userLat, userLng], [nearestStation.lat, nearestStation.lng]]);
                        map.fitBounds(bounds, { padding: [80, 80], maxZoom: 14 });
                    }
                }, () => { 
                    document.getElementById('gpsStatus').innerHTML = '<div class="live-dot" style="background:var(--danger)"></div> GPS DENIED';
                }, { enableHighAccuracy: true });
            } else { 
                document.getElementById('gpsStatus').innerHTML = '<div class="live-dot" style="background:var(--danger)"></div> GPS UNAVAILABLE';
            }
        }

        // Variabel untuk Firebase Queue
        window.currentStationId = null;
        window.unsubscribeQueue = null;

        window.showInfo = async (name, addr, lat, lng, isNearest) => {
            document.getElementById('fcName').innerText = name;
            document.getElementById('fcAddr').innerText = addr;
            
            const distLabel = document.getElementById('fcDist');
            const etaLabel = document.getElementById('fcEta');
            const nearLabel = document.getElementById('lblNear');
            
            document.getElementById('btnMaps').href = `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
            nearLabel.style.display = isNearest ? 'inline-block' : 'none';

            if (userLat && userLng) {
                distLabel.style.display = 'inline-block';
                distLabel.innerHTML = `<i class="fas fa-spinner fa-spin"></i> KALKULASI RUTE...`;
                etaLabel.style.display = 'none';
                
                const routingData = await fetchOSRMData(userLat, userLng, lat, lng);
                if(routingData) {
                    const distKm = (routingData.distance / 1000).toFixed(1);
                    const durMin = Math.ceil(routingData.duration / 60);
                    distLabel.innerHTML = `<i class="fas fa-car"></i> ${distKm} KM`;
                    etaLabel.style.display = 'inline-block';
                    etaLabel.innerHTML = `<i class="fas fa-clock"></i> ${durMin} MENIT`;
                } else {
                    distLabel.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Gagal Kalkulasi`;
                }
            } else {
                distLabel.style.display = 'none'; etaLabel.style.display = 'none';
            }

            // --- SISTEM FIREBASE ANTRIAN REALTIME ---
            window.currentStationId = name.replace(/[^a-zA-Z0-9]/g, '').toLowerCase(); // Buat ID dari nama stasiun
            
            if(window.unsubscribeQueue) window.unsubscribeQueue(); // Matikan listener lama
            document.getElementById('lblLiveQueue').innerText = "...";

            // Pasang Listener baru ke stasiun yang diklik
            window.unsubscribeQueue = onSnapshot(doc(db, "mlu_queues", window.currentStationId), (docSnap) => {
                if (docSnap.exists()) {
                    document.getElementById('lblLiveQueue').innerText = (docSnap.data().queue_list || []).length;
                } else {
                    document.getElementById('lblLiveQueue').innerText = "0";
                }
            });

            document.getElementById('infoCard').classList.add('active');
        }
        
        window.closeCard = () => { document.getElementById('infoCard').classList.remove('active'); }

        // --- FUNGSI AMBIL ANTRIAN (REGULER) ---
        window.ambilAntrianReguler = async () => {
            if(!window.currentStationId) return;
            if(!u.plat) return alert("Plat Nomor Anda tidak terdeteksi. Silakan login ulang.");

            const btn = document.getElementById('btnAmbilAntrian');
            btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> MEMPROSES...`; btn.disabled = true;

            try {
                const docRef = doc(db, "mlu_queues", window.currentStationId);
                const docSnap = await getDoc(docRef);
                const payload = { plat: u.plat, nama: u.namaKtp || u.nama, tipe: "REGULER", waktu: Date.now() };

                if (!docSnap.exists()) {
                    await setDoc(docRef, { queue_list: [payload] });
                } else {
                    const list = docSnap.data().queue_list || [];
                    if(list.some(x => x.plat === u.plat)) {
                        alert("Anda sudah berada di dalam antrian stasiun ini!");
                        btn.innerHTML = `<i class="fas fa-ticket-alt"></i> AMBIL ANTRIAN SAYA`; btn.disabled = false; return;
                    }
                    await updateDoc(docRef, { queue_list: arrayUnion(payload) });
                }
                alert("Berhasil mengambil antrian!");
            } catch (e) { alert("Gagal mengambil antrian."); }
            
            btn.innerHTML = `<i class="fas fa-ticket-alt"></i> AMBIL ANTRIAN SAYA`; btn.disabled = false;
        };

        // --- FUNGSI VIP (ADMIN) ---
        window.openVipModal = () => { document.getElementById('vipModal').style.display = 'flex'; };
        
        window.prosesTambahVip = async () => {
            const rawPlat = document.getElementById('inputVipPlat').value.trim().toUpperCase();
            if(!rawPlat) return alert("Masukkan Plat Nomor!");
            
            try {
                const docRef = doc(db, "mlu_queues", window.currentStationId);
                const docSnap = await getDoc(docRef);
                const payload = { plat: rawPlat, nama: "JALUR VIP ADMIN", tipe: "VIP", waktu: Date.now() };

                if (!docSnap.exists()) await setDoc(docRef, { queue_list: [payload] });
                else await updateDoc(docRef, { queue_list: arrayUnion(payload) });
                
                alert(`Plat ${rawPlat} berhasil diselipkan sebagai VIP!`);
                document.getElementById('vipModal').style.display = 'none';
                document.getElementById('inputVipPlat').value = '';
            } catch (e) { alert("Gagal input VIP."); }
        };
