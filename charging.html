<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Active Charging</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Variabel persis dari dashboard.html */
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; --gold-lux: #D4AF37;
            --bg-surface: #E8F0F8; --text-main: #0F172A; --text-muted: #64748B; 
            --success: #10B981; --danger: #EF4444; --warning: #F59E0B;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glass-shadow: 0 15px 35px rgba(10, 25, 49, 0.05);
        }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; color: var(--text-main); 
            background-color: var(--bg-surface);
            background-image: radial-gradient(at 0% 0%, #FFFFFF 0px, transparent 50%), radial-gradient(at 100% 0%, rgba(212, 175, 55, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, #FFFFFF 0px, transparent 50%), radial-gradient(at 0% 100%, rgba(45, 99, 237, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            display: flex; justify-content: center; min-height: 100vh; padding: 20px 15px;
            -webkit-tap-highlight-color: transparent;
        }

        * { box-sizing: border-box; }

        .container { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 15px; position: relative; z-index: 10;}

        /* Header Title */
        .top-header { text-align: center; padding: 10px 0; }
        .greet-txt { font-family: 'Outfit'; font-size: 24px; font-weight: 900; color: var(--royal-blue); line-height: 1; letter-spacing: -0.5px;}
        .sub-txt { font-family: 'Space Grotesk'; font-size: 11px; font-weight: 800; color: var(--electric-blue); letter-spacing: 2px; margin-top: 5px;}

        /* Card Saldo Premium */
        .vip-card { 
            border-radius: 24px; background: linear-gradient(135deg, #0A1128 0%, var(--royal-blue) 100%); 
            position: relative; overflow: hidden; box-shadow: 0 20px 40px rgba(10,34,89,0.3); 
            border: 1px solid rgba(255,255,255,0.15); padding: 25px 20px; text-align: center; color: white;
        }
        .vip-card::after { content: ''; position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 1px); background-size: 15px 15px; opacity: 0.3; pointer-events: none;}
        
        .wallet-title { font-family: 'Space Grotesk'; font-size: 11px; font-weight: 800; opacity: 0.8; letter-spacing: 1px; margin-bottom: 5px;}
        .wallet-balance { font-family: 'Outfit'; font-size: 38px; font-weight: 900; color: var(--gold-lux); text-shadow: 0 5px 15px rgba(0,0,0,0.5); line-height: 1;}
        .wallet-sub { font-size: 12px; font-weight: 600; opacity: 0.9; margin-top: 10px; background: rgba(0,0,0,0.3); display: inline-block; padding: 5px 15px; border-radius: 20px;}

        /* Logo Visualizer */
        .fc-wrapper { 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); 
            border-radius: 24px; border: 1px solid var(--glass-border); 
            box-shadow: var(--glass-shadow); padding: 40px 20px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .logo-stack {
            position: relative;
            width: 180px; height: 180px;
            display: flex; justify-content: center; align-items: center;
        }

        /* Trik gambar grayscale vs color */
        .logo-base, .logo-fill {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: contain;
        }
        .logo-base {
            filter: grayscale(100%) opacity(0.15); /* Hitam putih & redup */
        }
        .logo-fill {
            clip-path: inset(100% 0 0 0); /* Awalnya kepotong habis dari bawah */
            transition: clip-path 0.5s linear;
            filter: drop-shadow(0 10px 20px rgba(45, 99, 237, 0.3));
        }

        /* Stats Grid Glassmorphism */
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-box { 
            background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); 
            border: 1px solid var(--glass-border); border-radius: 16px; padding: 15px 5px; 
            text-align: center; box-shadow: var(--glass-shadow); 
        }
        .stat-value { font-family: 'Outfit'; font-size: 18px; font-weight: 900; color: var(--royal-blue); margin-bottom: 4px; }
        .stat-label { font-family: 'Space Grotesk'; font-size: 9px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;}

        /* SWIPE TO STOP BUTTON */
        .swipe-container {
            width: 100%; height: 65px;
            background: rgba(239, 68, 68, 0.1); border: 2px dashed rgba(239, 68, 68, 0.3);
            border-radius: 50px; position: relative; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            margin-top: 10px;
        }
        .swipe-text {
            font-family: 'Space Grotesk'; font-size: 13px; font-weight: 900;
            color: var(--danger); letter-spacing: 2px; pointer-events: none;
            z-index: 1; opacity: 0.8;
        }
        .swipe-thumb {
            position: absolute; left: 5px; top: 5px;
            width: 55px; height: 51px;
            background: linear-gradient(135deg, #EF4444, #991B1B);
            border-radius: 50px; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.4);
            cursor: grab; z-index: 2; transition: left 0.1s ease-out;
        }
        .swipe-thumb:active { cursor: grabbing; }
        .swipe-thumb.success { background: var(--success); box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4); }

        /* Lampu Ambient (Sama kaya Dashboard) */
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(90px); z-index: -1; opacity: 0.5; animation: floatLight 12s infinite alternate; }
        .light-1 { top: -10%; left: -20%; width: 500px; height: 500px; background: rgba(45, 99, 237, 0.15); }
        .light-2 { bottom: -10%; right: -20%; width: 450px; height: 450px; background: rgba(212, 175, 55, 0.15); animation-delay: -4s; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(30px, 50px);} }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <div class="container">
        
        <div class="top-header">
            <div class="greet-txt">CHARGING...</div>
            <div class="sub-txt"><i class="fas fa-bolt"></i> MLU FAST CHARGE</div>
        </div>

        <div class="vip-card">
            <div class="wallet-title">SISA SALDO DOMPET</div>
            <div class="wallet-balance" id="sisa-saldo">Rp 20.000</div>
            <div class="wallet-sub">Terpakai: <span id="saldo-terpakai" style="color: var(--warning);">Rp 0</span></div>
        </div>

        <div class="fc-wrapper">
            <div class="logo-stack">
                <img src="logomlumaster.png" class="logo-base" alt="MLU Base">
                <img src="logomlumaster.jpg" class="logo-fill" id="logo-fill" alt="MLU Fill">
            </div>
            <div style="font-size: 10px; color: var(--text-muted); font-weight: 700; margin-top: 20px;">
                <i class="fas fa-info-circle"></i> Indikator terisi otomatis berdasarkan daya.
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-value" id="time-display">00:00</div>
                <div class="stat-label">DURASI</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="kwh-display">0.00</div>
                <div class="stat-label">KWH MASUK</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" style="color: var(--electric-blue);">3.5 kW</div>
                <div class="stat-label">DAYA ARUS</div>
            </div>
        </div>

        <div class="swipe-container" id="swipe-container">
            <div class="swipe-text" id="swipe-text">GESER UNTUK BERHENTI</div>
            <div class="swipe-thumb" id="swipe-thumb"><i class="fas fa-angle-double-right"></i></div>
        </div>

    </div>

    <script>
        // Konfigurasi Bisnis MLU
        const TARIF_LISTRIK_KWH = 2100; 
        const TARIF_LAYANAN_JAM = 500;  
        const DAYA_KW = 3.5; 
        const SALDO_AWAL = 20000;
        
        let biayaReal = 0; 
        let secondsElapsed = 0;
        let kwhConsumed = 0.000;
        let isCharging = true;
        let chargingInterval;
        
        const formatRp = (angka) => 'Rp ' + angka.toLocaleString('id-ID');

        function updateDashboard() {
            if (!isCharging) return;
            secondsElapsed++;
            
            // Logika hitungan asli per detik
            kwhConsumed += (DAYA_KW / 3600);
            biayaReal = (kwhConsumed * TARIF_LISTRIK_KWH) + ((secondsElapsed / 3600) * TARIF_LAYANAN_JAM);
            
            // Logika tampilan (Dibulatkan kelipatan 1000 ke bawah biar tenang)
            let biayaTampil = Math.floor(biayaReal / 1000) * 1000; 
            let sisaTampil = SALDO_AWAL - biayaTampil;

            if (SALDO_AWAL - biayaReal <= 0) { cutOffPower(); return; }

            // Update Teks DOM
            document.getElementById('sisa-saldo').innerText = formatRp(sisaTampil);
            document.getElementById('saldo-terpakai').innerText = formatRp(biayaTampil);
            
            const m = Math.floor(secondsElapsed / 60).toString().padStart(2, '0');
            const s = (secondsElapsed % 60).toString().padStart(2, '0');
            document.getElementById('time-display').innerText = `${m}:${s}`;
            document.getElementById('kwh-display').innerText = kwhConsumed.toFixed(2);

            // Update Animasi Naik Logo Gambar
            let persentase = (biayaReal / SALDO_AWAL) * 100;
            if (persentase > 100) persentase = 100;
            document.getElementById('logo-fill').style.clipPath = `inset(${100 - persentase}% 0 0 0)`;
        }

        function cutOffPower() {
            isCharging = false;
            clearInterval(chargingInterval);
            document.getElementById('swipe-text').innerText = 'SALDO HABIS (CUT OFF)';
        }

        chargingInterval = setInterval(updateDashboard, 100); // 100ms buat simulasi cepat

        // ==========================================
        // LOGIKA SWIPE TO STOP (Anti Kepencet)
        // ==========================================
        const thumb = document.getElementById('swipe-thumb');
        const container = document.getElementById('swipe-container');
        const swipeText = document.getElementById('swipe-text');
        
        let isDragging = false;
        let startX = 0;
        let thumbLeft = 5; 
        let maxScroll = 0;

        function initSwipe() {
            // Lebar container dikurang lebar thumb dikurang padding
            maxScroll = container.offsetWidth - thumb.offsetWidth - 10; 
        }
        window.addEventListener('resize', initSwipe);
        initSwipe();

        thumb.addEventListener('touchstart', (e) => {
            if(!isCharging) return;
            isDragging = true;
            startX = e.touches[0].clientX - thumbLeft;
            thumb.style.transition = 'none'; // Matiin transisi biar mulus ngikutin jari
        });

        thumb.addEventListener('touchmove', (e) => {
            if (!isDragging || !isCharging) return;
            
            let currentX = e.touches[0].clientX - startX;
            
            if (currentX < 5) currentX = 5;
            if (currentX > maxScroll) currentX = maxScroll;
            
            thumbLeft = currentX;
            thumb.style.left = thumbLeft + 'px';
            
            // Bikin tulisan perlahan hilang saat ditarik
            swipeText.style.opacity = 1 - (thumbLeft / maxScroll);
        });

        thumb.addEventListener('touchend', (e) => {
            if (!isDragging || !isCharging) return;
            isDragging = false;
            thumb.style.transition = 'left 0.3s ease-out'; // Nyalain lagi transisi buat snap

            // Kalau tarikan kurang dari 80%, balik ke kiri
            if (thumbLeft < maxScroll * 0.8) {
                thumbLeft = 5;
                thumb.style.left = '5px';
                swipeText.style.opacity = 0.8;
            } else {
                // Berhasil di-swipe pol ke kanan!
                thumbLeft = maxScroll;
                thumb.style.left = maxScroll + 'px';
                thumb.innerHTML = '<i class="fas fa-check"></i>';
                thumb.classList.add('success');
                swipeText.innerText = 'MEMPROSES...';
                swipeText.style.opacity = 1;
                
                // Matikan sistem ngecas
                isCharging = false;
                clearInterval(chargingInterval);
                
                // Timeout dikit biar ada animasi selesai
                setTimeout(() => {
                    alert(`Sesi Selesai!\nTotal Biaya Real: Rp ${Math.round(biayaReal)}\n\n(Nanti disini bisa panggil fungsi update saldo ke Firebase)`);
                }, 500);
            }
        });
    </script>
</body>
</html>
