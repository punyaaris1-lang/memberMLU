<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Pusat Informasi</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; 
            --gold-lux: #D4AF37; --bg-surface: #F0F4F8; 
            --text-main: #0F172A; --text-muted: #64748B; 
            --danger: #EF4444; --success: #10B981;
        }
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 100px; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; }

        .header-main { padding: 40px 20px 20px; text-align: center; background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; color: white; box-shadow: 0 10px 30px rgba(10,34,89,0.2); margin-bottom: 20px;}
        .main-title { font-family: 'Outfit'; font-size: 28px; font-weight: 900; margin: 0; letter-spacing: 1px;}
        .sub-tag { font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; letter-spacing: 2px; color: var(--gold-lux); text-transform: uppercase; margin-top: 5px; display: block; }

        .container { padding: 0 20px; }

        /* FORM ADMIN BROADCAST */
        .admin-panel { background: white; padding: 25px 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 25px; border: 2px dashed var(--electric-blue); display: none; }
        .ap-title { font-family: 'Outfit'; font-size: 18px; font-weight: 900; color: var(--electric-blue); margin-bottom: 15px; display: flex; align-items: center; gap: 8px;}
        
        .form-group { margin-bottom: 15px; }
        .form-group label { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; display: block;}
        .form-input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #E2E8F0; background: #F8FAFC; font-family: 'Inter'; font-size: 14px; font-weight: 600; transition: 0.2s;}
        .form-input:focus { border-color: var(--electric-blue); background: white; }
        
        .btn-send { width: 100%; padding: 16px; background: linear-gradient(135deg, var(--electric-blue), var(--royal-blue)); color: white; border: none; border-radius: 14px; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 900; letter-spacing: 1px; cursor: pointer; box-shadow: 0 10px 25px rgba(45,99,237,0.3); transition: 0.2s;}
        .btn-send:active { transform: scale(0.96); }

        /* LIST PENGUMUMAN */
        .info-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); border: 1px solid #F1F5F9; position: relative; overflow: hidden;}
        .info-card::before { content: ''; position: absolute; left: 0; top: 0; width: 5px; height: 100%; background: var(--electric-blue); }
        .ic-date { font-size: 10px; color: var(--text-muted); font-weight: 700; margin-bottom: 5px; }
        .ic-title { font-family: 'Outfit'; font-size: 18px; font-weight: 900; color: var(--royal-blue); margin-bottom: 8px; line-height: 1.3;}
        .ic-body { font-size: 13px; color: #475569; line-height: 1.6; font-weight: 500; white-space: pre-wrap;}
        .ic-target { font-size: 9px; font-weight: 800; background: #F1F5F9; color: var(--text-muted); padding: 4px 8px; border-radius: 6px; display: inline-block; margin-top: 10px;}

        .btn-del { position: absolute; top: 15px; right: 15px; background: rgba(239,68,68,0.1); color: var(--danger); border: none; width: 30px; height: 30px; border-radius: 8px; font-size: 14px; cursor: pointer; display: none; align-items: center; justify-content: center;}

        /* BACK NAV */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; text-align: center;}
        .btn-premium-back { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(45,99,237,0.2); padding: 14px 25px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 12px; color: var(--electric-blue); text-decoration: none; display: inline-flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 30px rgba(45,99,237,0.15); transition: 0.2s;}
    </style>
</head>
<body>

    <header class="header-main">
        <h1 class="main-title"><i class="fas fa-bullhorn"></i> INFO MLU</h1>
        <span class="sub-tag">Pusat Informasi & Broadcast</span>
    </header>

    <div class="container">
        
        <div class="admin-panel" id="adminPanel">
            <div class="ap-title"><i class="fas fa-satellite-dish fa-beat"></i> KONTROL BROADCAST</div>
            
            <div class="form-group">
                <label>Judul Pengumuman</label>
                <input type="text" id="inpTitle" class="form-input" placeholder="Contoh: KOPDAR WAJIB MLU">
            </div>

            <div class="form-group">
                <label>Isi Pesan / Deskripsi</label>
                <textarea id="inpBody" class="form-input" rows="4" placeholder="Ketik isi pengumuman selengkapnya di sini..."></textarea>
            </div>

            <div class="form-group">
                <label>Target Notifikasi</label>
                <select id="inpTarget" class="form-input">
                    <option value="ALL">Semua Member (GLOBAL)</option>
                    <option value="PENGURUS">Khusus Pengurus</option>
                    <option value="RTO">Khusus Divisi RTO</option>
                </select>
            </div>

            <button class="btn-send" id="btnKirim" onclick="kirimBroadcast()"><i class="fas fa-paper-plane"></i> KIRIM SEKARANG</button>
            <div style="font-size:10px; color:var(--text-muted); text-align:center; margin-top:10px;">*Pesan akan masuk Database & Pop-Up HP Member (FCM).</div>
        </div>

        <div id="infoList">
            <div style="text-align:center; padding:30px; color:#94A3B8;"><i class="fas fa-spinner fa-spin"></i> Memuat Informasi...</div>
        </div>

    </div>

    <div class="back-nav">
        <a href="dashboard.html" class="btn-premium-back" id="btnBack"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // KONEKSI FIREBASE (DATABASE MLU UTAMA)
        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // CEK LOGIN USER
        let uData = null;
        try { uData = JSON.parse(localStorage.getItem('maka_user')); } catch (e) {}
        if (!uData || !uData.plat) window.location.href = 'index.html'; 

        const myName = uData.namaKtp || uData.namaWa || "User";
        const myPlat = (uData.plat || "").replace(/\s+/g, '').toUpperCase();
        
        // HAK AKSES ADMIN
        const isSuperAdmin = (myPlat === "B4248SWF" || uData.id === "ghost_admin");
        const role = uData.role ? uData.role.toUpperCase() : "MEMBER";
        const isAdmin = isSuperAdmin || (role !== "KELUARGA MLU" && role !== "GUEST" && role !== "MEMBER");

        if (isAdmin) {
            document.getElementById('adminPanel').style.display = 'block';
            // Tambah style biar tombol hapus (tong sampah) muncul buat admin
            const style = document.createElement('style'); 
            style.innerHTML = '.btn-del { display: flex !important; }'; 
            document.head.appendChild(style);
        }

        // FUNGSI TARIK DATA (READ)
        const qInfo = query(collection(db, "mlu_broadcasts"), orderBy("timestamp", "desc"));
        onSnapshot(qInfo, (snap) => {
            const list = document.getElementById('infoList');
            list.innerHTML = "";
            if(snap.empty) {
                list.innerHTML = `<div style="text-align:center; padding:30px; color:#94A3B8; font-size:12px;">Belum ada pengumuman.</div>`;
                return;
            }

            snap.forEach(doc => {
                const d = doc.data();
                const dateStr = new Date(d.timestamp).toLocaleDateString('id-ID', {weekday:'long', day:'numeric', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit'});
                
                list.innerHTML += `
                <div class="info-card">
                    <button class="btn-del" onclick="hapusInfo('${doc.id}')"><i class="fas fa-trash"></i></button>
                    <div class="ic-date"><i class="far fa-clock"></i> ${dateStr}</div>
                    <div class="ic-title">${d.title}</div>
                    <div class="ic-body">${d.body}</div>
                    <div class="ic-target">TARGET: ${d.target || 'GLOBAL'}</div>
                </div>`;
            });
        });

        window.hapusInfo = async (id) => {
            if(confirm("Hapus pengumuman ini?")) {
                await deleteDoc(doc(db, "mlu_broadcasts", id));
            }
        };

        // ==============================================================
        // FUNGSI UTAMA: SIMPAN KE FIREBASE & TEMBAK URL SAKTI (FCM)
        // ==============================================================
        window.kirimBroadcast = async () => {
            const title = document.getElementById('inpTitle').value.trim();
            const body = document.getElementById('inpBody').value.trim();
            const target = document.getElementById('inpTarget').value;

            if(!title || !body) return alert("Judul dan Isi pesan wajib diisi!");

            const btn = document.getElementById('btnKirim');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMPROSES...';
            btn.style.opacity = '0.7';

            try {
                // 1. Simpan ke Firestore (Biar nongol di web)
                await addDoc(collection(db, "mlu_broadcasts"), {
                    title: title,
                    body: body,
                    target: target,
                    sender: myName,
                    timestamp: Date.now()
                });

                // 2. TEMBAK KE "URL SAKTI" GOOGLE APPS SCRIPT BAPAK (Untuk Push Notif HP)
                const urlSaktiGAS = "https://script.google.com/macros/s/AKfycbxOXnRMTzXPPeY0NfSzcV2_MYL8FqznFecaUdQMJZd8L4rEJAacvgqMpYUD3ldj9jMr2g/exec";
                
                // Siapkan data yang mau dikirim ke HP
                const dataNotif = {
                    topic: "global", // Target pengiriman ke semua HP Android yg terpasang App
                    title: "MLU PUSAT: " + title,
                    body: body
                };

                // Lakukan tembakan (Fetch)
                fetch(urlSaktiGAS, {
                    method: 'POST',
                    body: JSON.stringify(dataNotif)
                }).then(response => {
                    console.log("FCM Trigger Dikirim!");
                }).catch(err => {
                    console.log("FCM Background Info: ", err);
                });

                alert("SUKSES! Pengumuman tersimpan dan Notifikasi (FCM) sedang meluncur ke HP Member!");
                
                // Bersihkan form
                document.getElementById('inpTitle').value = '';
                document.getElementById('inpBody').value = '';
                
            } catch(e) {
                alert("Gagal mengirim: " + e.message);
            } finally {
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> KIRIM SEKARANG';
                btn.style.opacity = '1';
            }
        };

        // Ganti tombol kembali sesuai tempat asal (Gading / Pusat)
        if(window.location.href.includes('_kc')) {
            document.getElementById('btnBack').href = "dashboard_kc.html";
        }
    </script>
</body>
</html>
