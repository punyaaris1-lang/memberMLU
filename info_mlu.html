<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Information Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; 
            --bg-surface: #F8FAFC; --white: #FFFFFF; 
            --text-main: #0F172A; --text-muted: #64748B; 
            --danger: #EF4444; --border-soft: rgba(226, 232, 240, 0.8); 
        }
        
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; padding-bottom: 120px; -webkit-font-smoothing: antialiased; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        /* --- HEADER --- */
        .header-premium { 
            background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); 
            padding: 50px 25px 80px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            color: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 10px 30px rgba(10,34,89,0.15);
        }
        .main-title { font-family: 'Space Grotesk'; font-size: 26px; font-weight: 900; margin: 0; }
        .sub-tag { font-size: 10px; font-weight: 800; letter-spacing: 3px; color: var(--electric-blue); text-transform: uppercase; margin-bottom: 5px; display: block; }

        /* --- FEED / BLOG LIST --- */
        .feed-container { padding: 0 20px; margin-top: -30px; position: relative; z-index: 101; display: flex; flex-direction: column; gap: 20px; }
        
        .article-card { 
            background: var(--white); border-radius: 24px; padding: 20px; 
            box-shadow: 0 15px 35px rgba(10, 34, 89, 0.05); border: 1px solid var(--border-soft); 
            position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 15px;
        }
        
        /* Gambar Artikel */
        .a-image { 
            width: 100%; height: 200px; object-fit: cover; border-radius: 16px; 
            background: #F1F5F9; border: 1px solid #E2E8F0; display: none; /* Hidden by default */
        }
        
        .a-content { display: flex; flex-direction: column; gap: 8px; }
        .a-date { font-size: 10px; font-weight: 800; color: var(--electric-blue); text-transform: uppercase; letter-spacing: 1px; }
        .a-title { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--royal-blue); line-height: 1.2; }
        .a-desc { font-size: 13px; color: var(--text-main); line-height: 1.6; white-space: pre-line; }
        .a-author { margin-top: 5px; font-size: 10px; font-weight: 700; color: var(--text-muted); padding-top: 15px; border-top: 1px dashed #E2E8F0; display: flex; align-items: center; gap: 5px; }

        /* Tombol Hapus Khusus Admin */
        .btn-del { 
            position: absolute; top: 15px; right: 15px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px);
            color: var(--danger); border: 1px solid #FCA5A5; width: 35px; height: 35px; border-radius: 10px; 
            cursor: pointer; display: none; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.2);
        }

        /* --- FAB (TOMBOL BUAT ARTIKEL) --- */
        .fab-admin { 
            position: fixed; bottom: 100px; right: 20px; width: 65px; height: 65px; 
            background: linear-gradient(135deg, var(--royal-blue) 0%, var(--electric-blue) 100%); 
            color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; 
            font-size: 24px; box-shadow: 0 15px 30px rgba(45, 99, 237, 0.4); border: none; cursor: pointer; z-index: 1000; transition: 0.3s;
        }
        .fab-admin:active { transform: scale(0.9); }

        /* --- MODAL FORM POSTING --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.8); backdrop-filter: blur(10px); display: none; align-items: flex-end; justify-content: center; z-index: 9999; }
        .modal-box { 
            background: var(--white); width: 100%; max-width: 500px; border-top-left-radius: 35px; border-top-right-radius: 35px; 
            padding: 30px 25px; box-shadow: 0 -20px 50px rgba(0,0,0,0.3); transform: translateY(100%); animation: slideUp 0.4s forwards cubic-bezier(0.19, 1, 0.22, 1);
            max-height: 90vh; overflow-y: auto;
        }
        @keyframes slideUp { to { transform: translateY(0); } }
        
        .m-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .m-title { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--royal-blue); }
        .btn-close { background: #F1F5F9; border: none; width: 30px; height: 30px; border-radius: 50%; color: var(--text-muted); cursor: pointer; font-size: 14px; }

        .inp-group { margin-bottom: 15px; }
        .inp-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; display: block; }
        .inp-text { width: 100%; padding: 15px; border-radius: 16px; border: 1px solid #E2E8F0; background: #F8FAFC; font-family: 'Inter'; font-size: 14px; font-weight: 600; outline: none; }
        .inp-text:focus { border-color: var(--electric-blue); background: var(--white); }
        textarea.inp-text { height: 120px; resize: none; }

        .upload-box { 
            width: 100%; padding: 20px; border: 2px dashed #CBD5E1; border-radius: 16px; text-align: center; 
            color: var(--electric-blue); font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; cursor: pointer; 
            margin-bottom: 15px; position: relative; overflow: hidden;
        }
        .upload-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
        #fileInput { display: none; }

        .btn-submit { width: 100%; padding: 18px; border: none; border-radius: 20px; background: var(--electric-blue); color: white; font-family: 'Space Grotesk'; font-size: 15px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(45, 99, 237, 0.3); text-transform: uppercase; letter-spacing: 1px; }

        /* --- BACK NAVIGATION --- */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; }
        .btn-premium-back { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid var(--border-soft); color: var(--royal-blue); padding: 16px; border-radius: 50px; font-family: 'Space Grotesk'; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header class="header-premium">
        <span class="sub-tag">Galeri & Informasi</span>
        <h1 class="main-title">MLU HIGHLIGHTS</h1>
    </header>

    <div class="feed-container" id="feedList">
        <div style="text-align:center; padding: 40px; color: #94A3B8; font-weight: 600;"><i class="fas fa-spinner fa-spin"></i> Memuat artikel...</div>
    </div>

    <button class="fab-admin" id="btnAdd" onclick="openModal()"><i class="fas fa-pen-nib"></i></button>

    <div class="back-nav"><a href="dashboard.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a></div>

    <div class="modal-overlay" id="postModal">
        <div class="modal-box">
            <div class="m-head">
                <div class="m-title">Buat Artikel Baru</div>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="inp-group">
                <label class="inp-label">Judul Acara / Berita</label>
                <input type="text" id="inpTitle" class="inp-text" placeholder="Kopdar Gabungan MLU 2026...">
            </div>

            <div class="inp-group">
                <label class="inp-label">Isi / Deskripsi</label>
                <textarea id="inpDesc" class="inp-text" placeholder="Ceritakan detail acara di sini..."></textarea>
            </div>

            <div class="inp-group">
                <label class="inp-label">Foto Dokumentasi (Opsional)</label>
                <label class="upload-box" for="fileInput">
                    <i class="fas fa-image" style="font-size: 24px; margin-bottom: 8px; display: block;"></i>
                    TAP UNTUK PILIH FOTO
                    <img id="imgPreview" src="">
                </label>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <button class="btn-submit" id="btnSave" onclick="saveArticle()">TERBITKAN ARTIKEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // CEK JABATAN
        const u = JSON.parse(localStorage.getItem('maka_user')) || {};
        const isHumas = (u.role === 'HUMAS' || u.role === 'KETUA UMUM' || u.role === 'WAKIL KETUA');

        if (isHumas) document.getElementById('btnAdd').style.display = 'flex';

        let currentImageBase64 = ""; // Untuk menyimpan foto yang dikompres

        // --- RENDER ARTIKEL DARI FIREBASE ---
        onSnapshot(query(collection(db, 'mlu_info'), orderBy('timestamp', 'desc')), (snap) => {
            const list = document.getElementById('feedList');
            list.innerHTML = snap.empty ? '<div style="text-align:center; color:#94A3B8; padding:30px;"><i class="fas fa-box-open" style="font-size:30px; margin-bottom:10px;"></i><br>Belum ada kegiatan/berita.</div>' : '';
            
            snap.forEach(docSnap => {
                const d = docSnap.data();
                
                // Cek apakah ada foto di database
                const imageHtml = d.image ? `<img src="${d.image}" class="a-image" style="display:block;">` : '';
                const btnDelHtml = isHumas ? `<button class="btn-del" onclick="window.delArticle('${docSnap.id}')" style="display:flex;"><i class="fas fa-trash"></i></button>` : '';

                list.innerHTML += `
                    <div class="article-card">
                        ${btnDelHtml}
                        ${imageHtml}
                        <div class="a-content">
                            <div class="a-date"><i class="fas fa-calendar-day" style="margin-right:5px;"></i>${d.date}</div>
                            <div class="a-title">${d.title}</div>
                            <div class="a-desc">${d.desc}</div>
                            <div class="a-author"><i class="fas fa-user-edit"></i> Ditulis oleh: ${d.author}</div>
                        </div>
                    </div>`;
            });
        });

        // --- IMAGE COMPRESSOR ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Maksimal lebar foto 800px agar ringan di Firebase
                    const MAX_WIDTH = 800;
                    let width = img.width;
                    let height = img.height;

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Convert ke Base64 (JPEG Kualitas 70%)
                    currentImageBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // Tampilkan Preview
                    const preview = document.getElementById('imgPreview');
                    preview.src = currentImageBase64;
                    preview.style.display = 'block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // --- FUNGSI MODAL ---
        window.openModal = () => {
            document.getElementById('postModal').style.display = 'flex';
        };

        window.closeModal = () => {
            document.getElementById('postModal').style.display = 'none';
            // Reset Form
            document.getElementById('inpTitle').value = '';
            document.getElementById('inpDesc').value = '';
            document.getElementById('imgPreview').style.display = 'none';
            document.getElementById('fileInput').value = '';
            currentImageBase64 = "";
        };

        // --- SAVE DATA ---
        window.saveArticle = async () => {
            const title = document.getElementById('inpTitle').value.trim();
            const desc = document.getElementById('inpDesc').value.trim();
            const btn = document.getElementById('btnSave');

            if(!title || !desc) return alert("Judul dan Isi artikel wajib diisi!");

            btn.innerText = "MENGUNGGAH...";
            btn.style.opacity = '0.7';

            try {
                // Formatting Tanggal (Contoh: 20 Februari 2026)
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                const dateStr = new Date().toLocaleDateString('id-ID', options);

                await addDoc(collection(db, 'mlu_info'), {
                    title: title, 
                    desc: desc, 
                    image: currentImageBase64, // Akan kosong jika tidak ada foto
                    author: `${u.nama} (${u.role})`, 
                    date: dateStr,
                    timestamp: Date.now()
                });
                
                closeModal();
            } catch(e) {
                alert("Gagal mengunggah: " + e.message);
            } finally {
                btn.innerText = "TERBITKAN ARTIKEL";
                btn.style.opacity = '1';
            }
        };

        // --- DELETE DATA ---
        window.delArticle = async (id) => {
            if(confirm("Hapus artikel ini secara permanen?")) {
                await deleteDoc(doc(db, 'mlu_info', id));
            }
        };
    </script>
</body>
</html>
