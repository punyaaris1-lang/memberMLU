<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Information Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA ULTRA LUXURY GLASS === */
        :root { 
            --royal-blue: #0A2259; --electric-blue: #2D63ED; 
            --gold-lux: #D4AF37; --bg-surface: #F0F4F8; 
            --white: #FFFFFF; --text-main: #0F172A; --text-muted: #64748B; 
            --danger: #EF4444; --success: #10B981;
            
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(255, 255, 255, 0.9);
            --shadow-soft: 0 15px 40px rgba(10, 34, 89, 0.08);
            --glow-blue: 0 5px 20px rgba(45, 99, 237, 0.3);
            --glow-green: 0 5px 20px rgba(16, 185, 129, 0.3);
        }
        
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); padding-bottom: 120px; -webkit-font-smoothing: antialiased; overflow-x: hidden; position: relative; }
        * { box-sizing: border-box; outline: none; -webkit-tap-highlight-color: transparent; }

        /* AMBIENT LIGHT & BACKGROUND */
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(100px); z-index: -1; opacity: 0.5; animation: floatLight 10s infinite alternate; }
        .light-1 { top: -20%; left: -20%; width: 500px; height: 500px; background: #bfdbfe; }
        .light-2 { top: 40%; right: -30%; width: 400px; height: 400px; background: rgba(212, 175, 55, 0.15); animation-delay: 2s; }
        .bg-watermark { position: fixed; top: 15%; right: -15%; width: 100%; height: 80%; background-image: url('logomlu.png'); background-repeat: no-repeat; background-size: contain; background-position: center; opacity: 0.04; transform: rotate(-15deg); z-index: -2; pointer-events: none; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(20px, 40px);} }

        /* HEADER */
        .header-premium { 
            background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); 
            padding: 50px 25px 80px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; 
            color: white; position: sticky; top: 0; z-index: 100; 
            box-shadow: 0 10px 30px rgba(45, 99, 237, 0.25); border-bottom: 2px solid rgba(45,99,237,0.3);
        }
        .main-title { font-family: 'Outfit'; font-size: 28px; font-weight: 900; margin: 0; letter-spacing: -1px; text-shadow: 0 10px 30px rgba(10,34,89,0.2); }
        .sub-tag { font-family: 'Space Grotesk'; font-size: 10px; font-weight: 800; letter-spacing: 2px; color: #93C5FD; text-transform: uppercase; margin-bottom: 5px; display: block; text-shadow: 0 0 10px rgba(147,197,253,0.5); }

        /* --- FEED / BLOG LIST GLASSMORPHISM --- */
        .feed-container { padding: 0 20px; margin-top: -30px; position: relative; z-index: 101; display: flex; flex-direction: column; gap: 20px; }
        
        .article-card { 
            background: rgba(255,255,255,0.75); backdrop-filter: blur(25px);
            border-radius: 24px; padding: 20px; 
            box-shadow: var(--shadow-soft); border: 1px solid rgba(255,255,255,0.9); 
            position: relative; overflow: hidden; display: flex; flex-direction: column; gap: 15px;
            transition: transform 0.3s;
        }
        .article-card:active { transform: scale(0.98); }
        
        /* Gambar Artikel */
        .a-image { 
            width: 100%; height: 200px; object-fit: cover; border-radius: 18px; 
            background: #F1F5F9; border: 1px solid rgba(255,255,255,0.5); display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        
        .a-content { display: flex; flex-direction: column; gap: 8px; }
        .a-date { font-size: 10px; font-weight: 800; color: var(--electric-blue); text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
        .a-title { font-family: 'Outfit'; font-size: 22px; font-weight: 800; color: var(--royal-blue); line-height: 1.2; }
        .a-desc { font-size: 13px; color: var(--text-main); line-height: 1.6; white-space: pre-line; font-weight: 500; opacity: 0.9; }
        .a-author { margin-top: 5px; font-size: 10px; font-weight: 700; color: var(--text-muted); padding-top: 15px; border-top: 1px dashed #CBD5E1; display: flex; align-items: center; gap: 6px; }

        /* Tombol Aksi Admin (Edit & Hapus) */
        .admin-actions { position: absolute; top: 15px; right: 15px; display: none; gap: 8px; z-index: 10; }
        .btn-act { 
            width: 35px; height: 35px; border-radius: 12px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; border: none; backdrop-filter: blur(10px);
            font-size: 14px; transition: 0.2s;
        }
        .btn-act:active { transform: scale(0.9); }
        .b-edit { background: rgba(255,255,255,0.9); color: var(--electric-blue); border: 1px solid rgba(45,99,237,0.3); box-shadow: 0 5px 15px rgba(45,99,237,0.15); }
        .b-del { background: rgba(255,255,255,0.9); color: var(--danger); border: 1px solid rgba(239,68,68,0.3); box-shadow: 0 5px 15px rgba(239,68,68,0.15); }

        /* Tombol Bagikan WA Glowing */
        .btn-share {
            margin-top: 5px; padding: 14px; border-radius: 14px; background: white; 
            color: var(--success); border: 1px solid rgba(16, 185, 129, 0.2); font-family: 'Space Grotesk'; 
            font-weight: 800; font-size: 12px; cursor: pointer; display: flex; 
            justify-content: center; align-items: center; gap: 8px; transition: 0.2s; width: 100%;
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.1);
        }
        .btn-share:active { background: var(--success); color: white; box-shadow: var(--glow-green); }

        /* --- FAB (TOMBOL BUAT ARTIKEL) --- */
        .fab-admin { 
            position: fixed; bottom: 100px; right: 25px; width: 60px; height: 60px; 
            background: linear-gradient(135deg, var(--royal-blue), var(--electric-blue)); 
            color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; 
            font-size: 22px; box-shadow: var(--glow-blue); border: 2px solid white; cursor: pointer; z-index: 1000; transition: 0.3s;
        }
        .fab-admin:active { transform: scale(0.9); }

        /* --- MODAL FORM GLASSMORPHISM --- */
        .modal-overlay { position: fixed; inset: 0; background: rgba(10,34,89,0.5); backdrop-filter: blur(8px); display: none; align-items: flex-end; justify-content: center; z-index: 9999; }
        .modal-box { 
            background: rgba(255,255,255,0.95); backdrop-filter: blur(20px); width: 100%; max-width: 500px; 
            border-top-left-radius: 35px; border-top-right-radius: 35px; border-top: 1px solid rgba(45,99,237,0.2);
            padding: 30px 25px; box-shadow: 0 -10px 40px rgba(45,99,237,0.15); transform: translateY(100%); 
            animation: slideUp 0.4s forwards cubic-bezier(0.19, 1, 0.22, 1); max-height: 90vh; overflow-y: auto;
        }
        @keyframes slideUp { to { transform: translateY(0); } }
        
        .m-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .m-title { font-family: 'Space Grotesk'; font-size: 20px; font-weight: 900; color: var(--royal-blue); }
        .btn-close { background: #F1F5F9; border: none; width: 32px; height: 32px; border-radius: 50%; color: var(--text-muted); cursor: pointer; font-size: 14px; transition:0.2s;}
        .btn-close:active { transform: scale(0.9); background: #E2E8F0;}

        .inp-group { margin-bottom: 15px; }
        .inp-label { font-size: 10px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
        .inp-text { width: 100%; padding: 16px; border-radius: 14px; border: 1px solid #E2E8F0; background: #F8FAFC; font-family: 'Inter'; font-size: 14px; font-weight: 600; outline: none; transition: 0.2s;}
        .inp-text:focus { border-color: var(--electric-blue); background: var(--white); box-shadow: 0 0 0 3px rgba(45,99,237,0.1); }
        textarea.inp-text { height: 120px; resize: none; }

        .upload-box { 
            width: 100%; padding: 25px; border: 2px dashed #93C5FD; border-radius: 18px; text-align: center; 
            color: var(--electric-blue); font-family: 'Space Grotesk'; font-weight: 800; font-size: 12px; cursor: pointer; 
            margin-bottom: 15px; position: relative; overflow: hidden; background: #F0F9FF; transition:0.2s;
        }
        .upload-box:active { background: #E0F2FE; }
        .upload-box img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }
        #fileInput { display: none; }

        .btn-submit { width: 100%; padding: 18px; border: none; border-radius: 18px; background: var(--electric-blue); color: white; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 800; cursor: pointer; box-shadow: var(--glow-blue); letter-spacing: 1px; transition:0.2s;}
        .btn-submit:active { transform: scale(0.98); }

        /* --- BACK NAVIGATION --- */
        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 100; }
        .btn-premium-back { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(45,99,237,0.2); color: var(--electric-blue); padding: 16px; border-radius: 50px; font-family: 'Space Grotesk'; font-size: 13px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; box-shadow: var(--glow-blue); }
    </style>
</head>
<body>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>
    <div class="bg-watermark"></div>

    <header class="header-premium">
        <span class="sub-tag">GALERI & INFORMASI</span>
        <h1 class="main-title">MLU HIGHLIGHTS</h1>
    </header>

    <div class="feed-container" id="feedList">
        <div style="text-align:center; padding: 50px; color: #94A3B8; font-weight: 600;"><i class="fas fa-circle-notch fa-spin" style="font-size:24px; margin-bottom:10px; color:var(--electric-blue);"></i><br>Memuat berita terbaru...</div>
    </div>

    <button class="fab-admin" id="btnAdd" onclick="openModal()"><i class="fas fa-pen-nib"></i></button>

    <div class="back-nav"><a href="dashboard.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI KE DASHBOARD</a></div>

    <div class="modal-overlay" id="postModal">
        <div class="modal-box">
            <div class="m-head">
                <div class="m-title" id="mTitleText">Buat Artikel Baru</div>
                <button class="btn-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            
            <input type="hidden" id="editId">

            <div class="inp-group">
                <label class="inp-label">Judul Acara / Berita</label>
                <input type="text" id="inpTitle" class="inp-text" placeholder="Kopdar Gabungan MLU 2026...">
            </div>

            <div class="inp-group">
                <label class="inp-label">Isi / Deskripsi</label>
                <textarea id="inpDesc" class="inp-text" placeholder="Ceritakan detail acara di sini..."></textarea>
            </div>

            <div class="inp-group">
                <label class="inp-label">Foto Dokumentasi</label>
                <label class="upload-box" for="fileInput">
                    <i class="fas fa-camera" style="font-size: 28px; margin-bottom: 10px; display: block;"></i>
                    TAP UNTUK PILIH FOTO
                    <img id="imgPreview" src="">
                </label>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <button class="btn-submit" id="btnSave" onclick="saveArticle()">TERBITKAN ARTIKEL</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // CEK JABATAN PENGURUS
        const u = JSON.parse(localStorage.getItem('maka_user')) || {};
        const isHumas = (u.role === 'HUMAS' || u.role === 'KETUA UMUM' || u.role === 'WAKIL KETUA' || u.isSuperAdmin);

        if (isHumas) document.getElementById('btnAdd').style.display = 'flex';

        let currentImageBase64 = ""; 
        window.articlesData = {}; 

        // --- RENDER ARTIKEL DARI FIREBASE ---
        onSnapshot(query(collection(db, 'mlu_info'), orderBy('timestamp', 'desc')), (snap) => {
            const list = document.getElementById('feedList');
            list.innerHTML = snap.empty ? '<div style="text-align:center; color:#94A3B8; padding:30px;"><i class="fas fa-inbox" style="font-size:30px; margin-bottom:10px; opacity:0.5;"></i><br>Belum ada kegiatan/berita.</div>' : '';
            
            window.articlesData = {}; 

            snap.forEach(docSnap => {
                const d = docSnap.data();
                window.articlesData[docSnap.id] = { id: docSnap.id, ...d }; 
                
                const imageHtml = d.image ? `<img src="${d.image}" class="a-image" style="display:block;">` : '';
                const adminHtml = isHumas ? `
                    <div class="admin-actions" style="display:flex;">
                        <button class="btn-act b-edit" onclick="window.editArticle('${docSnap.id}')"><i class="fas fa-pen"></i></button>
                        <button class="btn-act b-del" onclick="window.delArticle('${docSnap.id}')"><i class="fas fa-trash"></i></button>
                    </div>` : '';

                list.innerHTML += `
                    <div class="article-card">
                        ${adminHtml}
                        ${imageHtml}
                        <div class="a-content">
                            <div class="a-date"><i class="far fa-calendar-alt"></i> ${d.date}</div>
                            <div class="a-title">${d.title}</div>
                            <div class="a-desc">${d.desc}</div>
                            <div class="a-author"><i class="fas fa-feather-alt"></i> ${d.author}</div>
                        </div>
                        <button class="btn-share" onclick="window.shareToWA('${docSnap.id}')">
                            <i class="fab fa-whatsapp" style="font-size:16px;"></i> BAGIKAN KE WA
                        </button>
                    </div>`;
            });
        });

        // --- BAGIKAN KE WHATSAPP ---
        window.shareToWA = (id) => {
            const data = window.articlesData[id];
            if(!data) return;
            
            const msg = `*📢 HIGHLIGHTS INFO MLU 📢*\n\n*${data.title}*\n🗓️ _${data.date}_\n\n${data.desc}\n\n_Silakan buka Aplikasi MLU untuk melihat info selengkapnya (termasuk foto dokumentasi)._`;
            const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
            window.location.href = url; 
        };

        // --- IMAGE COMPRESSOR ---
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const MAX_WIDTH = 800;
                    let width = img.width; let height = img.height;

                    if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    
                    canvas.width = width; canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    currentImageBase64 = canvas.toDataURL('image/jpeg', 0.8);
                    
                    const preview = document.getElementById('imgPreview');
                    preview.src = currentImageBase64;
                    preview.style.display = 'block';
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(file);
        });

        // --- FUNGSI MODAL ---
        window.openModal = () => {
            document.getElementById('editId').value = "";
            document.getElementById('mTitleText').innerText = "Buat Artikel Baru";
            document.getElementById('postModal').style.display = 'flex';
        };

        window.editArticle = (id) => {
            const data = window.articlesData[id];
            if(!data) return;

            document.getElementById('editId').value = id;
            document.getElementById('mTitleText').innerText = "Edit Artikel";
            document.getElementById('inpTitle').value = data.title;
            document.getElementById('inpDesc').value = data.desc;
            
            if(data.image) {
                document.getElementById('imgPreview').src = data.image;
                document.getElementById('imgPreview').style.display = 'block';
                currentImageBase64 = data.image;
            } else {
                document.getElementById('imgPreview').style.display = 'none';
                currentImageBase64 = "";
            }

            document.getElementById('postModal').style.display = 'flex';
        };

        window.closeModal = () => {
            document.getElementById('postModal').style.display = 'none';
            document.getElementById('editId').value = '';
            document.getElementById('inpTitle').value = '';
            document.getElementById('inpDesc').value = '';
            document.getElementById('imgPreview').style.display = 'none';
            document.getElementById('fileInput').value = '';
            currentImageBase64 = "";
        };

        // --- SAVE / UPDATE DATA ---
        window.saveArticle = async () => {
            const editId = document.getElementById('editId').value;
            const title = document.getElementById('inpTitle').value.trim();
            const desc = document.getElementById('inpDesc').value.trim();
            const btn = document.getElementById('btnSave');

            if(!title || !desc) return alert("Judul dan Isi artikel wajib diisi!");

            btn.innerText = "MENYIMPAN...";
            btn.style.opacity = '0.7';

            try {
                let payload = { title: title, desc: desc };

                if (currentImageBase64) {
                    payload.image = currentImageBase64;
                } else if (!editId) {
                    payload.image = ""; 
                } 

                if (editId) {
                    await updateDoc(doc(db, 'mlu_info', editId), payload);
                } else {
                    const options = { year: 'numeric', month: 'long', day: 'numeric' };
                    payload.date = new Date().toLocaleDateString('id-ID', options);
                    payload.author = `${u.nama} (${u.role})`;
                    payload.timestamp = Date.now();
                    await addDoc(collection(db, 'mlu_info'), payload);
                }
                
                closeModal();
            } catch(e) {
                alert("Gagal menyimpan: " + e.message);
            } finally {
                btn.innerText = "TERBITKAN ARTIKEL";
                btn.style.opacity = '1';
            }
        };

        // --- DELETE DATA ---
        window.delArticle = async (id) => {
            if(confirm("Hapus artikel ini secara permanen?")) {
                await deleteDoc(doc(db, 'mlu_info', id));
            }
        };
    </script>
</body>
</html>
