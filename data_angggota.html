<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLU - Live Directory</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Space+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --royal-blue: #0A2259; --electric-blue: #2D63ED; --bg-surface: #F8FAFC; --white: #FFFFFF; --text-main: #0F172A; --text-muted: #64748B; --gold: #D4AF37; }
        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; padding-bottom: 120px; }
        * { box-sizing: border-box; outline: none; }

        .header-premium { background: linear-gradient(160deg, var(--royal-blue) 0%, #15398F 100%); padding: 50px 25px 80px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; color: white; position: sticky; top: 0; z-index: 100; }
        .main-title { font-family: 'Space Grotesk'; font-size: 26px; font-weight: 900; margin: 0; }
        
        .search-container { padding: 0 20px; margin-top: -25px; position: relative; z-index: 101; }
        .search-box { background: var(--white); border-radius: 18px; padding: 15px 20px; display: flex; align-items: center; gap: 12px; box-shadow: 0 15px 30px rgba(10,34,89,0.1); border: 1px solid #E2E8F0; }
        .search-box input { border: none; width: 100%; font-family: 'Inter'; font-weight: 600; font-size: 14px; color: var(--text-main); }

        .member-list { padding: 25px 20px; display: flex; flex-direction: column; gap: 12px; }
        .member-card { background: var(--white); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid #E2E8F0; position: relative; }
        
        .member-photo { width: 55px; height: 55px; border-radius: 16px; object-fit: cover; border: 1px solid #E2E8F0; background: #F1F5F9; }
        
        .member-info { flex: 1; min-width: 0; }
        .m-name { font-family: 'Space Grotesk'; font-size: 15px; font-weight: 900; color: var(--royal-blue); margin-bottom: 4px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .m-name-wa { font-family: 'Inter'; font-size: 11px; font-weight: 600; color: var(--electric-blue); text-transform: uppercase; }
        .m-plat { font-size: 11px; font-weight: 700; color: var(--text-main); margin-bottom: 6px; letter-spacing: 1px; }
        
        .badge-row { display: flex; gap: 4px; flex-wrap: wrap; }
        .badge { font-size: 8px; font-weight: 800; padding: 4px 8px; border-radius: 6px; letter-spacing: 1px; display: inline-block; }
        .b-pengurus { background: #FFFBEB; color: var(--gold); border: 1px solid #FEF3C7; }
        .b-anggota { background: #F1F5F9; color: var(--text-muted); border: 1px solid #E2E8F0; }
        .b-type { background: rgba(45, 99, 237, 0.1); color: var(--electric-blue); border: 1px solid rgba(45, 99, 237, 0.2); }

        .m-hp { text-align: right; font-size: 11px; font-weight: 700; color: var(--text-muted); flex-shrink: 0; }

        /* ACTION PENGURUS */
        .action-bar { display: none; position: absolute; right: 10px; top: 10px; gap: 5px; }
        .btn-act { background: #F1F5F9; border: none; width: 26px; height: 26px; border-radius: 6px; font-size: 10px; cursor: pointer; color: var(--text-main); }
        .btn-act.red { color: #EF4444; background: #FEF2F2; }

        .fab-admin { position: fixed; bottom: 100px; right: 20px; width: 60px; height: 60px; background: var(--electric-blue); color: white; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 10px 25px rgba(45, 99, 237, 0.4); border: none; cursor: pointer; z-index: 1000; }
        
        /* SYNC BUTTON */
        #btnSync { background: #10B981; color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; width: 100%; margin-bottom: 15px; display: none; cursor: pointer; box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3); font-family: 'Space Grotesk'; letter-spacing: 1px; }

        .back-nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 350px; z-index: 1000; }
        .btn-premium-back { background: rgba(255,255,255,0.95); border: 1px solid #E2E8F0; padding: 16px; border-radius: 50px; font-family: 'Space Grotesk'; font-weight: 800; font-size: 13px; color: var(--royal-blue); text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <header class="header-premium">
        <div style="font-size:10px; font-weight:800; letter-spacing:3px; opacity:0.7; text-transform:uppercase;">Live Database</div>
        <h1 class="main-title">ANGGOTA MLU</h1>
    </header>

    <div class="search-container">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Cari Nama Asli, WA, atau Plat Nomor..." onkeyup="filterRender()">
        </div>
    </div>

    <main class="member-list">
        <button id="btnSync" onclick="window.syncInitialData()"><i class="fas fa-cloud-upload-alt"></i> SYNC DATA KE SERVER</button>
        <div id="memberContainer">Memuat direktori...</div>
    </main>

    <button class="fab-admin" id="btnAddMember" onclick="addMember()"><i class="fas fa-user-plus"></i></button>

    <div class="back-nav"><a href="dashboard.html" class="btn-premium-back"><i class="fas fa-arrow-left"></i> KEMBALI</a></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);

        // CEK HAK AKSES PENGURUS
        const u = JSON.parse(localStorage.getItem('maka_user')) || {};
        const isPengurus = (u.role && u.role !== 'KELUARGA MLU');

        if (isPengurus) document.getElementById('btnAddMember').style.display = 'flex';

        // 41 DATA RAW (DITANAM)
        const rawMembers = [
            { n: "RENO", p: "B 4454 SWF", h: "085711164860", r: "KELUARGA MLU", t: "RTO" },
            { n: "UBAY", p: "B 4484 SWF", h: "085771739616", r: "SEKRETARIS", t: "RTO" },
            { n: "PURNOMO", p: "B 4773 SWF", h: "087888720198", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "CRIS", p: "B 4933 SWG", h: "082123914054", r: "KELUARGA MLU", t: "RTO" },
            { n: "ABDULLAH FAQIH", p: "B 4699 SWG", h: "08978608692", r: "KELUARGA MLU", t: "RTO" },
            { n: "MAT", p: "B 4673 SWE", h: "088291040252", r: "KELUARGA MLU", t: "RTO" },
            { n: "REHAN", p: "B 4229 SWF", h: "-", r: "KELUARGA MLU", t: "RTO" },
            { n: "OBYZWNSKY", p: "B 4457 SWF", h: "088211503243", r: "KELUARGA MLU", t: "RTO" },
            { n: "MALIK", p: "B 4922 SWG", h: "081398006148", r: "KELUARGA MLU", t: "RTO" },
            { n: "AWANG THEA", p: "B 4146 SWH", h: "085714306460", r: "KELUARGA MLU", t: "RTO" },
            { n: "SARIP", p: "B 4804 SWJ", h: "081317818752", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "FERY", p: "B 4674 SWE", h: "082124545636", r: "HUMAS", t: "RTO" },
            { n: "IVAN", p: "B 4105 SWI", h: "085717433722", r: "KELUARGA MLU", t: "RTO" },
            { n: "ENDRO", p: "B 4437 SWF", h: "081386517328", r: "SATGAS", t: "RTO" },
            { n: "NANANG", p: "B 4248 SWJ", h: "-", r: "KELUARGA MLU", t: "RTO" },
            { n: "IW4N", p: "B 4650 SWE", h: "081398669543", r: "PEMBINA", t: "RTO" },
            { n: "YUDIF", p: "B 4720 SWI", h: "085159680822", r: "KELUARGA MLU", t: "RTO" },
            { n: "RIO", p: "B 4683 SWE", h: "081318321423", r: "KELUARGA MLU", t: "RTO" },
            { n: "AGS", p: "B 4497 SWF", h: "081387477676", r: "KELUARGA MLU", t: "RTO" },
            { n: "DZILAN", p: "B 4961 SWF", h: "081919570750", r: "KELUARGA MLU", t: "RTO" },
            { n: "JISTER", p: "B 4713 SWG", h: "081381336088", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "AJI", p: "B 4381 SWD", h: "082128835198", r: "PENASEHAT", t: "RTO" },
            { n: "CAPUNG", p: "B 3687 PWG", h: "-", r: "KELUARGA MLU", t: "RTO" },
            { n: "PAPADILO", p: "B 4236 SWG", h: "087888786276", r: "KELUARGA MLU", t: "RTO" },
            { n: "BW", p: "B 4697 SWG", h: "089506550656", r: "KELUARGA MLU", t: "RTO" },
            { n: "EGA", p: "B 4769 SWE", h: "087848620227", r: "KELUARGA MLU", t: "RTO" },
            { n: "DAYYAN", p: "B 4236 SWJ", h: "085885579179", r: "WAKIL KETUA", t: "RTO" },
            { n: "JET LEE", p: "B 4876 SWE", h: "085711546320", r: "SATGAS", t: "RTO" },
            { n: "AHMAD", p: "B 4453 SWF", h: "081290159443", r: "KETUA UMUM", t: "RTO" },
            { n: "ENDANG SAHARA", p: "B 4793 SWJ", h: "081314421984", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "DONI", p: "B 4944 SWH", h: "081808138130", r: "HUMAS", t: "RTO" },
            { n: "RIZKY", p: "B 4248 SWF", h: "085691536957", r: "KELUARGA MLU", t: "RTO" },
            { n: "ANDRI JR", p: "B 4231 SWF", h: "087875875068", r: "KELUARGA MLU", t: "RTO" },
            { n: "VIZAR", p: "B 4810 SWJ", h: "085810304638", r: "KELUARGA MLU", t: "RTO" },
            { n: "NANDANG", p: "B 4958 SWT", h: "081297370884", r: "KELUARGA MLU", t: "RTO" },
            { n: "WINDIYONO", p: "B 4237 SWF", h: "081213669925", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "ZAKARIA", p: "B 4795 SWJ", h: "088211963922", r: "KELUARGA MLU", t: "RTO" },
            { n: "RAMON", p: "B 4774 UWF", h: "08111007688", r: "KELUARGA MLU", t: "RTO" },
            { n: "RICHIE", p: "B 4429 SWF", h: "088808104101", r: "KELUARGA MLU", t: "RTO" },
            { n: "GOND'S", p: "B 4798 SWF", h: "081219139569", r: "KELUARGA MLU", t: "TRANSGO" },
            { n: "MUHAMAD ILHAM M.", p: "B 4698 SWE", h: "082310253644", r: "KELUARGA MLU", t: "RTO" }
        ];

        let firebaseData = [];

        onSnapshot(collection(db, 'mlu_members'), (snap) => {
            firebaseData = [];
            
            if (snap.empty) {
                // JIKA SERVER KOSONG, PAKAI DATA SCRIPT AGAR LAYAR TIDAK KOSONG
                firebaseData = rawMembers.map((m, index) => ({
                    id: 'dummy_' + index,
                    namaKtp: m.n,
                    namaWa: m.n,
                    nama: m.n,
                    plat: m.p,
                    hp: m.h,
                    role: m.r,
                    type: m.t,
                    foto: ""
                }));
                
                // Munculkan tombol SYNC HANYA untuk pengurus
                if (isPengurus) document.getElementById('btnSync').style.display = 'block';
            } else {
                // JIKA SERVER ADA ISI, PAKAI DATA SERVER & SEMBUNYIKAN TOMBOL SYNC
                document.getElementById('btnSync').style.display = 'none';
                snap.forEach(docSnap => firebaseData.push({ id: docSnap.id, ...docSnap.data() }));
            }

            filterRender();
        });

        // LOGIC SORTING DAN RENDER
        window.filterRender = () => {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const container = document.getElementById('memberContainer');
            
            // Hirarki Jabatan (Pengurus di atas)
            const roleWeight = { "KETUA UMUM": 1, "WAKIL KETUA": 2, "SEKRETARIS": 3, "PEMBINA": 4, "PENASEHAT": 5, "HUMAS": 6, "KORLAP": 7, "SATGAS": 8, "KELUARGA MLU": 9 };

            // Filter Pintar (Cek Nama KTP, Nama WA, dan Plat)
            let filtered = firebaseData.filter(m => {
                const searchString = `${m.namaKtp || ''} ${m.namaWa || m.nama || ''} ${m.plat}`.toLowerCase();
                return searchString.includes(query);
            });
            
            filtered.sort((a, b) => {
                const wA = roleWeight[a.role] || 99; const wB = roleWeight[b.role] || 99;
                if (wA !== wB) return wA - wB;
                
                const nameA = a.namaKtp || a.nama || "";
                const nameB = b.namaKtp || b.nama || "";
                return nameA.localeCompare(nameB);
            });

            container.innerHTML = '';
            filtered.forEach(m => {
                const roleClass = m.role !== "KELUARGA MLU" ? "b-pengurus" : "b-anggota";
                const iconRole = m.role !== "KELUARGA MLU" ? '<i class="fas fa-star" style="margin-right:3px;"></i>' : '';
                
                // Menentukan NAMA ASLI / NAMA WA
                const namaKtp = m.namaKtp || m.nama; 
                const namaWa = m.namaWa || m.nama;   
                
                let displayNameHtml = `${namaKtp} <span class="m-name-wa">/ ${namaWa}</span>`;

                // Cek Foto (Ambil dari DB, kalau tidak ada buat avatar inisial)
                const finalPhoto = m.foto || `https://ui-avatars.com/api/?background=f1f5f9&color=0A2259&bold=true&name=${encodeURIComponent(namaKtp)}`;

                // Jika pengurus, munculkan aksi Edit/Hapus
                const actionHtml = isPengurus ? `
                    <div class="action-bar" style="display:flex;">
                        <button class="btn-act" onclick="editMember('${m.id}', '${m.namaKtp || m.nama}', '${m.plat}', '${m.role}', '${m.type}')"><i class="fas fa-pen"></i></button>
                        <button class="btn-act red" onclick="delMember('${m.id}')"><i class="fas fa-trash"></i></button>
                    </div>` : '';

                container.innerHTML += `
                    <div class="member-card">
                        ${actionHtml}
                        <img src="${finalPhoto}" class="member-photo">
                        <div class="member-info">
                            <div class="m-name">${displayNameHtml}</div>
                            <div class="m-plat">${m.plat}</div>
                            <div class="badge-row">
                                <span class="badge ${roleClass}">${iconRole}${m.role || 'KELUARGA MLU'}</span>
                                <span class="badge b-type">${m.type || 'RTO'}</span>
                            </div>
                        </div>
                        <div class="m-hp">
                            <i class="fas fa-phone-alt" style="color:var(--electric-blue); display:block; margin-bottom:4px; font-size:14px;"></i>
                            ${m.hp || '-'}
                        </div>
                    </div>`;
            });
        };

        // AKSI CRUD KHUSUS PENGURUS
        window.addMember = async () => {
            const nama = prompt("Nama Anggota (KTP):"); if(!nama) return;
            const namaWa = prompt("Nama Panggilan (WA):", nama);
            const plat = prompt("Plat Nomor:");
            const hp = prompt("No. HP:");
            const role = prompt("Jabatan (KETUA UMUM/HUMAS/SATGAS/dll) atau biarkan 'KELUARGA MLU':", "KELUARGA MLU").toUpperCase();
            const type = prompt("Tipe (RTO / TRANSGO):", "RTO").toUpperCase();
            await addDoc(collection(db, 'mlu_members'), { namaKtp: nama, namaWa: namaWa, nama: namaWa, plat, hp, role, type });
        };

        window.editMember = async (id, oNama, oPlat, oRole, oType) => {
            if (id.startsWith('dummy_')) return alert("Mohon klik tombol 'SYNC DATA KE SERVER' terlebih dahulu sebelum dapat mengedit data.");
            
            const role = prompt(`Ubah Jabatan untuk ${oNama}:`, oRole).toUpperCase() || oRole;
            const type = prompt(`Ubah Tipe untuk ${oNama}:`, oType).toUpperCase() || oType;
            await updateDoc(doc(db, 'mlu_members', id), { role, type });
        };

        window.delMember = async (id) => {
            if (id.startsWith('dummy_')) return alert("Mohon klik tombol 'SYNC DATA KE SERVER' terlebih dahulu sebelum menghapus data.");
            if(confirm("Hapus anggota dari database?")) await deleteDoc(doc(db, 'mlu_members', id));
        };

        // --- FUNGSI RAHASIA (TOMBOL SYNC) ---
        window.syncInitialData = async () => {
            document.getElementById('btnSync').innerHTML = "<i class='fas fa-spinner fa-spin'></i> MENYALIN DATA... MOHON TUNGGU";
            
            for (const m of rawMembers) {
                await addDoc(collection(db, 'mlu_members'), { 
                    namaKtp: m.n, 
                    namaWa: m.n, 
                    nama: m.n, 
                    plat: m.p, 
                    hp: m.h, 
                    role: m.r, 
                    type: m.t, 
                    foto: "" 
                });
            }
            alert("Selesai! 41 Data berhasil disinkronisasi ke server.");
            document.getElementById('btnSync').style.display = 'none';
        };
    </script>
</body>
</html>
