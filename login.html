<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#064E3B">
    <title>Keamanan Maksimal - KGR</title>
    
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-base: #F4F6F5; --text-dark: #111827; --text-gray: #4B5563;
            --emerald-dark: #064E3B; --emerald-main: #059669; 
            --gold-accent: #FBBF24; --danger-red: #DC2626; --success-green: #059669;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #E2E8E4; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .app-container { 
            width: 100%; max-width: 414px; height: 100vh; background-color: var(--emerald-dark); 
            background-image: radial-gradient(circle at top right, rgba(5, 150, 105, 0.4) 0%, transparent 60%);
            position: relative; overflow: hidden; display: flex; flex-direction: column; justify-content: center; padding: 30px; 
        }

        @media (min-width: 600px) { 
            .app-container { max-width: 400px; height: 85vh; max-height: 800px; border-radius: 40px; box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2); border: 8px solid #FFFFFF; } 
        }

        .auth-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); border-radius: 30px; padding: 40px 24px; z-index: 2; position: relative; text-align: center; }

        .branding h1 { font-size: 20px; font-weight: 900; color: var(--text-dark); margin-bottom: 5px; }
        .branding p { font-size: 11px; font-weight: 800; color: var(--emerald-main); letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase;}
        .logo-icon { width: 70px; height: 70px; border-radius: 20px; background: linear-gradient(135deg, #059669 0%, #064E3B 100%); color: #FFF; display: flex; justify-content: center; align-items: center; font-size: 32px; margin: 0 auto 20px; box-shadow: 0 10px 20px rgba(5, 150, 105, 0.3); border: 3px solid #FFF; }

        .form-group { margin-bottom: 15px; text-align: left; position: relative; }
        .form-group i.input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-gray); font-size: 14px; }
        .form-input { width: 100%; padding: 16px 16px 16px 45px; border-radius: 14px; border: 2px solid rgba(0,0,0,0.06); font-size: 13px; font-weight: 700; color: var(--text-dark); outline: none; background: #F9F9F9; transition: 0.2s;}
        .form-input:focus { border-color: var(--emerald-main); background: #FFF;}

        .btn-auth { width: 100%; padding: 16px; border-radius: 14px; font-size: 14px; font-weight: 900; background: var(--text-dark); color: #FFF; border: none; margin-top: 5px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; transition: all 0.2s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 8px 20px rgba(0,0,0,0.15);}
        .btn-auth:active { transform: scale(0.95); }
        .btn-auth:disabled { background: var(--text-gray); cursor: not-allowed; transform: none;}
        .btn-auth i { color: var(--gold-accent); }

        .link-text { font-size: 12px; font-weight: 800; color: var(--text-gray); margin-top: 20px; display: inline-block; cursor: pointer; }
        .link-text span { color: var(--emerald-main); }

        .toggle-view { display: none; }
        .toggle-view.active { display: block; animation: fadeIn 0.4s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ALERT MODAL PREMIUM */
        .custom-alert-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 99999; opacity: 0; visibility: hidden; transition: 0.3s ease; padding: 24px; }
        .custom-alert-overlay.show { opacity: 1; visibility: visible; }
        .custom-alert-box { background: #FFF; border-radius: 30px; padding: 30px 24px; width: 100%; max-width: 320px; text-align: center; transform: scale(0.9); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1); box-shadow: 0 25px 50px rgba(0,0,0,0.2);}
        .custom-alert-overlay.show .custom-alert-box { transform: scale(1); }
        .alert-icon { font-size: 55px; margin-bottom: 15px; }
        .alert-icon.error { color: var(--danger-red); }
        .alert-icon.success { color: var(--success-green); }
        .alert-title { font-size: 18px; font-weight: 900; color: var(--text-dark); margin-bottom: 8px; }
        .alert-msg { font-size: 13px; font-weight: 700; color: var(--text-gray); margin-bottom: 25px; line-height: 1.4;}
        .btn-alert { width: 100%; padding: 16px; border-radius: 14px; font-size: 14px; font-weight: 900; border: none; cursor: pointer; color: #FFF; background: var(--text-dark); transition: 0.2s;}
        .btn-alert:active { transform: scale(0.95); }

        /* ANIMASI TYPEWRITER */
        .intro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--emerald-dark); z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .intro-overlay.active { display: flex; }
        .typewriter-box { text-align: center; padding: 20px; }
        .type-line-1 { font-size: clamp(22px, 6vw, 26px); font-weight: 900; color: #FFF; margin-bottom: 5px; min-height: 32px; letter-spacing: 1px; }
        .type-line-2 { font-size: 14px; font-weight: 800; color: var(--gold-text); min-height: 18px; letter-spacing: 2px; }
        .cursor { display: inline-block; width: 3px; height: 1em; background: var(--gold-accent); vertical-align: middle; margin-left: 2px; animation: blink 0.7s infinite; }
        .cursor.hidden { display: none; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="customAlert" class="custom-alert-overlay">
        <div class="custom-alert-box">
            <div id="alertIcon" class="alert-icon"><i class="fa-solid fa-circle-info"></i></div>
            <h3 id="alertTitle" class="alert-title">Info</h3>
            <p id="alertMessage" class="alert-msg">Pesan</p>
            <button class="btn-alert" onclick="document.getElementById('customAlert').classList.remove('show')">Mengerti</button>
        </div>
    </div>

    <div id="introAnimation" class="intro-overlay">
        <div class="logo-icon" style="margin-bottom: 30px; transform: scale(1.2);"><i class="fa-solid fa-hands-holding-child"></i></div>
        <div class="typewriter-box">
            <div class="type-line-1"><span id="text1"></span><span id="cursor1" class="cursor"></span></div>
            <div class="type-line-2"><span id="text2"></span><span id="cursor2" class="cursor hidden"></span></div>
        </div>
    </div>

    <div class="app-container">
        <div class="auth-card">
            <div class="logo-icon"><i class="fa-solid fa-hands-holding-child"></i></div>
            <div class="branding">
                <h1>KOTAK GOTONG ROYONG</h1>
                <p>Akses Member Terverifikasi</p>
            </div>

            <!-- STEP LOGIN -->
            <div id="stepLogin" class="toggle-view active">
                <form id="formLogin">
                    <div class="form-group">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input type="email" id="logEmail" class="form-input" placeholder="Email Terdaftar" required>
                    </div>
                    <div class="form-group">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input type="password" id="logPass" class="form-input" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn-auth" id="btnLoginSubmit">Masuk Aplikasi <i class="fa-solid fa-right-to-bracket"></i></button>
                </form>
                <span class="link-text" onclick="switchView('stepRegister')">Belum punya akun? <span>Daftar disini</span></span>
            </div>

            <!-- STEP REGISTER (Face ID Dihapus Langsung Submit) -->
            <div id="stepRegister" class="toggle-view">
                <form id="formRegister">
                    <div class="form-group"><i class="fa-solid fa-user input-icon"></i><input type="text" id="regName" class="form-input" placeholder="Nama Sesuai KTP" required></div>
                    <div class="form-group"><i class="fa-solid fa-id-card input-icon"></i><input type="tel" id="regNik" class="form-input" placeholder="16 Digit NIK" required maxlength="16" oninput="this.value = this.value.replace(/[^0-9]/g, '');"></div>
                    <div class="form-group"><i class="fa-brands fa-whatsapp input-icon"></i><input type="tel" id="regWa" class="form-input" placeholder="Nomor WhatsApp" required oninput="this.value = this.value.replace(/[^0-9]/g, '');"></div>
                    <div class="form-group"><i class="fa-solid fa-envelope input-icon"></i><input type="email" id="regEmail" class="form-input" placeholder="Email Aktif (Gmail/Yahoo)" required></div>
                    <div class="form-group" style="margin-bottom: 10px;"><i class="fa-solid fa-lock input-icon"></i><input type="password" id="regPass" class="form-input" placeholder="Password (Min. 6 huruf)" required minlength="6"></div>
                    <button type="submit" class="btn-auth" id="btnRegisterSubmit">Daftar Akun Baru <i class="fa-solid fa-user-plus"></i></button>
                </form>
                <span class="link-text" onclick="switchView('stepLogin')">Sudah punya akun? <span>Masuk</span></span>
            </div>
        </div>
    </div>

    <script type="module">
        import { auth, db } from './db-config.js'; 
        import { signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { doc, getDoc, setDoc, serverTimestamp, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // ===================================================
        // ADVANCED BROWSER FINGERPRINTING (POINT 4)
        // ===================================================
        function getDeviceID() {
            const nav = window.navigator;
            const screen = window.screen;
            let ghostPrint = [
                nav.userAgent,
                nav.language,
                screen.colorDepth,
                screen.width + "x" + screen.height,
                new Date().getTimezoneOffset(),
                nav.hardwareConcurrency || 2
            ].join("||");

            // Hash String Generator untuk membuat token sidik jari
            let hash = 0;
            for (let i = 0; i < ghostPrint.length; i++) {
                const char = ghostPrint.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash |= 0;
            }
            return "KGR-FINGER-" + Math.abs(hash);
        }

        // ENKRIPSI NIK (SINKRON DENGAN PROFIL.HTML)
        const CRYPTO_OFFSET = 7;
        function encryptData(plainText) {
            if (!plainText) return "";
            let shifted = plainText.split("").map(char => String.fromCharCode(char.charCodeAt(0) + CRYPTO_OFFSET)).join("");
            return btoa(unescape(encodeURIComponent(shifted)));
        }

        function isValidNIK(nik) {
            if (!/^\d{16}$/.test(nik)) return false;
            let hari = parseInt(nik.substring(6, 8)); let bulan = parseInt(nik.substring(8, 10));
            if (hari > 40) hari -= 40; if (hari < 1 || hari > 31 || bulan < 1 || bulan > 12) return false;
            if (/^(.)\1{15}$/.test(nik)) return false; return true;
        }

        window.showAlert = function(type, title, message) {
            document.getElementById('alertTitle').innerText = title; document.getElementById('alertMessage').innerText = message;
            document.getElementById('alertIcon').className = 'alert-icon ' + type; document.getElementById('customAlert').classList.add('show');
        }
        window.switchView = function(viewId) { document.querySelectorAll('.toggle-view').forEach(el => el.classList.remove('active')); document.getElementById(viewId).classList.add('active'); }

        // PROSES SUBMIT PENDAFTARAN BARU DENGAN FILTER DUPLIKASI (POINT 1)
        document.getElementById('formRegister').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnRegisterSubmit');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memvalidasi Data...'; btn.disabled = true;

            const name = document.getElementById('regName').value;
            const nikInput = document.getElementById('regNik').value;
            const waInput = document.getElementById('regWa').value;
            const email = document.getElementById('regEmail').value.toLowerCase();
            const pass = document.getElementById('regPass').value;

            const allowedDomains = ["gmail.com", "yahoo.com"];
            
            // Validasi dasar di frontend
            if (!allowedDomains.includes(email.split('@')[1])) { showAlert('error', 'Domain Ditolak', 'Gunakan alamat email @gmail.com atau @yahoo.com.'); btn.innerHTML = 'Daftar Akun Baru <i class="fa-solid fa-user-plus"></i>'; btn.disabled = false; return; }
            if (!isValidNIK(nikInput)) { showAlert('error', 'NIK Palsu', 'Sistem mendeteksi format NIK tidak valid.'); btn.innerHTML = 'Daftar Akun Baru <i class="fa-solid fa-user-plus"></i>'; btn.disabled = false; return; }

            try {
                // 1. CEK APAKAH NIK SUDAH TERDAFTAR (POINT 1)
                const encryptedInputNik = encryptData(nikInput);
                const qNik = query(collection(db, "users"), where("nik", "==", encryptedInputNik));
                const snapNik = await getDocs(qNik);
                if (!snapNik.empty) { throw new Error("NIK ini sudah terdaftar dengan akun lain! Hubungi pengurus."); }

                // 2. CEK APAKAH NOMOR WA SUDAH TERDAFTAR (POINT 1)
                const qWa = query(collection(db, "users"), where("no_wa", "==", waInput));
                const snapWa = await getDocs(qWa);
                if (!snapWa.empty) { throw new Error("Nomor WhatsApp ini sudah digunakan oleh akun lain!"); }

                // 3. JIKA LOLOS FILTER, DAFTARKAN AUTH DAN SIMPAN DATA KE FIRESTORE
                let userRecord;
                try {
                    const uc = await createUserWithEmailAndPassword(auth, email, pass); 
                    userRecord = uc.user; 
                    await sendEmailVerification(userRecord);
                } catch (authErr) {
                    if (authErr.code === 'auth/email-already-in-use') { 
                        const uc = await signInWithEmailAndPassword(auth, email, pass); 
                        userRecord = uc.user; 
                    } else { throw authErr; }
                }

                // Simpan sidik jari HP (Fingerprint Perangkat) & NIK terenkripsi
                await setDoc(doc(db, "users", userRecord.email), { 
                    nama_lengkap: name, 
                    nik: encryptedInputNik, 
                    no_wa: waInput, 
                    email: email, 
                    role: "member", 
                    status: "Pending Admin", 
                    device_id: getDeviceID(), 
                    created_at: serverTimestamp() 
                });

                showAlert('success', 'Registrasi Berhasil', 'Silahkan cek kotak masuk email Anda untuk verifikasi.'); 
                setTimeout(() => { switchView('stepLogin'); document.getElementById('formRegister').reset(); }, 3000);

            } catch (error) { 
                showAlert('error', 'Pendaftaran Ditolak', error.message.replace('Firebase: ', '')); 
            } finally {
                btn.innerHTML = 'Daftar Akun Baru <i class="fa-solid fa-user-plus"></i>'; btn.disabled = false;
            }
        });

        // FORM LOGIN & PENCOCOKAN DEVICE FINGERPRINT (POINT 4)
        document.getElementById('formLogin').addEventListener('submit', async (e) => {
            e.preventDefault(); const btn = document.getElementById('btnLoginSubmit'); btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memverifikasi...'; btn.disabled = true;
            try {
                const uc = await signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logPass').value);
                if (!uc.user.emailVerified) throw new Error("Email belum diverifikasi. Cek kotak masuk Anda.");
                
                const userDoc = await getDoc(doc(db, "users", uc.user.email));
                if (userDoc.exists()) {
                    const dbDeviceId = userDoc.data().device_id;
                    // Cek kecocokan sidik jari hardware HP
                    if (dbDeviceId && dbDeviceId !== getDeviceID()) { 
                        auth.signOut(); 
                        throw new Error("AKSES ILEGAL DITOLAK:\n\nAkun ini sudah dikunci permanen untuk perangkat (HP) lain."); 
                    }
                }
                window.playTypewriterAndRedirect();
            } catch (error) { showAlert('error', 'Gagal Masuk', error.message.replace('Firebase: ', '')); btn.innerHTML = 'Masuk Aplikasi <i class="fa-solid fa-right-to-bracket"></i>'; btn.disabled = false; }
        });

        window.playTypewriterAndRedirect = async function() {
            document.getElementById('introAnimation').classList.add('active');
            const typeText = async (text, element) => { for (let i = 0; i < text.length; i++) { element.innerHTML += text.charAt(i); await new Promise(r => setTimeout(r, 40)); } };
            await typeText("KOTAK GOTONG ROYONG", document.getElementById('text1'));
            document.getElementById('cursor1').classList.add('hidden'); document.getElementById('cursor2').classList.remove('hidden'); 
            await new Promise(r => setTimeout(r, 200)); 
            await typeText("ANAK OJOL BABAH ALUN", document.getElementById('text2'));
            setTimeout(() => { window.location.href = 'index.html'; }, 800);
        }
    </script>
</body>
</html>
