<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabungan KC</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; background: #000; font-family: 'Inter', sans-serif; color: #fff; padding-bottom: 50px; }
        .header { background: rgba(15,15,15,0.9); padding: 20px; display: flex; align-items: center; gap: 15px; position: sticky; top: 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .btn-back { color: white; font-size: 20px; width: 40px; height: 40px; background: rgba(255,255,255,0.05); border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none;}
        .header-title h1 { margin: 0; font-family: 'Space Grotesk'; font-size: 20px; color: #10B981; }
        .balance-card { margin: 20px; background: #111; border: 1px solid rgba(16,185,129,0.3); border-radius: 24px; padding: 30px 20px; text-align: center; }
        .balance-amount { font-family: 'Space Grotesk'; font-size: 38px; font-weight: 900; color: #10B981; margin: 10px 0;}
    </style>
</head>
<body>
    <div class="header">
        <a href="dashboard_kc.html" class="btn-back"><i class="fas fa-chevron-left"></i></a>
        <div class="header-title"><h1>TABUNGAN KC</h1></div>
    </div>
    <div class="balance-card">
        <div style="font-size: 11px; color: #94a3b8; font-weight: 700;">TOTAL TABUNGAN ANDA</div>
        <div class="balance-amount">Rp 0</div>
        <div style="font-size: 10px; color: #64748b;">(Fitur setor & riwayat akan segera disempurnakan)</div>
    </div>
