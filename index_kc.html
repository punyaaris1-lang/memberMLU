<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KC - Secure Login</title>
    
    <link rel="manifest" href="manifest_kc.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@700;800;900&family=Outfit:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === TEMA HITAM PEKAT (KC) === */
        :root { 
            --kc-yellow: #D4FF00; 
            --electric-blue: #10B981; 
            --bg-black: #020202; 
            --text-main: #FFFFFF; 
            --text-muted: #94A3B8; 
            --glass-bg: rgba(10, 10, 10, 0.8); 
            --danger: #EF4444;
        }
        body { margin: 0; background: var(--bg-black); font-family: 'Inter', sans-serif; color: var(--text-main); overflow: hidden; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; text-decoration: none; }

        /* LOADING SCREEN (LOGO SORE) */
        #loader { position: fixed; inset: 0; background: #000; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .loader-img { width: 120px; height: auto; animation: pulseGlow 1.5s infinite alternate; filter: drop-shadow(0 0 20px rgba(212,255,0,0.3));}
        .loader-text { margin-top: 20px; font-family: 'Space Grotesk'; font-weight: 800; color: var(--kc-yellow); letter-spacing: 3px; font-size: 12px; animation: blink 1s infinite;}
        @keyframes pulseGlow { 0% { transform: scale(0.95); filter: drop-shadow(0 0 10px rgba(212,255,0,0.2)); } 100% { transform: scale(1.05); filter: drop-shadow(0 0 30px rgba(212,255,0,0.6)); } }
        @keyframes blink { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }

        /* BACKGROUND AMBIENT */
        .ambient-light { position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.15; animation: floatLight 10s infinite alternate; }
        .light-1 { top: -10%; left: -20%; width: 400px; height: 400px; background: var(--kc-yellow); }
        .light-2 { bottom: -20%; right: -20%; width: 300px; height: 300px; background: var(--electric-blue); animation-delay: 2s; }
        @keyframes floatLight { 0% {transform: translate(0,0);} 100% {transform: translate(30px, 30px);} }

        /* MAIN LOGIN WRAPPER */
        .login-wrapper { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        
        .logo-main { width: 140px; height: auto; margin-bottom: 10px; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));}
        
        .app-title { font-family: 'Outfit'; font-size: 28px; font-weight: 900; color: white; margin: 0; text-transform: uppercase; letter-spacing: 1px;}
        .app-subtitle { font-family: 'Space Grotesk'; font-size: 11px; font-weight: 800; color: var(--kc-yellow); letter-spacing: 3px; margin-bottom: 40px; text-transform: uppercase;}

        .login-box { width: 100%; max-width: 350px; background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); border-radius: 24px; padding: 30px 25px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }

        .form-group { margin-bottom: 20px; position: relative;}
        .form-label { display: block; font-size: 10px; font-weight: 800; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        
        .input-icon-wrap { position: relative; }
        .input-icon-wrap i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #64748B; font-size: 16px; transition: 0.3s;}
        
        .form-input { width: 100%; padding: 16px 15px 16px 45px; border-radius: 14px; border: 1px solid #222; background: #0a0a0a; color: white; font-family: 'Space Grotesk'; font-size: 16px; font-weight: 700; outline: none; transition: 0.3s; text-transform: uppercase;}
        .form-input:focus { border-color: var(--kc-yellow); box-shadow: 0 0 15px rgba(212,255,0,0.1); background: #000;}
        .form-input:focus + i { color: var(--kc-yellow); }

        /* WARNING PIN */
        .pin-warning { background: rgba(239,68,68,0.1); border-left: 3px solid var(--danger); padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: flex-start; gap: 10px;}
        .pin-warning i { color: var(--danger); font-size: 14px; margin-top: 2px;}
        .pin-warning p { margin: 0; font-size: 10px; color: #cbd5e1; line-height: 1.4; font-weight: 600;}
        .pin-warning b { color: white; }

        .btn-login { width: 100%; padding: 18px; border-radius: 14px; border: none; background: var(--kc-yellow); color: black; font-family: 'Space Grotesk'; font-size: 15px; font-weight: 900; letter-spacing: 1px; cursor: pointer; box-shadow: 0 10px 25px rgba(212,255,0,0.3); transition: 0.2s;}
        .btn-login:active { transform: scale(0.96); box-shadow: 0 5px 15px rgba(212,255,0,0.4); }

        .btn-eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #64748B; cursor: pointer; font-size: 16px; padding: 0;}
    </style>
</head>
<body>

    <div id="loader">
        <img src="sore.png" class="loader-img" alt="Sore" onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
        <div class="loader-text">MEMUAT SISTEM KC...</div>
    </div>

    <div class="ambient-light light-1"></div>
    <div class="ambient-light light-2"></div>

    <div class="login-wrapper">
        <img src="logo_kc.png" class="logo-main" alt="KC Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/847/847969.png'">
        <h1 class="app-title">KARTIKA CHANDRA</h1>
        <div class="app-subtitle">Maka Lintas Utara</div>

        <div class="login-box">
            <div class="form-group">
                <label class="form-label">Plat Nomor Kendaraan</label>
                <div class="input-icon-wrap">
                    <input type="text" id="platInput" class="form-input" placeholder="Contoh: B 1234 ABC">
                    <i class="fas fa-motorcycle"></i>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 10px;">
                <label class="form-label">PIN Login App</label>
                <div class="input-icon-wrap">
                    <input type="password" id="pinInput" class="form-input" placeholder="Masukkan PIN Login">
                    <i class="fas fa-lock"></i>
                    <button class="btn-eye" onclick="togglePin()"><i class="fas fa-eye" id="eyeIcon"></i></button>
                </div>
            </div>

            <div class="pin-warning">
                <i class="fas fa-exclamation-circle"></i>
                <p><b>PERHATIAN:</b> Ini adalah PIN Khusus untuk masuk aplikasi. <b>BUKAN</b> PIN Tabungan Anda. Jangan sampai tertukar!</p>
            </div>

            <button class="btn-login" id="btnLogin" onclick="prosesLogin()">MASUK SYSTEM</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // KONEKSI MURNI DATABASE KC (antriankcnew)
        const firebaseConfig = {
            apiKey: "AIzaSyDfsTAGclYUSRe6YhiljS-xb-v-9RBYVEM",
            authDomain: "antriankcnew.firebaseapp.com",
            projectId: "antriankcnew"
        };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // HILANGKAN LOADER SORE.PNG SETELAH 2 DETIK
        window.onload = () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 2000);
        };

        // FUNGSI LIHAT PIN
        window.togglePin = () => {
            const input = document.getElementById('pinInput');
            const icon = document.getElementById('eyeIcon');
            if(input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        };

        // PROSES LOGIN
        window.prosesLogin = async () => {
            const platRaw = document.getElementById('platInput').value;
            const pinRaw = document.getElementById('pinInput').value;
            
            // Bersihkan spasi dan jadikan huruf besar biar validasinya gampang
            const platBersih = platRaw.replace(/\s+/g, '').toUpperCase();

            if(!platBersih || !pinRaw) return alert("Plat Nomor dan PIN wajib diisi!");

            const btn = document.getElementById('btnLogin');
            btn.innerText = "MEMVERIFIKASI...";
            btn.style.opacity = "0.7";

            try {
                // Tarik data dari koleksi 'anggota' di DB antriankcnew
                const snap = await getDocs(collection(db, "anggota"));
                let userDoc = null;
                let userId = null;

                snap.forEach(d => {
                    const platDB = (d.data().plat || "").replace(/\s+/g, '').toUpperCase();
                    if(platDB === platBersih) {
                        userDoc = d.data();
                        userId = d.id;
                    }
                });

                if(userDoc) {
                    // CEK PIN LOGIN (Disimpan terpisah di field 'pin_login')
                    // Jika pin_login belum ada, kita kasih toleransi baca field 'pin' lama, 
                    // TAPI kalau dua-duanya kosong, berarti dia member baru yang belum set PIN Login.
                    
                    const dbPinLogin = userDoc.pin_login || userDoc.pin;

                    if(!dbPinLogin) {
                        // KONDISI 1: MEMBER BELUM BIKIN PIN LOGIN
                        if(confirm(`Anda belum memiliki PIN Login Aplikasi.\n\nApakah Anda ingin menyimpan [ ${pinRaw} ] sebagai PIN Login Anda sekarang?`)) {
                            // Simpan PIN ke database sebagai pin_login
                            await updateDoc(doc(db, "anggota", userId), { pin_login: pinRaw });
                            berhasilLogin(userId, userDoc);
                        } else {
                            btn.innerText = "MASUK SYSTEM";
                            btn.style.opacity = "1";
                        }
                    } else {
                        // KONDISI 2: MEMBER SUDAH PUNYA PIN LOGIN
                        if(dbPinLogin === pinRaw) {
                            berhasilLogin(userId, userDoc);
                        } else {
                            alert("❌ PIN LOGIN SALAH!\n\nPastikan Anda tidak terbalik memasukkan PIN Tabungan ke sini.");
                            btn.innerText = "MASUK SYSTEM";
                            btn.style.opacity = "1";
                        }
                    }
                } else {
                    alert("❌ Plat Nomor tidak ditemukan di database KC!\nPastikan Anda sudah terdaftar.");
                    btn.innerText = "MASUK SYSTEM";
                    btn.style.opacity = "1";
                }

            } catch(e) {
                alert("Terjadi kesalahan jaringan: " + e.message);
                btn.innerText = "MASUK SYSTEM";
                btn.style.opacity = "1";
            }
        };

        // FUNGSI JIKA LOGIN SUKSES
        function berhasilLogin(id, data) {
            // Gabungin ID ke data biar gampang dipanggil di halaman lain
            data.id = id;
            
            // Simpan sesi login di HP user
            localStorage.setItem('maka_user', JSON.stringify(data));
            localStorage.setItem('myPlat', data.plat);
            
            // Arahin langsung ke Dashboard Utama KC
            window.location.href = 'dashboard_kc.html';
        }
    </script>
        <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                // Pastikan ini manggil sw_kc.js, BUKAN sw.js
                navigator.serviceWorker.register('sw_kc.js')
                .then(registration => {
                    console.log('PWA KC Berhasil jalan!', registration.scope);
                })
                .catch(err => {
                    console.log('PWA KC Gagal:', err);
                });
            });
        }
        </script>
    
</body>
</html>
