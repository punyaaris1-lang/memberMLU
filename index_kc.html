<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Maka Lintas KC</title>
    
    <link rel="manifest" href="manifest_kc.json">
    <link rel="icon" href="logo_kc.png">
    <meta name="theme-color" content="#000000">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { margin: 0; padding: 0; height: 100vh; background: #000000; font-family: 'Inter', sans-serif; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden;}
        * { box-sizing: border-box; outline: none; }

        /* Ornamen Cahaya Hijau/Kuning KC */
        .bg-glow { position: absolute; width: 300px; height: 300px; background: #D4FF00; filter: blur(100px); border-radius: 50%; opacity: 0.15; top: -50px; right: -50px; z-index: 0; animation: pulseGlow 4s infinite alternate;}
        .bg-glow-2 { position: absolute; width: 200px; height: 200px; background: #10B981; filter: blur(80px); border-radius: 50%; opacity: 0.15; bottom: -20px; left: -20px; z-index: 0;}
        @keyframes pulseGlow { 0% {transform: scale(1);} 100% {transform: scale(1.2);} }

        .login-box { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); width: 90%; max-width: 380px; padding: 40px 30px; border-radius: 30px; text-align: center; z-index: 10; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        
        .logo-wrap { width: 100px; height: 100px; margin: 0 auto 20px; background: #111; border-radius: 25px; padding: 10px; border: 2px solid #D4FF00; box-shadow: 0 0 20px rgba(212, 255, 0, 0.2); }
        .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }
        
        h2 { margin: 0 0 5px; font-family: 'Space Grotesk'; font-size: 26px; color: white; }
        p { margin: 0 0 30px; font-size: 11px; color: #94A3B8; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #D4FF00; font-size: 16px; }
        input { width: 100%; padding: 16px 16px 16px 50px; border-radius: 18px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; font-family: 'Space Grotesk'; font-size: 16px; font-weight: 700; text-transform: uppercase; transition: 0.3s; }
        input:focus { border-color: #D4FF00; box-shadow: 0 0 10px rgba(212, 255, 0, 0.2); }
        input::placeholder { color: #64748b; font-weight: 500; text-transform: none;}

        .btn-login { width: 100%; padding: 18px; border: none; border-radius: 18px; background: linear-gradient(135deg, #D4FF00, #10B981); color: black; font-family: 'Space Grotesk'; font-size: 16px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(212, 255, 0, 0.2); transition: 0.2s; margin-top: 10px;}
        .btn-login:active { transform: scale(0.95); }

        .error-msg { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); color: #EF4444; font-size: 11px; font-weight: 700; margin-top: 15px; padding: 12px; border-radius: 12px; display: none; }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="login-box">
        <div class="logo-wrap">
            <img src="logo_kc.png" alt="Logo KC" onerror="this.src='https://cdn-icons-png.flaticon.com/512/854/854878.png'">
        </div>
        <h2>LOGIN KC</h2>
        <p>Akses Khusus Anggota Kartika Chandra</p>

        <div class="input-group">
            <i class="fas fa-motorcycle"></i>
            <input type="text" id="inputPlat" placeholder="B 1234 XYZ" autocomplete="off">
        </div>

        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="inputPin" placeholder="PIN (4 Angka)" pattern="[0-9]*" inputmode="numeric" maxlength="4">
        </div>

        <div id="errorBox" class="error-msg"></div>
        
        <button class="btn-login" id="btnLogin" onclick="prosesLogin()">MASUK APLIKASI</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Konfigurasi Database Utama untuk verifikasi member
        const firebaseConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5", storageBucket: "rtomaka-e67b5.firebasestorage.app", messagingSenderId: "472036722228", appId: "1:472036722228:web:11d520f9204db317d02c61" };
        const app = initializeApp(firebaseConfig); 
        const db = getFirestore(app);

        // Jika sudah login, langsung lempar ke dashboard KC
        document.addEventListener("DOMContentLoaded", () => {
            if (localStorage.getItem('maka_user')) {
                window.location.href = 'dashboard_kc.html';
            }
        });

        document.getElementById('inputPlat').addEventListener('input', function(e) { this.value = this.value.toUpperCase(); });

        window.prosesLogin = async () => {
            const rawPlat = document.getElementById('inputPlat').value.trim().toUpperCase();
            const pin = document.getElementById('inputPin').value.trim();
            const errBox = document.getElementById('errorBox');
            const btn = document.getElementById('btnLogin');

            if (!rawPlat || !pin) { errBox.innerHTML = "Plat Nomor dan PIN wajib diisi!"; errBox.style.display = 'block'; return; }
            if (pin.length !== 4) { errBox.innerHTML = "PIN harus 4 angka!"; errBox.style.display = 'block'; return; }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> MEMERIKSA...';
            btn.style.opacity = '0.7'; errBox.style.display = 'none';

            try {
                const querySnapshot = await getDocs(collection(db, "mlu_members"));
                let userData = null; 
                let docId = null;

                querySnapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const platDiDatabase = data.plat || data.Plat || data.PLAT || data.plat_nomor || "";
                    if (String(platDiDatabase).replace(/\s+/g, '').toUpperCase() === rawPlat.replace(/\s+/g, '') && platDiDatabase !== "") {
                        userData = data; docId = docSnap.id;
                    }
                });

                if (!userData) {
                    errBox.innerHTML = `Plat <b>${rawPlat}</b> tidak terdaftar!`;
                    errBox.style.display = 'block'; btn.innerHTML = 'MASUK APLIKASI'; btn.style.opacity = '1'; return;
                }

                if (!userData.pin || userData.pin === "") {
                    await updateDoc(doc(db, "mlu_members", docId), { pin: pin }); userData.pin = pin; 
                } else if (pin !== String(userData.pin)) {
                    errBox.innerHTML = `PIN Salah!`; errBox.style.display = 'block'; btn.innerHTML = 'MASUK APLIKASI'; btn.style.opacity = '1'; return;
                }

                if (rawPlat.replace(/\s+/g, '') === "B4248SWF") { userData.isSuperAdmin = true; userData.role = "PENGURUS"; }

                userData.id = docId; localStorage.setItem('maka_user', JSON.stringify(userData));
                
                btn.innerHTML = 'BERHASIL!'; btn.style.background = 'var(--success)'; btn.style.color = 'white'; btn.style.opacity = '1';
                
                // LEMPAR KE DASHBOARD KC
                setTimeout(() => { window.location.href = 'dashboard_kc.html'; }, 800);

            } catch (error) {
                errBox.innerHTML = "Gangguan koneksi. Coba lagi."; errBox.style.display = 'block'; btn.innerHTML = 'MASUK APLIKASI'; btn.style.opacity = '1';
            }
        };

        document.getElementById('inputPin').addEventListener('keypress', function (e) { if (e.key === 'Enter') prosesLogin(); });
    </script>
</body>
</html>
