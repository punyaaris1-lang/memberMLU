<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLU - Tactical Route</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Grotesk:wght@700;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        :root { 
            --kc-cyan: #00E5FF; --kc-cyan-dark: #0077B6; 
            --royal-blue: #0A2259; --electric-blue: #2D63ED;
            --bg-surface: #F0F4F8; --bg-panel: rgba(255, 255, 255, 0.95); --border-glass: rgba(45, 99, 237, 0.2);
            --text-main: #0F172A; --text-muted: #64748B; --danger: #EF4444; --success: #10B981;
        }

        body { margin: 0; background: var(--bg-surface); font-family: 'Inter', sans-serif; color: var(--text-main); overflow: hidden; -webkit-tap-highlight-color: transparent;}
        * { box-sizing: border-box; outline: none; }

        /* HEADER WHITE/LIGHT MODE */
        .top-header { position: absolute; top: 0; left: 0; width: 100%; padding: 25px 20px 25px; background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0.8) 70%, rgba(255,255,255,0) 100%); z-index: 1000; display: flex; align-items: flex-start; gap: 15px; pointer-events: none;}
        .btn-back { width: 40px; height: 40px; border-radius: 12px; background: white; border: 1px solid var(--border-glass); color: var(--electric-blue); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05); pointer-events: auto; text-decoration: none;}
        .btn-back:active { transform: scale(0.9); }
        .header-title { font-family: 'Outfit'; font-size: 20px; font-weight: 900; letter-spacing: 1px; color: var(--royal-blue); margin-top: 5px; text-shadow: 0 2px 10px rgba(255,255,255,0.8);}

        /* MAP AREA */
        #mapContainer { width: 100%; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1;}

        /* CUSTOM MARKERS */
        .custom-div-icon { background: transparent; border: none; }
        .marker-fc { width: 35px; height: 35px; background: var(--electric-blue); border: 3px solid white; border-radius: 50%; box-shadow: 0 5px 15px rgba(45,99,237,0.4); display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; transition: 0.3s;}
        .marker-fc.is-kc { background: #10B981; box-shadow: 0 5px 15px rgba(16,185,129,0.4); }
        .marker-fc.is-gading { background: #F59E0B; box-shadow: 0 5px 15px rgba(245,158,11,0.4); }
        
        .marker-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); background: white; color: var(--royal-blue); padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 900; white-space: nowrap; box-shadow: 0 3px 10px rgba(0,0,0,0.1); border: 1px solid rgba(0,0,0,0.05);}
        
        .marker-me { width: 20px; height: 20px; background: var(--electric-blue); border: 3px solid white; border-radius: 50%; box-shadow: 0 0 0 10px rgba(45,99,237,0.2), 0 5px 15px rgba(0,0,0,0.3); animation: pulseMe 2s infinite;}
        @keyframes pulseMe { 0% { box-shadow: 0 0 0 0 rgba(45,99,237,0.4); } 70% { box-shadow: 0 0 0 15px rgba(45,99,237,0); } 100% { box-shadow: 0 0 0 0 rgba(45,99,237,0); } }

        /* SEARCH CONTROL */
        .leaflet-routing-container { display: none !important; }
        
        .search-panel { position: absolute; top: 85px; left: 20px; right: 20px; z-index: 1000; pointer-events: auto;}
        .search-box { background: white; backdrop-filter: blur(15px); border: 1px solid var(--border-glass); border-radius: 18px; padding: 15px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 10px 30px rgba(10,34,89,0.1); }
        
        .search-input-wrapper { display: flex; align-items: flex-start; gap: 10px; }
        .search-input-wrapper i { color: var(--electric-blue); font-size: 18px; margin-top: 10px; }
        .search-input { flex: 1; background: #F8FAFC; border: 1px solid #E2E8F0; color: var(--text-main); padding: 12px 15px; border-radius: 12px; font-family: 'Inter'; font-size: 13px; font-weight: 600; outline: none; resize: none; }
        .search-input:focus { border-color: var(--electric-blue); }
        
        .btn-search { background: var(--royal-blue); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 900; font-family: 'Space Grotesk'; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 15px rgba(10,34,89,0.2);}
        .btn-search:active { transform: scale(0.96); }

        #statusText { font-size:10px; font-weight:800; color:var(--electric-blue); text-align:center; background:#EFF6FF; padding:8px; border-radius:8px; display:none; border: 1px dashed #BFDBFE;}

        /* BOTTOM SHEET */
        .drive-sheet { position: absolute; bottom: -100%; left: 0; width: 100%; background: white; border-top: 1px solid var(--border-glass); border-radius: 30px 30px 0 0; padding: 25px 25px 40px; z-index: 1000; box-shadow: 0 -15px 40px rgba(0,0,0,0.1); transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);}
        .drive-sheet.show { bottom: 0; }
        
        .ds-handle { width: 50px; height: 5px; background: #CBD5E1; border-radius: 10px; margin: 0 auto 20px; }
        .ds-title { font-family: 'Outfit'; font-size: 20px; font-weight: 900; color: var(--royal-blue); margin: 0 0 5px; text-transform: uppercase;}
        .ds-desc { font-size: 11px; color: var(--text-muted); font-weight: 600; margin-bottom: 20px; line-height: 1.4;}
        
        .btn-gmaps { width: 100%; background: linear-gradient(135deg, var(--electric-blue), #1D4ED8); color: white; border: none; padding: 18px; border-radius: 16px; font-family: 'Space Grotesk'; font-size: 14px; font-weight: 900; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 10px 25px rgba(45,99,237,0.3); cursor: pointer; transition: 0.2s;}
        .btn-gmaps:active { transform: scale(0.96); }

        .btn-cancel { width: 100%; background: transparent; border: 1px solid #E2E8F0; color: var(--text-muted); padding: 15px; border-radius: 16px; font-family: 'Space Grotesk'; font-weight: 800; margin-top: 10px; cursor: pointer; background: #F8FAFC;}
        .btn-cancel:active { background: #E2E8F0; }
    </style>
</head>
<body>

    <div class="top-header">
        <a href="dashboard_kc.html" class="btn-back"><i class="fas fa-arrow-left"></i></a>
        <div class="header-title">TACTICAL NAVIGATOR</div>
    </div>

    <div class="search-panel">
        <div class="search-box">
            <div class="search-input-wrapper">
                <i class="fas fa-map-marker-alt"></i>
                <textarea id="inpTujuan" class="search-input" rows="2" placeholder="Ketik tujuan akhir (Bisa masukkan 2 alamat atau lebih, pisahkan dengan koma/enter)"></textarea>
            </div>
            <button class="btn-search" onclick="cariMultiTujuan()"><i class="fas fa-route"></i> CARI RUTE</button>
            <div id="statusText"></div>
        </div>
    </div>

    <div id="mapContainer"></div>

    <div class="drive-sheet" id="driveSheet">
        <div class="ds-handle"></div>
        <div style="display:flex; align-items:flex-start; gap:15px; margin-bottom:20px;">
            <div style="width:50px; height:50px; background:rgba(45,99,237,0.1); border:1px solid var(--electric-blue); color:var(--electric-blue); border-radius:16px; display:flex; align-items:center; justify-content:center; font-size:24px;">
                <i class="fas fa-charging-station"></i>
            </div>
            <div style="flex:1;">
                <h3 class="ds-title" id="dsFcName">NAMA FC</h3>
                <div class="ds-desc">Google Maps akan menuntun Anda mampir ke Charging Station ini sebelum melanjutkan ke tujuan akhir.</div>
            </div>
        </div>
        <button class="btn-gmaps" id="btnGas"><i class="fas fa-location-arrow"></i> BUKA GOOGLE MAPS</button>
        <button class="btn-cancel" onclick="tutupSheet()">BATAL</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // KONEKSI FIREBASE MLU
        const appMLUConfig = { apiKey: "AIzaSyAk3G5aQUBVe_g7_peVu1F6xllP_RejGq0", authDomain: "rtomaka-e67b5.firebaseapp.com", projectId: "rtomaka-e67b5" };
        const appMLU = initializeApp(appMLUConfig, "AppMLU");
        const dbMLU = getFirestore(appMLU);

        let map, routingControl;
        let myLat = null, myLng = null;
        let selectedFcLat = null, selectedFcLng = null;
        
        // Simpan teks alamat tujuan asli yang diketik user
        let rawDestinations = []; 
        // Simpan hasil koordinat kasar buat nggambar garis biru
        let geocodedWaypoints = []; 

        // INISIALISASI PETA TEMA TERANG (VOYAGER)
        map = L.map('mapContainer', { zoomControl: false }).setView([-6.200000, 106.816666], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '© CartoDB',
            maxZoom: 19
        }).addTo(map);

        const statusEl = document.getElementById('statusText');
        function setStatus(msg) { statusEl.style.display = 'block'; statusEl.innerText = msg; }

        // 1. LOKASI MEMBER SAAT INI
        setStatus("Mencari Sinyal GPS...");
        if(navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                myLat = pos.coords.latitude; myLng = pos.coords.longitude;
                map.setView([myLat, myLng], 14);
                
                L.marker([myLat, myLng], {
                    icon: L.divIcon({ className: 'custom-div-icon', html: `<div class="marker-me"></div>`, iconSize:[20,20], iconAnchor:[10,10] }),
                    zIndexOffset: 1000
                }).addTo(map);
                
                loadFcLocations();
                setStatus("GPS Terkunci. Masukkan Tujuan Anda.");
                setTimeout(()=> { statusEl.style.display = 'none'; }, 3000);
            }, (err) => { alert("GPS gagal. Pastikan izin lokasi aktif!"); setStatus("GPS Ditolak."); }, {enableHighAccuracy: true});
        }

        // 2. LOAD SEMUA TITIK FC
        async function loadFcLocations() {
            // Masukkan data statis (Gading & KC)
            const fixedStations = [
                { id: 'gading', name: 'FC Kelapa Gading', lat: -6.159389, lng: 106.901416, class: 'is-gading' },
                { id: 'kc', name: 'Kartika Chandra', lat: -6.2285953, lng: 106.819502, class: 'is-kc' }
            ];

            let allLocations = [...fixedStations];
            const snap = await getDocs(collection(dbMLU, "fc_locations"));
            
            snap.forEach(doc => {
                const data = doc.data();
                if(data.isActive !== false && doc.id !== 'kc' && doc.id !== 'gading') {
                    allLocations.push({ 
                        id: doc.id, name: data.name || doc.id, 
                        lat: parseFloat(data.lat || data.latitude), 
                        lng: parseFloat(data.lng || data.longitude),
                        class: ''
                    });
                }
            });

            allLocations.forEach(loc => {
                if(!isNaN(loc.lat) && !isNaN(loc.lng)) {
                    const iconHtml = `
                        <div class="marker-fc ${loc.class}"><i class="fas fa-bolt"></i></div>
                        <div class="marker-label">${loc.name.toUpperCase()}</div>
                    `;
                    const fcMarker = L.marker([loc.lat, loc.lng], {
                        icon: L.divIcon({ className: 'custom-div-icon', html: iconHtml, iconSize:[35,35], iconAnchor:[17,17] })
                    }).addTo(map);

                    fcMarker.on('click', () => {
                        selectedFcLat = loc.lat; selectedFcLng = loc.lng;
                        document.getElementById('dsFcName').innerText = loc.name.toUpperCase();
                        document.getElementById('driveSheet').classList.add('show');
                    });
                }
            });
        }

        // 3. FUNGSI BYPASS GEOCODER (Biar alamat super panjang kayak Bekasi ttp ketemu daerahnya)
        async function getRoughCoordinates(address) {
            try {
                // Percobaan 1: Alamat Full
                let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address + ", Indonesia")}`);
                let data = await res.json();
                if(data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                
                // Percobaan 2: Bypass Alamat Kepanjangan (Potong nomor rumah dll, ambil 3 kata terakhir aja misal "Jati Asih Bekasi")
                let parts = address.split(' ');
                if(parts.length > 3) {
                    let fallbackStr = parts.slice(-3).join(' ');
                    let res2 = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(fallbackStr + ", Indonesia")}`);
                    let data2 = await res2.json();
                    if(data2 && data2.length > 0) return { lat: parseFloat(data2[0].lat), lng: parseFloat(data2[0].lon) };
                }
            } catch(e) { console.log(e); }
            return null; // Gagal nemu
        }

        // 4. PROSES MULTI TUJUAN (A -> B -> C)
        window.cariMultiTujuan = async () => {
            const rawInput = document.getElementById('inpTujuan').value;
            if(!rawInput.trim() || !myLat) return alert("Pastikan GPS aktif dan tujuan sudah diisi!");
            
            setStatus("Memindai rute jalan...");

            // Pecah inputan berdasarkan Koma atau Baris Baru
            rawDestinations = rawInput.split(/[,;\n]+/).map(s => s.trim()).filter(s => s.length > 2);
            geocodedWaypoints = [];

            // Hapus Rute Lama
            if(routingControl) map.removeControl(routingControl);

            // Cari koordinat masing-masing tujuan buat ngegambar garis biru
            for(let i = 0; i < rawDestinations.length; i++) {
                let coords = await getRoughCoordinates(rawDestinations[i]);
                if(coords) {
                    geocodedWaypoints.push(L.latLng(coords.lat, coords.lng));
                    
                    // Pasang bendera merah di peta
                    L.marker([coords.lat, coords.lng], {
                        icon: L.divIcon({ className: 'custom-div-icon', html: `<div style="font-size:30px; color:var(--danger); filter:drop-shadow(0 5px 10px rgba(239,68,68,0.5));"><i class="fas fa-map-marker-alt"></i></div><div class="marker-label" style="bottom:-25px;">Tujuan ${i+1}</div>`, iconSize:[30,30], iconAnchor:[15,30] })
                    }).addTo(map);
                }
            }

            if(geocodedWaypoints.length > 0) {
                // Susun rute: Posisi User -> Tujuan 1 -> Tujuan 2 -> dst
                let routingPoints = [ L.latLng(myLat, myLng), ...geocodedWaypoints ];
                
                routingControl = L.Routing.control({
                    waypoints: routingPoints,
                    lineOptions: { styles: [{ color: '#2D63ED', opacity: 0.7, weight: 5 }] },
                    createMarker: function() { return null; }, 
                    fitSelectedRoutes: true, show: false
                }).addTo(map);

                setStatus("Rute Biru Ditemukan! Klik icon FC yang nempel / searah dengan garis biru.");
            } else {
                alert("Sistem Peta gagal menggambar Garis Biru. Tapi tenang, Google Maps tetap akan mencari alamat tersebut saat Anda klik Gas.");
                setStatus("Garis rute tidak bisa digambar.");
            }
        };

        // 5. BUKA GOOGLE MAPS DENGAN MULTI WAYPOINTS (TEKS ASLI)
        document.getElementById('btnGas').onclick = () => {
            if(!selectedFcLat || !myLat) return;
            
            let gmapsUrl = "";
            
            if(rawDestinations.length > 0) {
                // Tujuan Akhir adalah elemen terakhir di array
                let finalDest = encodeURIComponent(rawDestinations[rawDestinations.length - 1]);
                
                // Waypoint mampir pertama adalah FC, dilanjut sisa tujuan (kalau tujuannya lebih dari 1)
                let stops = [`${selectedFcLat},${selectedFcLng}`]; // Titik mampir wajib: FC
                
                // Masukkan tujuan 1, tujuan 2, dll sbg waypoint (kecuali tujuan akhir)
                for(let i = 0; i < rawDestinations.length - 1; i++) {
                    stops.push(encodeURIComponent(rawDestinations[i]));
                }
                
                let waypointsString = stops.join('|');

                gmapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${myLat},${myLng}&destination=${finalDest}&waypoints=${waypointsString}&travelmode=driving`;
            } else {
                // Kalau klik FC tanpa masukin tujuan apa-apa
                gmapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${myLat},${myLng}&destination=${selectedFcLat},${selectedFcLng}&travelmode=driving`;
            }
            
            window.open(gmapsUrl, '_blank');
            tutupSheet();
        };

        window.tutupSheet = () => { document.getElementById('driveSheet').classList.remove('show'); };
    </script>
</body>
</html>
